<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .stand-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .stand-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream); padding: 40px; position: relative; overflow: hidden;
    }
    .stand-hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.04) 1.5px, transparent 1.5px);
      background-size: 18px 18px; pointer-events: none;
    }
    .stand-hero > * { position: relative; z-index: 1; }
    .stand-hero h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; font-weight: 500; margin: 0 0 6px; }
    .stand-hero p { font-size: 14px; opacity: 0.6; margin: 0; }

    .stand-body { padding: 24px var(--gutter); }

    .stand-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .stand-table th {
      text-align: left; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em; opacity: 0.45; padding: 10px 8px;
      border-bottom: 2px solid rgba(15,77,58,0.1); font-weight: 500;
    }
    .stand-table td {
      padding: 14px 8px;
      border-bottom: 1px solid rgba(15,77,58,0.05);
    }
    .stand-table tbody tr:first-child td {
      color: var(--gold-deep); font-weight: 600;
    }
    .stand-table tbody tr:hover td { background: rgba(15,77,58,0.02); }

    .rank-num { font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--gold-deep); }
    .team-name { font-weight: 600; }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; opacity: 0.5; }

    @media (max-width: 600px) {
      .stand-hero { padding: 28px 20px; }
      .stand-hero h1 { font-size: 28px; }
      .stand-table { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="stand-shell">
    <div class="stand-hero">
      <div class="eyebrow" style="margin-bottom: 10px;">Standings</div>
      <h1>Division standings</h1>
      <p>Updated live after each league night. W-L-T plus round point differential.</p>
    </div>

    <div class="stand-body">
      <div class="tabs" id="stand-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>

      <div id="stand-content">
        <div class="empty-state">Standings will populate once league play begins.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('stand-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#stand-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
