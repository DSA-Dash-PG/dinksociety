<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .teams-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .teams-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream); padding: 40px; position: relative; overflow: hidden;
    }
    .teams-hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.04) 1.5px, transparent 1.5px);
      background-size: 18px 18px; pointer-events: none;
    }
    .teams-hero > * { position: relative; z-index: 1; }
    .teams-hero h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; font-weight: 500; margin: 0 0 6px; }
    .teams-hero p { font-size: 14px; opacity: 0.6; margin: 0; }

    .teams-body { padding: 24px var(--gutter); }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .team-card {
      background: white; border: 1px solid rgba(15,77,58,0.06);
      border-radius: var(--radius-sm); padding: 18px; transition: border-color 0.15s;
    }
    .team-card:hover { border-color: rgba(15,77,58,0.15); }

    .team-card__top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .team-card__icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--emerald); display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .team-card__name { font-size: 15px; font-weight: 600; }
    .team-card__record { font-size: 12px; opacity: 0.4; }

    .team-card__roster {
      padding-top: 10px; border-top: 1px solid rgba(15,77,58,0.05);
      font-size: 13px; line-height: 1.7; opacity: 0.6;
    }
    .team-card__captain {
      color: var(--gold-deep); font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* Player profile expand (future) */
    .team-card__player {
      display: inline; cursor: default;
    }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; opacity: 0.5; }

    @media (max-width: 600px) {
      .teams-hero { padding: 28px 20px; }
      .teams-hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="teams-shell">
    <div class="teams-hero">
      <div class="eyebrow" style="margin-bottom: 10px;">Teams</div>
      <h1>Circuit I rosters</h1>
      <p>4&ndash;10 players per team. Tap a team to see the full roster, match history, and player profiles.</p>
    </div>

    <div class="teams-body">
      <div class="tabs" id="teams-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>

      <div id="teams-grid">
        <div class="empty-state">Teams will appear once rosters are set for Circuit I.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('teams-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#teams-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
