<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .success-shell { max-width: 600px; margin: 0 auto; padding: 60px var(--gutter) 80px; text-align: center; }

    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--gold); color: var(--emerald);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 20px; font-weight: 600;
    }
    .success-title {
      font-family: var(--font-display); font-style: italic;
      font-size: 32px; margin: 0 0 12px;
    }
    .success-body {
      font-size: 15px; line-height: 1.7; opacity: 0.7; margin: 0 0 28px;
    }
    .success-cta { margin-top: 8px; }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="success-shell">
    <div class="success-icon">&check;</div>
    <h1 class="success-title">You're in.</h1>
    <p class="success-body">
      Your registration for Circuit I is confirmed. If you registered as a team captain,
      check your email for a magic link to the captain portal where you can complete your roster.
      <br><br>
      Free agents &mdash; sit tight. You'll be drafted onto a team before the Circuit starts.
    </p>
    <div class="success-cta">
      <a href="/" class="btn btn--gold">Back to home</a>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
</body>
</html>
