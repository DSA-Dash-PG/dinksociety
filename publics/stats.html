<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .stats-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .stats-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream); padding: 40px; position: relative; overflow: hidden;
    }
    .stats-hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.04) 1.5px, transparent 1.5px);
      background-size: 18px 18px; pointer-events: none;
    }
    .stats-hero > * { position: relative; z-index: 1; }
    .stats-hero h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; font-weight: 500; margin: 0 0 6px; }
    .stats-hero p { font-size: 14px; opacity: 0.6; margin: 0; }

    .stats-body { padding: 24px var(--gutter); }

    /* Stat leaders grid */
    .stats-leaders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 32px;
    }
    .stat-leader {
      background: white; border: 1px solid rgba(15,77,58,0.06);
      border-radius: var(--radius-sm); padding: 16px;
    }
    .stat-leader__label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      opacity: 0.45; margin-bottom: 4px; font-weight: 500;
    }
    .stat-leader__value {
      font-family: var(--font-display); font-style: italic;
      font-size: 28px; color: var(--gold-deep);
    }
    .stat-leader__who { font-size: 12px; opacity: 0.5; margin-top: 2px; }

    /* Analytics section */
    .analytics-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold-deep); font-weight: 500; margin-bottom: 12px;
    }
    .analytics-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .analytics-card {
      background: white; border: 1px solid rgba(15,77,58,0.06);
      border-radius: var(--radius-sm); padding: 20px; min-height: 140px;
    }
    .analytics-card__title {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gold-deep); font-weight: 500; margin-bottom: 12px;
    }
    .analytics-card__placeholder {
      font-size: 13px; opacity: 0.35; text-align: center; padding: 24px 0;
    }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; opacity: 0.5; }

    @media (max-width: 600px) {
      .stats-hero { padding: 28px 20px; }
      .stats-hero h1 { font-size: 28px; }
      .analytics-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="stats-shell">
    <div class="stats-hero">
      <div class="eyebrow" style="margin-bottom: 10px;">Stats</div>
      <h1>Division stats &amp; analytics</h1>
      <p>Live analytics for active divisions. Filterable by division, team, and player.</p>
    </div>

    <div class="stats-body">
      <div class="tabs" id="stats-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>

      <div id="stats-content">
        <div class="empty-state">Stats will populate as matches are played and scores submitted.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('stats-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#stats-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
