<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Page — Stats Up Top Mockup · The Dink Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
<style>
:root, [data-theme="dark"] {
  --color-bg:#0e0e0e; --color-surface:#161616; --color-surface-2:#1e1e1e; --color-surface-3:#262626;
  --color-border:rgba(255,255,255,0.08); --color-border-strong:rgba(255,255,255,0.14); --color-divider:rgba(255,255,255,0.06);
  --color-text:#f0f0ec; --color-text-muted:#9a9e97; --color-text-faint:#5e625c; --color-text-inverse:#0e0e0e;
  --color-lime:#b8ff2c; --color-lime-dim:rgba(184,255,44,0.12); --color-lime-ghost:rgba(184,255,44,0.06);
  --color-teal:#17d7b0; --color-teal-dim:rgba(23,215,176,0.12); --color-red:#ff5c47; --color-red-dim:rgba(255,92,71,0.12); --color-gold:#f0c040;
  --radius-full:9999px; --radius-lg:20px; --radius-md:14px; --radius-sm:10px; --max-w:1040px; --gutter:20px; --transition:.18s ease;
}
[data-theme="light"] {
  --color-bg:#f5f6f2; --color-surface:#ffffff; --color-surface-2:#eef0ea; --color-surface-3:#e2e5dd;
  --color-border:rgba(12,18,14,0.10); --color-border-strong:rgba(12,18,14,0.16); --color-divider:rgba(12,18,14,0.07);
  --color-text:#111410; --color-text-muted:#5e665d; --color-text-faint:#8b948a; --color-text-inverse:#f4f5f1;
  --color-lime:#7acc00; --color-lime-dim:rgba(122,204,0,0.10); --color-lime-ghost:rgba(122,204,0,0.05);
  --color-teal:#0ea88d; --color-teal-dim:rgba(14,168,141,0.12); --color-red:#d84b3a; --color-red-dim:rgba(216,75,58,0.12); --color-gold:#c9972e;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--color-bg); color:var(--color-text); -webkit-font-smoothing:antialiased; padding-bottom:84px; }

.mock-wrap { max-width:1240px; margin:0 auto; padding:24px var(--gutter); }
.mock-label { font-size:11px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--color-lime); margin:26px 0 12px; display:flex; align-items:center; gap:8px; }
.mock-label::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--color-lime); }

/* phone frame */
.phone { width:392px; margin:0 auto; border:11px solid #222; border-radius:38px; overflow:hidden; background:var(--color-bg); box-shadow:0 20px 60px rgba(0,0,0,.5); }
.phone .tp-shell, .phone .panels, .phone .tabbar__in { max-width:100%; }

/* ── HERO ── */
.a-hero { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); overflow:hidden; }
.a-hero__top { display:flex; align-items:center; gap:34px; padding:38px 36px;
  background:
    radial-gradient(120% 150% at 0% 0%, rgba(184,255,44,.18), transparent 55%),
    radial-gradient(120% 160% at 100% 10%, rgba(23,215,176,.10), transparent 50%),
    linear-gradient(115deg, var(--color-surface-3), var(--color-surface)); }
.a-logo__mark { width:112px; height:112px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:46px; font-weight:900; color:#fff; box-shadow:0 8px 30px rgba(0,0,0,.4); flex-shrink:0; }
.a-headline { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
.a-name { font-size:clamp(2rem,4.5vw,3.2rem); font-weight:900; text-transform:uppercase; line-height:.98; margin:0 0 16px; font-style:italic; }
.a-callouts { display:flex; gap:40px; flex-wrap:wrap; align-items:flex-start; }
.a-callout { display:flex; align-items:baseline; gap:12px; }
.a-callout__big { font-size:clamp(2.2rem,5vw,3rem); font-weight:900; line-height:1; }
.a-callout__lbl { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-faint); line-height:1.3; max-width:120px; }
.num-green{color:#22c55e;} .num-red{color:var(--color-red);} .num-lime{color:var(--color-lime);} .num-teal{color:var(--color-teal);} .num-muted{color:var(--color-text-muted);}

/* Next match — now in the hero, under the callouts/DSR */
.a-next { display:inline-flex; align-items:center; gap:10px; margin-top:18px; padding:9px 15px; border:1px solid var(--color-border); border-radius:var(--radius-full); background:var(--color-surface-2); width:fit-content; }
.a-next__ic { color:var(--color-teal); display:flex; }
.a-next__lbl { font-size:9.5px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--color-text-faint); }
.a-next__val { font-size:13px; font-weight:800; }
.a-next__val b { color:var(--color-teal); }
.a-next__val span { color:var(--color-text-muted); font-weight:600; }

/* ── STAT ROWS (moved up; two rows) ── */
.a-stats { border-top:1px solid var(--color-border); }
.a-statrow { display:grid; }
.a-statrow--m { grid-template-columns:repeat(5,1fr); border-bottom:1px solid var(--color-border); }
.a-statrow--g { grid-template-columns:repeat(6,1fr); }
.a-stat2 { padding:18px 10px; border-right:1px solid var(--color-border); text-align:center; }
.a-stat2:last-child { border-right:none; }
.a-stat2__num { font-size:1.75rem; font-weight:900; line-height:1; font-variant-numeric:tabular-nums; }
.a-stat2__lbl { font-size:9px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--color-text-faint); margin-top:7px; }

/* ── TABS ── */
.tabbar { background:var(--color-surface-2); border-top:1px solid var(--color-border); border-bottom:1px solid var(--color-border); margin-top:20px; }
.tabbar__in { max-width:var(--max-w); margin:0 auto; display:flex; padding:0 16px; overflow:hidden; }
.tab { border:none; background:transparent; color:var(--color-text-muted); font-family:inherit; font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; padding:17px 26px; cursor:pointer; transform:skewX(-14deg); }
.tab > span { display:inline-block; transform:skewX(14deg); }
.tab.active { background:var(--color-lime); color:var(--color-text-inverse); }
.tab + .tab { margin-left:2px; }

/* ── PANELS ── */
.panels { padding:24px var(--gutter) 40px; max-width:var(--max-w); margin:0 auto; }
.card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:22px 24px; margin-bottom:18px; }
.card-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:15px; }
.card-head h3 { font-size:11px; font-weight:700; letter-spacing:.14em; font-style:italic; text-transform:uppercase; color:var(--color-text-faint); margin:0; display:flex; gap:8px; }
.pill { font-size:11px; font-weight:700; padding:3px 11px; border-radius:var(--radius-full); border:1px solid var(--color-border); color:var(--color-text-faint); background:var(--color-surface-2); }
.two-col { display:grid; grid-template-columns:1.3fr 1fr; gap:18px; }
.psum-row { display:flex; align-items:center; gap:15px; padding:13px; border-radius:var(--radius-md); background:var(--color-surface-2); border:1px solid var(--color-border); margin-bottom:9px; }
.psum-av { width:50px; height:50px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:#fff; flex-shrink:0; }
.psum-body { flex:1; min-width:0; }
.psum-name { font-size:15px; font-weight:800; font-style:italic; text-transform:uppercase; }
.psum-role { font-size:11px; font-weight:600; color:var(--color-text-faint); margin-top:2px; }
.psum-dsr { text-align:center; flex-shrink:0; padding-right:6px; }
.psum-dsr__n { font-size:19px; font-weight:900; color:var(--color-teal); }
.psum-dsr__l { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-faint); }
.psum-more { font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--color-lime); flex-shrink:0; }
.about-meta { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.about-meta__l { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--color-text-faint); margin-bottom:4px; }
.about-meta__v { font-size:14px; font-weight:700; }

/* ── MOBILE overrides (container-scoped so the phone frame renders mobile regardless of viewport) ── */
.is-mobile .a-hero__top { flex-direction:column; text-align:center; gap:18px; padding:30px 20px; }
.is-mobile .a-headline { align-items:center; }
.is-mobile .a-name { font-size:1.9rem; }
.is-mobile .a-callouts { justify-content:center; gap:30px; }
.is-mobile .a-callout__big { font-size:2.1rem; }
.is-mobile .a-next { margin-left:auto; margin-right:auto; }
.is-mobile .a-statrow--m { grid-template-columns:repeat(3,1fr); }
.is-mobile .a-statrow--g { grid-template-columns:repeat(3,1fr); }
.is-mobile .a-stat2 { padding:14px 6px; border-bottom:1px solid var(--color-border); }
.is-mobile .a-stat2__num { font-size:1.5rem; }
.is-mobile .tabbar__in { padding:0; }
.is-mobile .tab { flex:1; min-width:0; padding:14px 4px; font-size:10px; letter-spacing:.02em; transform:none; text-align:center; }
.is-mobile .tab > span { transform:none; display:block; white-space:nowrap; }
.is-mobile .tab + .tab { margin-left:0; border-left:1px solid var(--color-border); }
.is-mobile .two-col { grid-template-columns:1fr; }
.is-mobile .panels { padding:18px 14px 30px; }

.mock-bar { position:fixed; bottom:0; left:0; right:0; z-index:500; display:flex; flex-wrap:wrap; align-items:center; gap:14px; padding:10px 16px; background:#000; border-top:2px solid var(--color-lime); font-size:12px; color:#cfcfcf; }
.mock-bar strong { color:var(--color-lime); }
.mock-bar button { font:inherit; font-weight:700; font-size:11px; padding:6px 12px; border-radius:999px; border:1px solid #444; background:#1a1a1a; color:#eee; cursor:pointer; }
.mock-bar .spacer { flex:1; }
</style>
</head>
<body>

<div class="mock-wrap">
  <div class="mock-label">Full site</div>
  <div id="desktop"></div>

  <div class="mock-label">Mobile</div>
  <div class="phone"><div class="is-mobile" id="mobile"></div></div>
</div>

<div class="mock-bar">
  <strong>MOCKUP</strong>
  <span>Stats moved up (2 rows) · next match in hero under DSR · Season 1 removed · Season Snapshot card gone.</span>
  <span class="spacer"></span>
  <button id="tglTheme">Theme: Dark</button>
  <span style="color:#777;">PS / Pts Against / Diff = illustrative</span>
</div>

<script>
// Zero Zero Two — real figures from the team page; PS/PA/Diff illustrative.
const TEAM = {
  name:'Zero Zero Two', emoji:'🎯', color:'#1e1e1e', rank:3, dsr:407,
  wins:1, ties:1, losses:0, matchPts:3,
  gamesWon:9, gamesLost:3, ps:138, pa:121,
  next:{ date:'Jun 22', opp:'Timog Cal' },
  roster:12, captain:'Philip R.',
  players:[
    ['S','Shay C.','#e0533f',95.7],['L','Lara P.','#8b5cf6',70.1],['K','Kaithlyn R.','#5cc8e0',68.3],
    ['K','Kyle U.','#2bb1a0',65.0],['A','Anthony B.','#e08a2b',63.2],
  ],
};
function pct(w,n){ return n? Math.round(w/n*100):0; }
function signed(n){ return (n>0?'+':n<0?'−':'')+Math.abs(n); }

function buildTeam(t){
  const total = t.wins + t.ties + t.losses;
  const matchWin = pct(t.wins, total);
  const gameWin = pct(t.gamesWon, t.gamesWon + t.gamesLost);
  const diff = t.ps - t.pa;
  const diffCls = diff>0?'num-green':diff<0?'num-red':'num-muted';

  const stat = (num,lbl,cls)=>'<div class="a-stat2"><div class="a-stat2__num '+(cls||'')+'">'+num+'</div><div class="a-stat2__lbl">'+lbl+'</div></div>';

  return ''
  + '<div class="a-hero">'
  +   '<div class="a-hero__top">'
  +     '<div class="a-logo__mark" style="background:'+t.color+'">'+t.emoji+'</div>'
  +     '<div class="a-headline">'
  +       '<h1 class="a-name">'+t.name+'</h1>'
  +       '<div class="a-callouts">'
  +         '<div class="a-callout"><span class="a-callout__big num-lime">#'+t.rank+'</span><span class="a-callout__lbl">Division Rank</span></div>'
  +         '<div class="a-callout"><span class="a-callout__big num-teal">'+t.dsr+'</span><span class="a-callout__lbl">Team DSR</span></div>'
  +       '</div>'
  +       '<div class="a-next">'
  +         '<span class="a-next__ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>'
  +         '<span class="a-next__lbl">Next Match</span>'
  +         '<span class="a-next__val"><b>'+t.next.date+'</b> <span>vs '+t.next.opp+'</span></span>'
  +       '</div>'
  +     '</div>'
  +   '</div>'
  +   '<div class="a-stats">'
  +     '<div class="a-statrow a-statrow--m">'
  +       stat(t.wins,'Wins','num-green') + stat(t.ties,'Ties','num-muted') + stat(t.losses,'Losses','num-red')
  +       + stat(t.matchPts,'Match Points') + stat(matchWin+'%','Match Win %','num-teal')
  +     '</div>'
  +     '<div class="a-statrow a-statrow--g">'
  +       stat(t.gamesWon,'Games Won','num-lime') + stat(t.gamesLost,'Games Lost','num-muted') + stat(gameWin+'%','Games Win %')
  +       + stat(t.ps,'Pts Scored') + stat(t.pa,'Points Against','num-muted') + stat(signed(diff),'Diff',diffCls)
  +     '</div>'
  +   '</div>'
  + '</div>'
  + '<div class="tabbar"><div class="tabbar__in">'
  +   '<button class="tab active"><span>Overview</span></button>'
  +   '<button class="tab"><span>Stats</span></button>'
  +   '<button class="tab"><span>Schedule</span></button>'
  +   '<button class="tab"><span>Match History</span></button>'
  +   '<button class="tab"><span>Roster</span></button>'
  + '</div></div>'
  + '<div class="panels"><div class="two-col">'
  + '<div class="card"><div class="card-head"><h3>👥 Player Summary</h3><span class="pill">Top by DSR</span></div>'
  + t.players.map(function(p){ return '<div class="psum-row"><div class="psum-av" style="background:'+p[2]+'">'+p[0]+'</div><div class="psum-body"><div class="psum-name">'+p[1]+'</div><div class="psum-role">Player</div></div><div class="psum-dsr"><div class="psum-dsr__n">'+p[3]+'</div><div class="psum-dsr__l">DSR</div></div><div class="psum-more">View ›</div></div>'; }).join('')
  + '</div>'
  +   '<div class="card"><div class="card-head"><h3>ℹ️ About</h3></div>'
  +     '<div class="about-meta">'
  +       '<div><div class="about-meta__l">Roster</div><div class="about-meta__v">'+t.roster+' players</div></div>'
  +       '<div><div class="about-meta__l">Captain</div><div class="about-meta__v">'+t.captain+'</div></div>'
  +       '<div><div class="about-meta__l">Record (W–T–L)</div><div class="about-meta__v">'+t.wins+'–'+t.ties+'–'+t.losses+'</div></div>'
  +       '<div><div class="about-meta__l">Games Won</div><div class="about-meta__v">'+t.gamesWon+'–'+t.gamesLost+'</div></div>'
  +     '</div>'
  +   '</div>'
  + '</div></div>';
}

const html = buildTeam(TEAM);
document.getElementById('desktop').innerHTML = html;
document.getElementById('mobile').innerHTML = html;

document.getElementById('tglTheme').addEventListener('click', function(){
  const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', t);
  this.textContent = 'Theme: ' + (t==='dark'?'Dark':'Light');
});
</script>
</body>
</html>
