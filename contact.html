<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/shared-nav.css">
  <link rel="stylesheet" href="/css/compat.css">
</head>
<body>
  <div data-partial="nav"></div>

  <div class="contact-shell">
    <div class="contact-hero">
      <h1>Get in touch</h1>
      <p>Questions about the league, registration, or partnerships? Drop us a line.</p>
    </div>

    <div class="contact-body">
      <form class="contact-form" id="contact-form" onsubmit="return handleContact(event)">
        <div class="contact-row">
          <div class="contact-field">
            <label for="c-first">First name</label>
            <input type="text" id="c-first" name="first" required />
          </div>
          <div class="contact-field">
            <label for="c-last">Last name</label>
            <input type="text" id="c-last" name="last" required />
          </div>
        </div>
        <div class="contact-field">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" name="email" required />
        </div>
        <div class="contact-field">
          <label for="c-subject">What's this about?</label>
          <select id="c-subject" name="subject">
            <option value="">Select a topic</option>
            <option value="registration">Registration question</option>
            <option value="rules">Rules clarification</option>
            <option value="partnership">Partnership / sponsorship</option>
            <option value="feedback">Feedback</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="contact-field">
          <label for="c-message">Message</label>
          <textarea id="c-message" name="message" required></textarea>
        </div>
        <button type="submit" class="contact-submit">Send message</button>
        <div class="contact-status" id="contact-status"></div>
      </form>

      <div class="contact-info">
        <div class="contact-info__block">
          <div class="contact-info__label">Follow us</div>
          <div class="contact-info__value">
            <a href="https://instagram.com/dinksociety.pb" target="_blank" rel="noopener">@dinksociety.pb</a>
          </div>
        </div>
        <div class="contact-info__block">
          <div class="contact-info__label">Location</div>
          <div class="contact-info__value">South Bay, CA<br>Southern California</div>
        </div>
        <div class="contact-info__block">
          <div class="contact-info__label">League</div>
          <div class="contact-info__value">Circuit I &middot; May 2026<br>3.0 Mixed &amp; 3.5 Mixed</div>
        </div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    function handleContact(e) {
      e.preventDefault();
      const status = document.getElementById('contact-status');
      // Future: POST to a Netlify function or Resend endpoint
      status.className = 'contact-status contact-status--success';
      status.textContent = 'Message sent! We\'ll get back to you soon.';
      e.target.reset();
      return false;
    }
  </script>
</body>
</html>
