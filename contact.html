<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .contact-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .contact-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream); padding: 40px; position: relative; overflow: hidden;
    }
    .contact-hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.04) 1.5px, transparent 1.5px);
      background-size: 18px 18px; pointer-events: none;
    }
    .contact-hero > * { position: relative; z-index: 1; }
    .contact-hero h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; font-weight: 500; margin: 0 0 6px; }
    .contact-hero p { font-size: 14px; opacity: 0.6; margin: 0; }

    .contact-body {
      padding: 32px var(--gutter);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 800px;
    }

    .contact-form { display: flex; flex-direction: column; gap: 12px; }
    .contact-field label {
      display: block; font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; opacity: 0.55; margin-bottom: 5px; font-weight: 500;
    }
    .contact-field input,
    .contact-field select,
    .contact-field textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid rgba(15,77,58,0.12); border-radius: 6px;
      font-size: 14px; font-family: var(--font-body);
      background: white; color: var(--emerald);
      transition: border-color 0.15s;
    }
    .contact-field input:focus,
    .contact-field select:focus,
    .contact-field textarea:focus {
      outline: none; border-color: var(--gold);
    }
    .contact-field textarea { height: 120px; resize: vertical; }

    .contact-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .contact-submit {
      padding: 12px 24px; background: var(--gold); color: var(--emerald);
      border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body); transition: opacity 0.15s;
    }
    .contact-submit:hover { opacity: 0.9; }

    .contact-status {
      font-size: 13px; padding: 10px 14px; border-radius: 6px;
      display: none; margin-top: 4px;
    }
    .contact-status--success { display: block; background: rgba(29,158,117,0.1); color: #0F6E56; }
    .contact-status--error { display: block; background: rgba(163,45,45,0.1); color: #a32d2d; }

    /* Info sidebar */
    .contact-info { padding-top: 8px; }
    .contact-info__block { margin-bottom: 24px; }
    .contact-info__label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold-deep); font-weight: 500; margin-bottom: 6px;
    }
    .contact-info__value { font-size: 14px; line-height: 1.7; opacity: 0.75; }
    .contact-info__value a {
      color: var(--gold-deep); text-decoration: none; font-weight: 500;
    }

    @media (max-width: 700px) {
      .contact-body { grid-template-columns: 1fr; gap: 32px; }
      .contact-hero { padding: 28px 20px; }
      .contact-hero h1 { font-size: 28px; }
      .contact-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="contact-shell">
    <div class="contact-hero">
      <div class="eyebrow" style="margin-bottom: 10px;">Contact</div>
      <h1>Get in touch</h1>
      <p>Questions about the league, registration, or partnerships? Drop us a line.</p>
    </div>

    <div class="contact-body">
      <form class="contact-form" id="contact-form" onsubmit="return handleContact(event)">
        <div class="contact-row">
          <div class="contact-field">
            <label for="c-first">First name</label>
            <input type="text" id="c-first" name="first" required />
          </div>
          <div class="contact-field">
            <label for="c-last">Last name</label>
            <input type="text" id="c-last" name="last" required />
          </div>
        </div>
        <div class="contact-field">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" name="email" required />
        </div>
        <div class="contact-field">
          <label for="c-subject">What's this about?</label>
          <select id="c-subject" name="subject">
            <option value="">Select a topic</option>
            <option value="registration">Registration question</option>
            <option value="rules">Rules clarification</option>
            <option value="partnership">Partnership / sponsorship</option>
            <option value="feedback">Feedback</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="contact-field">
          <label for="c-message">Message</label>
          <textarea id="c-message" name="message" required></textarea>
        </div>
        <button type="submit" class="contact-submit">Send message</button>
        <div class="contact-status" id="contact-status"></div>
      </form>

      <div class="contact-info">
        <div class="contact-info__block">
          <div class="contact-info__label">Follow us</div>
          <div class="contact-info__value">
            <a href="https://instagram.com/dinksociety.pb" target="_blank" rel="noopener">@dinksociety.pb</a>
          </div>
        </div>
        <div class="contact-info__block">
          <div class="contact-info__label">Location</div>
          <div class="contact-info__value">South Bay, CA<br>Southern California</div>
        </div>
        <div class="contact-info__block">
          <div class="contact-info__label">League</div>
          <div class="contact-info__value">Circuit I &middot; May 2026<br>3.0 Mixed &amp; 3.5 Mixed</div>
        </div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    function handleContact(e) {
      e.preventDefault();
      const status = document.getElementById('contact-status');
      // Future: POST to a Netlify function or Resend endpoint
      status.className = 'contact-status contact-status--success';
      status.textContent = 'Message sent! We\'ll get back to you soon.';
      e.target.reset();
      return false;
    }
  </script>
</body>
</html>
