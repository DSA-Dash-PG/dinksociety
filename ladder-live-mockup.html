<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ladder Live — mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0b0d0a; --surf:#161914; --surf2:#1c1f18; --bd:rgba(255,255,255,.08); --bds:rgba(255,255,255,.16);
    --tx:#f0f2ec; --mut:#9aa094; --fnt:#5e655a;
    --lime:#b8ff2c; --teal:#17d7b0; --blue:#4aa3e0; --pink:#ff7bb0; --gold:#f0c040; --red:#ff5c47; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--tx); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:560px; margin:0 auto; padding:0 14px 60px; }
  a{ color:inherit; }

  /* mockup control bar (not part of the real page) */
  .mock{ background:#1a1205; border-bottom:1px solid rgba(240,192,64,.3); color:#f0c040; font-size:11.5px; padding:8px 14px; text-align:center; }
  .mock b{ font-weight:800; }
  .mock .seg{ display:inline-flex; gap:4px; margin-left:8px; vertical-align:middle; }
  .mock button{ font:inherit; font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px; border:1px solid rgba(240,192,64,.4); background:transparent; color:#f0c040; cursor:pointer; }
  .mock button.on{ background:#f0c040; color:#1a1205; }

  /* top bar */
  .top{ position:sticky; top:0; z-index:30; background:rgba(11,13,10,.86); backdrop-filter:blur(10px); border-bottom:1px solid var(--bd); }
  .top-in{ max-width:560px; margin:0 auto; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .brand{ display:flex; align-items:center; gap:9px; font-weight:900; font-size:14px; letter-spacing:-.01em; }
  .mk{ width:28px;height:28px;border-radius:8px;background:var(--lime);color:#000;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px; }
  .livepill{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; color:#06210f; background:var(--lime); border-radius:999px; padding:5px 11px; }
  .livepill.final{ background:var(--teal); }
  .livepill.soon{ background:var(--gold); }
  .ldot{ width:7px;height:7px;border-radius:50%;background:#06210f;animation:pulse 1.1s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* hero */
  .hero{ padding:18px 2px 6px; }
  .hero h1{ font-size:22px; font-weight:900; margin:0 0 5px; letter-spacing:-.02em; }
  .hero .meta{ font-size:12.5px; color:var(--mut); display:flex; flex-wrap:wrap; gap:5px 10px; }
  .hero .meta b{ color:var(--tx); font-weight:700; }

  /* find my court */
  .find{ position:sticky; top:51px; z-index:20; background:var(--bg); padding:10px 0 8px; }
  .find-in{ background:var(--surf); border:1px solid var(--bd); border-radius:13px; padding:11px 12px; }
  .find-lbl{ font-size:10.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--fnt); margin-bottom:7px; }
  .find input{ width:100%; background:var(--surf2); border:1px solid var(--bd); border-radius:10px; color:var(--tx); font:inherit; font-size:14px; padding:10px 12px; }
  .find input::placeholder{ color:var(--fnt); }
  .namechips{ display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
  .namechips button{ font:inherit; font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px; border:1px solid var(--bd); background:var(--surf2); color:var(--mut); cursor:pointer; }
  .namechips button:hover{ border-color:var(--bds); color:var(--tx); }

  /* you-banner */
  .you{ background:linear-gradient(135deg, rgba(184,255,44,.16), rgba(23,215,176,.08)); border:1px solid rgba(184,255,44,.4); border-radius:15px; padding:14px 15px; margin:10px 0 4px; }
  .you-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .you-court{ font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); }
  .you-big{ font-size:26px; font-weight:900; letter-spacing:-.01em; margin:3px 0 2px; }
  .you-sub{ font-size:12.5px; color:var(--mut); line-height:1.5; }
  .you-sub b{ color:var(--tx); }
  .you-next{ margin-top:11px; padding-top:11px; border-top:1px solid rgba(184,255,44,.2); font-size:12px; color:var(--mut); display:flex; align-items:center; gap:7px; }
  .you-next .pin{ font-size:14px; }
  .you-x{ background:none; border:0; color:var(--mut); font-size:18px; cursor:pointer; line-height:1; }

  /* round nav */
  .seclbl{ font-size:10.5px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--fnt); margin:18px 2px 9px; }
  .rounds{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .rchip{ font:inherit; font-size:12px; font-weight:800; padding:7px 13px; border-radius:10px; border:1.5px solid var(--bd); background:var(--surf); color:var(--mut); cursor:pointer; display:flex; align-items:center; gap:6px; }
  .rchip.on{ border-color:rgba(184,255,44,.5); background:rgba(184,255,44,.12); color:var(--lime); }
  .rchip.live{ border-color:rgba(23,215,176,.5); }
  .rchip.locked{ opacity:.45; cursor:not-allowed; }
  .rchip .d{ width:6px;height:6px;border-radius:50%; }
  .rchip .d.done{ background:var(--lime);} .rchip .d.live{ background:var(--teal); box-shadow:0 0 7px var(--teal); animation:pulse 1.1s infinite;} .rchip .d.next{ background:transparent;border:1.5px dashed var(--fnt);}

  /* court card */
  .court{ background:var(--surf); border:1px solid var(--bd); border-radius:14px; padding:13px 14px; margin-bottom:10px; }
  .court.mine{ border-color:rgba(184,255,44,.55); box-shadow:0 0 0 1px rgba(184,255,44,.25); }
  .court-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; }
  .court-nm{ font-size:11px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:var(--mut); display:flex; align-items:center; gap:7px; }
  .court-dot{ width:8px;height:8px;border-radius:50%;background:var(--blue); }
  .court-st{ font-size:9.5px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; padding:3px 8px; border-radius:999px; }
  .court-st.live{ color:#06210f; background:var(--teal); display:inline-flex; align-items:center; gap:5px; }
  .court-st.live .ldot{ background:#06210f; }
  .court-st.final{ color:var(--lime); background:rgba(184,255,44,.13); }
  .court-st.wait{ color:var(--mut); background:var(--surf2); }
  .matchup{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; }
  .side{ display:flex; flex-direction:column; gap:4px; min-width:0; }
  .side.r{ text-align:right; align-items:flex-end; }
  .pl{ font-size:13.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .pl .g{ font-size:9px; font-weight:800; color:var(--fnt); margin-left:4px; }
  .pl.me{ color:var(--lime); }
  .pl.f{ }
  .score{ text-align:center; min-width:64px; }
  .score .n{ font-size:24px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1; }
  .score .n .w{ color:var(--lime); } .score .n .sep{ color:var(--fnt); margin:0 3px; }
  .score .to{ font-size:9.5px; color:var(--fnt); font-weight:700; margin-top:3px; letter-spacing:.04em; }
  .score .vs{ font-size:12px; font-weight:900; letter-spacing:.1em; color:var(--fnt); }

  /* standings */
  .lbt{ width:100%; border-collapse:collapse; font-size:12.5px; }
  .lbt th{ text-align:right; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--fnt); font-weight:800; padding:5px 6px; border-bottom:1px solid var(--bd); }
  .lbt th.l{ text-align:left; }
  .lbt td{ text-align:right; padding:8px 6px; border-bottom:1px solid rgba(255,255,255,.05); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .lbt td.l{ text-align:left; font-weight:700; }
  .lbt tr.me td{ background:rgba(184,255,44,.07); }
  .rk{ display:inline-flex; width:20px; justify-content:center; color:var(--fnt); font-weight:900; }
  .rk.top{ color:var(--gold); }

  /* tabs */
  .tabs{ display:flex; gap:5px; background:var(--surf); border:1px solid var(--bd); border-radius:999px; padding:4px; margin:6px 0 4px; }
  .tabs button{ flex:1; padding:8px; border:0; border-radius:999px; font:inherit; font-size:12.5px; font-weight:800; cursor:pointer; background:transparent; color:var(--mut); }
  .tabs button.on{ background:var(--lime); color:#06210f; }

  .roster-row{ display:flex; align-items:center; gap:9px; padding:9px 11px; background:var(--surf); border:1px solid var(--bd); border-radius:10px; margin-bottom:7px; }
  .roster-row .av{ width:30px;height:30px;border-radius:9px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:var(--mut);flex-shrink:0; }
  .roster-row .av.f{ background:rgba(255,123,176,.14); color:var(--pink); }
  .roster-row .av.m{ background:rgba(74,163,224,.14); color:var(--blue); }
  .roster-row .nm{ flex:1; font-weight:700; font-size:13.5px; }
  .roster-row .tag{ font-size:10px; font-weight:800; color:var(--fnt); }

  .note{ background:var(--surf); border:1px solid var(--bd); border-radius:12px; padding:14px 15px; color:var(--mut); font-size:13px; line-height:1.6; }
  .note b{ color:var(--tx); }

  /* home-screen pinned live card */
  .hs-live{ background:linear-gradient(135deg, rgba(184,255,44,.15), rgba(23,215,176,.07)); border:1px solid rgba(184,255,44,.42); border-radius:16px; padding:15px 16px; margin:12px 0 6px; }
  .hs-tag{ display:inline-flex; align-items:center; gap:6px; font-size:10.5px; font-weight:900; letter-spacing:.09em; text-transform:uppercase; color:#06210f; background:var(--lime); border-radius:999px; padding:4px 10px; }
  .hs-nm{ font-size:20px; font-weight:900; letter-spacing:-.01em; margin:9px 0 2px; }
  .hs-sub{ font-size:12px; color:var(--mut); margin-bottom:12px; }
  .hs-you{ background:rgba(0,0,0,.22); border:1px solid rgba(184,255,44,.25); border-radius:12px; padding:11px 13px; margin-bottom:11px; }
  .hs-you .lab{ font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); }
  .hs-you .big{ font-size:19px; font-weight:900; margin-top:2px; }
  .hs-you .sm{ font-size:11.5px; color:var(--mut); margin-top:2px; }
  .hs-find input{ width:100%; background:var(--surf2); border:1px solid var(--bd); border-radius:10px; color:var(--tx); font:inherit; font-size:14px; padding:10px 12px; margin-bottom:11px; }
  .hs-cta{ display:block; width:100%; text-align:center; padding:12px; border:0; border-radius:11px; background:var(--lime); color:#06210f; font:inherit; font-size:14px; font-weight:900; cursor:pointer; }
  .hs-faded{ opacity:.4; pointer-events:none; }
  .countdown{ font-variant-numeric:tabular-nums; color:var(--gold); font-weight:800; }
  .foot{ text-align:center; font-size:11px; color:var(--fnt); margin-top:18px; }
  .hide{ display:none !important; }
</style>
</head>
<body>

<div class="mock">
  <b>MOCKUP</b> · preview a state:
  <span class="seg">
    <button data-state="home" class="on" onclick="setState('home')">🏠 Challengers' home</button>
    <button data-state="soon" onclick="setState('soon')">Before start</button>
    <button data-state="live" onclick="setState('live')">Live board</button>
    <button data-state="final" onclick="setState('final')">Final</button>
  </span>
</div>

<div class="top"><div class="top-in">
  <div class="brand"><span class="mk">DS</span> The Dink Society</div>
  <span id="statePill" class="livepill"><span class="ldot"></span>Live</span>
</div></div>

<div class="wrap">

  <div class="hero">
    <h1>Dink Society Ladder Challenge</h1>
    <div class="meta"><span>📅 <b>Thu, Jun 25</b></span><span>🕖 <b>7:00 PM</b></span><span>📍 <b>South End Racquet Club</b></span><span>🎾 Mixed · 12 players · 3 courts</span></div>
  </div>

  <!-- YOU banner -->
  <div id="youBanner"></div>

  <!-- LIVE / FINAL body -->
  <div id="liveBody"></div>

  <!-- BEFORE-START body -->
  <div id="soonBody" class="hide"></div>

  <div class="foot" id="foot">Updates automatically · last refresh 7:42 PM</div>
</div>

<script>
/* ---------------- sample data ---------------- */
const PLAYERS = [
  {id:'p1', name:'Annie Kang', g:'F'}, {id:'p2', name:'Devin Carroll', g:'M'},
  {id:'p3', name:'Fiat Tapaneeyakorn', g:'F'}, {id:'p4', name:'Gopi D', g:'M'},
  {id:'p5', name:'Kai Pylkkanen', g:'M'}, {id:'p6', name:'Kayo', g:'F'},
  {id:'p7', name:'KC T', g:'M'}, {id:'p8', name:'Phoebe Borsum', g:'F'},
  {id:'p9', name:'Richard Hak', g:'M'}, {id:'p10', name:'Ryan Hom', g:'M'},
  {id:'p11', name:'Stan Esperon', g:'M'}, {id:'p12', name:'Teddie Liu', g:'M'},
];
const P = Object.fromEntries(PLAYERS.map(p=>[p.id,p]));
const COURTS = ['Court 1','Court 2','Court 3'];
// rounds: each court = { a:[id,id], b:[id,id], sa, sb, done }
const ROUNDS = [
  { round:1, courts:[
    { c:0, a:['p2','p1'], b:['p4','p8'], sa:11, sb:7,  done:true },
    { c:1, a:['p5','p6'], b:['p7','p3'], sa:9,  sb:11, done:true },
    { c:2, a:['p9','p10'],b:['p11','p12'],sa:11,sb:8,  done:true },
  ]},
  { round:2, courts:[
    { c:0, a:['p2','p6'], b:['p9','p8'], sa:11, sb:6,  done:true },
    { c:1, a:['p4','p1'], b:['p7','p3'], sa:8,  sb:11, done:true },
    { c:2, a:['p5','p12'],b:['p11','p10'],sa:11,sb:9,  done:true },
  ]},
  { round:3, courts:[   // LIVE
    { c:0, a:['p2','p1'], b:['p4','p8'], sa:8,  sb:6,  done:false },
    { c:1, a:['p5','p6'], b:['p7','p3'], sa:7,  sb:7,  done:false },
    { c:2, a:['p9','p10'],b:['p11','p12'],sa:10, sb:9,  done:false },
  ]},
];
const TOTAL_ROUNDS = 6;
const CURRENT = 2;        // index of live round (Round 3)
let viewRound = CURRENT;  // which round the board is showing
let me = 'p1';            // the viewer — remembered after first visit (no search needed)
let state = 'home';       // home | soon | live | final
let tab = 'board';        // board | standings | roster

const nm = id => P[id]?.name || '—';
const first = id => nm(id).split(' ')[0];

/* ---------------- find my court ---------------- */
function myCourt(roundIdx){
  const r=ROUNDS[roundIdx]; if(!r) return null;
  for(const ct of r.courts){ if([...ct.a,...ct.b].includes(me)) return ct; }
  return null;
}
function youBanner(){
  const el=document.getElementById('youBanner');
  if(!me || state==='soon' || state==='home'){ el.innerHTML=''; return; }
  const ct = myCourt(CURRENT);
  if(!ct){ el.innerHTML=`<div class="you"><div class="you-top"><div><div class="you-court">You're sitting this round</div><div class="you-big">On the bench</div><div class="you-sub">You'll be back in next round — hang tight.</div></div></div></div>`; return; }
  const onA = ct.a.includes(me);
  const partner = (onA?ct.a:ct.b).find(x=>x!==me);
  const opps = (onA?ct.b:ct.a);
  const myScore = onA?ct.sa:ct.sb, oppScore = onA?ct.sb:ct.sa;
  const lead = myScore>oppScore?'leading':myScore<oppScore?'trailing':'tied';
  const liveStr = state==='final' ? 'Final' : `Round ${ROUNDS[CURRENT].round} of ${TOTAL_ROUNDS} · in play`;
  el.innerHTML = `
    <div class="you">
      <div class="you-top">
        <div>
          <div class="you-court">📍 You're on</div>
          <div class="you-big">${COURTS[ct.c]}</div>
          <div class="you-sub">${liveStr}<br>with <b>${nm(partner)}</b> &nbsp;vs&nbsp; <b>${first(opps[0])}</b> & <b>${first(opps[1])}</b></div>
        </div>
      </div>
      <div class="you-next"><span class="pin">⏱️</span> ${state==='final' ? 'That’s a wrap — see the final standings below.' : `Score <b style="color:var(--tx)">${myScore}–${oppScore}</b> · you're ${lead}. Next court posts when Round ${ROUNDS[CURRENT].round} wraps.`}</div>
    </div>`;
}

/* ---------------- board ---------------- */
function courtCard(ct, live){
  const mine = me && [...ct.a,...ct.b].includes(me);
  const st = ct.done ? `<span class="court-st final">Final</span>`
    : live ? `<span class="court-st live"><span class="ldot"></span>Live</span>`
    : `<span class="court-st wait">Upcoming</span>`;
  const aWin = ct.done && ct.sa>ct.sb, bWin = ct.done && ct.sb>ct.sa;
  const plName = (id,right)=>`<div class="pl ${id===me?'me':''}">${nm(id)}<span class="g">${P[id].g}</span></div>`;
  const scoreBlock = (ct.sa!=null) ?
    `<div class="n"><span class="${aWin||(!ct.done&&ct.sa>ct.sb)?'w':''}">${ct.sa}</span><span class="sep">–</span><span class="${bWin||(!ct.done&&ct.sb>ct.sa)?'w':''}">${ct.sb}</span></div><div class="to">to 11</div>`
    : `<div class="vs">VS</div>`;
  return `
  <div class="court ${mine?'mine':''}">
    <div class="court-top">
      <div class="court-nm"><span class="court-dot" style="background:${['#4aa3e0','#a78bfa','#f0c040'][ct.c]}"></span>${COURTS[ct.c]}</div>
      ${st}
    </div>
    <div class="matchup">
      <div class="side">${plName(ct.a[0])}${plName(ct.a[1])}</div>
      <div class="score">${scoreBlock}</div>
      <div class="side r">${plName(ct.b[0])}${plName(ct.b[1])}</div>
    </div>
  </div>`;
}

function roundNav(){
  let h='<div class="rounds">';
  for(let i=0;i<TOTAL_ROUNDS;i++){
    const r=ROUNDS[i];
    const done = r && r.courts.every(c=>c.done);
    const live = i===CURRENT && state==='live';
    const locked = !r;
    const cls = locked?'rchip locked':(i===viewRound?'rchip on':'rchip')+(live?' live':'');
    const dot = done?'<span class="d done"></span>':live?'<span class="d live"></span>':'<span class="d next"></span>';
    h+=`<button class="${cls}" ${locked?'disabled':`onclick="viewRound=${i};render()"`}>${dot}Rd ${i+1}</button>`;
  }
  return h+'</div>';
}

/* ---------------- standings ---------------- */
function standings(){
  const s={}; PLAYERS.forEach(p=>s[p.id]={id:p.id,w:0,l:0,pf:0,pa:0});
  ROUNDS.forEach(r=>r.courts.forEach(c=>{
    if(!c.done) return;
    const aw=c.sa>c.sb;
    c.a.forEach(id=>{s[id].pf+=c.sa;s[id].pa+=c.sb;aw?s[id].w++:s[id].l++;});
    c.b.forEach(id=>{s[id].pf+=c.sb;s[id].pa+=c.sa;aw?s[id].l++:s[id].w++;});
  }));
  return Object.values(s).map(x=>({...x,diff:x.pf-x.pa}))
    .sort((a,b)=> b.w-a.w || b.diff-a.diff || b.pf-a.pf);
}
function standingsTable(){
  const rows=standings().map((x,i)=>`
    <tr class="${x.id===me?'me':''}">
      <td class="l"><span class="rk ${i<3?'top':''}">${i+1}</span> ${nm(x.id)}</td>
      <td>${x.w}</td><td>${x.l}</td><td>${x.diff>=0?'+':''}${x.diff}</td><td>${x.pf}</td>
    </tr>`).join('');
  return `<table class="lbt"><thead><tr><th class="l">Player</th><th>W</th><th>L</th><th>Diff</th><th>PF</th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* ---------------- roster ---------------- */
function rosterList(){
  return PLAYERS.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`
    <div class="roster-row">
      <div class="av ${p.g==='F'?'f':'m'}">${p.name[0]}</div>
      <div class="nm">${p.name}${p.id===me?' <span style="color:var(--lime);font-size:11px">· you</span>':''}</div>
      <div class="tag">${p.g}</div>
    </div>`).join('');
}

/* ---------------- home screen (challengers' landing) ---------------- */
function homeScreen(){
  const ct = me?myCourt(CURRENT):null;
  let inner;
  if(ct){
    const partner = (ct.a.includes(me)?ct.a:ct.b).find(x=>x!==me);
    inner = `<div class="hs-you"><div class="lab">📍 Your court right now</div><div class="big">${COURTS[ct.c]}</div><div class="sm">Round ${ROUNDS[CURRENT].round} of ${TOTAL_ROUNDS} · with ${nm(partner)}</div></div>`;
  } else {
    inner = `<div class="hs-you"><div class="lab">You're up next</div><div class="big">On the bench</div><div class="sm">Back in for the next round.</div></div>`;
  }
  return `
    <div class="hs-live">
      <div class="hs-tag"><span class="ldot" style="background:#06210f"></span> Dink Society Ladder · Live now</div>
      <div class="hs-nm">Dink Society Ladder Challenge</div>
      <div class="hs-sub">Round 3 of 6 in play · South End Racquet Club</div>
      ${inner}
      <button class="hs-cta" onclick="setState('live')">See the live board →</button>
    </div>
    <div class="seclbl">More from the ladder</div>
    <div class="hs-faded">
      <div class="court"><div class="court-top"><div class="court-nm">🏆 Latest winners</div></div><div class="hs-sub" style="margin:0">Last night: Gopi D &amp; Phoebe Borsum</div></div>
      <div class="court"><div class="court-top"><div class="court-nm">📅 Upcoming ladders</div></div><div class="hs-sub" style="margin:0">Mon Jun 30 · 7:00 PM · open for signup</div></div>
    </div>`;
}

/* ---------------- render ---------------- */
function render(){
  // state pill
  const pill=document.getElementById('statePill');
  pill.className='livepill '+(state==='final'?'final':state==='soon'?'soon':'');
  pill.innerHTML = (state==='live'||state==='home')?'<span class="ldot"></span>Live'
    : state==='final'?'Final'
    : 'Doors 7:00';
  document.querySelectorAll('.mock button').forEach(b=>b.classList.toggle('on', b.dataset.state===state));

  const live=document.getElementById('liveBody'), soon=document.getElementById('soonBody');
  const foot=document.getElementById('foot');
  youBanner();

  if(state==='home'){
    soon.classList.add('hide'); live.classList.remove('hide');
    live.innerHTML = homeScreen();
    foot.textContent='This is the challengers’ home — the live night is pinned to the top.';
    return;
  }

  if(state==='soon'){
    live.classList.add('hide'); soon.classList.remove('hide');
    soon.innerHTML = `
      <div class="note" style="margin:10px 0 14px">🔒 <b>Registration is closed.</b> The roster below is locked in. Court pairings post automatically when the night starts at <b>7:00 PM</b> — check back here to see your first court. <span class="countdown">starts in 1:48:22</span></div>
      <div class="tabs"><button class="on">Who's playing (12)</button></div>
      ${rosterList()}`;
    foot.textContent='This page updates automatically — no need to refresh.';
    return;
  }
  soon.classList.add('hide'); live.classList.remove('hide');

  // tabs
  let h = `<div class="tabs">
      <button class="${tab==='board'?'on':''}" onclick="tab='board';render()">Courts</button>
      <button class="${tab==='standings'?'on':''}" onclick="tab='standings';render()">Standings</button>
      <button class="${tab==='roster'?'on':''}" onclick="tab='roster';render()">Roster</button>
    </div>`;

  if(tab==='board'){
    h += roundNav();
    const r=ROUNDS[viewRound];
    const isLiveRound = viewRound===CURRENT && state==='live';
    h += `<div class="seclbl" style="margin-top:4px">Round ${r.round} ${isLiveRound?'· in play':'· final'} — all courts</div>`;
    h += r.courts.map(c=>courtCard(c, isLiveRound)).join('');
  } else if(tab==='standings'){
    h += `<div class="seclbl" style="margin-top:4px">Night standings ${state==='final'?'· final':'· live'}</div>` + standingsTable();
  } else {
    h += `<div class="seclbl" style="margin-top:4px">Roster · 12 players</div>` + rosterList();
  }
  live.innerHTML = h;
  foot.textContent = state==='final' ? 'Night complete · final results' : 'Updates automatically · last refresh 7:42 PM';
}

function setState(s){
  state=s;
  if(s==='final'){ ROUNDS.forEach(r=>r.courts.forEach(c=>c.done=true)); viewRound=ROUNDS.length-1; }
  else { ROUNDS[CURRENT].courts.forEach(c=>c.done=false); if(s==='live') viewRound=CURRENT; }
  render();
}

render();
</script>
</body>
</html>
