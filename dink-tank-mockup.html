<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Dink Tank — Analytics Mockup · The Dink Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
<style>
:root, [data-theme="dark"] {
  --color-bg:#0e0e0e; --color-surface:#161616; --color-surface-2:#1e1e1e; --color-surface-3:#262626;
  --color-border:rgba(255,255,255,0.08); --color-border-strong:rgba(255,255,255,0.14); --color-divider:rgba(255,255,255,0.06);
  --color-text:#f0f0ec; --color-text-muted:#9a9e97; --color-text-faint:#5e625c; --color-text-inverse:#0e0e0e;
  --color-lime:#b8ff2c; --color-lime-dim:rgba(184,255,44,0.12); --color-teal:#17d7b0; --color-teal-dim:rgba(23,215,176,0.12);
  --color-red:#ff5c47; --color-red-dim:rgba(255,92,71,0.12); --color-gold:#f0c040; --color-purple:#a78bfa;
  --radius-full:9999px; --radius-lg:20px; --radius-md:14px; --radius-sm:10px; --max-w:1080px; --gutter:20px; --transition:.18s ease;
}
[data-theme="light"] {
  --color-bg:#f5f6f2; --color-surface:#ffffff; --color-surface-2:#eef0ea; --color-surface-3:#e2e5dd;
  --color-border:rgba(12,18,14,0.10); --color-border-strong:rgba(12,18,14,0.16); --color-divider:rgba(12,18,14,0.07);
  --color-text:#111410; --color-text-muted:#5e665d; --color-text-faint:#8b948a; --color-text-inverse:#f4f5f1;
  --color-lime:#7acc00; --color-lime-dim:rgba(122,204,0,0.10); --color-teal:#0ea88d; --color-teal-dim:rgba(14,168,141,0.12);
  --color-red:#d84b3a; --color-red-dim:rgba(216,75,58,0.12); --color-gold:#c9972e; --color-purple:#7c5cf0;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--color-bg); color:var(--color-text); -webkit-font-smoothing:antialiased; padding-bottom:84px; }
.wrap { max-width:var(--max-w); margin:0 auto; padding:0 var(--gutter); }

/* Hero */
.hero { text-align:center; padding:54px var(--gutter) 8px; }
.hero h1 { font-size:clamp(2rem,1.3rem+2.4vw,3rem); font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:-.02em; }
.hero h1 .lime { color:var(--color-lime); }
.hero p { color:var(--color-text-muted); font-size:14px; margin-top:8px; }
.hero .disc { margin-top:14px; font-size:12px; font-weight:800; font-style:italic; color:var(--color-gold); letter-spacing:.02em; }
.hero .rule { width:60px; height:3px; background:var(--color-lime); border-radius:2px; margin:14px auto 0; }

/* Tabs */
.tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:26px auto 8px; }
.tab { font:inherit; font-size:12.5px; font-weight:700; padding:8px 15px; border-radius:var(--radius-full); border:1px solid var(--color-border-strong); background:transparent; color:var(--color-text-muted); cursor:pointer; transition:all var(--transition); white-space:nowrap; }
.tab:hover { color:var(--color-text); border-color:var(--color-text-muted); }
.tab.on { background:var(--color-lime); color:var(--color-text-inverse); border-color:var(--color-lime); }

/* Panels */
.panel { display:none; padding:18px 0 40px; }
.panel.on { display:block; animation:fade .2s ease; }
@keyframes fade { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.ptitle { text-align:center; font-size:20px; font-weight:900; font-style:italic; margin-bottom:4px; }
.psub { text-align:center; font-size:13px; color:var(--color-text-muted); margin-bottom:18px; }

.card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:20px 22px; margin-bottom:16px; }

/* Select rows */
.selrow { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.selrow .vs { font-weight:900; font-style:italic; color:var(--color-text-faint); }
select { font:inherit; font-size:13px; font-weight:600; padding:11px 14px; border-radius:var(--radius-md); border:1px solid var(--color-border-strong); background:var(--color-surface); color:var(--color-text); cursor:pointer; min-width:230px; }
select.bl { border-color:rgba(120,160,230,.6); } select.or { border-color:rgba(240,140,80,.6); }

/* P v P */
.pvp-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.pvp-side { font-weight:900; font-style:italic; text-transform:uppercase; }
.pvp-side small { display:block; font-weight:600; font-style:normal; text-transform:none; font-size:11px; color:var(--color-text-faint); }
.pvp-side.r { text-align:right; }
.pvp-side.a { color:var(--color-red); } .pvp-side.b { color:var(--color-purple); }
.radar-wrap { display:flex; justify-content:center; padding:8px 0 4px; }
.legend { display:flex; gap:18px; justify-content:center; margin:6px 0 10px; font-size:12px; font-weight:700; }
.legend .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; }
.cmp-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:11px 4px; border-bottom:1px solid var(--color-divider); font-variant-numeric:tabular-nums; }
.cmp-row:last-child { border-bottom:none; }
.cmp-row .lbl { text-align:center; font-size:12px; color:var(--color-text-muted); }
.cmp-row .av { font-size:15px; font-weight:800; } .cmp-row .av.l{text-align:left;} .cmp-row .av.r{text-align:right;}
.cmp-row .av.win { color:var(--color-teal); }
.h2h-note { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-faint); margin:16px 0 8px; }
.h2h-game { display:grid; grid-template-columns:50px 1fr auto 1fr; align-items:center; gap:8px; background:var(--color-surface-2); border-radius:var(--radius-sm); padding:10px 12px; font-size:12px; margin-bottom:6px; }
.h2h-game .wk { color:var(--color-text-faint); font-weight:700; }
.h2h-game .sc { font-weight:900; font-size:14px; }

/* Game splits / generic stat table */
.gtbl { display:flex; flex-direction:column; gap:2px; }
.grow { display:grid; grid-template-columns:minmax(140px,1.2fr) 1fr 1fr 1fr; gap:8px; align-items:stretch; }
.grow.hd > div { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-faint); text-align:center; padding:4px; }
.gname { display:flex; flex-direction:column; justify-content:center; }
.gname b { font-weight:800; font-style:italic; text-transform:uppercase; font-size:13px; }
.gname small { font-size:10px; color:var(--color-text-faint); }
.gcell { border-radius:var(--radius-sm); padding:9px 6px; text-align:center; background:var(--color-surface-2); }
.gcell.wd { background:rgba(208,107,160,.12); } .gcell.md { background:rgba(91,139,208,.12); } .gcell.mx { background:rgba(122,204,0,.10); }
.gcell .lab { font-size:8px; font-weight:800; letter-spacing:.08em; color:var(--color-text-faint); }
.gcell .pct { font-size:16px; font-weight:900; }
.gcell .rec { font-size:10px; color:var(--color-text-muted); }
.gcell.empty { background:var(--color-surface-2); opacity:.5; display:flex; align-items:center; justify-content:center; }

/* Win margins */
.wm-player { margin-bottom:18px; }
.wm-player h4 { font-size:13px; font-weight:800; font-style:italic; text-transform:uppercase; margin-bottom:2px; }
.wm-player .sub { font-size:11px; color:var(--color-text-faint); margin-bottom:9px; }
.wm-bar-row { display:grid; grid-template-columns:90px 1fr 30px; align-items:center; gap:10px; margin-bottom:6px; }
.wm-cat { font-size:11px; color:var(--color-text-muted); }
.wm-bar { display:flex; height:20px; border-radius:6px; overflow:hidden; background:var(--color-surface-2); }
.wm-w { background:#2f9e44; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; }
.wm-l { background:var(--color-red); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; }
.wm-tot { font-size:12px; font-weight:800; text-align:right; color:var(--color-text-muted); }

/* Partner impact cards */
.pi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.pi-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:16px; }
.pi-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.pi-av { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:#fff; flex-shrink:0; }
.pi-name { font-weight:900; font-style:italic; text-transform:uppercase; font-size:14px; }
.pi-name small { display:block; font-weight:600; font-style:normal; text-transform:none; font-size:10px; color:var(--color-text-faint); }
.pi-cnt { margin-left:auto; text-align:right; font-size:10px; color:var(--color-text-faint); }
.pi-row { display:grid; grid-template-columns:1fr 30px 42px 42px 48px; align-items:center; gap:6px; padding:7px 0; border-top:1px solid var(--color-divider); font-size:12px; font-variant-numeric:tabular-nums; }
.pi-row.hd > span { font-size:8px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-faint); text-align:right; }
.pi-row.hd > span:first-child { text-align:left; }
.pi-row .pn { font-weight:700; }
.pi-row .r { text-align:right; }
.pi-imp { text-align:right; font-weight:800; border-radius:var(--radius-full); padding:2px 0; font-size:11px; }
.pos { color:var(--color-teal); } .neg { color:var(--color-red); } .pos-bg{background:var(--color-teal-dim);color:var(--color-teal);} .neg-bg{background:var(--color-red-dim);color:var(--color-red);}

/* Opponent strength */
.os-sec-h { font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-faint); margin:4px 0 6px; display:flex; align-items:center; gap:7px; }
.os-row { display:grid; grid-template-columns:24px 1fr auto auto; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--color-divider); }
.os-row:last-child { border-bottom:none; }
.os-rk { font-weight:900; color:var(--color-text-faint); font-size:12px; }
.os-nm { font-weight:800; font-style:italic; text-transform:uppercase; font-size:13px; }
.os-prog { font-size:12px; color:var(--color-text-muted); font-variant-numeric:tabular-nums; }
.os-delta { font-size:11px; font-weight:800; border-radius:var(--radius-full); padding:3px 9px; }

/* Scoring trends chart */
.st-legend { display:flex; gap:18px; font-size:11px; font-weight:700; margin-bottom:8px; }
.sttbl { width:100%; border-collapse:collapse; margin-top:12px; font-size:12px; }
.sttbl th { font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--color-text-faint); text-align:right; padding:8px 10px; border-bottom:1px solid var(--color-border); }
.sttbl th:first-child { text-align:left; }
.sttbl td { padding:9px 10px; border-bottom:1px solid var(--color-divider); text-align:right; font-variant-numeric:tabular-nums; }
.sttbl td:first-child { text-align:left; font-weight:700; }
.sttbl tr:last-child td { border-bottom:none; }

/* Weekly trends */
.wt-cols { display:grid; grid-template-columns:1fr; gap:16px; }
.wt-row { display:grid; grid-template-columns:22px 1.4fr auto auto auto; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid var(--color-divider); }
.wt-row:last-child { border-bottom:none; }
.wt-rk { font-weight:900; color:var(--color-text-faint); font-size:12px; }
.wt-nm { font-weight:800; font-style:italic; text-transform:uppercase; font-size:13px; }
.wt-nm small { display:block; font-weight:600; font-style:normal; text-transform:none; font-size:10px; color:var(--color-text-faint); }
.wt-val { font-size:12px; color:var(--color-text-muted); font-variant-numeric:tabular-nums; }
.wt-delta { font-size:13px; font-weight:900; }

/* Team v team */
.tvt { display:grid; grid-template-columns:1fr auto 1fr; gap:6px; }
.tvt-h { text-align:center; font-weight:900; font-style:italic; text-transform:uppercase; font-size:18px; }
.tvt-h small { display:block; font-size:11px; font-weight:600; font-style:normal; text-transform:none; color:var(--color-text-faint); }
.tvt-h.a { color:var(--color-lime); } .tvt-h.b { color:var(--color-teal); }
.tvt-row { display:grid; grid-template-columns:1fr 60px 1fr; align-items:center; padding:12px 4px; border-bottom:1px solid var(--color-divider); font-variant-numeric:tabular-nums; }
.tvt-row .lbl { text-align:center; font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-faint); }
.tvt-row .v { font-size:16px; font-weight:800; } .tvt-row .v.l{text-align:left;} .tvt-row .v.r{text-align:right;}
.tvt-row .v.win { color:var(--color-teal); }
.tvt-h2h { text-align:center; background:var(--color-surface-2); border-radius:var(--radius-md); padding:14px; margin-top:14px; }
.tvt-h2h .lab { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-faint); margin-bottom:6px; }

.muted { color:var(--color-text-faint); }
.spark { display:block; }

.mock-bar { position:fixed; bottom:0; left:0; right:0; z-index:500; display:flex; flex-wrap:wrap; align-items:center; gap:14px; padding:10px 16px; background:#000; border-top:2px solid var(--color-lime); font-size:12px; color:#cfcfcf; }
.mock-bar strong { color:var(--color-lime); }
.mock-bar button { font:inherit; font-weight:700; font-size:11px; padding:6px 12px; border-radius:999px; border:1px solid #444; background:#1a1a1a; color:#eee; cursor:pointer; }
.mock-bar .spacer { flex:1; }
</style>
</head>
<body>

<div class="hero">
  <h1>The <span class="lime">Dink Tank</span> 🧪</h1>
  <p>Deep dives, matchups &amp; nerdy breakdowns</p>
  <div class="disc">⚠️ For Extra Entertainment Purposes Only ⚠️</div>
  <div class="rule"></div>
</div>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<div class="mock-bar">
  <strong>MOCKUP</strong>
  <span>"The Dink Tank" analytics — 9 views (sample data). Name is a placeholder riff; easy to rename.</span>
  <span class="spacer"></span>
  <button id="tglTheme">Theme: Dark</button>
  <span style="color:#777;">Illustrative data</span>
</div>

<script>
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function sgn(n){ return (n>0?'+':n<0?'−':'')+Math.abs(n); }
function ini(n){ var p=String(n).trim().split(/\s+/); return ((p[0][0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase(); }
var COL = ['#e0533f','#8b5cf6','#5cc8e0','#2bb1a0','#e08a2b','#b8ff2c','#d06ba0','#f0c040'];
function colorFor(n){ var s=0; for(var i=0;i<n.length;i++)s+=n.charCodeAt(i); return COL[s%COL.length]; }

// ── Sample players ──
var P = [
  { n:'Ryan H.',   t:'Smash Society', g:'M', gp:29, w:25, l:4,  win:86, clutch:78, diff:5.1, cons:34, vol:29, aps:11.0, apa:5.9, dsr:92.9 },
  { n:'Annie K.',  t:'Smash Society', g:'F', gp:27, w:21, l:6,  win:78, clutch:71, diff:3.6, cons:32, vol:27, aps:9.9,  apa:6.3, dsr:96.4 },
  { n:'Devin C.',  t:'Smash Society', g:'M', gp:24, w:18, l:6,  win:75, clutch:64, diff:3.1, cons:31, vol:24, aps:9.3,  apa:6.2, dsr:93.1 },
  { n:'Shay C.',   t:'Zero Zero Two', g:'F', gp:26, w:20, l:6,  win:77, clutch:69, diff:3.3, cons:30, vol:26, aps:9.7,  apa:6.4, dsr:95.7 },
  { n:'Kaithlyn R.',t:'Zero Zero Two',g:'F', gp:37, w:30, l:7,  win:81, clutch:74, diff:4.4, cons:36, vol:37, aps:10.1, apa:5.7, dsr:68.3 },
  { n:'Philip C.', t:"K'CHN",         g:'M', gp:18, w:13, l:5,  win:72, clutch:55, diff:1.4, cons:28, vol:18, aps:8.8,  apa:7.4, dsr:68.8 },
  { n:'Albert F.', t:'Big Dink Energy',g:'M',gp:18, w:6,  l:12, win:33, clutch:20, diff:-2.1,cons:26, vol:18, aps:7.1,  apa:9.2, dsr:33.9 },
  { n:'Timmy O.',  t:'Timog Cal',     g:'M', gp:14, w:1,  l:11, win:8,  clutch:12, diff:-7.2,cons:18, vol:14, aps:6.1,  apa:11.0,dsr:18.0 },
];
var Pby = {}; P.forEach(function(p){ Pby[p.n]=p; });

var TEAMS = [
  { n:'Smash Society',   rec:'2-0-0', pts:4, gw:11, ps:131, pa:45,  diff:86 },
  { n:"K'CHN",           rec:'2-0-0', pts:4, gw:9,  ps:114, pa:77,  diff:37 },
  { n:'Zero Zero Two',   rec:'1-1-0', pts:3, gw:9,  ps:115, pa:62,  diff:53 },
  { n:'Big Dink Energy', rec:'0-1-1', pts:1, gw:3,  ps:62,  pa:115, diff:-53 },
  { n:'What the Dink?!', rec:'0-2-0', pts:0, gw:3,  ps:77,  pa:114, diff:-37 },
  { n:'Timog Cal',       rec:'0-2-0', pts:0, gw:1,  ps:45,  pa:131, diff:-86 },
];
var Tby = {}; TEAMS.forEach(function(t){ Tby[t.n]=t; });

// ════════════════ RADAR (Player vs Player) ════════════════
function radarSvg(a, b){
  // 6 axes: Win%, Clutch, Diff, Consist, Volume, Avg PS  (normalized 0..1)
  var axes = ['Win%','Clutch','Diff','Consist.','Volume','Avg PS'];
  function norm(p){ return [ p.win/100, p.clutch/100, (p.diff+8)/16, p.cons/40, p.vol/40, p.aps/13 ]; }
  var na = norm(a), nb = norm(b);
  var cx=130, cy=130, R=92, N=6;
  function pt(i, r){ var ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(ang)*R*r, cy+Math.sin(ang)*R*r]; }
  var grid='';
  [0.25,0.5,0.75,1].forEach(function(g){
    var pts=[]; for(var i=0;i<N;i++){ var c=pt(i,g); pts.push(c[0].toFixed(1)+','+c[1].toFixed(1)); }
    grid += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="var(--color-border)" stroke-width="1"/>';
  });
  var labels='';
  for(var i=0;i<N;i++){ var c=pt(i,1.18); labels += '<text x="'+c[0].toFixed(1)+'" y="'+c[1].toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="var(--color-text-faint)" font-weight="700">'+axes[i]+'</text>'; }
  function poly(nm, color){ var pts=[]; for(var i=0;i<N;i++){ var c=pt(i, Math.max(0.04,Math.min(1,nm[i]))); pts.push(c[0].toFixed(1)+','+c[1].toFixed(1)); } return '<polygon points="'+pts.join(' ')+'" fill="'+color+'22" stroke="'+color+'" stroke-width="2"/>'; }
  return '<svg viewBox="0 0 260 260" width="280" height="280" class="spark">'+grid+labels
    + poly(na,'var(--color-red)') + poly(nb,'var(--color-purple)') + '</svg>';
}

function renderPVP(root){
  var opts = P.map(function(p){ return '<option value="'+esc(p.n)+'">'+esc(p.n)+' ('+esc(p.t)+')</option>'; }).join('');
  root.innerHTML =
    '<div class="ptitle">⚔️ Player vs Player</div><div class="psub">Compare any two players head-to-head</div>'
    + '<div class="selrow"><select id="pvpA" class="bl">'+opts+'</select><span class="vs">vs</span><select id="pvpB" class="or">'+opts+'</select></div>'
    + '<div class="card" id="pvpOut"></div>';
  var selA=root.querySelector('#pvpA'), selB=root.querySelector('#pvpB');
  selA.selectedIndex=6; selB.selectedIndex=1; // Albert F vs Annie K
  function draw(){
    var a=Pby[selA.value], b=Pby[selB.value];
    var row=function(lbl,av,bv,fmt){ var f=fmt||function(x){return x;}; var aw=(typeof av==='number'&&typeof bv==='number'&&av>bv); var bw=(typeof av==='number'&&typeof bv==='number'&&bv>av);
      return '<div class="cmp-row"><div class="av l '+(aw?'win':'')+'">'+f(av)+'</div><div class="lbl">'+lbl+'</div><div class="av r '+(bw?'win':'')+'">'+f(bv)+'</div></div>'; };
    document.getElementById('pvpOut').innerHTML =
      '<div class="pvp-head"><div class="pvp-side a">'+esc(a.n)+'<small>'+esc(a.t)+'</small></div><div class="pvp-side b r">'+esc(b.n)+'<small>'+esc(b.t)+'</small></div></div>'
      + '<div class="radar-wrap">'+radarSvg(a,b)+'</div>'
      + '<div class="legend"><span><span class="dot" style="background:var(--color-red)"></span>'+esc(a.n)+'</span><span><span class="dot" style="background:var(--color-purple)"></span>'+esc(b.n)+'</span></div>'
      + row('Win %', a.win, b.win, function(x){return x+'%';})
      + row('Record', a.w+'–'+a.l, b.w+'–'+b.l)
      + row('Clutch', a.clutch, b.clutch, function(x){return x+'%';})
      + row('Avg Diff', a.diff, b.diff, function(x){return sgn(x);})
      + row('Consistency', a.cons, b.cons, function(x){return x+'%';})
      + row('Avg Scored', a.aps, b.aps)
      + row('Avg Allowed', a.apa, b.apa)
      + row('Volume', a.gp, b.gp, function(x){return x+' GP';})
      + '<div class="h2h-note">⚔️ Head-to-Head Games (0–1)</div>'
      + '<div class="h2h-game"><span class="wk">Wk 4</span><span>'+esc(a.n)+' / Karin Y</span><span class="sc">4 – 11</span><span style="text-align:right;">'+esc(b.n)+' / Jason P</span></div>';
  }
  selA.onchange=draw; selB.onchange=draw; draw();
}

// ════════════════ TEAM vs TEAM ════════════════
function renderTVT(root){
  var opts=TEAMS.map(function(t){return '<option value="'+esc(t.n)+'">'+esc(t.n)+'</option>';}).join('');
  root.innerHTML =
    '<div class="ptitle">🌸 Team vs Team</div><div class="psub">Full team comparison — stats &amp; head-to-head</div>'
    + '<div class="selrow"><select id="tvtA" class="bl">'+opts+'</select><span class="vs">vs</span><select id="tvtB" class="or">'+opts+'</select></div>'
    + '<div class="card" id="tvtOut"></div>';
  var selA=root.querySelector('#tvtA'), selB=root.querySelector('#tvtB');
  selA.selectedIndex=3; selB.selectedIndex=0;
  function draw(){
    var a=Tby[selA.value], b=Tby[selB.value];
    var r=function(lbl,av,bv,inv){ var aw=inv?av<bv:av>bv, bw=inv?bv<av:bv>av; return '<div class="tvt-row"><div class="v l '+(aw?'win':'')+'">'+av+'</div><div class="lbl">'+lbl+'</div><div class="v r '+(bw?'win':'')+'">'+bv+'</div></div>'; };
    document.getElementById('tvtOut').innerHTML =
      '<div class="tvt"><div class="tvt-h a">'+esc(a.n)+'<small>'+a.rec+'</small></div><div class="tvt-h" style="align-self:center;color:var(--color-text-faint);">vs</div><div class="tvt-h b">'+esc(b.n)+'<small>'+b.rec+'</small></div></div>'
      + r('PTS',a.pts,b.pts)+r('GW',a.gw,b.gw)+r('PS',a.ps,b.ps)+r('PA',a.pa,b.pa,true)+r('DIFF',sgn(a.diff),sgn(b.diff))
      + '<div class="tvt-h2h"><div class="lab">Head-to-Head Record</div><b style="color:var(--color-lime)">'+esc(a.n)+' 0W</b> · <b style="color:var(--color-teal)">'+esc(b.n)+' 2W</b></div>';
  }
  selA.onchange=draw; selB.onchange=draw; draw();
}

// ════════════════ SCORING TRENDS ════════════════
var TREND = { 'Albert F.':[[1,10.3,7.7,'2–1'],[2,6.7,9.0,'1–2'],[3,5.3,9.0,'1–2'],[4,4.3,11.0,'0–3'],[5,9.0,8.7,'1–2'],[6,7.0,9.7,'1–2']],
  'Ryan H.':[[1,11.2,5.1,'3–0'],[2,10.4,6.0,'2–1'],[3,11.8,5.8,'3–0'],[4,9.9,6.5,'2–1'],[5,11.1,4.9,'3–0'],[6,10.8,6.2,'2–1']] };
function lineChart(rows){
  var W=620,H=180,padL=30,padR=20,padT=20,padB=28; var n=rows.length;
  var all=[]; rows.forEach(function(r){all.push(r[1]);all.push(r[2]);}); var mx=Math.max.apply(null,all)+1, mn=Math.min.apply(null,all)-1;
  var x=function(i){return padL+(W-padL-padR)*(n===1?0.5:i/(n-1));}; var y=function(v){return padT+(H-padT-padB)*(1-(v-mn)/((mx-mn)||1));};
  function line(idx,color){ var pts=rows.map(function(r,i){return x(i).toFixed(1)+','+y(r[idx]).toFixed(1);}); var dots=rows.map(function(r,i){return '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(r[idx]).toFixed(1)+'" r="3.5" fill="'+color+'"/>';}).join(''); return '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>'+dots; }
  var wk=rows.map(function(r,i){return '<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="var(--color-text-faint)" font-weight="700">Wk '+r[0]+'</text>';}).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" class="spark">'+wk+line(1,'#5b8bd0')+line(2,'var(--color-red)')+'</svg>';
}
function renderTrends(root){
  var opts=Object.keys(TREND).map(function(k){return '<option value="'+esc(k)+'">'+esc(k)+'</option>';}).join('');
  root.innerHTML='<div class="ptitle">📈 Scoring Trends</div><div class="psub">Points scored &amp; allowed over time — peaking or slipping?</div>'
    + '<div class="selrow"><select id="trSel">'+opts+'</select></div><div class="card" id="trOut"></div>';
  var sel=root.querySelector('#trSel');
  function draw(){
    var rows=TREND[sel.value];
    var body=rows.map(function(r){var d=(r[1]-r[2]); return '<tr><td>Wk '+r[0]+'</td><td>'+r[3]+'</td><td style="color:#5b8bd0;font-weight:800">'+r[1].toFixed(1)+'</td><td>'+r[2].toFixed(1)+'</td><td class="'+(d>0?'pos':'neg')+'" style="font-weight:800">'+sgn(+d.toFixed(1))+'</td></tr>';}).join('');
    document.getElementById('trOut').innerHTML='<div class="st-legend"><span style="color:#5b8bd0">● Avg scored</span><span style="color:var(--color-red)">● Avg allowed</span></div>'
      + lineChart(rows)
      + '<table class="sttbl"><thead><tr><th>Week</th><th>W–L</th><th>Avg PS</th><th>Avg PA</th><th>Diff</th></tr></thead><tbody>'+body+'</tbody></table>';
  }
  sel.onchange=draw; draw();
}

// ════════════════ WEEKLY TRENDS ════════════════
var RISE = [['Walt A.','Too Old For Tennis',2.1,71.3,69.2,[2,40,55,48,71]],['Erika S.','Zero Zero Two',2.8,37.9,35.1,[3,28,24,22,38]],['Dale H.','Too Old For Tennis',27.1,57.2,30.1,[27,40,57]],['Tracey H.','Everlasting Lobstoppers',44.3,70.3,26.0,[44,52,49,55,70]],['Kaitlyn R.','Zero Zero Two',56.2,81.1,24.9,[56,62,58,68,81]]];
var FALL = [['Fiat T.','South Bay Ohana',69.6,1.8,-67.8,[70,66,64,40,2]],['Jean S.','Aloha Dinkers',66.6,4.5,-62.0,[66,60,55,30,5]],['Marisa Y.','Big Dink Energy',58.1,12.0,-46.1,[58,44,30,20,12]]];
function sparkline(vals,color){ var W=120,H=30,mx=Math.max.apply(null,vals),mn=Math.min.apply(null,vals); var n=vals.length;
  var pts=vals.map(function(v,i){var x=(W)*(n===1?0.5:i/(n-1)); var y=H-2-(H-4)*((v-mn)/((mx-mn)||1)); return x.toFixed(1)+','+y.toFixed(1);});
  return '<svg viewBox="0 0 '+W+' '+H+'" width="120" height="30" class="spark"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2"/></svg>'; }
function renderWeekly(root){
  var row=function(r,i,up){ var c=up?'#2bb1a0':'#e0533f';
    return '<div class="wt-row"><span class="wt-rk">'+(i+1)+'</span><span class="wt-nm">'+esc(r[0])+'<small>'+esc(r[1])+'</small></span>'

  root.innerHTML='<div class="ptitle">🔥 Weekly Composite Trends</div><div class="psub">Composite score week by week — who\'s rising, who\'s falling?</div>'
    + '<div class="card"><div class="os-sec-h">📈 Top Rising — biggest composite increase</div>'+RISE.map(function(r,i){return row(r,i,true);}).join('')+'</div>'
    + '<div class="card"><div class="os-sec-h">📉 Biggest Falling — biggest composite drop</div>'+FALL.map(function(r,i){return row(r,i,false);}).join('')+'</div>';
}

var VIEWS = [
  ['pvp','⚔️ Player vs Player', renderPVP],

var tabsEl=document.getElementById('tabs'), panelsEl=document.getElementById('panels');
VIEWS.forEach(function(v,idx){
  var b=document.createElement('button'); b.className='tab'+(idx===0?' on':''); b.textContent=v[1]; b.dataset.k=v[0]; tabsEl.appendChild(b);
  var p=document.createElement('div'); p.className='panel'+(idx===0?' on':''); p.id='panel-'+v[0]; panelsEl.appendChild(p);
});
var rendered={};
function show(k){
  VIEWS.forEach(function(v){ var on=v[0]===k;
    document.querySelector('.tab[data-k="'+v[0]+'"]').classList.toggle('on',on);
    var panel=document.getElementById('panel-'+v[0]); panel.classList.toggle('on',on);
    if(on && !rendered[k]){ v[2](panel); rendered[k]=true; }
  });
}
tabsEl.addEventListener('click',function(e){ var b=e.target.closest('.tab'); if(b) show(b.dataset.k); });
show('pvp');

document.getElementById('tglTheme').addEventListener('click',function(){
  var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t); this.textContent='Theme: '+(t==='dark'?'Dark':'Light');
});
