[build]
  publish = "public"
  functions = "netlify/functions"

# PORTAL_OWNER_EMAIL is just the owner's email address, not a credential. The
# same value is the DEFAULT_OWNER fallback in lib/owner.js, which trips Netlify's
# secret scanner. Exclude this one key so the (genuine) secret scan still runs.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "PORTAL_OWNER_EMAIL"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Land the Ladder Challengers product at the subdomain root. This host-scoped
# rewrite only affects ladders.dinksociety.app/ (force = true so it wins over the
# home index.html); every other path on the subdomain still serves normally
# (ladder-score.html, /profile, /css, /api …). The apex (dinksociety.app) is
# unaffected because the `from` is host-specific. Requires the domain alias
# `ladders.dinksociety.app` to be added in Netlify with DNS pointing at the site.
[[redirects]]
  from = "https://ladders.dinksociety.app/"
  to = "/ladders.html"
  status = 200
  force = true

# Pretty URLs for the two portals. The old /admin/* and /captain/* catch-alls
# were broader than needed — nothing routes to sub-paths (the admin panel uses
# in-page tabs, magic links land on the .html files directly), so only the
# bare paths are mapped.
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/captain"
  to = "/captain.html"
  status = 200

# Ladder Challengers public pages (query string ?event=… is preserved).
[[redirects]]
  from = "/ladders"
  to = "/ladders.html"
  status = 200

[[redirects]]
  from = "/ladder-live"
  to = "/ladder-live.html"
  status = 200

# Last rule — anything that didn't match a real file or a rule above is a 404.
# Netlify evaluates redirects top-to-bottom, first match wins; non-forced rules
# never shadow existing static files.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
