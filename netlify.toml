[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/captain/*"
  to = "/captain.html"
  status = 200

# Legacy redirect: moments → gallery
[[redirects]]
  from = "/moments.html"
  to = "/gallery.html"
  status = 301
