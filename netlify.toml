[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Pretty URLs for the two portals. The old /admin/* and /captain/* catch-alls
# were broader than needed — nothing routes to sub-paths (the admin panel uses
# in-page tabs, magic links land on the .html files directly), so only the
# bare paths are mapped.
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/captain"
  to = "/captain.html"
  status = 200

# Last rule — anything that didn't match a real file or a rule above is a 404.
# Netlify evaluates redirects top-to-bottom, first match wins; non-forced rules
# never shadow existing static files.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
