<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1040" width="760" height="1040">
  <defs>
    <radialGradient id="gold" cx="42%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#f4dd8a"/>
      <stop offset="42%" stop-color="#d9b24c"/>
      <stop offset="100%" stop-color="#9c7522"/>
    </radialGradient>
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbeeb0"/>
      <stop offset="100%" stop-color="#7d5a16"/>
    </linearGradient>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="0.4" flood-color="#5e4410" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="-1.1" stdDeviation="0.3" flood-color="#fff0bf" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="760" height="1040" fill="#0a0a0a"/>

  <!-- top loop -->
  <rect x="330" y="40" width="100" height="70" rx="16" fill="url(#bevel)"/>
  <rect x="345" y="54" width="70" height="42" rx="10" fill="#0a0a0a"/>

  <!-- medal body -->
  <rect x="70" y="100" width="620" height="880" rx="70" fill="url(#bevel)"/>
  <rect x="84" y="114" width="592" height="852" rx="60" fill="url(#gold)"/>

  <!-- faint court lines (brand mark, engraved) -->
  <g fill="none" stroke="#8a6a1c" stroke-width="6" stroke-linecap="square" opacity="0.45">
    <rect x="150" y="180" width="460" height="720"/>
    <line x1="380" y1="180" x2="380" y2="420"/>
    <line x1="380" y1="660" x2="380" y2="900"/>
    <line x1="150" y1="420" x2="610" y2="420" stroke-dasharray="26 20"/>
    <line x1="150" y1="660" x2="610" y2="660" stroke-dasharray="26 20"/>
  </g>

  <!-- ENGRAVED RECEIPT -->
  <g filter="url(#emboss)" fill="#7a5a16" text-anchor="middle"
     font-family="Liberation Mono, Courier New, monospace">

    <!-- header -->
    <text x="380" y="240" font-family="Liberation Sans, Arial, sans-serif" font-weight="bold" font-size="58" letter-spacing="3" fill="#6e5012">DINK SOCIETY</text>
    <text x="380" y="278" font-size="22" letter-spacing="6" fill="#7a5a16">PICKLEBALL LEAGUE</text>

    <line x1="170" y1="306" x2="590" y2="306" stroke="#8a6a1c" stroke-width="3" stroke-dasharray="10 9"/>

    <text x="380" y="346" font-size="26" letter-spacing="4">RECEIPT OF CHAMPIONSHIP</text>
    <text x="380" y="380" font-size="22" letter-spacing="3">SEASON 1  ·  LOS ANGELES</text>

    <line x1="170" y1="408" x2="590" y2="408" stroke="#8a6a1c" stroke-width="3" stroke-dasharray="10 9"/>

    <!-- itemized -->
    <g font-size="24" letter-spacing="1" text-anchor="start">
      <text x="180" y="452">MATCHES WON</text>      <text x="580" y="452" text-anchor="end">— —</text>
      <text x="180" y="492">GAMES TAKEN</text>      <text x="580" y="492" text-anchor="end">— —</text>
      <text x="180" y="532">DINKS LANDED</text>     <text x="580" y="532" text-anchor="end">— — —</text>
      <text x="180" y="572">COMPOSURE</text>        <text x="580" y="572" text-anchor="end">PRICELESS</text>
    </g>

    <line x1="170" y1="600" x2="590" y2="600" stroke="#8a6a1c" stroke-width="4"/>
    <text x="180" y="642" font-size="30" letter-spacing="2" text-anchor="start" fill="#6e5012" font-family="Liberation Sans, Arial, sans-serif" font-weight="bold">TOTAL</text>
    <text x="580" y="642" font-size="30" letter-spacing="2" text-anchor="end" fill="#6e5012" font-family="Liberation Sans, Arial, sans-serif" font-weight="bold">CHAMPION</text>
    <line x1="170" y1="664" x2="590" y2="664" stroke="#8a6a1c" stroke-width="4"/>

    <!-- champion engrave line -->
    <line x1="200" y1="730" x2="560" y2="730" stroke="#8a6a1c" stroke-width="3"/>
    <text x="380" y="758" font-size="16" letter-spacing="3" fill="#8a6a1c">( champion engraved )</text>
  </g>

  <!-- PAID IN FULL stamp (lime, matches front accent) -->
  <g transform="rotate(-12 400 502)" opacity="0.9">
    <rect x="258" y="466" width="284" height="72" rx="10" fill="none" stroke="#9bbf28" stroke-width="6"/>
    <rect x="272" y="480" width="256" height="44" rx="6" fill="none" stroke="#9bbf28" stroke-width="2.5"/>
    <text x="400" y="513" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="bold" font-size="33" letter-spacing="3" fill="#9bbf28">PAID IN FULL</text>
  </g>

  <!-- hero tagline -->
  <text x="380" y="838" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="bold" font-size="34" letter-spacing="2" fill="#6e5012" filter="url(#emboss)">THE SOCIETY KEEPS RECEIPTS</text>

  <!-- barcode -->
  <g fill="#6e5012">
    <rect x="250" y="864" width="4" height="34"/><rect x="258" y="864" width="2" height="34"/>
    <rect x="264" y="864" width="6" height="34"/><rect x="274" y="864" width="2" height="34"/>
    <rect x="280" y="864" width="4" height="34"/><rect x="288" y="864" width="6" height="34"/>
    <rect x="298" y="864" width="2" height="34"/><rect x="304" y="864" width="4" height="34"/>
    <rect x="312" y="864" width="2" height="34"/><rect x="318" y="864" width="6" height="34"/>
    <rect x="328" y="864" width="3" height="34"/><rect x="335" y="864" width="5" height="34"/>
    <rect x="344" y="864" width="2" height="34"/><rect x="350" y="864" width="6" height="34"/>
    <rect x="360" y="864" width="3" height="34"/><rect x="367" y="864" width="2" height="34"/>
    <rect x="373" y="864" width="5" height="34"/><rect x="382" y="864" width="3" height="34"/>
    <rect x="389" y="864" width="6" height="34"/><rect x="399" y="864" width="2" height="34"/>
    <rect x="405" y="864" width="4" height="34"/><rect x="413" y="864" width="2" height="34"/>
    <rect x="419" y="864" width="6" height="34"/><rect x="429" y="864" width="3" height="34"/>
    <rect x="436" y="864" width="2" height="34"/><rect x="442" y="864" width="5" height="34"/>
    <rect x="451" y="864" width="3" height="34"/><rect x="458" y="864" width="6" height="34"/>
    <rect x="468" y="864" width="2" height="34"/><rect x="474" y="864" width="4" height="34"/>
    <rect x="482" y="864" width="2" height="34"/><rect x="488" y="864" width="6" height="34"/>
    <rect x="498" y="864" width="3" height="34"/><rect x="505" y="864" width="5" height="34"/>
  </g>

  <text x="380" y="934" text-anchor="middle" font-family="Liberation Mono, Courier New, monospace" font-size="18" letter-spacing="3" fill="#7a5a16">NO REFUNDS  ·  NO REMATCHES</text>
</svg>
