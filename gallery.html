<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .gal-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .gal-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream); padding: 40px; position: relative; overflow: hidden;
    }
    .gal-hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.04) 1.5px, transparent 1.5px);
      background-size: 18px 18px; pointer-events: none;
    }
    .gal-hero > * { position: relative; z-index: 1; }
    .gal-hero h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; font-weight: 500; margin: 0 0 6px; }
    .gal-hero p { font-size: 14px; opacity: 0.6; margin: 0; }

    .gal-body { padding: 24px var(--gutter); }

    .gal-filters {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .gal-filter {
      font-size: 11px; padding: 6px 14px; border-radius: 4px;
      background: transparent; border: 1px solid rgba(15,77,58,0.1);
      color: var(--emerald); cursor: pointer; font-family: var(--font-body);
      transition: all 0.15s;
    }
    .gal-filter.is-active {
      background: var(--emerald); color: var(--cream); border-color: var(--emerald);
    }

    .gal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .gal-item {
      border-radius: 6px; overflow: hidden;
      aspect-ratio: 4/3; position: relative;
      background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
      cursor: pointer; transition: transform 0.15s;
    }
    .gal-item:hover { transform: scale(1.02); }
    .gal-item img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .gal-item__caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(5,24,16,0.7));
      font-size: 11px; color: var(--cream);
    }

    /* Lightbox */
    .gal-lightbox {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(5,24,16,0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      padding: 40px; cursor: pointer;
    }
    .gal-lightbox.is-open { display: flex; }
    .gal-lightbox img {
      max-width: 100%; max-height: 90vh; border-radius: 8px;
      object-fit: contain;
    }
    .gal-lightbox__close {
      position: absolute; top: 20px; right: 24px;
      background: none; border: none; cursor: pointer;
      color: var(--cream); font-size: 24px; opacity: 0.6;
    }
    .gal-lightbox__close:hover { opacity: 1; }

    .empty-state {
      text-align: center; padding: 60px 20px;
      font-size: 14px; opacity: 0.5;
    }
    .empty-state__icon {
      font-size: 32px; margin-bottom: 12px; opacity: 0.3;
    }

    @media (max-width: 600px) {
      .gal-hero { padding: 28px 20px; }
      .gal-hero h1 { font-size: 28px; }
      .gal-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="gal-shell">
    <div class="gal-hero">
      <div class="eyebrow" style="margin-bottom: 10px;">Gallery</div>
      <h1>Moments from the court</h1>
      <p>League nights, celebrations, and the post-match round.</p>
    </div>

    <div class="gal-body">
      <div class="gal-filters" id="gal-filters">
        <button class="gal-filter is-active" data-week="all">All weeks</button>
        <button class="gal-filter" data-week="1">Week 1</button>
        <button class="gal-filter" data-week="2">Week 2</button>
        <button class="gal-filter" data-week="3">Week 3</button>
        <button class="gal-filter" data-week="4">Week 4</button>
        <button class="gal-filter" data-week="5">Week 5</button>
        <button class="gal-filter" data-week="6">Week 6</button>
        <button class="gal-filter" data-week="7">Championship</button>
      </div>

      <div class="gal-grid" id="gal-grid">
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state__icon">📸</div>
          Photos will appear here once league nights begin.
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="gal-lightbox" id="gal-lightbox" onclick="this.classList.remove('is-open')">
    <button class="gal-lightbox__close" aria-label="Close">&times;</button>
    <img id="gal-lightbox-img" src="" alt="" />
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    // Filter tabs
    document.getElementById('gal-filters')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.gal-filter');
      if (!btn) return;
      document.querySelectorAll('.gal-filter').forEach(f => f.classList.remove('is-active'));
      btn.classList.add('is-active');
      // Future: filter gallery by week
    });

    // Lightbox
    document.getElementById('gal-grid')?.addEventListener('click', (e) => {
      const item = e.target.closest('.gal-item');
      if (!item) return;
      const img = item.querySelector('img');
      if (!img) return;
      document.getElementById('gal-lightbox-img').src = img.src;
      document.getElementById('gal-lightbox').classList.add('is-open');
    });
  </script>
</body>
</html>
