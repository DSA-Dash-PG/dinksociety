<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Page A — Mobile preview</title>
<style>
  body{margin:0;background:#0a0a0a;color:#f0f0ec;font-family:Inter,system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;gap:6px;}
  h1{font-size:1.1rem;font-weight:800;margin:0;}
  p{font-size:.82rem;color:#8a8f88;margin:0 0 22px;text-align:center;max-width:46ch;line-height:1.5;}
  .phone{width:393px;max-width:100%;height:830px;border-radius:46px;background:#000;
         padding:12px;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px #2a2a2a inset;position:relative;}
  .phone::before{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);
                 width:120px;height:28px;background:#000;border-radius:0 0 16px 16px;z-index:3;}
  .screen{width:100%;height:100%;border-radius:36px;overflow:hidden;background:#0e0e0e;position:relative;}
  iframe{width:393px;height:806px;border:0;display:block;}
  .cap{font-size:.75rem;color:#5e625c;margin-top:14px;}
</style>
</head>
<body>
  <h1>Net Gains — mobile</h1>
  <p>Live, interactive preview at iPhone width (393px). Tap the tabs, the Stats sub-tabs, and the “Admin edit” toggle just like on a phone.</p>
  <div class="phone"><div class="screen">
    <iframe src="team-page-A-mockup.html" title="Team page mobile preview"></iframe>
  </div></div>
  <div class="cap">Renders the same team-page-A-mockup.html — the layout reflows automatically below 820px.</div>
</body>
</html>
