<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player · The Dink Society</title>
  <meta name="description" content="Player profile — The Dink Society" />
  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Player · The Dink Society" />
  <meta property="og:description" content="Player profile — The Dink Society" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Dink Society" />
  <meta property="og:url" content="https://dinksociety.netlify.app/player" />
  <meta property="og:image" content="https://dinksociety.netlify.app/img/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Player · The Dink Society" />

  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <script src="/js/short-name.js"></script>
  <style>
    /* ═══════════════════════════════════════
       PLAYER PROFILE — full-page layout
    ═══════════════════════════════════════ */
    .pp-shell { max-width: 780px; margin: 0 auto; padding: 80px var(--gutter) 100px; }

    /* ── Nav back ── */
    .pp-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--color-text-faint); text-decoration: none; margin-bottom: var(--space-5); transition: color var(--transition); }
    .pp-back:hover { color: var(--color-text); }
    .pp-back::before { content: '←'; }

    /* ── Section card ── */
    .pp-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-5) var(--space-6); margin-bottom: var(--space-4); }
    .pp-card__head { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; font-style: italic; text-transform: uppercase; letter-spacing: 0.14em; color: var(--color-text-faint); margin-bottom: var(--space-4); }

    /* ── Hero ── */
    .pp-hero { display: flex; align-items: center; gap: var(--space-5); }
    .pp-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .pp-hero__body { flex: 1; min-width: 0; }
    .pp-hero__eyebrow { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--color-teal); margin-bottom: var(--space-2); }
    .pp-hero__name { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; text-transform: uppercase; margin: 0 0 var(--space-3); line-height: 1.05; }
    .pp-hero__meta { font-size: 12px; color: var(--color-text-faint); margin-bottom: var(--space-3); }
    .pp-hero__meta a { color: var(--color-teal); text-decoration: none; font-weight: 600; }
    .pp-hero__meta a:hover { text-decoration: underline; }
    .pp-hero__pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pp-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-full); border: 1px solid var(--color-border); color: var(--color-text-faint); background: var(--color-surface-2); }
    .pp-pill--captain { color: var(--color-lime); border-color: var(--color-lime); background: var(--color-lime-ghost); }
    .pp-pill--dupr    { color: var(--color-teal); border-color: var(--color-teal); background: var(--color-teal-dim); }

    /* ── Stat tiles ── */
    .stat-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-tile { flex: 1; min-width: 72px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 14px 10px; text-align: center; }
    .stat-tile__val { font-size: 1.75rem; font-weight: 800; line-height: 1; }
    .stat-tile__label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-faint); margin-top: 4px; }
    .val--green { color: #22c55e; }
    .val--red   { color: #ef4444; }
    .val--teal  { color: var(--color-teal); }
    .val--lime  { color: var(--color-lime); }

    /* ── DSR hero card ── */
    .pp-dsr { background: var(--color-surface); border: 1px solid rgba(184,255,44,0.25); border-radius: var(--radius-lg); padding: var(--space-6); text-align: center; margin-bottom: var(--space-4); }
    .pp-dsr__lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-text-faint); font-weight: 700; }
    .pp-dsr__n { font-size: 3.4rem; font-weight: 800; color: var(--color-lime); line-height: 1; margin: 8px 0 6px; }
    .pp-dsr__sub { font-size: 12px; color: var(--color-text-muted); }
    .pp-dsr__rank { display: inline-flex; align-items: center; gap: 5px; margin-top: 12px; font-size: 12px; font-weight: 700; background: var(--color-lime-ghost); color: var(--color-lime); padding: 5px 14px; border-radius: var(--radius-full); }

    /* ── Awards (Chef of the Week) ── */
    .awards-list { display: flex; flex-direction: column; }
    .award-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--color-border); }
    .award-row:last-child { border-bottom: none; }
    .award-badge { width: 34px; height: 34px; border-radius: 9px; background: var(--color-lime-ghost); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .award-badge--f { background: var(--color-teal-dim); }
    .award-body { flex: 1; min-width: 0; }
    .award-title { font-size: 13px; font-weight: 700; }
    .award-meta { font-size: 11px; color: var(--color-text-faint); margin-top: 1px; }
    .award-dsr { font-size: 18px; font-weight: 800; color: var(--color-lime); white-space: nowrap; }
    .award-dsr--f { color: var(--color-teal); }
    .award-dsr__u { font-size: 9px; color: var(--color-text-faint); font-weight: 600; }
    .pp-pill--award { color: var(--color-lime); border-color: var(--color-lime); background: var(--color-lime-ghost); }

    /* ── By game type ── */
    .game-type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
    .game-type-card { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 14px; text-align: center; }
    .game-type-card__label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-teal); margin-bottom: 8px; }
    .game-type-card__record { font-size: 1.4rem; font-weight: 800; }
    .game-type-card__record--zero { color: var(--color-text-faint); }
    .game-type-card__pct { font-size: 11px; color: var(--color-text-faint); margin-top: 2px; font-weight: 600; }
    .game-type-card__pct--good { color: var(--color-lime); }

    /* ── Partners ── */
    .partners-list { display: flex; flex-direction: column; gap: 0; }
    .partner-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
    .partner-row:last-child { border-bottom: none; }
    .partner-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .partner-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--color-text); text-decoration: none; transition: color var(--transition); }
    .partner-name:hover { color: var(--color-teal); }
    .partner-record { font-size: 12px; font-weight: 700; color: var(--color-text-muted); font-variant-numeric: tabular-nums; }
    .partner-pct { font-size: 12px; font-weight: 800; min-width: 40px; text-align: right; }
    .partner-total-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 0; font-size: 12px; font-weight: 700; color: var(--color-text-faint); }
    .partner-total-row .total-val { font-size: 14px; font-weight: 800; color: var(--color-text); }

    /* ── Season history ── */
    .history-list { display: flex; flex-direction: column; gap: 0; }
    .history-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--color-border); }
    .history-row:last-child { border-bottom: none; }
    .history-season { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-lime); background: var(--color-lime-ghost); padding: 3px 8px; border-radius: 4px; flex-shrink: 0; min-width: 72px; text-align: center; }
    .history-team { flex: 1; }
    .history-team__name { font-size: 13px; font-weight: 700; color: var(--color-text); text-decoration: none; }
    .history-team__name:hover { color: var(--color-teal); }
    .history-team__div { font-size: 10px; color: var(--color-text-faint); margin-top: 2px; }
    .history-stat { text-align: right; }
    .history-stat__record { font-size: 13px; font-weight: 700; }
    .history-stat__pct { font-size: 11px; color: var(--color-text-faint); margin-top: 1px; }
    .history-empty { font-size: 12px; color: var(--color-text-faint); padding: var(--space-3) 0; text-align: center; }

    /* ═══ MLP-format hero ═══ */
    .mlp-hero { border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--space-4);
      background: linear-gradient(115deg, var(--color-surface) 0%, var(--color-surface-2) 100%); }
    .mlp-hero__top { display: flex; align-items: center; gap: 24px; padding: 28px 30px; }
    .mlp-photo { width: 120px; height: 120px; flex-shrink: 0; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: 800; color: #fff;
      background: var(--ph, var(--color-teal)); border: 1px solid var(--color-border); }
    .mlp-photo__img { width: 100%; height: 100%; object-fit: cover; }
    .mlp-hero__id { flex: 1; min-width: 0; }
    .mlp-hero__eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--color-text-faint); margin-bottom: 8px; }
    .mlp-hero__eyebrow a { color: var(--color-teal); text-decoration: none; font-weight: 700; }
    .mlp-hero__eyebrow a:hover { text-decoration: underline; }
    .mlp-hero__name { font-size: clamp(1.4rem, 3.2vw, 2.2rem); font-weight: 800; line-height: 1.05; margin: 0; overflow-wrap: anywhere; }
    .mlp-hero__name.is-long  { font-size: clamp(1.25rem, 2.6vw, 1.85rem); }
    .mlp-hero__name.is-xlong { font-size: clamp(1.1rem, 2.2vw, 1.55rem); }
    .mlp-hero__meta { font-size: 13px; font-weight: 600; color: var(--color-text-muted); margin-top: 7px; }
    .mlp-hero__meta a { color: var(--color-teal); text-decoration: none; font-weight: 700; }
    .mlp-hero__meta a:hover { text-decoration: underline; }
    /* Last-resort: only wrap on very narrow screens so the name still fits */
    @media (max-width: 420px) { .mlp-hero__name { white-space: normal; overflow-wrap: anywhere; } }
    .mlp-hero__dsr { flex-shrink: 0; text-align: center; padding: 0 6px; }
    .mlp-hero__dsr-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-text-faint); }
    .mlp-hero__dsr-n { font-size: 3rem; font-weight: 800; color: var(--color-lime); line-height: 1; margin: 4px 0; }
    .mlp-hero__dsr-rk { font-size: 11px; color: var(--color-text-muted); font-weight: 600; }
    .mlp-vitals { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); border-top: 1px solid var(--color-border); background: rgba(0,0,0,0.18); }
    .mlp-vital { padding: 14px 12px; border-right: 1px solid var(--color-border); text-align: center; }
    .mlp-vital:last-child { border-right: none; }
    .mlp-vital__lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-faint); margin-bottom: 5px; }
    .mlp-vital__val { font-size: 15px; font-weight: 800; }
    .mlp-vital__val.is-empty { color: var(--color-text-faint); font-weight: 600; }

    /* ═══ MLP stat panel ═══ */
    .mlp-panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); margin-bottom: var(--space-4); }
    .mlp-panel__h { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; margin-bottom: var(--space-5); }
    .mlp-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .mlp-cards--4 { grid-template-columns: repeat(4, 1fr); }
    .mlp-cards--3 { grid-template-columns: repeat(3, 1fr); }
    .mlp-cards + .mlp-cards { margin-top: 10px; }
    .mlp-card { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 18px 12px; text-align: center; position: relative; }
    .mlp-card__val { font-size: 1.9rem; font-weight: 800; line-height: 1; }
    .mlp-card__lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--color-text-faint); margin-top: 8px; }
    .mlp-card__sub { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; font-weight: 600; }
    .mlp-card.is-est::after { content: 'EST'; position: absolute; top: 7px; right: 7px; font-size: 8px; font-weight: 800; letter-spacing: 0.06em; color: var(--color-lime); background: var(--color-lime-ghost); padding: 2px 5px; border-radius: 4px; }
    .mlp-card .is-na { color: var(--color-text-faint); font-style: italic; font-size: 1.4rem; }
    .mlp-disc-h { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-faint); margin: var(--space-5) 0 var(--space-3); }
    .mlp-table { width: 100%; border-collapse: collapse; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
    .mlp-table th, .mlp-table td { padding: 13px 16px; text-align: center; font-size: 13px; }
    .mlp-table th { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--color-text-faint); border-bottom: 1px solid var(--color-border); }
    .mlp-table th:first-child, .mlp-table td:first-child { text-align: left; font-weight: 700; }
    .mlp-table tbody tr + tr td { border-top: 1px solid var(--color-border); }
    .mlp-note { margin-top: var(--space-4); font-size: 11px; color: var(--color-text-faint); line-height: 1.6; }
    .mlp-note b { color: var(--color-text-muted); }

    @media (max-width: 640px) {
      .mlp-hero__top { gap: 14px; padding: 20px; }
      .mlp-photo { width: 76px; height: 76px; font-size: 26px; border-radius: 50%; }
      .mlp-hero__name { font-size: 1.45rem; }
      .mlp-hero__name.is-long  { font-size: 1.25rem; }
      .mlp-hero__name.is-xlong { font-size: 1.1rem; }
      .mlp-hero__dsr-n { font-size: 2.2rem; }
      .mlp-hero__dsr-rk { display: none; }
      .mlp-vitals { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); }
      .mlp-cards, .mlp-cards--4, .mlp-cards--3 { grid-template-columns: repeat(2, 1fr); }
      .mlp-panel { padding: var(--space-4); }
    }

    /* ── Loading / empty ── */
    .pp-loading { text-align: center; padding: 80px 20px; font-size: 14px; color: var(--color-text-faint); }

    @media (max-width: 600px) {
      .pp-card { padding: var(--space-4); }
      .pp-hero { gap: var(--space-3); }
      .pp-avatar { width: 56px; height: 56px; font-size: 22px; }
      .stat-tile__val { font-size: 1.4rem; }
      .game-type-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body data-page="player">
  <div data-partial="nav"></div>

  <div class="pp-shell">
    <a href="/teams" class="pp-back" id="back-link">Teams</a>
    <div id="page-root"><div class="pp-loading">Loading…</div></div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script src="/ladder-profile-view.js"></script>
  <script>
  (() => {
    /* ─── Helpers ─────────────────────────────────────────── */
    const esc  = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const slug = s => String(s ?? '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const fmtDate = iso => { if (!iso) return ''; const d = new Date(iso); return isNaN(d) ? '' : d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
    const pct  = (won, played) => played ? Math.round(won / played * 100) : 0;
    // Shrink the hero name for long names / long single words so it never
    // crowds the DSR or wraps awkwardly on mobile.
    const nameSizeClass = (name) => {
      const n = String(name || '');
      const longestWord = n.split(/\s+/).reduce((m, w) => Math.max(m, w.length), 0);
      if (n.length > 18 || longestWord > 11) return 'is-xlong';
      if (n.length > 12 || longestWord > 8)  return 'is-long';
      return '';
    };

    const PALETTE = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#84cc16'];
    const avatarColor = name => { let h = 0; for (const c of String(name||'')) h = (h*31+c.charCodeAt(0))&0xffff; return PALETTE[h%PALETTE.length]; };
    const initial = name => (name || '?').charAt(0).toUpperCase();
    const teamInitials = name => (name || '?').split(/\s+/).slice(0, 2).map(w => w.charAt(0).toUpperCase()).join('');

    /* ─── URL ─────────────────────────────────────────────── */
    const params     = new URLSearchParams(location.search);
    const teamParam  = params.get('team')  || '';
    const playerName = params.get('name')  || '';
    const playerIdParam = params.get('id') || '';   // direct player-id lookup (future use)
    // Optional season override (?season=circuit-test) for staff QA. Default = live season.
    const SEASON_ID = params.get('season') || 'circuit-i';
    const CIRCUIT   = SEASON_ID.replace('circuit-', '').toUpperCase();
    const LINK_SUFFIX = SEASON_ID === 'circuit-i' ? '' : `&season=${encodeURIComponent(SEASON_ID)}`;

    /* ─── Load ────────────────────────────────────────────── */
    async function load() {
      // Always fetch teams to find the player's roster entry + team info
      const [teamsRes, psRes] = await Promise.allSettled([
        fetch('/.netlify/functions/public-teams?season=' + encodeURIComponent(SEASON_ID)).then(r => r.ok ? r.json().catch(() => null) : null),
        fetch('/.netlify/functions/public-leaderboard?circuit=' + encodeURIComponent(CIRCUIT) + '&view=players').then(r => r.ok ? r.json().catch(() => null) : null),
      ]);

      const teamsData = teamsRes.status === 'fulfilled' ? teamsRes.value : null;
      if (!teamsData) {
        document.getElementById('page-root').innerHTML = '<div class="pp-loading">Couldn’t load right now. <a href="#" onclick="location.reload();return false" style="color:var(--color-lime);font-weight:700">Retry</a></div>';
        return;
      }
      const teams = teamsData.teams || [];

      // Find the team by slug or raw id
      let team = teams.find(t => slug(t.name) === teamParam) || teams.find(t => t.id === teamParam);
      let rosterPlayer = null;

      if (team) {
        rosterPlayer = (team.roster || []).find(p => p.name === playerName);
      }

      // Fall back: search all teams if direct team match fails
      if (!rosterPlayer) {
        for (const t of teams) {
          const found = (t.roster || []).find(p => p.name === playerName);
          if (found) { rosterPlayer = found; team = t; break; }
        }
      }

      if (!rosterPlayer || !team) {
        document.getElementById('page-root').innerHTML = '<div class="pp-loading">Player not found.</div>';
        return;
      }

      document.title = `${rosterPlayer.name} · The Dink Society`;
      const teamSlug = slug(team.name);

      // Update back link to point at the team page
      const back = document.getElementById('back-link');
      back.href = `/team?id=${teamSlug}${LINK_SUFFIX}`;
      back.textContent = team.name;

      // Find player stats by name (since we don't have playerId in the URL yet)
      const pstats  = psRes.value;
      const allP    = pstats && !pstats.empty ? Object.values(pstats.players || {}) : [];
      const pStat   = allP.find(p => p.name === playerName && (p.teamName === team.name || p.teamId === team.id))
                   || allP.find(p => p.name === playerName);

      // If we have a player ID, fetch cross-season history
      let history = [];
      const resolvedId = pStat?.playerId || rosterPlayer?.id || '';
      if (resolvedId) {
        try {
          const hr = await fetch(`/.netlify/functions/public-player?id=${encodeURIComponent(resolvedId)}&circuit=${encodeURIComponent(CIRCUIT)}`);
          if (hr.ok) {
            const hd = await hr.json();
            history = hd.history || [];
            // merge partnerNames for display
            if (pStat && hd.partnerNames) pStat._partnerNames = hd.partnerNames;
          }
        } catch {}
      }

      // ── Ranking: league-wide, by DSR (composite), overall + within gender ──
      const norm = g => { const s = String(g || '').trim().toLowerCase(); return s[0] === 'f' ? 'F' : s[0] === 'm' ? 'M' : ''; };
      const myGender = norm(pStat?.gender || rosterPlayer.gender);
      const dsr = pStat?.composite;
      const withDsr = allP.filter(p => p.composite != null);
      let overallRank = null, genderRank = null;
      if (dsr != null && pStat) {
        const oSorted = [...withDsr].sort((a, b) => b.composite - a.composite);
        overallRank = oSorted.indexOf(pStat) + 1 || null;
        const gSorted = withDsr.filter(p => norm(p.gender) === myGender).sort((a, b) => b.composite - a.composite);
        genderRank = gSorted.indexOf(pStat) + 1 || null;
      }
      const genderLabel = myGender === 'F' ? "Women's Ranking" : myGender === 'M' ? "Men's Ranking" : 'Division Ranking';
      const ranks = { dsr, overallRank, genderRank, genderLabel };

      // ── Derived MLP-style metrics ──
      const playersMap = pstats?.players || {};
      // Avg Partner DSR — game-weighted mean of partners' composite ratings.
      let avgPartnerDsr = null;
      if (pStat?.partners) {
        let wSum = 0, gSum = 0;
        for (const [pid, v] of Object.entries(pStat.partners)) {
          const played = v && typeof v === 'object' ? (v.played || 0) : (v || 0);
          const comp = playersMap[pid]?.composite;
          if (played > 0 && comp != null) { wSum += comp * played; gSum += played; }
        }
        if (gSum > 0) avgPartnerDsr = wSum / gSum;
      }
      // Avg Opponent DSR — game-weighted mean of opponents' composite ratings.
      let avgOpponentDsr = null, opponentCount = 0;
      if (pStat?.opponents) {
        let wSum = 0, gSum = 0;
        for (const [pid, v] of Object.entries(pStat.opponents)) {
          const played = v && typeof v === 'object' ? (v.played || 0) : (v || 0);
          const comp = playersMap[pid]?.composite;
          if (played > 0 && comp != null) { wSum += comp * played; gSum += played; opponentCount++; }
        }
        if (gSum > 0) avgOpponentDsr = wSum / gSum;
      }
      const pointsWonPct = (pStat && (pStat.ps + pStat.pa) > 0)
        ? Math.round(pStat.ps / (pStat.ps + pStat.pa) * 1000) / 10
        : null;
      const metrics = { avgPartnerDsr, avgOpponentDsr, opponentCount, pointsWonPct };

      render(rosterPlayer, team, teamSlug, pStat, history, ranks, metrics);

      // Combined profile: if this player also plays Ladder, wrap the league content
      // under League/Ladder tabs and make the hero rating follow the active tab.
      try {
        const up = await fetch(`/.netlify/functions/public-profile?leagueId=${encodeURIComponent(resolvedId)}&circuit=${encodeURIComponent(CIRCUIT)}`);
        if (up.ok) {
          const u = await up.json();
          if (u.found && u.ladder) {
            const L = u.ladder, root = document.getElementById('page-root'), hero = root.querySelector('.mlp-hero');
            if (hero) {
              const ordN = n => { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };
              const dsrV = (ranks && ranks.dsr != null) ? Number(ranks.dsr).toFixed(1) : '—';
              const dsrRank = [ranks && ranks.genderRank != null ? ('#' + ranks.genderRank + ' ' + (ranks.genderLabel || '').replace(' Ranking','')) : null, ranks && ranks.overallRank != null ? ('#' + ranks.overallRank + ' Overall') : null].filter(Boolean).join(' · ');
              const drV = (L.dr == null ? '–' : L.dr), drRank = '#' + (L.rank || '–') + (L.mvp ? ' · ' + L.mvp + '× top' : '');
              // Move existing league content (everything after the hero) into a League pane.
              const leaguePane = document.createElement('div'); leaguePane.id = 'lane-league';
              let nn = hero.nextSibling; while (nn) { const nx = nn.nextSibling; leaguePane.appendChild(nn); nn = nx; }
              // Build the Ladder pane from u.ladder via the shared profile renderer.
              const ladderPane = document.createElement('div'); ladderPane.id = 'lane-ladder'; ladderPane.style.display = 'none';
              ladderPane.innerHTML = (window.ladderProfileBody ? window.ladderProfileBody(L) : '');
              // Tab bar.
              const tabs = document.createElement('div');
              tabs.style.cssText = 'display:flex;gap:6px;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:9999px;padding:4px;margin:14px 0';
              tabs.innerHTML = '<button id="tabL" style="flex:1;padding:9px;border:0;border-radius:9999px;font:inherit;font-size:13.5px;font-weight:800;cursor:pointer">League</button><button id="tabD" style="flex:1;padding:9px;border:0;border-radius:9999px;font:inherit;font-size:13.5px;font-weight:800;cursor:pointer">Ladder</button>';
              root.appendChild(tabs); root.appendChild(leaguePane); root.appendChild(ladderPane);
              const heroN = hero.querySelector('.mlp-hero__dsr-n'), heroLbl = hero.querySelector('.mlp-hero__dsr-lbl'), heroRk = hero.querySelector('.mlp-hero__dsr-rk');
              const setTab = t => {
                const lg = t === 'league';
                document.getElementById('lane-league').style.display = lg ? '' : 'none';
                document.getElementById('lane-ladder').style.display = lg ? 'none' : '';
                const bL = document.getElementById('tabL'), bD = document.getElementById('tabD');
                bL.style.background = lg ? '#17d7b0' : 'transparent'; bL.style.color = lg ? '#06231d' : 'var(--color-text-faint)';
                bD.style.background = lg ? 'transparent' : '#b8ff2c'; bD.style.color = lg ? 'var(--color-text-faint)' : '#06210f';
                if (heroN) { heroN.textContent = lg ? dsrV : drV; heroN.style.color = lg ? '#17d7b0' : '#b8ff2c'; }
                if (heroLbl) heroLbl.textContent = lg ? 'League · DSR' : 'Ladder · DR';
                if (heroRk) heroRk.textContent = lg ? dsrRank : drRank;
              };
              document.getElementById('tabL').onclick = () => setTab('league');
              document.getElementById('tabD').onclick = () => setTab('ladder');
              setTab('league');
            }
          }
        }
      } catch {}
    }

    /* ─── Render ──────────────────────────────────────────── */
    function render(rp, team, teamSlug, stat, history, ranks = {}, metrics = {}) {
      const color    = avatarColor(team.name || rp.name);

      let html = '';

      const fmtRank = r => (r != null ? `#${r}` : '—');
      const fmtDsr  = d => (d != null ? Number(d).toFixed(1) : '—');

      /* ── HERO (MLP format) ── */
      const pills = [];
      if (rp.isCaptain)   pills.push(`<span class="pp-pill pp-pill--captain">Captain</span>`);
      if (rp.isCoCaptain) pills.push(`<span class="pp-pill pp-pill--captain" style="border-color:var(--color-teal);color:var(--color-teal);background:var(--color-teal-dim)">Co-Captain ⭐</span>`);

      // Photo (approved) or colored initials fallback.
      const avatarInner = rp.photoUrl
        ? `<img src="${esc(rp.photoUrl)}" alt="${esc(rp.name)}" class="mlp-photo__img">`
        : `<span>${teamInitials(team.name)}</span>`;

      // Meta line (team · gender · city) sits under the name; only non-empty parts.
      const genderTxt = rp.gender === 'F' ? 'Female' : rp.gender === 'M' ? 'Male' : '';
      const metaLine = [
        `<a href="/team?id=${teamSlug}${LINK_SUFFIX}">${esc(team.name)}</a>${team.emoji ? ' ' + team.emoji : ''}`,
        genderTxt ? esc(genderTxt) : '',
        rp.city ? esc(rp.city) : '',
      ].filter(Boolean).join(' · ');

      // Vitals bar — only show boxes that actually have a value.
      const vital = (lbl, val) => `<div class="mlp-vital"><div class="mlp-vital__lbl">${lbl}</div><div class="mlp-vital__val">${esc(String(val))}</div></div>`;
      const vitalDefs = [
        ['Height', rp.height], ['Age', rp.age], ['Plays', rp.plays], ['Home', rp.homeCourt],
      ].filter(([, v]) => v != null && v !== '');
      const vitals = vitalDefs.map(([l, v]) => vital(l, v)).join('');

      const rankLine = [
        ranks.genderRank != null ? `${fmtRank(ranks.genderRank)} ${ranks.genderLabel.replace(' Ranking','')}` : null,
        ranks.overallRank != null ? `${fmtRank(ranks.overallRank)} Overall` : null,
      ].filter(Boolean).join(' · ');

      html += `<div class="mlp-hero">
        <div class="mlp-hero__top">
          <div class="mlp-photo" style="--ph:${color}">${avatarInner}</div>
          <div class="mlp-hero__id">
            <h1 class="mlp-hero__name ${nameSizeClass(rp.name)}">${esc(rp.name)}</h1>
            <div class="mlp-hero__meta">${metaLine}</div>
            ${pills.length ? `<div class="pp-hero__pills" style="margin-top:10px">${pills.join('')}</div>` : ''}
          </div>
          <div class="mlp-hero__dsr">
            <div class="mlp-hero__dsr-lbl">DSR Rating</div>
            <div class="mlp-hero__dsr-n">${fmtDsr(ranks.dsr)}</div>
            ${rankLine ? `<div class="mlp-hero__dsr-rk">${esc(rankLine)}</div>` : ''}
          </div>
        </div>
        ${vitals ? `<div class="mlp-vitals">${vitals}</div>` : ''}
      </div>`;

      /* ── CURRENT SEASON STATS (MLP cards + discipline table) ── */
      if (stat && stat.gamesPlayed > 0) {
        const gwPct = pct(stat.gamesWon, stat.gamesPlayed);
        const ptPct = metrics.pointsWonPct;
        const apd   = metrics.avgPartnerDsr;
        const aod   = metrics.avgOpponentDsr;
        const card = (val, lbl, sub, cls = '') => `<div class="mlp-card ${cls}"><div class="mlp-card__val">${val}</div><div class="mlp-card__lbl">${lbl}</div>${sub ? `<div class="mlp-card__sub">${sub}</div>` : ''}</div>`;

        html += `<div class="mlp-panel">
          <div class="mlp-panel__h">Current Season Stats</div>
          <div class="mlp-cards mlp-cards--4">
            ${card(`<span class="val--green">${gwPct}%</span>`, 'Games Won %', `${stat.gamesWon} W – ${stat.gamesLost} L`)}
            ${card(`<span class="val--teal">${ptPct != null ? ptPct + '%' : '—'}</span>`, 'Points Won %', `${stat.ps} – ${stat.pa}`)}
            ${card(`<span class="val--lime">${apd != null ? apd.toFixed(1) : '—'}</span>`, 'Avg Partner DSR', `${Object.keys(stat.partners || {}).length} partners`)}
            ${card(`<span class="${aod != null ? 'val--lime' : 'is-na'}">${aod != null ? aod.toFixed(1) : 'N/A'}</span>`, 'Avg Opponent DSR', aod != null ? `${metrics.opponentCount} opponents` : 'needs match data')}
          </div>
          <div class="mlp-cards mlp-cards--3">
            ${card(`<span>${stat.ps}</span>`, 'Points Scored', 'all games')}
            ${card(`<span>${stat.pa}</span>`, 'Points Against', 'all games')}
            ${card(`<span class="${stat.diff >= 0 ? 'val--green' : 'val--red'}">${stat.diff >= 0 ? '+' : ''}${stat.diff}</span>`, 'Point Diff', 'scored − against')}
          </div>`;

        // Discipline breakdown.
        const bt = stat.byType || {};
        const rows = [
          { key: 'womens', label: "Gender (Women's)" },
          { key: 'mens',   label: "Gender (Men's)" },
          { key: 'mixed',  label: 'Mixed' },
        ].filter(r => (bt[r.key]?.played || 0) > 0);
        if (rows.length) {
          html += `<div class="mlp-disc-h">By Discipline</div>
          <table class="mlp-table"><thead><tr><th>Discipline</th><th>Games Won %</th><th>Games W / L</th></tr></thead><tbody>
            ${rows.map(r => {
              const d = bt[r.key]; const p = pct(d.won, d.played);
              const cls = d.won > d.played - d.won ? 'val--green' : d.won < d.played - d.won ? 'val--red' : '';
              return `<tr><td>${r.label}</td><td><span class="${cls}" style="font-weight:800">${p}%</span></td><td>${d.won} / ${d.played - d.won}</td></tr>`;
            }).join('')}
          </tbody></table>`;
        }
        html += `<div class="mlp-note"><b>Points Scored / Against / Diff</b> are this player's own rally points across every game.${aod == null ? ' <b>Avg Opponent DSR</b> appears once opponents are recorded for your games.' : ''}</div>`;
        html += `</div>`;
      }

      /* ── AWARDS — Chef of the Week wins ── */
      if (stat?.awards?.length) {
        const fmtAward = iso => { if (!iso) return ''; try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); } catch { return ''; } };
        html += `<div class="pp-card">
          <div class="pp-card__head" style="justify-content:space-between">
            <span>🏆 Chef of the Week</span>
            <span class="pp-pill pp-pill--award">${stat.awards.length}&times; winner</span>
          </div>
          <div class="awards-list">
            ${stat.awards.map(a => {
              const f = a.type === 'womens';
              return `<div class="award-row">
                <div class="award-badge ${f ? 'award-badge--f' : ''}">👑</div>
                <div class="award-body">
                  <div class="award-title">Week ${a.week} ${f ? "Women's" : "Men's"} Chef</div>
                  <div class="award-meta">${fmtAward(a.date)} &middot; ${a.w}W&ndash;${a.l}L &middot; ${a.diff >= 0 ? '+' : ''}${a.diff} pt diff</div>
                </div>
                <div class="award-dsr ${f ? 'award-dsr--f' : ''}">${Number(a.dsr).toFixed(1)}<span class="award-dsr__u"> DSR</span></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }

      /* ── PARTNERS — only if we have game data ── */
      if (stat && stat.gamesPlayed > 0) {

        /* Partners */
        const partners = stat.partners || {};
        const pNames   = stat._partnerNames || {};
        const pEntries = Object.entries(partners)
          .map(([pid, v]) => {
            const isObj = v && typeof v === 'object';
            const played = isObj ? v.played : (v || 0);
            const won    = isObj ? (v.won || 0) : 0;
            const info   = pNames[pid];
            return { pid, played, won, name: info?.name || null, teamName: info?.teamName || null };
          })
          .filter(p => p.played > 0 && p.name)
          .sort((a, b) => b.played - a.played || b.won - a.won);

        if (pEntries.length) {
          const totalPlayed = pEntries.reduce((s, p) => s + p.played, 0);
          const totalWon    = pEntries.reduce((s, p) => s + p.won, 0);
          const totalPct    = pct(totalWon, totalPlayed);

          html += `<div class="pp-card">
            <div class="pp-card__head">🤝 All Partners</div>
            <div class="partners-list">
              ${pEntries.map(p => {
                const pcolor = avatarColor(p.name);
                const partnerTeamSlug = p.teamName ? slug(p.teamName) : teamSlug;
                const partnerHref = `/player?team=${partnerTeamSlug}&name=${encodeURIComponent(p.name)}${LINK_SUFFIX}`;
                const pp = pct(p.won, p.played);
                const pctClass = pp >= 60 ? 'val--green' : pp <= 35 ? 'val--red' : '';
                return `<div class="partner-row">
                  <div class="partner-avatar" style="background:${pcolor}">${initial(p.name)}</div>
                  <a href="${partnerHref}" class="partner-name">${esc(shortName(p.name))}</a>
                  <span class="partner-record">${p.won}–${p.played - p.won}</span>
                  <span class="partner-pct ${pctClass}">${pp}%</span>
                </div>`;
              }).join('')}
              <div class="partner-total-row">
                <span>Total</span>
                <span class="total-val">${totalWon}–${totalPlayed - totalWon} <span style="color:var(--color-lime)">${totalPct}%</span></span>
              </div>
            </div>
          </div>`;
        }

      } else {
        /* No game data yet — show a pending card */
        html += `<div class="pp-card" style="text-align:center;padding:var(--space-8);">
          <div style="font-size:32px;margin-bottom:var(--space-3)">📊</div>
          <div style="font-size:14px;font-weight:700;margin-bottom:var(--space-2)">Stats pending</div>
          <div style="font-size:12px;color:var(--color-text-faint)">Game stats will appear here once Season 1 begins on June 8.</div>
        </div>`;
      }

      /* ── SEASON HISTORY ── */
      html += `<div class="pp-card">
        <div class="pp-card__head">🗂 Season History</div>`;

      if (history.length) {
        html += `<div class="history-list">
          ${history.map(s => {
            const sp = pct(s.stats?.gamesWon || 0, s.stats?.gamesPlayed || 0);
            const tSlug = s.teamName ? slug(s.teamName) : '';
            return `<div class="history-row">
              <span class="history-season">${esc(s.seasonLabel || s.circuit)}</span>
              <div class="history-team">
                ${tSlug ? `<a href="/team?id=${tSlug}" class="history-team__name">${esc(s.teamName)}</a>` : `<span class="history-team__name">${esc(s.teamName || '—')}</span>`}
                <div class="history-team__div">${s.year || ''}</div>
              </div>
              <div class="history-stat">
                <div class="history-stat__record">${s.stats?.gamesWon ?? '—'}–${s.stats?.gamesLost ?? '—'}</div>
                <div class="history-stat__pct">${sp}% · ${s.stats?.matchesPlayed ?? 0} matches</div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
      } else {
        /* Current season as a live preview row */
        const liveStat = stat && stat.gamesPlayed > 0;
        html += `<div class="history-list">
          <div class="history-row">
            <span class="history-season">Season 1</span>
            <div class="history-team">
              <a href="/team?id=${teamSlug}" class="history-team__name">${esc(team.name)}</a>
              <div class="history-team__div">2026 — In progress</div>
            </div>
            <div class="history-stat">
              ${liveStat
                ? `<div class="history-stat__record">${stat.gamesWon}–${stat.gamesLost}</div>
                   <div class="history-stat__pct">${pct(stat.gamesWon, stat.gamesPlayed)}%</div>`
                : `<div class="history-stat__record" style="color:var(--color-text-faint)">—</div>`}
            </div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--color-text-faint);margin-top:var(--space-3);text-align:center;">
          Past seasons will be archived here at the end of each circuit.
        </div>`;
      }

      html += `</div>`;

      document.getElementById('page-root').innerHTML = html;
    }

    load().catch(e => { console.error('player load failed', e); const pr = document.getElementById('page-root'); if (pr) pr.innerHTML = '<div class="pp-loading">Couldn’t load this player. <a href="#" onclick="location.reload();return false" style="color:var(--color-lime);font-weight:700">Retry</a></div>'; });
  })();
  </script>
</body>
</html>
