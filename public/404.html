<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem('ds-theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found · The Dink Society</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg:#0e0e0e; --color-surface:#161616; --color-surface-2:#1e1e1e; --color-surface-3:#262626; --color-surface-4:#2e2e2e;
    --color-border:rgba(255,255,255,0.08); --color-border-strong:rgba(255,255,255,0.14);
    --color-text:#f0f0ec; --color-text-muted:#9a9e97; --color-text-faint:#5e625c; --color-text-inverse:#0e0e0e;
    --color-lime:#b8ff2c; --color-lime-hover:#c8ff58; --color-lime-dim:rgba(184,255,44,0.12); --color-lime-ghost:rgba(184,255,44,0.06);
    --color-teal:#17d7b0; --color-teal-dim:rgba(23,215,176,0.12);
    --color-red:#ff5c47; --color-red-dim:rgba(255,92,71,0.12);
    --color-gold:#f0c040; --color-gold-dim:rgba(240,192,64,0.12);
    --radius-sm:10px; --radius-md:14px; --radius-lg:20px; --radius-full:9999px;
    --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--color-bg); color:var(--color-text); font-family:var(--font); }
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .nf {
    max-width:440px; width:100%; text-align:center;
    background:var(--color-surface); border:1px solid var(--color-border);
    border-radius:var(--radius-lg); padding:48px 32px;
  }
  .nf__brand {
    font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--color-text-faint); margin-bottom:28px;
  }
  .nf__code {
    font-size:64px; font-weight:900; line-height:1; color:var(--color-lime);
    margin-bottom:12px;
  }
  .nf__title {
    font-size:22px; font-weight:800; text-transform:uppercase; letter-spacing:0.02em;
    margin:0 0 10px;
  }
  .nf__msg {
    font-size:14px; color:var(--color-text-muted); line-height:1.6; margin:0 0 28px;
  }
  .nf__home {
    display:inline-block; padding:13px 32px; background:var(--color-lime); color:var(--color-text-inverse);
    font-size:14px; font-weight:700; text-decoration:none; border-radius:var(--radius-full);
  }
  .nf__home:hover { background:var(--color-lime-hover); }
</style>
</head>
<body>
  <main class="nf">
    <div class="nf__brand">The Dink Society</div>
    <div class="nf__code">404</div>
    <h1 class="nf__title">Page not found</h1>
    <p class="nf__msg">That page doesn't exist — maybe it got dinked out of bounds. Check the address, or head back to the homepage.</p>
    <a class="nf__home" href="/">Back to home</a>
  </main>
</body>
</html>
