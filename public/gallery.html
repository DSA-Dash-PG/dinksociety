<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery · The Dink Society</title>
  <meta name="description" content="Photos from league nights at The Dink Society." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .gal-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }



    .gal-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: var(--space-4); }
    .gal-filter {
      padding: 6px 14px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition);
    }
    .gal-filter:hover { color: var(--color-text); background: var(--color-surface-2); }
    .gal-filter.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .gal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--space-3); }
    .gal-item {
      aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden;
      cursor: pointer; background: var(--color-surface-2); position: relative;
    }
    .gal-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
    .gal-item:hover img { transform: scale(1.04); }
    .gal-item__overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 20px 12px 10px; color: #fff;
    }
    .gal-item__week { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.7; font-weight: 700; margin-bottom: 2px; }
    .gal-item__caption { font-size: 12px; }

    .gal-lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center; z-index: 300;
    }
    .gal-lightbox.is-open { display: flex; }
    .gal-lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 4px; }
    .gal-lightbox__close {
      position: absolute; top: 20px; right: 20px; background: none;
      border: 1px solid var(--color-border); color: var(--color-text);
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .gal-lightbox__close:hover { background: var(--color-surface-2); }
    .gal-lightbox__caption { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: var(--color-text-muted); font-size: 12px; text-align: center; max-width: 400px; }

    @media (max-width: 720px) {
      .gal-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
    }
  </style>
</head>
<body data-page="gallery">
  <div data-partial="nav"></div>
    <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="gallery"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow">Circuit I · Moments</div>
      <h1 class="page-hero__title">Gallery</h1>
      <p class="page-hero__sub">From the court — and after.</p>
    </div>
  </div>
  <main class="gal-shell">

    <div class="gal-filters" id="gal-filters">
      <button class="gal-filter is-active" data-week="">All weeks</button>
      <button class="gal-filter" data-week="1">Week 1</button>
      <button class="gal-filter" data-week="2">Week 2</button>
      <button class="gal-filter" data-week="3">Week 3</button>
      <button class="gal-filter" data-week="4">Week 4</button>
      <button class="gal-filter" data-week="5">Week 5</button>
      <button class="gal-filter" data-week="6">Week 6</button>
      <button class="gal-filter" data-week="7">Finals</button>
    </div>

    <div id="gal-content"><div class="empty-state">Loading gallery…</div></div>
  </main>

  <div class="gal-lightbox" id="lb">
    <button class="gal-lightbox__close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="">
    <div class="gal-lightbox__caption" id="lb-cap"></div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    const $id=id=>document.getElementById(id);let activeWeek='';

    async function loadGallery(){
      try{
        const p=new URLSearchParams();if(activeWeek)p.set('week',activeWeek);
        const r=await fetch(`/.netlify/functions/moments-list?${p}`);
        if(!r.ok)throw 0;const d=await r.json(),mm=d.moments||[];
        if(!mm.length){$id('gal-content').innerHTML='<div class="empty-state">No photos yet. Check back after league nights start.</div>';return;}
        $id('gal-content').innerHTML=`<div class="gal-grid">${mm.map(m=>`
          <div class="gal-item" onclick="openLb('${esc(m.url)}','${esc(m.caption||'')}')">
            <img src="${esc(m.url)}" alt="${esc(m.caption||'')}" loading="lazy">
            ${m.caption||m.week?`<div class="gal-item__overlay">${m.week?`<div class="gal-item__week">Week ${m.week}</div>`:''}${m.caption?`<div class="gal-item__caption">${esc(m.caption)}</div>`:''}</div>`:''}
          </div>`).join('')}</div>`;
      }catch{$id('gal-content').innerHTML='<div class="empty-state">Gallery coming soon.</div>';}
    }

    document.querySelectorAll('.gal-filter').forEach(b=>{b.addEventListener('click',()=>{
      document.querySelectorAll('.gal-filter').forEach(x=>x.classList.remove('is-active'));b.classList.add('is-active');
      activeWeek=b.dataset.week;loadGallery();
    });});

    function openLb(url,cap){$id('lb-img').src=url;$id('lb-cap').textContent=cap;$id('lb').classList.add('is-open');document.body.style.overflow='hidden';}
    function closeLb(){$id('lb').classList.remove('is-open');document.body.style.overflow='';}
    $id('lb-close').addEventListener('click',closeLb);
    $id('lb').addEventListener('click',e=>{if(e.target===$id('lb'))closeLb();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

    function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    loadGallery();
  </script>
</body>
</html>
