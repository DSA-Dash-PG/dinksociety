<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player profile · The Dink Society</title>
<meta name="theme-color" content="#0b0d0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
  :root{ --bg:#0b0d0a; --surf:#161914; --surf2:#1c1f18; --bd:rgba(255,255,255,.08); --tx:#f0f2ec; --mut:#9aa094; --fnt:#5e655a;
    --lime:#b8ff2c; --teal:#17d7b0; --gold:#f0c040; --red:#ff5c47; --purp:#a78bfa; }
  body{ background:var(--bg); color:var(--tx); font-family:'Inter',system-ui,sans-serif; margin:0; }
  .wrap{ max-width:560px; margin:0 auto; padding:16px 14px 48px; }
  .back{ display:inline-flex;align-items:center;gap:6px;color:var(--mut);text-decoration:none;font-size:.78rem;font-weight:600;margin-bottom:14px; }
  .head{ display:flex;align-items:center;gap:13px; }
  .av{ width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--lime),var(--teal));color:#06210f;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;flex-shrink:0; }
  .nm{ font-size:1.3rem;font-weight:900; } .meta{ font-size:.72rem;color:var(--mut);margin-top:2px; }
  .onep{ display:inline-flex;align-items:center;gap:5px;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--teal);background:rgba(23,215,176,.12);padding:5px 9px;border-radius:9999px; }
  .tiles{ display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px; }
  .tile{ background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:12px 13px; }
  .tile.lg{ border-color:rgba(23,215,176,.25); } .tile.ld{ border-color:rgba(184,255,44,.25); }
  .tlbl{ display:flex;align-items:center;gap:6px;font-size:.58rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase; }
  .dot{ width:7px;height:7px;border-radius:2px;display:inline-block; }
  .tnum{ font-size:1.7rem;font-weight:900;line-height:1.1;margin-top:4px; } .tsub{ font-size:.68rem;color:var(--mut); }
  .lane{ border-left:3px solid var(--teal);background:#13160f;border-radius:0 12px 12px 0;padding:13px 14px;margin-top:13px; }
  .lane.ld{ border-left-color:var(--lime); }
  .lane-top{ display:flex;justify-content:space-between;align-items:center; }
  .lane-ttl{ font-size:.78rem;font-weight:800;display:inline-flex;align-items:center;gap:6px; } .lane-r{ font-size:.62rem;color:var(--fnt); }
  .grid4{ display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:11px; }
  .g .n{ font-size:1.05rem;font-weight:900; } .g .l{ font-size:.55rem;color:var(--fnt);text-transform:uppercase;letter-spacing:.05em;margin-top:1px; }
  .recent{ margin-top:11px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px; }
  .rrow{ display:flex;justify-content:space-between;font-size:.72rem;padding:4px 0; } .rrow span:first-child{ color:#cdd2c6; }
  .cta{ margin-top:10px;display:block;text-align:center;font-size:.72rem;font-weight:800;padding:9px;border-radius:9px;text-decoration:none;cursor:pointer; }
  .cta.teal{ color:var(--teal);background:rgba(23,215,176,.1); } .cta.lime{ color:var(--lime);background:rgba(184,255,44,.1); }
  .empty{ text-align:center;color:var(--fnt);padding:40px 16px; }
  .seclbl{ font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:16px 2px 9px; }
  .ov{ position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:flex-end;justify-content:center;z-index:50; } .ov.on{ display:flex; }
  @media(min-width:560px){ .ov{ align-items:center; } }
  .sheet{ background:var(--surf);border:1px solid rgba(255,255,255,.14);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:86vh;overflow-y:auto;padding:18px 16px 26px;position:relative; }
  @media(min-width:560px){ .sheet{ border-radius:18px; } }
  .x{ position:absolute;top:13px;right:15px;background:none;border:0;color:var(--mut);font-size:1.4rem;cursor:pointer; }
  .pf-head{ display:flex;align-items:center;gap:13px;margin-bottom:12px; } .pf-av{ width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--lime),var(--teal));color:#06210f;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900; }
  .pf-nm{ font-size:1.15rem;font-weight:900; } .pf-badge{ font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:9999px;display:inline-block; }
  .pf-only{ background:rgba(184,255,44,.14);color:var(--lime); }
  .pf-kpis{ display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:9px; } .pf-kpi{ background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:9px 4px;text-align:center; }
  .pf-kpi .n{ font-size:1rem;font-weight:900; } .pf-kpi .l{ font-size:.5rem;text-transform:uppercase;letter-spacing:.05em;color:var(--fnt);margin-top:2px; }
  .note{ background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;color:var(--mut);font-size:.8rem;line-height:1.55; }
</style>
</head>
<body>
<div class="wrap" id="root"><div class="empty">Loading…</div></div>
<div class="ov" id="ldOv"><div class="sheet"><button class="x" onclick="document.getElementById('ldOv').classList.remove('on')">×</button><div id="ldBody"></div></div></div>

<script src="/ladder-profile-view.js"></script>
<script>
const API='/.netlify/functions';
const ICON_LADDER='<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M4 20h5v-5h5v-5h5V5"/></svg>';
const ICON_TROPHY='<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0z"/><path d="M7 5H5v2a2 2 0 0 0 2 2M17 5h2v2a2 2 0 0 1-2 2"/></svg>';
const esc=s=>String(s||'').replace(/[<>&]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]));
const qp=new URLSearchParams(location.search);
const initials=n=>String(n||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();

async function load(){
  const q=qp.get('ladderId')?`ladderId=${encodeURIComponent(qp.get('ladderId'))}`
        :qp.get('leagueId')?`leagueId=${encodeURIComponent(qp.get('leagueId'))}`
        :qp.get('email')?`email=${encodeURIComponent(qp.get('email'))}`:'';
  if(!q){ document.getElementById('root').innerHTML='<div class="empty">No player specified.</div>'; return; }
  let j={}; try{ j=await (await fetch(`${API}/public-profile?${q}`,{credentials:'include'})).json(); }catch(e){}
  if(!j.found){ document.getElementById('root').innerHTML='<div class="empty">Profile not found.</div>'; return; }
  render(j);
}

function render(j){
  const id=j.identity, lg=j.league, ld=j.ladder;
  const dsr=lg?(lg.dsr==null?'–':lg.dsr):'–', dr=ld?(ld.dr==null?'–':ld.dr):'–';
  const g=(v,l,c)=>`<div class="g"><div class="n" style="color:${c||'var(--tx)'}">${v}</div><div class="l">${l}</div></div>`;
  let h=`<a class="back" href="javascript:history.length>1?history.back():location.href='/'">← Back</a>
    <div class="head"><div class="av">${initials(id.name)}</div>
      <div style="flex:1;min-width:0"><div class="nm">${esc(id.name)}</div><div class="meta">${[lg&&lg.teamName?esc(lg.teamName):'',id.hasLeague&&id.hasLadder?'League + Ladder':id.hasLadder?'Ladder player':'League player'].filter(Boolean).join(' · ')}</div></div>
      ${id.hasLeague&&id.hasLadder?'<span class="onep">🔗 One profile</span>':''}
    </div>
    <div class="tiles">
      <div class="tile lg"><div class="tlbl" style="color:var(--teal)"><span class="dot" style="background:var(--teal)"></span> League · DSR</div><div class="tnum" style="color:${lg?'var(--teal)':'var(--fnt)'}">${dsr}</div><div class="tsub">${lg?'League rating':'Not in a league yet'}</div></div>
      <div class="tile ld"><div class="tlbl" style="color:var(--lime)"><span class="dot" style="background:var(--lime)"></span> Ladder · DR</div><div class="tnum" style="color:${ld?'var(--lime)':'var(--fnt)'}">${dr}</div><div class="tsub">${ld?(ld.rank?'Rank #'+ld.rank+(ld.mvp?' · '+ld.mvp+'× top':''):'Ladder rating'):'No ladder play yet'}</div></div>
    </div>`;

  if(lg){
    h+=`<div class="lane"><div class="lane-top"><div class="lane-ttl" style="color:var(--teal)">${ICON_TROPHY} League play</div><div class="lane-r">${esc(lg.teamName||'')}</div></div>
      <div class="grid4">${g(lg.w+'-'+lg.l,'Record')}${g(lg.winPct+'%','Win%','var(--teal)')}${g(lg.matchesPlayed,'Matches')}${g((lg.diff>0?'+':'')+lg.diff,'Diff',lg.diff>=0?'var(--teal)':'var(--red)')}</div>
      <a class="cta teal" href="${leagueHref(lg)}">View league profile →</a></div>`;
  }
  if(ld){
    h+=`<div class="lane ld"><div class="lane-top"><div class="lane-ttl" style="color:var(--lime)">${ICON_LADDER} Ladder play</div><div class="lane-r">Season pts ${ld.seasonPts}</div></div>${window.ladderProfileBody?window.ladderProfileBody(ld):''}</div>`;
  }
  if(!lg&&!ld) h+='<div class="note" style="margin-top:14px">No stats recorded yet.</div>';
  if(ld&&!lg) h+='<div class="note" style="margin-top:13px;font-size:.74rem">Ladder-only profile. Links to a league profile automatically if they join with the same email.</div>';
  document.getElementById('root').innerHTML=h;
  window.__ld=ld;
}

function openLadder(){ if(!window.__ld)return; document.getElementById('ldBody').innerHTML=renderLadderCard(window.__ld); document.getElementById('ldOv').classList.add('on'); }

function ord(n){ const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function slugify(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function leagueHref(lg){ let h=`/player?team=${encodeURIComponent(slugify(lg.teamName||''))}&name=${encodeURIComponent(lg.name||'')}`; if(lg.circuit&&lg.circuit!=='I')h+=`&season=circuit-${String(lg.circuit).toLowerCase()}`; return h; }
function shortDate(s){ if(!s)return''; const d=new Date(s+'T12:00:00'); return isNaN(d)?'':d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}); }
function courtSvg(mv,peak){
  const W=480,H=120,pad=18,n=mv.length; if(!n)return'';
  const maxC=Math.max(peak||1,...mv.map(m=>m.court),1),minC=1;
  const x=i=>pad+(n<=1?0:(W-2*pad)*i/(n-1)), y=c=>H-pad-(H-2*pad)*((c-minC)/Math.max(1,maxC-minC));
  const line=mv.map((m,i)=>`${x(i).toFixed(1)},${y(m.court).toFixed(1)}`).join(' ');
  const dots=mv.map((m,i)=>`${m.newLadder&&i>0?`<line x1="${x(i).toFixed(1)}" y1="6" x2="${x(i).toFixed(1)}" y2="${H-6}" stroke="rgba(255,255,255,.12)" stroke-dasharray="3 3"/>`:''}<circle cx="${x(i).toFixed(1)}" cy="${y(m.court).toFixed(1)}" r="3" fill="${m.won?'#b8ff2c':'#ff5c47'}"/>`).join('');
  return `<div style="background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:8px;overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:300px;height:118px"><polyline points="${line}" fill="none" stroke="#17d7b0" stroke-width="2"/>${dots}</svg><div style="font-size:.64rem;color:#9aa094;text-align:right">peak court ${peak} · ${n} rounds</div></div>`;
}
function renderLadderCard(p){
  const sk=p.streak, skStr=sk>0?'W'+sk:sk<0?'L'+Math.abs(sk):'–';
  const g=(v,lab,c)=>`<div class="pf-kpi"><div class="n" style="color:${c||'var(--tx)'}">${v}</div><div class="l">${lab}</div></div>`;
  const last=p.last10||[], mx=Math.max(1,...last.map(r=>Math.abs(r.margin||0)));
  const lw=last.filter(r=>r.won).length, ll=last.length-lw, lnet=last.reduce((a,r)=>a+(r.margin||0),0);
  const bars=last.map(r=>`<div title="${r.margin>0?'+':''}${r.margin}" style="flex:1;height:${Math.round(18+58*Math.abs(r.margin||0)/mx)}px;border-radius:3px;align-self:flex-end;background:${r.won?'var(--lime)':'var(--red)'}"></div>`).join('');
  const pl=(p.perLadder||[]).map(L=>{
    const place=L.placeRank?' · '+ord(L.placeRank):'', bn=L.bonus?' · +'+L.bonus:'';
    const rounds=L.rounds.map(r=>`<div style="display:flex;justify-content:space-between;gap:8px;padding:7px 2px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.76rem"><div><span style="color:#17d7b0;font-weight:700">Ct ${r.court}</span> w/ ${esc(r.partner||'—')} <span style="color:#5e655a">vs ${esc(r.opp.join(' + '))}</span></div><div style="font-weight:800;color:${r.won?'var(--lime)':'var(--red)'};white-space:nowrap">${r.pf}<span style="color:#5e655a">–${r.pa}</span></div></div>`).join('');
    return `<details style="background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:8px"><summary style="cursor:pointer;font-size:.84rem;list-style:none"><b>${esc(L.name)}</b> <span style="color:#9aa094;font-weight:600;font-size:.74rem">${shortDate(L.date)} · ${L.w}-${L.l}${place}${bn}</span></summary><div style="margin-top:6px">${rounds}</div></details>`;
  }).join('');
  return `
    <div class="pf-head"><div class="pf-av">${initials(p.name)}</div><div style="flex:1">
      <div class="pf-nm">${esc(p.name)}${p.podiums?' 👑':''}</div>
      <div style="font-size:.7rem;color:#9aa094;margin:3px 0">${p.gender||''} · Rank #${p.rank||'–'} ${p.mvp?`<span class="pf-badge" style="background:rgba(167,139,250,.16);color:var(--purp)">🏅 ${p.mvp}× Top</span>`:''}</div>
      <span class="pf-badge pf-only">Ladder · DR</span>
    </div><div style="text-align:right"><div style="font-size:1.7rem;font-weight:900;color:var(--lime);line-height:1">${p.seasonPts}</div><div style="font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:#9aa094;margin-top:2px">Season pts</div></div></div>
    <div class="pf-kpis">${g(p.w,'W','var(--lime)')}${g(p.l,'L','var(--red)')}${g(p.avg,'Avg')}${g(p.winPct+'%','Win%')}</div>
    <div class="pf-kpis">${g(p.pf,'PS')}${g(p.pa,'PA')}${g((p.diff>0?'+':'')+p.diff,'Diff',p.diff>=0?'var(--lime)':'var(--red)')}${g(skStr,'Streak',sk>0?'var(--lime)':sk<0?'var(--red)':'var(--mut)')}</div>
    ${last.length?`<div class="seclbl">Last ${last.length} rounds</div><div style="display:flex;gap:4px;align-items:flex-end;height:82px;background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:10px">${bars}</div><div style="font-size:.66rem;color:#9aa094;text-align:right;margin-top:4px">${lw}W · ${ll}L · ${lnet>0?'+':''}${lnet} net</div>`:''}
    ${(p.movement||[]).length?`<div class="seclbl">Court movement</div>${courtSvg(p.movement,p.peakCourt)}`:''}
    ${pl?`<div class="seclbl">Per ladder</div>${pl}`:''}`;
}

load();
</script>
</body>
</html>
