<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1242 1242" width="1242" height="1242">
  
  <g fill="none" stroke="#c7f032" stroke-width="13" stroke-linecap="square">
    <!-- court outer -->
    <rect x="392" y="178" width="458" height="886"/>
    <!-- centre service lines (top & bottom halves, broken at kitchen) -->
    <line x1="621" y1="178" x2="621" y2="508"/>
    <line x1="621" y1="734" x2="621" y2="1064"/>
