    <line x1="392" y1="508" x2="850" y2="508" stroke-dasharray="34 26"/>
    <line x1="392" y1="734" x2="850" y2="734" stroke-dasharray="34 26"/>
  </g>
  <!-- wordmark inside kitchen -->
  <text x="621" y="618" text-anchor="middle" fill="#c7f032"
