<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .stats-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }
    .stats-body { padding-top: var(--space-4); }

    .tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); }
    .tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .tab:hover { color: var(--color-text); background: var(--color-surface-2); }
    .tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .stats-leaders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 32px;
    }
    .stat-leader {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 16px;
    }
    .stat-leader__label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--color-text-faint); margin-bottom: 4px; font-weight: 600;
    }
    .stat-leader__value { font-size: 28px; font-weight: 900; color: var(--color-lime); }
    .stat-leader__who { font-size: 12px; color: var(--color-text-faint); margin-top: 2px; }

    .analytics-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--color-lime); font-weight: 700; margin-bottom: 12px;
    }
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .analytics-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 20px; min-height: 140px;
    }
    .analytics-card__title {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-lime); font-weight: 700; margin-bottom: 12px;
    }
    .analytics-card__placeholder {
      font-size: 13px; color: var(--color-text-faint); text-align: center; padding: 24px 0;
    }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; color: var(--color-text-faint); }

    @media (max-width: 600px) {
      .analytics-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="stats">
  <div data-partial="nav"></div>

  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="stats"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow">Circuit I · May 2026</div>
      <h1 class="page-hero__title">Stats & Analytics</h1>
      <p class="page-hero__sub">Live analytics for active divisions. Filterable by division, team, and player.</p>
    </div>
  </div>

  <div class="stats-shell">
    <div class="stats-body">
      <div class="tabs" id="stats-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>
      <div id="stats-content">
        <div class="empty-state">Stats will populate as matches are played and scores submitted.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('stats-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#stats-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
