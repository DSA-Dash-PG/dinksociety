<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .lb-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .lb-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream); padding: 40px; position: relative; overflow: hidden;
    }
    .lb-hero::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.05) 1.5px, transparent 1.5px);
      background-size: 18px 18px; pointer-events: none;
    }
    .lb-hero > * { position: relative; z-index: 1; }
    .lb-hero h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; font-weight: 500; margin: 0 0 6px; }
    .lb-hero p { font-size: 14px; opacity: 0.6; margin: 0; max-width: 480px; }

    .lb-body { padding: 24px var(--gutter); }

    /* Points key */
    .lb-points-key {
      display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .lb-points-cell {
      background: white; border: 1px solid rgba(15,77,58,0.06);
      border-radius: var(--radius-sm); padding: 12px 16px; text-align: center; flex: 1; min-width: 70px;
    }
    .lb-points-cell--gold { background: var(--gold); border-color: var(--gold); color: var(--emerald); }
    .lb-points-place { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
    .lb-points-num { font-family: var(--font-display); font-style: italic; font-size: 22px; }

    /* Leaderboard rows */
    .lb-list { margin-top: 16px; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 6px; margin-bottom: 4px;
      font-size: 14px; transition: background 0.15s;
    }
    .lb-row:hover { background: rgba(15,77,58,0.03); }
    .lb-row:nth-child(1) { background: rgba(232,181,66,0.08); }
    .lb-row:nth-child(1):hover { background: rgba(232,181,66,0.12); }

    .lb-rank {
      font-family: var(--font-display); font-style: italic;
      font-size: 20px; color: var(--gold-deep); min-width: 28px; text-align: center;
    }
    .lb-name { flex: 1; font-weight: 500; }
    .lb-pts { font-weight: 600; font-size: 16px; color: var(--emerald); }
    .lb-row:nth-child(1) .lb-pts { color: var(--gold-deep); }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; opacity: 0.5; }

    @media (max-width: 600px) {
      .lb-hero { padding: 28px 20px; }
      .lb-hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="lb-shell">
    <div class="lb-hero">
      <div class="eyebrow" style="margin-bottom: 10px;">Leaderboard</div>
      <h1>All-time circuit rankings</h1>
      <p>Points banked from every circuit. Your finish follows you across seasons. Weekly bonuses stack on top.</p>
    </div>

    <div class="lb-body">
      <div class="tabs" id="lb-tabs">
        <button class="tab is-active" data-view="overall">Overall</button>
        <button class="tab" data-view="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-view="3.5-mixed">3.5 Mixed</button>
      </div>

      <div class="lb-points-key">
        <div class="lb-points-cell lb-points-cell--gold"><div class="lb-points-place">1st</div><div class="lb-points-num">100</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">2nd</div><div class="lb-points-num">75</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">3rd</div><div class="lb-points-num">50</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">4th</div><div class="lb-points-num">30</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">5th-6th</div><div class="lb-points-num">15</div></div>
      </div>

      <div id="lb-list">
        <div class="empty-state">The leaderboard will populate after Circuit I concludes.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('lb-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#lb-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
