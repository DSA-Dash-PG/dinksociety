<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <link rel="stylesheet" href="/css/compat.css" />
  <style>
    .lb-hero { background: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text); }
    .lb-hero__label { color: var(--color-teal); }
    .lb-hero__title { font-size: var(--text-3xl); font-weight: 900; text-transform: uppercase; line-height: 1.1; }
    .lb-controls select:focus { outline: 1px solid var(--color-lime); outline-offset: 1px; }
    .lb-card__title { font-size: var(--text-xl); font-weight: 900; text-transform: uppercase; }
    .lb-rank { font-weight: 900; font-size: var(--text-lg); font-style: normal; }
    .lb-rank--top { color: var(--color-lime); }
    .lb-row--leader td { background: var(--color-lime-ghost) !important; border-bottom-color: rgba(184,255,44,0.12) !important; }
    .lb-pill--sweep { background: var(--color-gold-dim); color: var(--color-gold); }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: var(--space-3); margin-bottom: var(--space-4); }
    .stat-card { background: var(--color-surface-2); padding: var(--space-3) var(--space-4); border-radius: var(--radius-sm); border: 1px solid var(--color-border); }
    .stat-card__label { font-size: var(--text-xs); letter-spacing: 0.15em; text-transform: uppercase; color: var(--color-text-faint); font-weight: 700; margin-bottom: var(--space-1); }
    .stat-card__value { font-size: var(--text-xl); font-weight: 900; color: var(--color-lime); line-height: 1.1; }
    .match-card--final { background: var(--color-teal-dim); border-color: rgba(23,215,176,0.2); }
    .match-card__week { font-weight: 900; font-style: normal; color: var(--color-lime); }
    .match-card__score { font-weight: 900; font-style: normal; font-size: var(--text-xl); }
  </style>
</head>
<body data-page="leaderboard">
  <div data-partial="nav"></div>
  <main class="lb-shell">
    <div class="lb-hero">
      <div class="lb-hero__label">The Dink Society</div>
      <h1 class="lb-hero__title" id="lb-title">Leaderboard</h1>
      <p class="lb-hero__sub" id="lb-sub">Loading&hellip;</p>
      <div class="lb-controls">
        <select id="circuit-select" aria-label="Circuit"><option value="I">Circuit I</option></select>
        <select id="division-select" aria-label="Division"><option value="">All divisions</option><option value="3.0M">3.0 Mixed</option><option value="3.5M">3.5 Mixed</option><option value="3.5W">3.5 Women's</option></select>
      </div>
    </div>
    <nav class="lb-tabs">
      <button class="lb-tab is-active" data-tab="standings">Standings</button>
      <button class="lb-tab" data-tab="society">Society Circuit</button>
      <button class="lb-tab" data-tab="players">Players</button>
      <button class="lb-tab" data-tab="schedule">Schedule</button>
    </nav>
    <section class="lb-section is-active" data-section="standings"><div id="standings-content"><div class="empty-state">Loading standings&hellip;</div></div></section>
    <section class="lb-section" data-section="society"><div id="society-content"><div class="empty-state">Loading Society Circuit&hellip;</div></div></section>
    <section class="lb-section" data-section="players"><div id="players-content"><div class="empty-state">Loading player stats&hellip;</div></div></section>
    <section class="lb-section" data-section="schedule"><div id="schedule-content"><div class="empty-state">Loading schedule&hellip;</div></div></section>
  </main>
  <div data-partial="footer"></div>
  <script>
    const DIVISION_LABELS={'3.0M':'3.0 Mixed','3.5M':'3.5 Mixed','3.5W':"3.5 Women's"};
    const SLOT_TYPE_LABELS={womens:"Women's",mens:"Men's",mixed:'Mixed'};
    const state={circuit:'I',division:'',tab:'standings',playerFilter:'all',standings:null,playerStats:null,schedule:null};
    const $id=(id)=>document.getElementById(id);

    function readUrl(){const p=new URLSearchParams(window.location.search);if(p.get('circuit'))state.circuit=p.get('circuit');if(p.get('division'))state.division=p.get('division');if(p.get('view'))state.tab=p.get('view');$id('circuit-select').value=state.circuit;$id('division-select').value=state.division||'';activateTab(state.tab);}
    function writeUrl(){const p=new URLSearchParams();if(state.circuit!=='I')p.set('circuit',state.circuit);if(state.division)p.set('division',state.division);if(state.tab!=='standings')p.set('view',state.tab);const qs=p.toString();history.replaceState({},'',qs?`?${qs}`:window.location.pathname);}

    async function loadStandings(){try{const r=await fetch(`/.netlify/functions/public-leaderboard?circuit=${encodeURIComponent(state.circuit)}`);if(!r.ok)throw new Error();state.standings=await r.json();}catch{state.standings={empty:true};}}
    async function loadPlayerStats(){try{const r=await fetch(`/.netlify/functions/public-leaderboard?circuit=${encodeURIComponent(state.circuit)}&view=players`);if(!r.ok)throw new Error();state.playerStats=await r.json();}catch{state.playerStats={empty:true};}}
    async function loadSchedule(){try{const r=await fetch(`/.netlify/functions/public-leaderboard?circuit=${encodeURIComponent(state.circuit)}&view=schedule`);if(!r.ok)throw new Error();state.schedule=await r.json();}catch{state.schedule={empty:true};}}

    function renderHero(){const c=state.circuit;const div=state.division?` · ${DIVISION_LABELS[state.division]||state.division}`:'';$id('lb-title').textContent=`Circuit ${c}${div}`;const updated=state.standings?.lastUpdated?` · updated ${formatTime(state.standings.lastUpdated)}`:'';$id('lb-sub').textContent=`Standings, scores, and player stats${updated}`;}

    function renderStandings(){const el=$id('standings-content');if(!state.standings||state.standings.empty){el.innerHTML=`<div class="lb-card"><div class="empty-state">${escapeHtml(state.standings?.message||'No standings yet. Come back once matches are underway.')}</div></div>`;return;}const divisions=state.standings.divisions||{};if(!Object.keys(divisions).length){el.innerHTML=`<div class="lb-card"><div class="empty-state">No finalized matches yet this Circuit.</div></div>`;return;}const filterDiv=state.division;const visible=filterDiv?{[filterDiv]:divisions[filterDiv]}:divisions;const parts=[];for(const[div,data]of Object.entries(visible)){if(!data)continue;parts.push(renderDivisionStandings(div,data));}el.innerHTML=parts.join('')||`<div class="lb-card"><div class="empty-state">No standings for this division yet.</div></div>`;}

    function renderDivisionStandings(divKey,data){const teams=data.teams||[];if(!teams.length)return'';const rows=teams.map(t=>{const diff=(t.matchPointsFor-t.matchPointsAgainst);const diffStr=diff>0?`+${diff}`:String(diff);const leaderClass=t.rank===1?' lb-row--leader':'';return`<tr class="${leaderClass}"><td class="lb-rank ${t.rank===1?'lb-rank--top':''}">${t.rank}</td><td class="lb-team">${escapeHtml(t.teamName)}${t.sweeps>0?`<span class="lb-pill lb-pill--sweep" title="${t.sweeps} sweep${t.sweeps===1?'':'s'}">${t.sweeps}&times; 4&ndash;0</span>`:''}</td><td class="numeric">${t.wins}&ndash;${t.losses}${t.ties?`&ndash;${t.ties}`:''}</td><td class="numeric"><strong>${t.matchPointsFor}</strong></td><td class="numeric lb-col-optional">${t.matchPointsAgainst}</td><td class="numeric lb-col-optional">${diffStr}</td><td class="numeric lb-col-optional">${t.totalGamesWon}</td></tr>`;}).join('');return`<div class="lb-card"><h2 class="lb-card__title">${escapeHtml(DIVISION_LABELS[divKey]||divKey)}</h2><table class="lb-table"><thead><tr><th>#</th><th>Team</th><th class="numeric">W&ndash;L${teams.some(t=>t.ties)?'&ndash;T':''}</th><th class="numeric">MP</th><th class="numeric lb-col-optional">Against</th><th class="numeric lb-col-optional">Diff</th><th class="numeric lb-col-optional">Games won</th></tr></thead><tbody>${rows}</tbody></table></div>`;}

    function renderSociety(){const el=$id('society-content');if(!state.standings||state.standings.empty){el.innerHTML=`<div class="lb-card"><div class="empty-state">No data yet for this Circuit.</div></div>`;return;}const divisions=state.standings.divisions||{};const perDivision=[];const allTeams=[];for(const[div,data]of Object.entries(divisions)){(data.teams||[]).forEach(t=>allTeams.push({...t,division:div}));perDivision.push(renderSocietyDivision(div,data));}allTeams.sort((a,b)=>b.societyCircuitPoints-a.societyCircuitPoints);const overallRows=allTeams.slice(0,20).map((t,idx)=>`<tr class="${idx===0?'lb-row--leader':''}"><td class="lb-rank ${idx===0?'lb-rank--top':''}">${idx+1}</td><td class="lb-team">${escapeHtml(t.teamName)} <span class="lb-team__meta">${escapeHtml(DIVISION_LABELS[t.division]||t.division)}</span></td><td class="numeric"><strong>${t.societyCircuitPoints}</strong></td><td class="numeric lb-col-optional">${t.weeklyBonusPoints}</td><td class="numeric lb-col-optional">${t.placementBonus}</td></tr>`).join('');el.innerHTML=`<div class="lb-card"><h2 class="lb-card__title">All-time circuit rankings</h2><p style="font-size:var(--text-xs);color:var(--color-text-faint);margin:0 0 var(--space-3);">Points banked from every circuit. Your finish follows you across seasons. Weekly bonuses stack on top.</p><table class="lb-table"><thead><tr><th>#</th><th>Team</th><th class="numeric">SC pts</th><th class="numeric lb-col-optional">Bonus</th><th class="numeric lb-col-optional">Placement</th></tr></thead><tbody>${overallRows||'<tr><td colspan="5" class="empty-state">No data yet.</td></tr>'}</tbody></table></div>${perDivision.join('')}`;}

    function renderSocietyDivision(divKey,data){const teams=data.teams||[];if(!teams.length)return'';const rows=teams.map((t,idx)=>`<tr class="${idx===0?'lb-row--leader':''}"><td class="lb-rank ${idx===0?'lb-rank--top':''}">${t.rank}</td><td class="lb-team">${escapeHtml(t.teamName)}</td><td class="numeric"><strong>${t.societyCircuitPoints}</strong></td><td class="numeric lb-col-optional">${t.weeklyBonusPoints}</td><td class="numeric lb-col-optional">${t.placementBonus}</td></tr>`).join('');return`<div class="lb-card"><h2 class="lb-card__title">${escapeHtml(DIVISION_LABELS[divKey]||divKey)} Society Circuit</h2><table class="lb-table"><thead><tr><th>#</th><th>Team</th><th class="numeric">SC pts</th><th class="numeric lb-col-optional">Bonus</th><th class="numeric lb-col-optional">Placement</th></tr></thead><tbody>${rows}</tbody></table></div>`;}

    function renderPlayers(){const el=$id('players-content');if(!state.playerStats||state.playerStats.empty){el.innerHTML=`<div class="lb-card"><div class="empty-state">No player stats yet this Circuit.</div></div>`;return;}const players=Object.values(state.playerStats.players||{});if(!players.length){el.innerHTML=`<div class="lb-card"><div class="empty-state">No player stats yet this Circuit.</div></div>`;return;}const filter=state.playerFilter;const statForPlayer=(p)=>{if(filter==='all')return{played:p.gamesPlayed,won:p.gamesWon};return p.byType?.[filter]||{played:0,won:0};};const sorted=players.map(p=>({...p,_stat:statForPlayer(p)})).filter(p=>p._stat.played>0).sort((a,b)=>{const rateA=a._stat.played?a._stat.won/a._stat.played:0;const rateB=b._stat.played?b._stat.won/b._stat.played:0;if(rateB!==rateA)return rateB-rateA;return b._stat.won-a._stat.won;});const filters=['all','womens','mens','mixed'].map(f=>`<button class="player-filter__btn ${filter===f?'is-active':''}" data-filter="${f}">${f==='all'?'All games':SLOT_TYPE_LABELS[f]}</button>`).join('');const rows=sorted.slice(0,50).map((p,idx)=>{const rate=p._stat.played?Math.round(100*p._stat.won/p._stat.played):0;return`<tr class="${idx===0?'lb-row--leader':''}"><td class="lb-rank ${idx===0?'lb-rank--top':''}">${idx+1}</td><td class="lb-team">${escapeHtml(p.name)}<span class="lb-team__meta">${escapeHtml(p.teamName||'')}</span></td><td class="numeric"><strong>${p._stat.won}&ndash;${p._stat.played-p._stat.won}</strong></td><td class="numeric">${rate}%</td><td class="numeric lb-col-optional">${p.matchesPlayed||0}</td></tr>`;}).join('');el.innerHTML=`<div class="lb-card"><h2 class="lb-card__title">Player standings</h2><div class="player-filter">${filters}</div><table class="lb-table"><thead><tr><th>#</th><th>Player</th><th class="numeric">W&ndash;L</th><th class="numeric">Win rate</th><th class="numeric lb-col-optional">Matches</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty-state">No games played in this filter yet.</td></tr>'}</tbody></table></div>`;el.querySelectorAll('[data-filter]').forEach(btn=>{btn.addEventListener('click',()=>{state.playerFilter=btn.dataset.filter;renderPlayers();});});}

    function renderSchedule(){const el=$id('schedule-content');if(!state.schedule||state.schedule.empty){el.innerHTML=`<div class="lb-card"><div class="empty-state">No schedule yet.</div></div>`;return;}const{finalized=[],upcoming=[]}=state.schedule;const div=state.division;const filterFn=(m)=>!div||m.division===div;const f=finalized.filter(filterFn);const u=upcoming.filter(filterFn);const renderMatch=(m)=>{const finalHtml=m.finalizedAt?`<div class="match-card__score">${m.scoreA??0} &ndash; ${m.scoreB??0}</div>`:`<div class="match-card__score" style="opacity:0.5;font-size:14px;">vs</div>`;return`<div class="match-card ${m.finalizedAt?'match-card--final':''}"><div class="match-card__week">W${m.week}</div><div><div class="match-card__team">${escapeHtml(m.teamA?.name||'TBD')}</div><div class="match-card__meta">${escapeHtml(DIVISION_LABELS[m.division]||m.division||'')}${m.court?' · '+escapeHtml(m.court):''}</div></div>${finalHtml}<div><div class="match-card__team match-card__team--right">${escapeHtml(m.teamB?.name||'TBD')}</div><div class="match-card__meta" style="text-align:right;">${m.scheduledAt?formatDateShort(m.scheduledAt):(m.finalizedAt?'Final':'Time TBD')}</div></div></div>`;};const finalHtml=f.length?`<div class="lb-card"><h2 class="lb-card__title">Recent results</h2>${f.slice(0,12).map(renderMatch).join('')}</div>`:'';const upHtml=u.length?`<div class="lb-card"><h2 class="lb-card__title">Upcoming</h2>${u.slice(0,12).map(renderMatch).join('')}</div>`:'';el.innerHTML=(finalHtml+upHtml)||`<div class="lb-card"><div class="empty-state">No matches for this filter yet.</div></div>`;}

    function activateTab(name){state.tab=name;document.querySelectorAll('.lb-tab').forEach(b=>b.classList.toggle('is-active',b.dataset.tab===name));document.querySelectorAll('.lb-section').forEach(s=>s.classList.toggle('is-active',s.dataset.section===name));writeUrl();if(name==='standings'||name==='society'){if(!state.standings)loadStandings().then(()=>{renderHero();renderStandings();renderSociety();});else{renderStandings();renderSociety();}}if(name==='players'){if(!state.playerStats)loadPlayerStats().then(renderPlayers);else renderPlayers();}if(name==='schedule'){if(!state.schedule)loadSchedule().then(renderSchedule);else renderSchedule();}}

    document.querySelectorAll('.lb-tab').forEach(btn=>{btn.addEventListener('click',()=>activateTab(btn.dataset.tab));});
    $id('circuit-select').addEventListener('change',(e)=>{state.circuit=e.target.value;state.standings=null;state.playerStats=null;state.schedule=null;writeUrl();activateTab(state.tab);});
    $id('division-select').addEventListener('change',(e)=>{state.division=e.target.value;writeUrl();renderStandings();renderSchedule();});

    function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function formatTime(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
    function formatDateShort(iso){if(!iso)return'';const d=new Date(iso);if(isNaN(d))return'';return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

    readUrl();
    loadStandings().then(()=>{renderHero();renderStandings();renderSociety();});
  </script>
  <script src="/js/partials.js"></script>
</body>
</html>
