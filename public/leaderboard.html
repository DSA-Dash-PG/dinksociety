<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard &middot; The Dink Society</title>
  <meta name="description" content="Circuit standings, scores, player stats, and schedule for The Dink Society pickleball league.">
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/shared-nav.css">
  <link rel="stylesheet" href="/css/compat.css">
</head><body>
  <div data-partial="nav"></div>

  <div class="lb-shell">
    <div class="lb-hero">
      <h1>All-time circuit rankings</h1>
      <p>Points banked from every circuit. Your finish follows you across seasons. Weekly bonuses stack on top.</p>
    </div>

    <div class="lb-body">
      <div class="tabs" id="lb-tabs">
        <button class="tab is-active" data-view="overall">Overall</button>
        <button class="tab" data-view="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-view="3.5-mixed">3.5 Mixed</button>
      </div>

      <div class="lb-points-key">
        <div class="lb-points-cell lb-points-cell--gold"><div class="lb-points-place">1st</div><div class="lb-points-num">100</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">2nd</div><div class="lb-points-num">75</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">3rd</div><div class="lb-points-num">50</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">4th</div><div class="lb-points-num">30</div></div>
        <div class="lb-points-cell"><div class="lb-points-place">5th-6th</div><div class="lb-points-num">15</div></div>
      </div>

      <div id="lb-list">
        <div class="empty-state">The leaderboard will populate after Circuit I concludes.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('lb-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#lb-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
