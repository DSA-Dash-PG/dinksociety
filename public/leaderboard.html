<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings · The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .lb-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }



    .lb-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: var(--space-4); }
    .lb-controls select { padding:8px 14px; background:var(--color-surface-2); border:1px solid var(--color-border); color:var(--color-text); border-radius:var(--radius-sm); font-size:12px; font-family:inherit; cursor:pointer; }
    .lb-controls select:focus { border-color:var(--color-lime); outline:none; }

    .lb-tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); }
    .lb-tab { padding:8px 16px; border-radius:var(--radius-full); font-size:11px; font-weight:700; border:1px solid var(--color-border); background:transparent; color:var(--color-text-faint); cursor:pointer; transition:all var(--transition); font-family:inherit; }
    .lb-tab:hover { color:var(--color-text); background:var(--color-surface-2); }
    .lb-tab.is-active { background:var(--color-lime); color:var(--color-text-inverse); border-color:var(--color-lime); }

    .lb-section { display: none; }
    .lb-section.is-active { display: block; }

    .lb-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:var(--space-5); margin-bottom:var(--space-4); }
    .lb-card__title { font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:0.04em; margin:0 0 var(--space-4); }

    .lb-table { width:100%; border-collapse:collapse; font-size:12px; }
    .lb-table th { text-align:left; padding:8px 6px; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--color-text-faint); font-weight:600; border-bottom:1px solid var(--color-border-strong); }
    .lb-table td { padding:9px 6px; border-bottom:1px solid var(--color-border); }
    .lb-table tr:last-child td { border-bottom:none; }
    .lb-table .numeric { text-align:right; font-variant-numeric:tabular-nums; }
    .lb-rank { color:var(--color-text-faint); font-weight:800; min-width:24px; }
    .lb-rank--top { color:var(--color-lime); }
    .lb-row--leader td { background:var(--color-lime-ghost); }
    .lb-team { font-weight:600; }
    .lb-team__meta { font-size:10px; color:var(--color-text-faint); font-weight:400; margin-left:4px; }
    .lb-pill { display:inline-block; padding:1px 6px; border-radius:3px; font-size:9px; font-weight:700; margin-left:6px; vertical-align:middle; }
    .lb-pill--sweep { background:var(--color-gold-dim); color:var(--color-gold); }

    .lb-col-optional {}

    .player-filter { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:var(--space-4); }
    .player-filter__btn { padding:5px 12px; font-size:10px; border-radius:var(--radius-full); border:1px solid var(--color-border); background:transparent; color:var(--color-text-faint); cursor:pointer; font-family:inherit; font-weight:600; transition:all var(--transition); }
    .player-filter__btn.is-active { background:var(--color-lime); color:var(--color-text-inverse); border-color:var(--color-lime); }

    .match-card { display:grid; grid-template-columns:40px 1fr auto 1fr; gap:10px; align-items:center; padding:12px 14px; background:var(--color-surface-2); border:1px solid var(--color-border); border-radius:var(--radius-sm); margin-bottom:6px; }
    .match-card--final { background:var(--color-teal-dim); border-color:rgba(23,215,176,0.2); }
    .match-card__week { font-size:11px; font-weight:800; color:var(--color-lime); }
    .match-card__team { font-size:12px; font-weight:600; }
    .match-card__team--right { text-align:right; }
    .match-card__score { font-size:18px; font-weight:800; text-align:center; min-width:60px; }
    .match-card__meta { font-size:10px; color:var(--color-text-faint); margin-top:2px; }

    @media(max-width:720px){
      .lb-card{padding:var(--space-4);}
      .lb-table{font-size:11px;}
      .lb-table th,.lb-table td{padding:7px 4px;}
      .lb-col-optional{display:none;}
      .match-card{grid-template-columns:32px 1fr auto 1fr;gap:6px;}
    }
  </style>
</head>
<body data-page="leaderboard">
  <div data-partial="nav"></div>
  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="leaderboard"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow">The Dink Society</div>
      <h1 class="page-hero__title">Leaderboard</h1>
      <p class="page-hero__sub">All-time Circuit Points across every division.</p>
    </div>
  </div>

  <main class="lb-shell">
    <div class="lb-controls">
        <select id="circuit-select"><option value="I">Circuit I</option></select>
        <select id="division-select"><option value="">All divisions</option><option value="3.0M">3.0 Mixed</option><option value="3.5M">3.5 Mixed</option><option value="3.5W">3.5 Women's</option></select>
      </div>


    <nav class="lb-tabs">
      <button class="lb-tab is-active" data-tab="standings">Standings</button>
      <button class="lb-tab" data-tab="society">Society Circuit</button>
      <button class="lb-tab" data-tab="players">Players</button>
      <button class="lb-tab" data-tab="analytics">Analytics</button>
    </nav>

    <section class="lb-section is-active" data-section="standings"><div id="standings-content"><div class="empty-state">Loading standings…</div></div></section>
    <section class="lb-section" data-section="society"><div id="society-content"><div class="empty-state">Loading Society Circuit…</div></div></section>
    <section class="lb-section" data-section="players"><div id="players-content"><div class="empty-state">Loading player stats…</div></div></section>
    <section class="lb-section" data-section="analytics"><div id="analytics-content"></div></section>
  </main>

  <div data-partial="footer"></div>

  <script>
    const DIVISION_LABELS={'3.0M':'3.0 Mixed','3.5M':'3.5 Mixed','3.5W':"3.5 Women's"};
    const SLOT_TYPE_LABELS={womens:"Women's",mens:"Men's",mixed:'Mixed'};
    const state={circuit:'I',division:'',tab:'standings',playerFilter:'all',standings:null,playerStats:null};
    const $id=(id)=>document.getElementById(id);

    function readUrl(){const p=new URLSearchParams(window.location.search);if(p.get('circuit'))state.circuit=p.get('circuit');if(p.get('division'))state.division=p.get('division');if(p.get('view'))state.tab=p.get('view');$id('circuit-select').value=state.circuit;$id('division-select').value=state.division||'';activateTab(state.tab);}
    function writeUrl(){const p=new URLSearchParams();if(state.circuit!=='I')p.set('circuit',state.circuit);if(state.division)p.set('division',state.division);if(state.tab!=='standings')p.set('view',state.tab);const q=p.toString();history.replaceState({},'',q?`?${q}`:window.location.pathname);}

    async function loadStandings(){try{const r=await fetch(`/.netlify/functions/public-leaderboard?circuit=${encodeURIComponent(state.circuit)}`);if(!r.ok)throw 0;state.standings=await r.json();}catch{state.standings={empty:true};}}
    async function loadPlayerStats(){try{const r=await fetch(`/.netlify/functions/public-leaderboard?circuit=${encodeURIComponent(state.circuit)}&view=players`);if(!r.ok)throw 0;state.playerStats=await r.json();}catch{state.playerStats={empty:true};}}

    function renderHero(){const c=state.circuit;const d=state.division?` · ${DIVISION_LABELS[state.division]||state.division}`:'';$id('lb-title').textContent=`Circuit ${c}${d}`;const u=state.standings?.lastUpdated?` · updated ${formatTime(state.standings.lastUpdated)}`:'';$id('lb-sub').textContent=`Standings, scores, and player stats${u}`;}

    function renderStandings(){const el=$id('standings-content');if(!state.standings||state.standings.empty){el.innerHTML=`<div class="lb-card"><div class="empty-state">${escapeHtml(state.standings?.message||'No standings yet. Come back once matches are underway.')}</div></div>`;return;}
    const divs=state.standings.divisions||{};if(!Object.keys(divs).length){el.innerHTML='<div class="lb-card"><div class="empty-state">No finalized matches yet.</div></div>';return;}
    const vis=state.division?{[state.division]:divs[state.division]}:divs;const parts=[];for(const[d,data]of Object.entries(vis)){if(data)parts.push(renderDivStandings(d,data));}
    el.innerHTML=parts.join('')||'<div class="lb-card"><div class="empty-state">No standings for this division.</div></div>';}

    function renderDivStandings(dk,data){const teams=data.teams||[];if(!teams.length)return'';
    const rows=teams.map(t=>{const diff=t.matchPointsFor-t.matchPointsAgainst;const ds=diff>0?`+${diff}`:String(diff);return`<tr class="${t.rank===1?'lb-row--leader':''}"><td class="lb-rank ${t.rank===1?'lb-rank--top':''}">${t.rank}</td><td class="lb-team">${escapeHtml(t.teamName)}${t.sweeps>0?` <span class="lb-pill lb-pill--sweep">${t.sweeps}× 4-0</span>`:''}</td><td class="numeric">${t.wins}–${t.losses}${t.ties?`–${t.ties}`:''}</td><td class="numeric"><strong>${t.matchPointsFor}</strong></td><td class="numeric lb-col-optional">${t.matchPointsAgainst}</td><td class="numeric lb-col-optional">${ds}</td><td class="numeric lb-col-optional">${t.totalGamesWon}</td></tr>`;}).join('');
    return`<div class="lb-card"><h2 class="lb-card__title">${escapeHtml(DIVISION_LABELS[dk]||dk)}</h2><table class="lb-table"><thead><tr><th>#</th><th>Team</th><th class="numeric">W–L${teams.some(t=>t.ties)?'–T':''}</th><th class="numeric">MP</th><th class="numeric lb-col-optional">Against</th><th class="numeric lb-col-optional">Diff</th><th class="numeric lb-col-optional">Games won</th></tr></thead><tbody>${rows}</tbody></table></div>`;}

    function renderSociety(){const el=$id('society-content');if(!state.standings||state.standings.empty){el.innerHTML='<div class="lb-card"><div class="empty-state">No data yet.</div></div>';return;}
    const divs=state.standings.divisions||{};const allTeams=[];const perDiv=[];
    for(const[d,data]of Object.entries(divs)){(data.teams||[]).forEach(t=>allTeams.push({...t,division:d}));perDiv.push(renderSocDiv(d,data));}
    allTeams.sort((a,b)=>b.societyCircuitPoints-a.societyCircuitPoints);
    const rows=allTeams.slice(0,20).map((t,i)=>`<tr class="${i===0?'lb-row--leader':''}"><td class="lb-rank ${i===0?'lb-rank--top':''}">${i+1}</td><td class="lb-team">${escapeHtml(t.teamName)} <span class="lb-team__meta">${escapeHtml(DIVISION_LABELS[t.division]||t.division)}</span></td><td class="numeric"><strong>${t.societyCircuitPoints}</strong></td><td class="numeric lb-col-optional">${t.weeklyBonusPoints}</td><td class="numeric lb-col-optional">${t.placementBonus}</td></tr>`).join('');
    el.innerHTML=`<div class="lb-card"><h2 class="lb-card__title">Overall Society Circuit ranking</h2><p style="font-size:11px;color:var(--color-text-faint);margin:0 0 12px;">Combined across all divisions. Projected while Circuit is live.</p><table class="lb-table"><thead><tr><th>#</th><th>Team</th><th class="numeric">SC pts</th><th class="numeric lb-col-optional">Bonus</th><th class="numeric lb-col-optional">Placement</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty-state">No data.</td></tr>'}</tbody></table></div>${perDiv.join('')}`;}

    function renderSocDiv(dk,data){const teams=data.teams||[];if(!teams.length)return'';
    const rows=teams.map((t,i)=>`<tr class="${i===0?'lb-row--leader':''}"><td class="lb-rank ${i===0?'lb-rank--top':''}">${t.rank}</td><td class="lb-team">${escapeHtml(t.teamName)}</td><td class="numeric"><strong>${t.societyCircuitPoints}</strong></td><td class="numeric lb-col-optional">${t.weeklyBonusPoints}</td><td class="numeric lb-col-optional">${t.placementBonus}</td></tr>`).join('');
    return`<div class="lb-card"><h2 class="lb-card__title">${escapeHtml(DIVISION_LABELS[dk]||dk)} Society Circuit</h2><table class="lb-table"><thead><tr><th>#</th><th>Team</th><th class="numeric">SC pts</th><th class="numeric lb-col-optional">Bonus</th><th class="numeric lb-col-optional">Placement</th></tr></thead><tbody>${rows}</tbody></table></div>`;}

    function renderPlayers(){const el=$id('players-content');if(!state.playerStats||state.playerStats.empty){el.innerHTML='<div class="lb-card"><div class="empty-state">No player stats yet.</div></div>';return;}
    const players=Object.values(state.playerStats.players||{});if(!players.length){el.innerHTML='<div class="lb-card"><div class="empty-state">No player stats yet.</div></div>';return;}
    const filter=state.playerFilter;const sf=p=>filter==='all'?{played:p.gamesPlayed,won:p.gamesWon}:(p.byType?.[filter]||{played:0,won:0});
    const sorted=players.map(p=>({...p,_s:sf(p)})).filter(p=>p._s.played>0).sort((a,b)=>{const ra=a._s.played?a._s.won/a._s.played:0,rb=b._s.played?b._s.won/b._s.played:0;return rb!==ra?rb-ra:b._s.won-a._s.won;});
    const fbtns=['all','womens','mens','mixed'].map(f=>`<button class="player-filter__btn ${filter===f?'is-active':''}" data-filter="${f}">${f==='all'?'All games':SLOT_TYPE_LABELS[f]}</button>`).join('');
    const rows=sorted.slice(0,50).map((p,i)=>{const r=p._s.played?Math.round(100*p._s.won/p._s.played):0;return`<tr class="${i===0?'lb-row--leader':''}"><td class="lb-rank ${i===0?'lb-rank--top':''}">${i+1}</td><td class="lb-team">${escapeHtml(p.name)} <span class="lb-team__meta">${escapeHtml(p.teamName||'')}</span></td><td class="numeric"><strong>${p._s.won}–${p._s.played-p._s.won}</strong></td><td class="numeric">${r}%</td><td class="numeric lb-col-optional">${p.matchesPlayed||0}</td></tr>`;}).join('');
    el.innerHTML=`<div class="lb-card"><h2 class="lb-card__title">Player standings</h2><div class="player-filter">${fbtns}</div><table class="lb-table"><thead><tr><th>#</th><th>Player</th><th class="numeric">W–L</th><th class="numeric">Win rate</th><th class="numeric lb-col-optional">Matches</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty-state">No games in this filter.</td></tr>'}</tbody></table></div>`;
    el.querySelectorAll('[data-filter]').forEach(b=>{b.addEventListener('click',()=>{state.playerFilter=b.dataset.filter;renderPlayers();});});}

    function renderAnalytics(){$id('analytics-content').innerHTML=`<div class="lb-card"><h2 class="lb-card__title">League analytics</h2><div class="empty-state" style="padding:var(--space-10)">Analytics will appear here once enough match data has been collected. Track scoring averages, team momentum, point differentials, and head-to-head records.</div></div>`;}

    function activateTab(name){state.tab=name;document.querySelectorAll('.lb-tab').forEach(b=>b.classList.toggle('is-active',b.dataset.tab===name));document.querySelectorAll('.lb-section').forEach(s=>s.classList.toggle('is-active',s.dataset.section===name));writeUrl();
    if(name==='standings'||name==='society'){if(!state.standings)loadStandings().then(()=>{renderHero();renderStandings();renderSociety();});else{renderStandings();renderSociety();}}
    if(name==='players'){if(!state.playerStats)loadPlayerStats().then(renderPlayers);else renderPlayers();}
    if(name==='analytics')renderAnalytics();}

    document.querySelectorAll('.lb-tab').forEach(b=>{b.addEventListener('click',()=>activateTab(b.dataset.tab));});
    $id('circuit-select').addEventListener('change',e=>{state.circuit=e.target.value;state.standings=null;state.playerStats=null;writeUrl();activateTab(state.tab);});
    $id('division-select').addEventListener('change',e=>{state.division=e.target.value;writeUrl();renderStandings();});

    function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function formatTime(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
    function formatDateShort(iso){if(!iso)return'';const d=new Date(iso);return isNaN(d)?'':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

    readUrl();
    loadStandings().then(()=>{renderHero();renderStandings();renderSociety();});
  </script>
  <script src="/js/partials.js"></script>
</body>
</html>
