<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .teams-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }
    .teams-body { padding-top: var(--space-4); }

    .tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); }
    .tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .tab:hover { color: var(--color-text); background: var(--color-surface-2); }
    .tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .team-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 18px; transition: border-color var(--transition);
    }
    .team-card:hover { border-color: var(--color-border-strong); }
    .team-card__top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .team-card__icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--color-lime-dim); color: var(--color-lime);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; font-weight: 800;
    }
    .team-card__name { font-size: 15px; font-weight: 700; }
    .team-card__record { font-size: 12px; color: var(--color-text-faint); }
    .team-card__roster {
      padding-top: 10px; border-top: 1px solid var(--color-border);
      font-size: 13px; line-height: 1.7; color: var(--color-text-muted);
    }
    .team-card__captain {
      color: var(--color-lime); font-weight: 700; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; color: var(--color-text-faint); }

    @media (max-width: 600px) {
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="teams">
  <div data-partial="nav"></div>

  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="teams"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow">Circuit I · May 2026</div>
      <h1 class="page-hero__title">Teams</h1>
      <p class="page-hero__sub">Rosters, captains, and division lineups. Tap a team to see the full roster.</p>
    </div>
  </div>

  <div class="teams-shell">
    <div class="teams-body">
      <div class="tabs" id="teams-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>
      <div id="teams-grid">
        <div class="empty-state">Teams will appear once rosters are set for Circuit I.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    let teamsData=null;let activeDivision='3.0-mixed';
    const $id=id=>document.getElementById(id);

    document.getElementById('teams-tabs')?.addEventListener('click',(e)=>{
      const btn=e.target.closest('.tab');if(!btn)return;
      document.querySelectorAll('#teams-tabs .tab').forEach(t=>t.classList.remove('is-active'));
      btn.classList.add('is-active');
      activeDivision=btn.dataset.division;
      renderTeams();
    });

    async function loadTeams(){
      try{
        const r=await fetch('/.netlify/functions/public-teams?circuit=I');
        if(!r.ok)throw 0;
        teamsData=await r.json();
        if(!teamsData.teamCount)throw 0;
        renderTeams();
      }catch{
        $id('teams-grid').innerHTML='<div class="empty-state">Teams will appear once rosters are set for Circuit I.</div>';
      }
    }

    function renderTeams(){
      const el=$id('teams-grid');
      if(!teamsData||!teamsData.divisions){
        el.innerHTML='<div class="empty-state">Teams will appear once rosters are set.</div>';return;
      }
      const divMap={'3.0-mixed':'3.0M','3.5-mixed':'3.5M','3.5-womens':'3.5W'};
      const divKey=divMap[activeDivision]||activeDivision;
      const teams=teamsData.divisions?.[divKey];
      if(!teams||teams.length===0){
        el.innerHTML='<div class="empty-state">No teams in this division yet.</div>';return;
      }
      el.innerHTML='<div class="teams-grid">'+teams.map(function(t){
        const captain=t.roster?.find(function(p){return p.isCaptain;});
        const rosterNames=t.roster?.map(function(p){return esc(p.name);}).join(', ')||'Roster pending';
        return '<div class="team-card">'+
          '<div class="team-card__top">'+
            '<div class="team-card__icon">'+esc(t.name.charAt(0))+'</div>'+
            '<div><div class="team-card__name">'+esc(t.name)+'</div>'+
            '<div class="team-card__record">'+esc(t.divisionLabel||t.division)+'</div></div>'+
          '</div>'+
          (captain?'<div class="team-card__captain">Captain: '+esc(captain.name)+'</div>':'')+
          '<div class="team-card__roster">'+rosterNames+'</div>'+
        '</div>';
      }).join('')+'</div>';
    }

    function esc(s){return String(s??'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});}
    loadTeams();
  </script>
</body>
</html>
