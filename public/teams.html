<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams &middot; The Dink Society</title>
  <meta name="description" content="Meet the teams of The Dink Society pickleball league." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .teams-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }

    .teams-hero {
      background: var(--color-surface); border: 1px solid var(--color-border);
      padding: var(--space-8) var(--space-6); border-radius: var(--radius-lg); margin-bottom: var(--space-4);
    }
    .teams-hero .eyebrow {
      font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--color-teal); margin-bottom: var(--space-3);
      display: flex; align-items: center; gap: var(--space-2);
    }
    .teams-hero .eyebrow::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-teal); box-shadow: 0 0 0 4px var(--color-teal-dim);
    }
    .teams-hero h1 {
      font-size: var(--text-3xl); font-weight: 800; text-transform: uppercase;
      margin: 0 0 var(--space-2);
    }
    .teams-hero p { color: var(--color-text-muted); font-size: var(--text-sm); margin: 0; }

    .div-tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); flex-wrap: wrap; }
    .div-tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .div-tab:hover { color: var(--color-text); background: var(--color-surface-2); }
    .div-tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .team-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 20px;
      transition: border-color var(--transition);
    }
    .team-card:hover { border-color: var(--color-border-strong); }

    .team-card__header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .team-card__emoji { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--color-surface-2); border-radius: var(--radius-sm); flex-shrink: 0; }
    .team-card__info { flex: 1; min-width: 0; }
    .team-card__name { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; }
    .team-card__captain { font-size: 11px; color: var(--color-teal); font-weight: 600; margin-top: 2px; }

    .team-card__roster { border-top: 1px solid var(--color-border); padding-top: 12px; }
    .team-card__roster-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--color-text-faint); margin-bottom: 8px;
    }
    .roster-list { list-style: none; margin: 0; padding: 0; }
    .roster-list li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; font-size: 13px; color: var(--color-text-muted);
    }
    .roster-list li + li { border-top: 1px solid var(--color-divider); }
    .roster-list .name { font-weight: 500; color: var(--color-text); }
    .roster-list .captain-badge {
      font-size: 9px; font-weight: 700; color: var(--color-lime);
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 1px 6px; border-radius: 3px; background: var(--color-lime-ghost);
    }
    .roster-list .dupr { font-size: 11px; color: var(--color-text-faint); font-variant-numeric: tabular-nums; }

    .empty-state {
      text-align: center; padding: 60px 20px; font-size: 14px;
      color: var(--color-text-faint);
    }

    .team-count {
      font-size: 11px; color: var(--color-text-faint); margin-bottom: var(--space-3);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 600px) {
      .teams-hero { padding: var(--space-6) var(--space-4); }
      .teams-hero h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); }
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="teams">
  <div data-partial="nav"></div>

  <div class="teams-shell">
    <div class="teams-hero">
      <div class="eyebrow">Rosters</div>
      <h1>Circuit I Teams</h1>
      <p>4&ndash;10 players per team. See who's competing this season.</p>
    </div>

    <nav class="div-tabs" id="div-tabs"></nav>
    <div class="team-count" id="team-count"></div>
    <div id="teams-grid" class="teams-grid">
      <div class="empty-state">Loading teams&hellip;</div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    const DIVISION_LABELS = { '3-0-mixed': '3.0 Mixed', '3-5-mixed': '3.5 Mixed' };
    let allTeams = [];
    let activeDivision = '';

    async function loadTeams() {
      try {
        const r = await fetch('/.netlify/functions/public-teams?season=circuit-i');
        if (!r.ok) throw 0;
        const data = await r.json();
        allTeams = data.teams || [];
      } catch {
        allTeams = [];
      }
      renderTabs();
      renderTeams();
    }

    function renderTabs() {
      const divs = [...new Set(allTeams.map(t => t.division))].sort();
      if (!divs.length) { document.getElementById('div-tabs').innerHTML = ''; return; }

      // Default to first division
      if (!activeDivision || !divs.includes(activeDivision)) activeDivision = divs[0];

      document.getElementById('div-tabs').innerHTML = divs.map(d =>
        `<button class="div-tab ${d === activeDivision ? 'is-active' : ''}" data-div="${esc(d)}">${esc(DIVISION_LABELS[d] || d)}</button>`
      ).join('');

      document.querySelectorAll('.div-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeDivision = btn.dataset.div;
          document.querySelectorAll('.div-tab').forEach(b => b.classList.toggle('is-active', b.dataset.div === activeDivision));
          renderTeams();
        });
      });
    }

    function renderTeams() {
      const filtered = allTeams.filter(t => t.division === activeDivision);
      const grid = document.getElementById('teams-grid');
      const count = document.getElementById('team-count');

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No teams registered yet for this division.</div>';
        count.textContent = '';
        return;
      }

      count.textContent = `${filtered.length} team${filtered.length === 1 ? '' : 's'}`;

      grid.innerHTML = filtered.map(t => {
        const roster = (t.roster || []).map(p => {
          const badges = [];
          if (p.isCaptain) badges.push('<span class="captain-badge">Captain</span>');
          const dupr = p.dupr ? `<span class="dupr">${p.dupr} DUPR</span>` : '';
          return `<li><span class="name">${esc(p.name)}</span> <span style="display:flex;gap:6px;align-items:center;">${badges.join('')}${dupr}</span></li>`;
        }).join('');

        return `<div class="team-card">
          <div class="team-card__header">
            <div class="team-card__emoji">${t.emoji || '🏓'}</div>
            <div class="team-card__info">
              <div class="team-card__name">${esc(t.name)}</div>
              <div class="team-card__captain">Captain: ${esc(t.captain)}</div>
            </div>
          </div>
          <div class="team-card__roster">
            <div class="team-card__roster-title">Roster (${t.roster?.length || 0} players)</div>
            <ul class="roster-list">${roster || '<li class="empty-state" style="padding:8px 0;">Roster pending</li>'}</ul>
          </div>
        </div>`;
      }).join('');
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    loadTeams();
  </script>
</body>
</html>
