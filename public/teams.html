<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams &middot; The Dink Society</title>
  <meta name="description" content="Meet the teams of The Dink Society pickleball league." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .teams-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }


    .div-tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); flex-wrap: wrap; }
    .div-tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .div-tab:hover { color: var(--color-text); background: var(--color-surface-2); }
    .div-tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .team-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 20px;
      transition: border-color var(--transition);
    }
    .team-card:hover { border-color: var(--color-border-strong); }

    .team-card__header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .team-card__emoji { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--color-surface-2); border-radius: var(--radius-sm); flex-shrink: 0; }
    .team-card__info { flex: 1; min-width: 0; }
    .team-card__name { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; }
    .team-card__captain { font-size: 11px; color: var(--color-teal); font-weight: 600; margin-top: 2px; }

    .team-card__roster { border-top: 1px solid var(--color-border); padding-top: 12px; }
    .team-card__roster-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--color-text-faint); margin-bottom: 8px;
    }
    /* Shared column grid for the header row + each roster row */
    .roster-head, .roster-list li {
      display: grid;
      grid-template-columns: 1fr 58px 18px 46px;
      align-items: center; gap: 6px;
    }
    .roster-head {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--color-text-faint); padding: 0 0 6px; border-bottom: 1px solid var(--color-border);
    }
    .roster-head .h-rank { text-align: center; }
    .roster-head .h-dsr  { text-align: right; }
    .roster-list { list-style: none; margin: 6px 0 0; padding: 0; }
    .roster-list li {
      padding: 5px 0; font-size: 13px; color: var(--color-text-muted);
    }
    .roster-list li + li { border-top: 1px solid var(--color-divider); }
    .roster-list .name { font-weight: 500; color: var(--color-text); min-width: 0; }
    .team-name-link { color: inherit; text-decoration: none; }
    .team-name-link:hover { color: var(--color-lime); }
    .player-link { color: inherit; text-decoration: none; }
    .player-link:hover { color: var(--color-teal); text-decoration: underline; }
    .roster-list .rank { font-size: 12px; font-weight: 700; color: var(--color-text-muted); text-align: center; font-variant-numeric: tabular-nums; }
    .roster-list .rank--empty { color: var(--color-text-faint); font-weight: 600; }
    .roster-list .gender { font-size: 11px; color: var(--color-text-faint); text-align: center; }
    .roster-list .score { font-size: 12px; font-weight: 700; color: var(--color-teal); font-variant-numeric: tabular-nums; text-align: right; }
    .roster-list .score--empty { font-size: 11px; color: var(--color-text-faint); text-align: right; }

    .empty-state {
      text-align: center; padding: 60px 20px; font-size: 14px;
      color: var(--color-text-faint);
    }

    .team-count {
      font-size: 11px; color: var(--color-text-faint); margin-bottom: var(--space-3);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 600px) {
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="teams">
  <div data-partial="nav"></div>

  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="teams"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow"><span data-circuit-label>Season 1</span> · <span data-start-month-year>June 2026</span></div>
      <h1 class="page-hero__title">Teams</h1>
    </div>
  </div>

  <div class="teams-shell">

    <nav class="div-tabs" id="div-tabs"></nav>
    <div class="team-count" id="team-count"></div>
    <div id="teams-grid" class="teams-grid">
      <div class="empty-state">Loading teams&hellip;</div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    const DIVISION_LABELS = { '3-0-mixed': '3.0–3.5 Mixed', '3-5-mixed': '3.0–3.5 Mixed', '3.5M': '3.0–3.5 Mixed', '3.0M': '3.0 Mixed' };
    let allTeams = [];
    let activeDivision = '';
    let playerScoreMap = {}; // name → composite score (DSR)
    let playerRankMap = {};  // name → league rank within their gender (by DSR)

    // M / F / male / female / Male → 'M' | 'F' | ''
    function normGender(g) { const s = String(g || '').trim().toLowerCase(); return s[0] === 'f' ? 'F' : s[0] === 'm' ? 'M' : ''; }

    // Optional season override (?season=circuit-test) for staff QA. Default = live season.
    const SEASON_ID = new URLSearchParams(location.search).get('season') || 'circuit-i';
    const CIRCUIT   = SEASON_ID.replace('circuit-', '').toUpperCase();
    const LINK_SUFFIX = SEASON_ID === 'circuit-i' ? '' : `&season=${encodeURIComponent(SEASON_ID)}`;

    async function loadTeams() {
      const [teamsRes, statsRes] = await Promise.allSettled([
        fetch('/.netlify/functions/public-teams?season=' + encodeURIComponent(SEASON_ID)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-leaderboard?circuit=' + encodeURIComponent(CIRCUIT) + '&view=players').then(r => r.ok ? r.json() : null),
      ]);
      allTeams = teamsRes.value?.teams || [];

      // Build name → composite score map
      const statsData = statsRes.value;
      if (statsData && !statsData.empty && statsData.players) {
        for (const p of Object.values(statsData.players)) {
          if (p.name && p.composite != null) playerScoreMap[p.name] = p.composite;
        }
      }

      computeGenderRanks();
      renderTabs();
      renderTeams();
    }

    // League-wide ranking within each gender, ordered by DSR (composite) desc.
    // Players without a DSR yet are left unranked.
    function computeGenderRanks() {
      playerRankMap = {};
      const seen = new Set();
      const pool = [];
      for (const t of allTeams) {
        for (const p of (t.roster || [])) {
          if (!p.name || seen.has(p.name)) continue;
          seen.add(p.name);
          const dsr = playerScoreMap[p.name];
          if (dsr == null) continue;
          pool.push({ name: p.name, g: normGender(p.gender), dsr });
        }
      }
      for (const g of ['M', 'F']) {
        pool.filter(p => p.g === g)
            .sort((a, b) => b.dsr - a.dsr)
            .forEach((p, i) => { playerRankMap[p.name] = i + 1; });
      }
    }

    // Normalize a team's division to a display label
    // Prefer the stored divisionLabel, fall back to the DIVISION_LABELS map, then raw value
    function divLabel(t) { return t.divisionLabel || DIVISION_LABELS[t.division] || t.division || ''; }

    function renderTabs() {
      // Group by label so teams with different raw values but same label share a tab
      const labels = [...new Set(allTeams.map(t => divLabel(t)))].sort();
      if (!labels.length) { document.getElementById('div-tabs').innerHTML = ''; return; }

      if (!activeDivision || !labels.includes(activeDivision)) activeDivision = labels[0];

      document.getElementById('div-tabs').innerHTML = labels.map(l =>
        `<button class="div-tab ${l === activeDivision ? 'is-active' : ''}" data-div="${esc(l)}">${esc(l)}</button>`
      ).join('');

      document.querySelectorAll('.div-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeDivision = btn.dataset.div;
          document.querySelectorAll('.div-tab').forEach(b => b.classList.toggle('is-active', b.dataset.div === activeDivision));
          renderTeams();
        });
      });
    }

    function renderTeams() {
      const filtered = allTeams.filter(t => divLabel(t) === activeDivision);
      const grid = document.getElementById('teams-grid');
      const count = document.getElementById('team-count');

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No teams registered yet for this division.</div>';
        count.textContent = '';
        return;
      }

      count.textContent = `${filtered.length} team${filtered.length === 1 ? '' : 's'}`;

      grid.innerHTML = filtered.map(t => {
        const teamSlug = slugify(t.name);
        const teamUrl = `/team?id=${teamSlug}${LINK_SUFFIX}`;
        const roster = (t.roster || []).map(p => {
          const playerUrl = `/player?team=${teamSlug}&name=${encodeURIComponent(p.name || '')}${LINK_SUFFIX}`;
          const gender = p.gender ? `<span class="gender">${esc(p.gender)}</span>` : '<span class="gender"></span>';
          const sc = playerScoreMap[p.name];
          const scoreEl = sc != null
            ? `<span class="score">${sc.toFixed(1)}</span>`
            : `<span class="score--empty">—</span>`;
          return `<li><a href="${playerUrl}" class="name player-link">${esc(p.name)}</a>${gender}${scoreEl}</li>`;
        }).join('');

        return `<div class="team-card">
          <div class="team-card__header">
            <div class="team-card__emoji">${t.emoji || ''}</div>
            <div class="team-card__info">
              <div class="team-card__name"><a href="${teamUrl}" class="team-name-link">${esc(t.name)}</a></div>
              <div class="team-card__captain">Captain: ${esc(t.captain)}</div>
            </div>
          </div>
          <div class="team-card__roster">
            <div class="team-card__roster-title">Roster (${t.roster?.length || 0} players)</div>
            <ul class="roster-list">${roster || '<li class="empty-state" style="padding:8px 0;">Roster pending</li>'}</ul>
          </div>
        </div>`;
      }).join('');
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function slugify(s) { return String(s ?? '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
    loadTeams();
  </script>
</body>
</html>
