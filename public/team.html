<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Team profile — The Dink Society" />

  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    /* ═══════════════════════════════════════
       TEAM PROFILE — full-page layout
    ═══════════════════════════════════════ */
    .tp-shell { max-width: var(--max-w); margin: 0 auto; padding: 80px var(--gutter) 100px; }

    /* ── Nav back ── */
    .tp-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--color-text-faint); text-decoration: none; margin-bottom: var(--space-5); transition: color var(--transition); }
    .tp-back:hover { color: var(--color-text); }
    .tp-back::before { content: '←'; }

    /* ── Section card ── */
    .tp-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-5) var(--space-6); margin-bottom: var(--space-4); }
    .tp-card__head { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--color-text-faint); margin-bottom: var(--space-4); }
    .tp-card__head-icon { font-size: 14px; }

    /* ── Hero ── */
    .tp-hero { display: flex; align-items: center; gap: var(--space-5); }
    .tp-hero__emoji { font-size: 52px; width: 80px; height: 80px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--color-surface-2); border-radius: var(--radius-md); }
    .tp-hero__emoji--text { font-size: 28px; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase; }
    .tp-hero__body { flex: 1; min-width: 0; }
    .tp-hero__eyebrow { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--color-teal); margin-bottom: var(--space-2); }
    .tp-hero__name { font-size: clamp(1.7rem, 4vw, 2.6rem); font-weight: 800; text-transform: uppercase; margin: 0 0 var(--space-3); line-height: 1.05; }
    .tp-hero__pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .tp-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-full); border: 1px solid var(--color-border); color: var(--color-text-faint); background: var(--color-surface-2); }
    .tp-pill--teal { color: var(--color-teal); border-color: var(--color-teal); background: var(--color-teal-dim); }
    .tp-pill--lime { color: var(--color-lime); border-color: var(--color-lime); background: var(--color-lime-ghost); }

    /* ── Schedule ── */
    .sched-list { display: flex; flex-direction: column; gap: 6px; }
    .sched-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-sm); transition: border-color var(--transition); }
    .sched-row--upcoming { opacity: 0.6; }
    .sched-wk { font-size: 10px; font-weight: 800; color: var(--color-lime); background: var(--color-lime-ghost); padding: 3px 8px; border-radius: 4px; min-width: 38px; text-align: center; flex-shrink: 0; }
    .sched-opp { flex: 1; font-size: 13px; font-weight: 600; color: var(--color-text); text-decoration: none; transition: color var(--transition); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sched-opp:hover { color: var(--color-teal); }
    .sched-opp__emoji { margin-right: 5px; }
    .sched-score { font-size: 12px; font-weight: 700; color: var(--color-text-muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .sched-date { font-size: 11px; color: var(--color-text-faint); flex-shrink: 0; }
    .sched-serve { font-size: 9px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: #ffb02e; background: rgba(255,176,46,0.12); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .sched-result { font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 4px; flex-shrink: 0; }
    .sched-result--w { color: #22c55e; background: rgba(34,197,94,.14); }
    .sched-result--l { color: #ef4444; background: rgba(239,68,68,.14); }
    .sched-result--t { color: var(--color-text-faint); background: var(--color-surface-3, var(--color-surface-2)); }
    .sched-hint { font-size: 11px; color: var(--color-text-faint); text-align: center; padding: var(--space-3) 0 0; }

    /* ── Stat tiles ── */
    .stat-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-tile { flex: 1; min-width: 72px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 14px 10px; text-align: center; }
    .stat-tile__val { font-size: 1.8rem; font-weight: 800; line-height: 1; }
    .stat-tile__label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-faint); margin-top: 4px; }
    .stat-tile__sub { font-size: 10px; font-weight: 700; color: var(--color-lime); margin-top: 3px; }
    .val--green { color: #22c55e; }
    .val--red { color: #ef4444; }
    .val--teal { color: var(--color-teal); }
    .val--lime { color: var(--color-lime); }

    /* ── Snapshot ── */
    .snap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4); }
    .snap-item__label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-text-faint); margin-bottom: 4px; }
    .snap-item__val { font-size: 14px; font-weight: 700; }
    .snap-item__val a { color: var(--color-text); text-decoration: none; transition: color var(--transition); }
    .snap-item__val a:hover { color: var(--color-teal); }
    .snap-divider { border: none; border-top: 1px solid var(--color-border); margin: 0 0 var(--space-3); }
    .snap-meta { font-size: 12px; color: var(--color-text-faint); display: flex; gap: var(--space-4); }
    .snap-meta span { display: flex; align-items: center; gap: 4px; }

    /* ── Team Leaders ── */
    .leaders-cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .leaders-col__title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-text-faint); margin-bottom: var(--space-3); }
    .leader-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-sm); margin-bottom: 6px; text-decoration: none; transition: border-color var(--transition); }
    .leader-row:last-child { margin-bottom: 0; }
    .leader-row:hover { border-color: var(--color-border-strong); }
    .leader-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .leader-body { flex: 1; min-width: 0; }
    .leader-name { font-size: 13px; font-weight: 700; color: var(--color-text); }
    .leader-sub { font-size: 10px; color: var(--color-text-faint); margin-top: 1px; }
    .leader-stat { font-size: 14px; font-weight: 800; color: var(--color-lime); flex-shrink: 0; }

    /* ── Roster grid ── */
    .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .roster-split { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
    .roster-col__title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-text-faint); margin-bottom: var(--space-3); display: flex; align-items: center; gap: 6px; }
    .roster-col__count { font-weight: 800; color: var(--color-text-muted); }
    .roster-col__cards { display: flex; flex-direction: column; gap: 8px; }
    .roster-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); text-decoration: none; transition: border-color var(--transition); }
    .roster-card:hover { border-color: var(--color-border-strong); }
    .roster-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .roster-name { font-size: 13px; font-weight: 700; color: var(--color-text); }
    .roster-role { font-size: 10px; color: var(--color-text-faint); margin-top: 2px; }
    .roster-role--captain { color: var(--color-lime); }
    .roster-role--cocaptain { color: var(--color-teal); }
    .roster-dupr { font-size: 10px; color: var(--color-text-faint); margin-top: 1px; }

    /* ── Transactions ── */
    .tx-list { display: flex; flex-direction: column; gap: 0; }
    .tx-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--color-border); }
    .tx-row:last-child { border-bottom: none; }
    .tx-badge { font-size: 9px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; flex-shrink: 0; min-width: 38px; text-align: center; }
    .tx-badge--in { color: var(--color-lime); background: var(--color-lime-ghost); }
    .tx-badge--out { color: var(--color-text-faint); background: var(--color-surface-2); }
    .tx-body { flex: 1; min-width: 0; }
    .tx-player { font-size: 13px; font-weight: 700; color: var(--color-text); text-decoration: none; }
    .tx-player:hover { color: var(--color-teal); }
    .tx-route { font-size: 11px; color: var(--color-text-faint); margin-top: 2px; }
    .tx-arrow { opacity: 0.6; }
    .tx-note { font-size: 11px; font-style: italic; color: var(--color-text-muted); margin-top: 2px; }
    .tx-date { font-size: 11px; color: var(--color-text-faint); flex-shrink: 0; }

    /* ── Empty / loading ── */
    .tp-empty { text-align: center; padding: 28px 16px; font-size: 13px; color: var(--color-text-faint); }

    @media (max-width: 640px) {
      .tp-card { padding: var(--space-4); }
      .tp-hero { flex-direction: column; align-items: flex-start; gap: var(--space-3); }
      .tp-hero__emoji { width: 64px; height: 64px; font-size: 38px; }
      .tp-hero__emoji--text { font-size: 22px; }
      .leaders-cols { grid-template-columns: 1fr; }
      .roster-grid { grid-template-columns: 1fr; }
      .roster-split { grid-template-columns: 1fr; gap: var(--space-4); }
      .snap-grid { grid-template-columns: 1fr 1fr; }
      .stat-tile__val { font-size: 1.5rem; }
    }
  </style>
</head>
<body data-page="team">
  <div data-partial="nav"></div>

  <div class="tp-shell">
    <a href="/teams" class="tp-back" id="back-link">All Teams</a>
    <div id="page-root"><div class="tp-empty" style="padding:80px;">Loading…</div></div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
  (() => {
    /* ─── Helpers ─────────────────────────────────────────── */
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const slug = s => String(s ?? '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const pct  = (won, played) => played ? Math.round(won / played * 100) : 0;
    const sign = n => n > 0 ? `+${n}` : String(n);
    const fmtDate = iso => { if (!iso) return ''; const d = new Date(iso); return isNaN(d) ? '' : d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
    const MATCH_START_TIME = '7:00 PM';   // single start time for all matches

    const PALETTE = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#84cc16'];
    const avatarColor = name => { let h = 0; for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xffff; return PALETTE[h % PALETTE.length]; };
    const initial = name => (name || '?').charAt(0).toUpperCase();
    const isTextLogo = v => /[a-z0-9]/i.test(String(v || ''));

    /* ─── URL ─────────────────────────────────────────────── */
    const _q = new URLSearchParams(location.search);
    const teamParam = _q.get('id') || '';
    // Optional season override (?season=circuit-test) for staff QA. Default = live season.
    const SEASON_ID = _q.get('season') || 'circuit-i';
    const CIRCUIT   = SEASON_ID.replace('circuit-', '').toUpperCase();
    const LINK_SUFFIX = SEASON_ID === 'circuit-i' ? '' : `&season=${encodeURIComponent(SEASON_ID)}`;

    /* ─── Data ────────────────────────────────────────────── */
    async function load() {
      const [td, ld, sd, pd] = await Promise.allSettled([
        fetch('/.netlify/functions/public-teams?season=' + encodeURIComponent(SEASON_ID)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-leaderboard?circuit=' + encodeURIComponent(CIRCUIT)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-schedule?season=' + encodeURIComponent(SEASON_ID)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-leaderboard?circuit=' + encodeURIComponent(CIRCUIT) + '&view=players').then(r => r.ok ? r.json() : null),
      ]);

      const teams  = td.value?.teams  || [];
      const lb     = ld.value;          // { circuit, divisions }
      const sched  = sd.value;          // { weeks }
      const pstats = pd.value;          // { players }

      /* find this team */
      const team = teams.find(t => slug(t.name) === teamParam) || teams.find(t => t.id === teamParam);
      if (!team) { document.getElementById('page-root').innerHTML = '<div class="tp-empty" style="padding:80px;">Team not found.</div>'; return; }

      document.title = `${team.name} · The Dink Society`;
      const teamSlug = slug(team.name);

      /* transactions for this team (all seasons) */
      let transactions = [];
      try {
        const txr = await fetch('/.netlify/functions/public-transactions?teamId=' + encodeURIComponent(team.id));
        if (txr.ok) transactions = (await txr.json()).transactions || [];
      } catch {}

      /* standings for this team */
      let rec = null, divTeamCount = 0;
      if (lb && !lb.empty && lb.divisions) {
        for (const div of Object.values(lb.divisions)) {
          const m = (div.teams || []).find(t => t.teamId === team.id || t.teamName === team.name);
          if (m) { rec = m; divTeamCount = div.teams.length; break; }
        }
      }

      /* schedule for this team */
      const weeks = sched?.weeks || [];
      const myMatches = weeks.flatMap(w =>
        (w.matches || []).map(m => ({ ...m, week: w.week }))
      ).filter(m => m.teamA === team.name || m.teamB === team.name)
       .sort((a,b) => a.week - b.week);

      /* player stats for this team — only players who have actually played;
         the aggregate seeds every rostered player at zero, and those shouldn't
         populate Team Leaders */
      const allP = pstats && !pstats.empty ? Object.values(pstats.players || {}) : [];
      const myP  = allP.filter(p => (p.teamName === team.name || p.teamId === team.id) && p.gamesPlayed > 0);

      /* roster helpers */
      const roster = (team.roster || []).slice().sort((a,b) => (a.name||'').localeCompare(b.name||''));
      const captain   = roster.find(p => p.isCaptain);
      const coCaptain = roster.find(p => p.isCoCaptain);
      const maleCount = roster.filter(p => p.gender === 'M').length;
      const femaleCount = roster.filter(p => p.gender === 'F').length;

      /* attach gender from roster to player stats */
      const rosterByName = {};
      roster.forEach(p => rosterByName[p.name] = p);
      myP.forEach(p => { const rp = rosterByName[p.name]; if (rp) { p.gender = rp.gender; p.isCaptain = rp.isCaptain; } });

      const divLabel = team.divisionLabel || team.division || 'Mixed Doubles';

      /* ── BUILD HTML ───────────────────────────────────── */
      let html = '';

      /* HERO */
      // Standings seed every team at 0–0, so "has stats" means at least one match played.
      const hasPlayed = !!rec && (rec.wins + rec.losses + (rec.ties || 0)) > 0;
      const recPill = hasPlayed ? `<span class="tp-pill">${rec.wins}–${rec.losses}${rec.ties ? `–${rec.ties}` : ''}</span>` : '';
      html += `
        <div class="tp-card">
          <div class="tp-hero">
            <div class="tp-hero__emoji${isTextLogo(team.emoji) ? ' tp-hero__emoji--text' : ''}"${isTextLogo(team.emoji) && team.color ? ` style="color:${team.color}"` : ''}>${team.emoji || ''}</div>
            <div class="tp-hero__body">
              <div class="tp-hero__eyebrow">Season 1 &mdash; ${esc(divLabel)}</div>
              <h1 class="tp-hero__name">${esc(team.name)}</h1>
              <div class="tp-hero__pills">
                <span class="tp-pill">${roster.length} players</span>
                ${captain ? `<span class="tp-pill tp-pill--teal">Captain: ${esc(captain.name)}</span>` : ''}
                ${recPill}
                ${hasPlayed && rec?.rank ? `<span class="tp-pill tp-pill--lime">#${rec.rank} of ${divTeamCount}</span>` : ''}
              </div>
            </div>
          </div>
        </div>`;

      /* SCHEDULE */
      html += `<div class="tp-card"><div class="tp-card__head"><span class="tp-card__head-icon">📅</span> Team Schedule</div>`;
      if (!myMatches.length) {
        html += `<div class="tp-empty">Schedule will appear once the season begins (June 8).</div>`;
      } else {
        html += `<div class="sched-list">`;
        myMatches.forEach(m => {
          const isHome = m.teamA === team.name;
          const oppName = isHome ? m.teamB : m.teamA;
          const myScore  = isHome ? m.scoreA : m.scoreB;
          const oppScore = isHome ? m.scoreB : m.scoreA;
          const isPlayed = myScore !== null && oppScore !== null;
          const oppTeam  = teams.find(t => t.name === oppName);
          const oppEmoji = oppTeam?.emoji || '';
          const oppHref  = oppTeam ? `/team?id=${slug(oppTeam.name)}${LINK_SUFFIX}` : '#';

          let resultHtml = '', rightHtml = '';
          if (isPlayed) {
            const r = myScore > oppScore ? 'w' : myScore < oppScore ? 'l' : 't';
            resultHtml = `<span class="sched-result sched-result--${r}">${r.toUpperCase()}</span>`;
            rightHtml  = `<span class="sched-score">${myScore}–${oppScore}</span>`;
          } else {
            const dstr = fmtDate(m.scheduledAt);
            rightHtml = `<span class="sched-date">${dstr ? dstr + ' · ' : ''}${m.startTime || MATCH_START_TIME}</span>`;
          }

          // Round 1 serve indicator (home serves first); shown on upcoming rows only
          const serveHtml = isPlayed ? '' :
            `<span class="sched-serve" title="${isHome ? 'Round 1: you serve first, opponent chooses side' : 'Round 1: opponent serves first, you choose side'}">${isHome ? 'Serve R1' : 'Receive R1'}</span>`;

          html += `<div class="sched-row ${isPlayed ? '' : 'sched-row--upcoming'}">
            <span class="sched-wk">WK ${m.week}</span>
            <a href="${oppHref}" class="sched-opp"><span class="sched-opp__emoji">${oppEmoji}</span>vs ${esc(oppName)}</a>
            ${serveHtml}${rightHtml}${resultHtml}
          </div>`;
        });
        html += `</div>`;
        if (myMatches.some(m => m.scoreA !== null)) {
          html += `<div class="sched-hint">Scores reflect games won per match</div>`;
        }
      }
      html += `</div>`;

      /* MATCH RECORD — hidden until the team has actually played */
      if (hasPlayed) {
        const total = rec.wins + rec.losses + (rec.ties || 0);
        const winP  = pct(rec.wins, total);
        html += `<div class="tp-card">
          <div class="tp-card__head"><span class="tp-card__head-icon">📊</span> Match Record</div>
          <div class="stat-row">
            <div class="stat-tile"><div class="stat-tile__val val--green">${rec.wins}</div><div class="stat-tile__label">Wins</div></div>
            <div class="stat-tile"><div class="stat-tile__val val--red">${rec.losses}</div><div class="stat-tile__label">Losses</div></div>
            ${rec.ties ? `<div class="stat-tile"><div class="stat-tile__val">${rec.ties}</div><div class="stat-tile__label">Ties</div></div>` : ''}
            <div class="stat-tile"><div class="stat-tile__val">${rec.matchPointsFor}</div><div class="stat-tile__label">Match Pts</div></div>
            <div class="stat-tile"><div class="stat-tile__val val--teal">${winP}%</div><div class="stat-tile__label">Win%</div></div>
          </div>
        </div>`;

        /* SCORING */
        const diff = (rec.matchPointsFor ?? 0) - (rec.matchPointsAgainst ?? 0);
        html += `<div class="tp-card">
          <div class="tp-card__head"><span class="tp-card__head-icon">🎯</span> Scoring</div>
          <div class="stat-row">
            <div class="stat-tile">
              <div class="stat-tile__val val--lime">${rec.totalGamesWon ?? '—'}</div>
              <div class="stat-tile__label">Games Won</div>
              ${rec.rank && divTeamCount ? `<div class="stat-tile__sub">#${rec.rank}/${divTeamCount}</div>` : ''}
            </div>
            <div class="stat-tile">
              <div class="stat-tile__val val--red">${rec.totalGamesLost ?? '—'}</div>
              <div class="stat-tile__label">Games Lost</div>
            </div>
            <div class="stat-tile">
              <div class="stat-tile__val ${diff >= 0 ? 'val--green' : 'val--red'}">${sign(diff)}</div>
              <div class="stat-tile__label">Match Diff</div>
            </div>
            <div class="stat-tile">
              <div class="stat-tile__val">${rec.rank ?? '—'}</div>
              <div class="stat-tile__label">Rank</div>
              ${divTeamCount ? `<div class="stat-tile__sub">of ${divTeamCount}</div>` : ''}
            </div>
          </div>
        </div>`;
      }

      /* TEAM LEADERS */
      if (myP.length) {
        const byWinRate = arr => arr.slice().sort((a, b) => {
          const ra = pct(a.gamesWon, a.gamesPlayed), rb = pct(b.gamesWon, b.gamesPlayed);
          return rb - ra || b.gamesWon - a.gamesWon;
        });
        const men   = byWinRate(myP.filter(p => p.gender === 'M')).slice(0, 3);
        const women = byWinRate(myP.filter(p => p.gender === 'F')).slice(0, 3);

        html += `<div class="tp-card">
          <div class="tp-card__head"><span class="tp-card__head-icon">🏆</span> Team Leaders</div>
          <div class="leaders-cols">
            <div>
              <div class="leaders-col__title">♂ Men</div>
              ${men.length ? men.map(p => leaderCard(p, teamSlug)).join('') : '<div class="tp-empty" style="padding:12px 0;">No data yet</div>'}
            </div>
            <div>
              <div class="leaders-col__title">♀ Women</div>
              ${women.length ? women.map(p => leaderCard(p, teamSlug)).join('') : '<div class="tp-empty" style="padding:12px 0;">No data yet</div>'}
            </div>
          </div>
        </div>`;
      }

      /* ROSTER — split by gender */
      const rosterMen   = roster.filter(p => p.gender === 'M');
      const rosterWomen = roster.filter(p => p.gender === 'F');
      const rosterOther = roster.filter(p => p.gender !== 'M' && p.gender !== 'F');
      const rosterCol = (title, list) => list.length ? `
        <div class="roster-col">
          <div class="roster-col__title">${title} <span class="roster-col__count">${list.length}</span></div>
          <div class="roster-col__cards">
            ${list.map(p => rosterCard(p, teamSlug)).join('')}
          </div>
        </div>` : '';
      html += `<div class="tp-card">
        <div class="tp-card__head"><span class="tp-card__head-icon">👥</span> Roster</div>
        <div class="roster-split">
          ${rosterCol('♂ Men', rosterMen)}
          ${rosterCol('♀ Women', rosterWomen)}
        </div>
        ${rosterOther.length ? `
        <div class="roster-col" style="margin-top:var(--space-4);">
          <div class="roster-col__title">Unspecified <span class="roster-col__count">${rosterOther.length}</span></div>
          <div class="roster-grid">${rosterOther.map(p => rosterCard(p, teamSlug)).join('')}</div>
        </div>` : ''}
      </div>`;

      /* TRANSACTIONS */
      if (transactions.length) {
        html += `<div class="tp-card">
          <div class="tp-card__head"><span class="tp-card__head-icon">🔄</span> Transactions</div>
          <div class="tx-list">
            ${transactions.map(tx => txRow(tx, team.id)).join('')}
          </div>
        </div>`;
      }

      document.getElementById('page-root').innerHTML = html;
    }

    /* ─── Sub-renderers ──────────────────────────────────── */
    function leaderCard(p, teamSlug) {
      const winP = pct(p.gamesWon, p.gamesPlayed);
      const color = avatarColor(p.name);
      const href  = `/player?team=${teamSlug}&name=${encodeURIComponent(p.name)}${LINK_SUFFIX}`;
      return `<a class="leader-row" href="${href}">
        <div class="leader-avatar" style="background:${color}">${initial(p.name)}</div>
        <div class="leader-body">
          <div class="leader-name">${esc(p.name)}</div>
          <div class="leader-sub">${p.gamesWon}W–${p.gamesLost ?? (p.gamesPlayed - p.gamesWon)}L &middot; ${p.gamesPlayed} GP</div>
        </div>
        <div class="leader-stat">${winP}%</div>
      </a>`;
    }

    function txRow(tx, thisTeamId) {
      const incoming = tx.toTeamId === thisTeamId;
      const badge = incoming
        ? '<span class="tx-badge tx-badge--in">In</span>'
        : '<span class="tx-badge tx-badge--out">Out</span>';
      const pSlug = slug(tx.toTeamName || '');
      const pHref = pSlug ? `/player?team=${pSlug}&name=${encodeURIComponent(tx.playerName)}${LINK_SUFFIX}` : null;
      const nameHtml = pHref
        ? `<a class="tx-player" href="${pHref}">${esc(tx.playerName)}</a>`
        : `<span class="tx-player">${esc(tx.playerName)}</span>`;
      return `<div class="tx-row">
        ${badge}
        <div class="tx-body">
          ${nameHtml}
          <div class="tx-route">${esc(tx.fromTeamName)} <span class="tx-arrow">→</span> ${esc(tx.toTeamName)}</div>
          ${tx.note ? `<div class="tx-note">"${esc(tx.note)}"</div>` : ''}
        </div>
        <div class="tx-date">${fmtDate(tx.transferredAt)}</div>
      </div>`;
    }

    function rosterCard(p, teamSlug) {
      const color = avatarColor(p.name);
      const href  = `/player?team=${teamSlug}&name=${encodeURIComponent(p.name)}${LINK_SUFFIX}`;
      const roleLabel = p.isCaptain ? 'Captain 👑' : p.isCoCaptain ? 'Co-Captain ⭐' : 'Player';
      const roleClass = p.isCaptain ? 'roster-role--captain' : p.isCoCaptain ? 'roster-role--cocaptain' : '';
      const duprLine  = p.dupr ? `<div class="roster-dupr">${esc(p.dupr)} DUPR</div>` : '';
      return `<a class="roster-card" href="${href}">
        <div class="roster-avatar" style="background:${color}">${initial(p.name)}</div>
        <div>
          <div class="roster-name">${esc(p.name)}</div>
          <div class="roster-role ${roleClass}">${roleLabel}</div>
          ${duprLine}
        </div>
      </a>`;
    }

    load();
  })();
  </script>
</body>
</html>
