  <style>
    /* ═══════════════════════════════════════
       TEAM PROFILE — MLP-style tabbed layout
    ═══════════════════════════════════════ */
    .tp-shell { max-width: var(--max-w); margin: 0 auto; padding: 40px var(--gutter) 0; }
    .tp-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--color-text-faint); text-decoration: none; margin-bottom: var(--space-4); transition: color var(--transition); }
    .tp-back:hover { color: var(--color-text); }
    .tp-back::before { content: '←'; }
    .tp-empty { text-align: center; padding: 28px 16px; font-size: 13px; color: var(--color-text-faint); }

    /* ── HERO (gradient band) ── */
    .a-hero { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .a-hero__top { display: flex; align-items: center; gap: 34px; padding: 42px 40px;
      background:
        radial-gradient(120% 150% at 0% 0%, rgba(184,255,44,.18), transparent 55%),
        radial-gradient(120% 160% at 100% 10%, rgba(23,215,176,.10), transparent 50%),
        linear-gradient(115deg, var(--color-surface-3), var(--color-surface)); }
    .a-logo { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .a-logo__mark { width: 118px; height: 118px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 900; color: #fff; box-shadow: 0 8px 30px rgba(0,0,0,.4); overflow: hidden; }
    .a-logo__mark img { width: 100%; height: 100%; object-fit: cover; }
    .a-logo__mark--text { font-size: 30px; letter-spacing: .02em; text-transform: uppercase; }
    .a-logo__name { font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; text-align: center; color: var(--color-text-muted); }
    .a-headline { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .a-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--color-teal); margin-bottom: 10px; }
    .a-name { font-size: clamp(2rem, 4.5vw, 3.4rem); font-weight: 900; text-transform: uppercase; line-height: .98; margin: 0 0 16px; font-style: italic; }
    .a-callouts { display: flex; gap: 40px; flex-wrap: wrap; }
    .a-callout { display: flex; align-items: baseline; gap: 12px; }
    .a-callout__big { font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 900; line-height: 1; }
    .a-callout__lbl { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-text-faint); line-height: 1.3; max-width: 130px; }
    .a-statstrip { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--color-border); }
    .a-stat { padding: 22px 26px; border-right: 1px solid var(--color-border); display: flex; align-items: center; gap: 14px; }
    .a-stat:last-child { border-right: none; }
    .a-stat__num { font-size: 2.4rem; font-weight: 900; line-height: 1; }
    .a-stat__lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--color-text-faint); }
    .a-stat__sub { font-size: 10px; color: var(--color-text-faint); margin-top: 3px; line-height: 1.4; }
    .num-green { color: #22c55e; } .num-red { color: var(--color-red); } .num-lime { color: var(--color-lime); } .num-teal { color: var(--color-teal); }

    /* ── TAB NAV (MLP-style angled) ── */
    .tabbar { background: var(--color-surface-2); border-top: 1px solid var(--color-border); border-bottom: 1px solid var(--color-border); margin-top: 20px; }
    .tabbar__in { max-width: var(--max-w); margin: 0 auto; display: flex; padding: 0 calc(var(--gutter) - 4px); overflow: hidden; }
    .tab { appearance: none; border: none; background: transparent; color: var(--color-text-muted); font-family: inherit; font-size: 13px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; padding: 18px 30px; cursor: pointer; position: relative; transform: skewX(-14deg); transition: color var(--transition), background var(--transition); }
    .tab > span { display: inline-block; transform: skewX(14deg); }
    .tab:hover { color: var(--color-text); }
    .tab.active { background: var(--color-lime); color: var(--color-text-inverse); }
    .tab + .tab { margin-left: 2px; }
    .t-short { display: none; }

    /* ── PANELS ── */
    .panels { padding: 28px var(--gutter) 100px; max-width: var(--max-w); margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; animation: fade .2s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 24px 26px; margin-bottom: 20px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 16px; }
    .card-head h3 { font-size: 11px; font-weight: 700; letter-spacing: .14em; font-style: italic; text-transform: uppercase; color: var(--color-text-faint); margin: 0; display: flex; align-items: center; gap: 8px; }
    .pill { font-size: 11px; font-weight: 700; padding: 3px 11px; border-radius: var(--radius-full); border: 1px solid var(--color-border); color: var(--color-text-faint); background: var(--color-surface-2); }
    .pill--lime { color: var(--color-lime); border-color: var(--color-lime); background: var(--color-lime-dim); }
    .pill--teal { color: var(--color-teal); border-color: var(--color-teal); background: var(--color-teal-dim); }

    .two-col { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; }

    /* Player summary list */
    .psum-row { display: flex; align-items: center; gap: 16px; padding: 14px; border-radius: var(--radius-md); background: var(--color-surface-2); border: 1px solid var(--color-border); margin-bottom: 10px; text-decoration: none; transition: border-color var(--transition); }
    .psum-row:last-child { margin-bottom: 0; }
    .psum-row:hover { border-color: var(--color-border-strong); }
    .psum-av { width: 54px; height: 54px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #fff; flex-shrink: 0; overflow: hidden; }
    .psum-av img { width: 100%; height: 100%; object-fit: cover; }
    .psum-body { flex: 1; min-width: 0; }
    .psum-name { font-size: 16px; font-weight: 800; font-style: italic; text-transform: uppercase; }
    .psum-role { font-size: 11px; font-weight: 600; color: var(--color-text-faint); margin-top: 2px; }
    .psum-role.cap { color: var(--color-lime); } .psum-role.co { color: var(--color-teal); }
    .psum-dsr { text-align: center; flex-shrink: 0; padding-right: 6px; }
    .psum-dsr__n { font-size: 20px; font-weight: 900; color: var(--color-teal); }
    .psum-dsr__l { font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--color-text-faint); margin-top: 1px; }
    .psum-more { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--color-lime); flex-shrink: 0; }

    .about-p { font-size: 14px; line-height: 1.65; color: var(--color-text-muted); margin: 0 0 14px; }
    .about-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--color-border); }
    .about-meta__l { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--color-text-faint); margin-bottom: 4px; }
    .about-meta__v { font-size: 14px; font-weight: 700; }
    .about-meta__v a { color: var(--color-text); text-decoration: none; }
    .about-meta__v a:hover { color: var(--color-teal); }

    /* Stat tiles */
    .tile-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .tile { flex: 1; min-width: 90px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 12px; text-align: center; }
    .tile__v { font-size: 1.9rem; font-weight: 900; line-height: 1; }
    .tile__l { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--color-text-faint); margin-top: 5px; }

    /* Tables */
    .subtabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .subtab { font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; padding: 8px 16px; border-radius: var(--radius-full); border: 1px solid var(--color-border); background: var(--color-surface-2); color: var(--color-text-muted); cursor: pointer; }
    .subtab.active { background: var(--color-lime-dim); border-color: var(--color-lime); color: var(--color-lime); }
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--color-text-faint); text-align: right; padding: 10px 12px; border-bottom: 1px solid var(--color-border); }
    .tbl th:first-child { text-align: left; }
    .tbl td { padding: 12px; border-bottom: 1px solid var(--color-divider); text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
    .tbl td:first-child { text-align: left; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl .nm { display: flex; align-items: center; gap: 10px; font-style: italic; text-transform: uppercase; font-weight: 800; text-decoration: none; color: var(--color-text); }
    .tbl .nm:hover { color: var(--color-teal); }
    .tbl-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; overflow: hidden; }
    .tbl-av img { width: 100%; height: 100%; object-fit: cover; }
    .subdisp { display: none; } .subdisp.active { display: block; }

    /* Schedule rows */
    .sched-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: 10px; }
    .sched-row--up { opacity: .72; }
    .sched-wk { font-size: 10px; font-weight: 800; color: var(--color-lime); background: var(--color-lime-ghost); padding: 4px 9px; border-radius: 6px; min-width: 42px; text-align: center; flex-shrink: 0; }
    .sched-opp { flex: 1; font-size: 14px; font-weight: 700; min-width: 0; text-decoration: none; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sched-opp:hover { color: var(--color-teal); }
    .sched-opp small { display: block; font-size: 11px; font-weight: 500; color: var(--color-text-faint); margin-top: 2px; }
    .sched-score { font-size: 14px; font-weight: 900; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .sched-res { font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 6px; flex-shrink: 0; }
    .res-w { color: #22c55e; background: rgba(34,197,94,.14); } .res-l { color: var(--color-red); background: var(--color-red-dim); } .res-t { color: var(--color-text-faint); background: var(--color-surface-3); }
    .sched-when { font-size: 12px; color: var(--color-text-faint); flex-shrink: 0; text-align: right; }

    /* Match history detail */
    .mh { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 12px; }
    .mh__top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .mh__opp { font-size: 15px; font-weight: 800; font-style: italic; text-transform: uppercase; text-decoration: none; color: var(--color-text); }
    .mh__opp:hover { color: var(--color-teal); }
    .mh__opp small { display: block; font-size: 11px; font-weight: 500; font-style: normal; text-transform: none; color: var(--color-text-faint); margin-top: 2px; }
    .mh__rounds { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
    .mh__r { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; padding: 10px 12px; text-align: center; }
    .mh__r .l { font-size: 8px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--color-text-faint); }
    .mh__r .s { font-size: 16px; font-weight: 900; font-variant-numeric: tabular-nums; margin-top: 3px; }
    .mh__r.win .s { color: #22c55e; } .mh__r.loss .s { color: var(--color-red); }

    /* Roster grid */
    .roster-head { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--color-text-faint); margin: 0 0 12px; display: flex; align-items: center; gap: 7px; }
    .roster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 22px; }
    .roster-grid:last-child { margin-bottom: 0; }
    .rcard { display: flex; gap: 14px; padding: 16px; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); text-decoration: none; transition: border-color var(--transition); }
    .rcard:hover { border-color: var(--color-border-strong); }
    .rcard__av { width: 58px; height: 58px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: #fff; flex-shrink: 0; overflow: hidden; }
    .rcard__av img { width: 100%; height: 100%; object-fit: cover; }
    .rcard__b { flex: 1; min-width: 0; }
    .rcard__top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .rcard__name { font-size: 15px; font-weight: 800; font-style: italic; text-transform: uppercase; color: var(--color-text); }
    .rcard__dsr { font-size: 11px; font-weight: 800; color: var(--color-text-inverse); background: var(--color-teal); padding: 3px 9px; border-radius: var(--radius-full); flex-shrink: 0; }
    .rcard__role { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--color-text-faint); margin: 3px 0 6px; }
    .rcard__role.cap { color: var(--color-lime); } .rcard__role.co { color: var(--color-teal); }
    .rcard__meta { font-size: 12px; line-height: 1.5; color: var(--color-text-muted); }

    @media (max-width: 820px) {
      .tp-shell { padding-top: 24px; }
      .a-hero__top { flex-direction: column; text-align: center; gap: 18px; padding: 34px 24px; }
      .a-headline { align-items: center; } .a-callouts { justify-content: center; gap: 28px; }
      .a-statstrip { grid-template-columns: 1fr 1fr; } .a-stat:nth-child(2) { border-right: none; }
      .a-stat:nth-child(1), .a-stat:nth-child(2) { border-bottom: 1px solid var(--color-border); }
      .two-col { grid-template-columns: 1fr; } .roster-grid { grid-template-columns: 1fr; }
      .tabbar__in { overflow: hidden; padding: 0; }
      .tab { flex: 1; min-width: 0; padding: 15px 4px; font-size: 10.5px; letter-spacing: .02em; transform: none; text-align: center; }
      .tab > span { transform: none; display: block; white-space: nowrap; }
      .tab + .tab { margin-left: 0; border-left: 1px solid var(--color-border); }
      .tab.active { border-left-color: var(--color-lime); }
      .t-full { display: none; } .t-short { display: inline; }
      .tbl { font-size: 12px; } .tbl th, .tbl td { padding: 9px 7px; }
    }
  </style>
</head>
<body data-page="team">
  <div data-partial="nav"></div>

  <div class="tp-shell">
    <a href="/teams" class="tp-back" id="back-link">All Teams</a>
  </div>
  <div id="page-root"><div class="tp-shell"><div class="tp-empty" style="padding:80px;">Loading…</div></div></div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
  (() => {
    /* ─── Helpers ─────────────────────────────────────────── */
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const slug = s => String(s ?? '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const pct  = (won, played) => played ? Math.round(won / played * 100) : 0;
    const sign = n => n > 0 ? `+${n}` : String(n);
    const fmtDate = iso => { if (!iso) return ''; const d = new Date(iso); return isNaN(d) ? '' : d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
    const MATCH_START_TIME = '7:00 PM';
    const matchStartLabel = m => {
      if (m && m.scheduledAt) { const d = new Date(m.scheduledAt); if (!isNaN(d)) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }
      return (m && m.startTime) || MATCH_START_TIME;
    };
    const dsrOf = p => (p && p.composite != null) ? Math.round(p.composite * 10) / 10 : null;

    const PALETTE = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#84cc16'];
    const avatarColor = name => { let h = 0; for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xffff; return PALETTE[h % PALETTE.length]; };
    const initial = name => (name || '?').charAt(0).toUpperCase();
    const isTextLogo = v => /[a-z0-9]/i.test(String(v || ''));

    /* ─── URL ─────────────────────────────────────────────── */
    const _q = new URLSearchParams(location.search);
    const teamParam = _q.get('id') || '';
    const SEASON_ID = _q.get('season') || 'circuit-i';
    const CIRCUIT   = SEASON_ID.replace('circuit-', '').toUpperCase();
    const LINK_SUFFIX = SEASON_ID === 'circuit-i' ? '' : `&season=${encodeURIComponent(SEASON_ID)}`;

    /* ─── Avatar markup (photo if present, else initial) ──── */
    const avatarImg = (p, cls) =>
      `<div class="${cls}" style="background:${avatarColor(p.name)}">${p.photoUrl ? `<img src="${esc(p.photoUrl)}" alt="${esc(p.name)}">` : initial(p.name)}</div>`;

    /* ─── Data ────────────────────────────────────────────── */
    async function load() {
      const [td, ld, sd, pd] = await Promise.allSettled([
        fetch('/.netlify/functions/public-teams?season=' + encodeURIComponent(SEASON_ID)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-leaderboard?circuit=' + encodeURIComponent(CIRCUIT)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-schedule?season=' + encodeURIComponent(SEASON_ID)).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-leaderboard?circuit=' + encodeURIComponent(CIRCUIT) + '&view=players').then(r => r.ok ? r.json() : null),
      ]);

      const teams  = td.value?.teams  || [];
      const lb     = ld.value;
      const sched  = sd.value;
      const pstats = pd.value;

      const team = teams.find(t => slug(t.name) === teamParam) || teams.find(t => t.id === teamParam);
      if (!team) { document.getElementById('page-root').innerHTML = '<div class="tp-shell"><div class="tp-empty" style="padding:80px;">Team not found.</div></div>'; return; }

      document.title = `${team.name} · The Dink Society`;
      const teamSlug = slug(team.name);

      /* standings */
      let rec = null, divTeamCount = 0;
      if (lb && !lb.empty && lb.divisions) {
        for (const div of Object.values(lb.divisions)) {
          const m = (div.teams || []).find(t => t.teamId === team.id || t.teamName === team.name);
          if (m) { rec = m; divTeamCount = div.teams.length; break; }
        }
      }

      /* schedule */
      const weeks = sched?.weeks || [];
      const myMatches = weeks.flatMap(w => (w.matches || []).map(m => ({ ...m, week: w.week })))
        .filter(m => m.teamA === team.name || m.teamB === team.name)
        .sort((a,b) => a.week - b.week);

      /* player stats */
      const allP = pstats && !pstats.empty ? Object.values(pstats.players || {}) : [];
      const myP  = allP.filter(p => (p.teamName === team.name || p.teamId === team.id) && p.gamesPlayed > 0);

      /* roster */
      const roster = (team.roster || []).slice().sort((a,b) => (a.name||'').localeCompare(b.name||''));
      const captain   = roster.find(p => p.isCaptain);
      const coCaptain = roster.find(p => p.isCoCaptain);

      /* merge roster meta onto stats + build dsr map */
      const rosterByName = {};
      roster.forEach(p => rosterByName[p.name] = p);
      myP.forEach(p => { const rp = rosterByName[p.name]; if (rp) { p.gender = rp.gender; p.isCaptain = rp.isCaptain; p.isCoCaptain = rp.isCoCaptain; p.dupr = rp.dupr; p.photoUrl = rp.photoUrl; } });
      const dsrByName = {};
      myP.forEach(p => { const d = dsrOf(p); if (d != null) dsrByName[p.name] = d; });

      /* Team DSR = sum of rated players' DSR */
      const ratedDsr = roster.map(p => dsrByName[p.name]).filter(d => d != null);
      const teamDSR = ratedDsr.length ? Math.round(ratedDsr.reduce((a,b) => a + b, 0) * 10) / 10 : null;

      const divLabel = team.divisionLabel || team.division || 'Mixed Doubles';
      const hasPlayed = !!rec && (rec.wins + rec.losses + (rec.ties || 0)) > 0;
      const total   = hasPlayed ? rec.wins + rec.losses + (rec.ties || 0) : 0;
      const gamesWon  = rec?.totalGamesWon ?? null;
      const gamesLost = rec?.totalGamesLost ?? null;

      /* a match is "done" if finalized or has match points recorded */
      const isFinal = m => m.status === 'final' || (m.scoreA != null && m.scoreB != null);

      /* next upcoming match */
      const nextMatch = myMatches.find(m => !isFinal(m));
      const nextOpp = nextMatch ? (nextMatch.teamA === team.name ? nextMatch.teamB : nextMatch.teamA) : null;

      /* ── HERO ── */
      const logoInner = team.photoUrl
        ? `<img src="${esc(team.photoUrl)}" alt="${esc(team.name)}">`
        : (team.emoji || initial(team.name));
      const logoTextCls = (!team.photoUrl && isTextLogo(team.emoji)) ? ' a-logo__mark--text' : '';
      const logoStyle = team.photoUrl ? '' : ` style="background:${team.color || avatarColor(team.name)}"`;

      let nextSub = '—', nextNum = '—';
      if (nextMatch) { nextNum = (fmtDate(nextMatch.scheduledAt) || `WK ${nextMatch.week}`).toUpperCase(); nextSub = `vs ${esc(nextOpp)}`; }
      else if (hasPlayed) { nextNum = 'DONE'; nextSub = 'Season complete'; }

      let hero = `
        <div class="tp-shell">
          <div class="a-hero">
            <div class="a-hero__top">
              <div class="a-logo">
                <div class="a-logo__mark${logoTextCls}"${logoStyle}>${logoInner}</div>
              </div>
              <div class="a-headline">
                <div class="a-eyebrow">Season 1</div>
                <h1 class="a-name">${esc(team.name)}</h1>
                <div class="a-callouts">
                  ${hasPlayed && rec?.rank ? `<div class="a-callout"><span class="a-callout__big num-lime">#${rec.rank}</span><span class="a-callout__lbl">Division Rank</span></div>` : ''}
                  ${teamDSR != null ? `<div class="a-callout"><span class="a-callout__big num-teal">${teamDSR}</span><span class="a-callout__lbl">Team DSR</span></div>` : ''}
                </div>
              </div>
            </div>
            <div class="a-statstrip">
              <div class="a-stat"><div class="a-stat__num num-green">${rec?.wins ?? 0}</div><div><div class="a-stat__lbl">Wins</div></div></div>
              <div class="a-stat"><div class="a-stat__num num-red">${rec?.losses ?? 0}</div><div><div class="a-stat__lbl">Losses</div>${rec?.ties ? `<div class="a-stat__sub">${rec.ties} tie${rec.ties === 1 ? '' : 's'}</div>` : ''}</div></div>
              <div class="a-stat"><div class="a-stat__num">${rec?.matchPointsFor ?? 0}</div><div><div class="a-stat__lbl">Match Pts</div>${hasPlayed ? `<div class="a-stat__sub">${sign((rec.matchPointsFor ?? 0) - (rec.matchPointsAgainst ?? 0))} diff</div>` : ''}</div></div>
              <div class="a-stat"><div class="a-stat__num num-teal" style="font-size:1.4rem;">${nextNum}</div><div><div class="a-stat__lbl">Next Match</div><div class="a-stat__sub">${nextSub}</div></div></div>
            </div>
          </div>
        </div>`;

      /* ── TAB BAR ── */
      hero += `
        <div class="tabbar"><div class="tabbar__in" id="tabbar">
          <button class="tab active" data-tab="overview"><span>Overview</span></button>
          <button class="tab" data-tab="stats"><span>Stats</span></button>
          <button class="tab" data-tab="schedule"><span>Schedule</span></button>
          <button class="tab" data-tab="history"><span><span class="t-full">Match History</span><span class="t-short">Matches</span></span></button>
          <button class="tab" data-tab="roster"><span>Roster</span></button>
        </div></div>`;

      /* ════════ PANELS ════════ */
      let panels = `<div class="panels">`;

      /* ── OVERVIEW ── */
      const topPlayers = myP.slice().sort((a,b) => (dsrByName[b.name] ?? -1) - (dsrByName[a.name] ?? -1)).slice(0, 5);
      panels += `<section class="panel active" data-panel="overview"><div class="two-col">`;

      // Player summary
      panels += `<div class="card"><div class="card-head"><h3>👥 Player Summary</h3>${topPlayers.length ? '<span class="pill">Top by DSR</span>' : ''}</div>`;
      if (!topPlayers.length) {
        panels += `<div class="tp-empty">Player stats appear once matches are played.</div>`;
      } else {
        topPlayers.forEach(p => {
          const role = p.isCaptain ? '<div class="psum-role cap">Captain 👑</div>' : p.isCoCaptain ? '<div class="psum-role co">Co-Captain ⭐</div>' : '<div class="psum-role">Player</div>';
          const d = dsrByName[p.name];
          panels += `<a class="psum-row" href="/player?team=${teamSlug}&name=${encodeURIComponent(p.name)}${LINK_SUFFIX}">
            ${avatarImg(p, 'psum-av')}
            <div class="psum-body"><div class="psum-name">${esc(shortName(p.name))}</div>${role}</div>
            ${d != null ? `<div class="psum-dsr"><div class="psum-dsr__n">${d}</div><div class="psum-dsr__l">DSR</div></div>` : ''}
            <div class="psum-more">View ›</div>
          </a>`;
        });
      }
      panels += `</div>`;

      // About
      panels += `<div class="card"><div class="card-head"><h3>ℹ️ About</h3></div>`;
      if (team.bio) panels += `<p class="about-p">${esc(team.bio)}</p>`;
      panels += `<div class="about-meta" style="${team.bio ? '' : 'border-top:none;margin-top:0;padding-top:0;'}">
        <div><div class="about-meta__l">Roster</div><div class="about-meta__v">${roster.length} player${roster.length === 1 ? '' : 's'}</div></div>
        ${captain ? `<div><div class="about-meta__l">Captain</div><div class="about-meta__v">${esc(shortName(captain.name))}</div></div>` : ''}
        ${coCaptain ? `<div><div class="about-meta__l">Co-Captain</div><div class="about-meta__v">${esc(shortName(coCaptain.name))}</div></div>` : ''}
        ${hasPlayed ? `<div><div class="about-meta__l">Record (W–T–L)</div><div class="about-meta__v">${rec.wins}–${rec.ties || 0}–${rec.losses}</div></div>` : ''}
        ${gamesWon != null ? `<div><div class="about-meta__l">Games Won</div><div class="about-meta__v">${gamesWon}–${gamesLost}</div></div>` : ''}
      </div></div>`;
      panels += `</div>`; // two-col

      // Season snapshot tiles
      if (hasPlayed) {
        const matchWin = pct(rec.wins, total);
        const gw = gamesWon ?? 0, gl = gamesLost ?? 0;
        const gameWin = pct(gw, gw + gl);
        panels += `<div class="card"><div class="card-head"><h3>📊 Season Snapshot</h3></div><div class="tile-row">
          <div class="tile"><div class="tile__v num-green">${rec.wins}</div><div class="tile__l">Wins</div></div>
          <div class="tile"><div class="tile__v num-red">${rec.losses}</div><div class="tile__l">Losses</div></div>
          <div class="tile"><div class="tile__v num-lime">${gw}</div><div class="tile__l">Games Won</div></div>
          <div class="tile"><div class="tile__v">${gl}</div><div class="tile__l">Games Lost</div></div>
          <div class="tile"><div class="tile__v num-teal">${matchWin}%</div><div class="tile__l">Match Win %</div></div>
          <div class="tile"><div class="tile__v">${gameWin}%</div><div class="tile__l">Game Win %</div></div>
        </div></div>`;
      }
      panels += `</section>`;

      /* ── STATS ── */
      panels += `<section class="panel" data-panel="stats"><div class="card">
        <div class="card-head"><h3>📈 Season Stats</h3></div>`;
      if (!hasPlayed && !myP.length) {
        panels += `<div class="tp-empty">Stats will populate once the season begins.</div>`;
      } else {
        const matchWin = hasPlayed ? pct(rec.wins, total) : 0;
        const gw = gamesWon ?? 0, gl = gamesLost ?? 0;
        const gameWin = pct(gw, gw + gl);
        panels += `<div class="subtabs" id="stat-subtabs">
          <button class="subtab active" data-sub="team">Team Totals</button>
          <button class="subtab" data-sub="players">Individual Players</button>
        </div>`;
        // team totals
        panels += `<div class="subdisp active" data-sub="team"><table class="tbl">
          <thead><tr><th>Team</th><th>Standing</th><th>W</th><th>L</th><th>Games</th><th>Pts</th><th>Match Win%</th><th>Game Win%</th></tr></thead>
          <tbody><tr>
            <td><div class="nm">${avatarTeam(team)}${esc(team.name)}</div></td>
            <td>${rec?.rank ? '#' + rec.rank : '—'}</td>
            <td>${rec?.wins ?? 0}</td>
            <td>${rec?.losses ?? 0}</td>
            <td>${gamesWon != null ? `${gw}–${gl}` : '—'}</td>
            <td>${rec?.matchPointsFor ?? 0}</td>
            <td>${hasPlayed ? matchWin + '%' : '—'}</td>
            <td>${(gw + gl) ? gameWin + '%' : '—'}</td>
          </tr></tbody></table></div>`;
        // individual players
        const sortedP = myP.slice().sort((a,b) => (dsrByName[b.name] ?? -1) - (dsrByName[a.name] ?? -1));
        panels += `<div class="subdisp" data-sub="players">`;
        if (!sortedP.length) {
          panels += `<div class="tp-empty">No individual stats yet.</div>`;
        } else {
          panels += `<table class="tbl">
            <thead><tr><th>Player</th><th>GP</th><th>W</th><th>L</th><th>Win%</th><th>DSR</th></tr></thead><tbody>`;
          sortedP.forEach(p => {
            const gl2 = p.gamesLost ?? (p.gamesPlayed - p.gamesWon);
            const d = dsrByName[p.name];
            panels += `<tr>
              <td><a class="nm" href="/player?team=${teamSlug}&name=${encodeURIComponent(p.name)}${LINK_SUFFIX}">${avatarImg(p, 'tbl-av')}${esc(shortName(p.name))}</a></td>
              <td>${p.gamesPlayed}</td><td>${p.gamesWon}</td><td>${gl2}</td><td>${pct(p.gamesWon, p.gamesPlayed)}%</td>
              <td style="color:var(--color-teal);">${d != null ? d : '—'}</td>
            </tr>`;
          });
          panels += `</tbody></table>`;
        }
        panels += `</div>`;
      }
      panels += `</div></section>`;

      /* ── SCHEDULE ── */
      const upcoming = myMatches.filter(m => !isFinal(m));
      const completed = myMatches.filter(isFinal).reverse();
      panels += `<section class="panel" data-panel="schedule">`;
      if (!myMatches.length) {
        panels += `<div class="card"><div class="tp-empty">Schedule will appear once the season begins.</div></div>`;
      } else {
        if (upcoming.length) {
          panels += `<div class="card"><div class="card-head"><h3>📅 Upcoming</h3></div>`;
          upcoming.forEach(m => {
            const isHome = m.teamA === team.name;
            const oppName = isHome ? m.teamB : m.teamA;
            const oppTeam = teams.find(t => t.name === oppName);
            const oppHref = oppTeam ? `/team?id=${slug(oppTeam.name)}${LINK_SUFFIX}` : '#';
            const dstr = fmtDate(m.scheduledAt);
            panels += `<div class="sched-row sched-row--up">
              <span class="sched-wk">WK ${m.week}</span>
              <a class="sched-opp" href="${oppHref}">vs ${esc(oppName)}${m.venue ? `<small>${esc(m.venue)}${m.court ? ' · Court ' + esc(m.court) : ''}</small>` : ''}</a>
              <span class="sched-when">${dstr || ''}${dstr ? '<br>' : ''}${matchStartLabel(m)}</span>
            </div>`;
          });
          panels += `</div>`;
        }
        if (completed.length) {
          panels += `<div class="card"><div class="card-head"><h3>✓ Completed</h3></div>`;
          completed.forEach(m => {
            const isHome = m.teamA === team.name;
            const oppName = isHome ? m.teamB : m.teamA;
            const oppTeam = teams.find(t => t.name === oppName);
            const oppHref = oppTeam ? `/team?id=${slug(oppTeam.name)}${LINK_SUFFIX}` : '#';
            const myPts = isHome ? m.scoreA : m.scoreB;
            const opPts = isHome ? m.scoreB : m.scoreA;
            const myG = isHome ? m.gamesA : m.gamesB;
            const opG = isHome ? m.gamesB : m.gamesA;
            const r = myPts > opPts ? 'w' : myPts < opPts ? 'l' : 't';
            panels += `<div class="sched-row">
              <span class="sched-wk">WK ${m.week}</span>
              <a class="sched-opp" href="${oppHref}">vs ${esc(oppName)}${(myG != null && opG != null) ? `<small>${myG}–${opG} games</small>` : ''}</a>
              <span class="sched-score">${myPts ?? '–'}–${opPts ?? '–'}</span>
              <span class="sched-res res-${r}">${r.toUpperCase()}</span>
            </div>`;
          });
          panels += `<div class="tp-empty" style="padding:10px 0 0;">Score = match points · games shown below opponent</div></div>`;
        }
      }
      panels += `</section>`;

      /* ── MATCH HISTORY ── */
      panels += `<section class="panel" data-panel="history"><div class="card">
        <div class="card-head"><h3>🗂️ Match History</h3><span class="pill pill--lime">Season 1</span></div>`;
      if (!completed.length) {
        panels += `<div class="tp-empty">No completed matches yet.</div>`;
      } else {
        completed.forEach(m => {
          const isHome = m.teamA === team.name;
          const oppName = isHome ? m.teamB : m.teamA;
          const oppTeam = teams.find(t => t.name === oppName);
          const oppHref = oppTeam ? `/team?id=${slug(oppTeam.name)}${LINK_SUFFIX}` : '#';
          const myPts = isHome ? m.scoreA : m.scoreB;
          const opPts = isHome ? m.scoreB : m.scoreA;
          const myG = isHome ? m.gamesA : m.gamesB;
          const opG = isHome ? m.gamesB : m.gamesA;
          const r = myPts > opPts ? 'w' : myPts < opPts ? 'l' : 't';
          const resLabel = r === 'w' ? `WON ${myPts}–${opPts}` : r === 'l' ? `LOST ${myPts}–${opPts}` : `TIE ${myPts}–${opPts}`;
          const dstr = fmtDate(m.scheduledAt);
          // round breakdown
          let rounds = '';
          [['R1', m.round1], ['R2', m.round2]].forEach(([lbl, rd]) => {
            if (!rd) return;
            const mh = isHome ? rd.homeGames : rd.awayGames;
            const oh = isHome ? rd.awayGames : rd.homeGames;
            const rr = mh > oh ? 'win' : mh < oh ? 'loss' : '';
            rounds += `<div class="mh__r ${rr}"><div class="l">Round ${lbl.slice(1)} · Games</div><div class="s">${mh}–${oh}</div></div>`;
          });
          if (myG != null && opG != null) {
            rounds += `<div class="mh__r ${myG > opG ? 'win' : myG < opG ? 'loss' : ''}"><div class="l">Total Games</div><div class="s">${myG}–${opG}</div></div>`;
          }
          if (m.pointsA != null && m.pointsB != null) {
            const mp = isHome ? m.pointsA : m.pointsB, op = isHome ? m.pointsB : m.pointsA;
            rounds += `<div class="mh__r"><div class="l">Total Rally Pts</div><div class="s">${mp}–${op}</div></div>`;
          }
          panels += `<div class="mh">
            <div class="mh__top">
              <a class="mh__opp" href="${oppHref}">vs ${esc(oppName)} <small>Week ${m.week}${dstr ? ' · ' + dstr : ''}${m.venue ? ' · ' + esc(m.venue) : ''}</small></a>
              <span class="sched-res res-${r}">${resLabel}</span>
            </div>
            ${rounds ? `<div class="mh__rounds">${rounds}</div>` : ''}
          </div>`;
        });
      }
      panels += `</div></section>`;

      /* ── ROSTER ── */
      const rosterMen   = roster.filter(p => p.gender === 'M');
      const rosterWomen = roster.filter(p => p.gender === 'F');
      const rosterOther = roster.filter(p => p.gender !== 'M' && p.gender !== 'F');
      const rcard = p => {
        const d = dsrByName[p.name];
        const role = p.isCaptain ? '<div class="rcard__role cap">Captain 👑</div>' : p.isCoCaptain ? '<div class="rcard__role co">Co-Captain ⭐</div>' : '<div class="rcard__role">Player</div>';
        const meta = p.dupr ? `<div class="rcard__meta">${esc(p.dupr)} DUPR</div>` : '';
        return `<a class="rcard" href="/player?team=${teamSlug}&name=${encodeURIComponent(p.name)}${LINK_SUFFIX}">
          ${avatarImg(p, 'rcard__av')}
          <div class="rcard__b">
            <div class="rcard__top"><span class="rcard__name">${esc(shortName(p.name))}</span>${d != null ? `<span class="rcard__dsr">${d}</span>` : ''}</div>
            ${role}${meta}
          </div>
        </a>`;
      };
      const rcol = (title, list) => list.length ? `<div class="roster-head">${title} <span class="pill">${list.length}</span></div><div class="roster-grid">${list.map(rcard).join('')}</div>` : '';
      panels += `<section class="panel" data-panel="roster"><div class="card">
        <div class="card-head"><h3>👥 Roster</h3><span class="pill">${roster.length} player${roster.length === 1 ? '' : 's'}</span></div>
        ${rcol('♂ Men', rosterMen)}
        ${rcol('♀ Women', rosterWomen)}
        ${rcol('Players', rosterOther)}
      </div></section>`;

      panels += `</div>`; // .panels

      document.getElementById('page-root').innerHTML = hero + panels;
      wireTabs();
    }

    function avatarTeam(team) {
      if (team.photoUrl) return `<div class="tbl-av"><img src="${esc(team.photoUrl)}" alt="${esc(team.name)}"></div>`;
      const txt = isTextLogo(team.emoji) ? esc(team.emoji).slice(0,2) : (team.emoji || initial(team.name));
      return `<div class="tbl-av" style="background:${team.color || avatarColor(team.name)};font-size:10px;">${txt}</div>`;
    }

    /* ─── Tab wiring ──────────────────────────────────────── */
    function wireTabs() {
      const bar = document.getElementById('tabbar');
      if (bar) bar.addEventListener('click', e => {
        const btn = e.target.closest('.tab'); if (!btn) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
        const id = btn.dataset.tab;
        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === id));
        const tb = document.querySelector('.tabbar');
        if (tb && tb.getBoundingClientRect().top < 0) tb.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      const sub = document.getElementById('stat-subtabs');
      if (sub) sub.addEventListener('click', e => {
        const btn = e.target.closest('.subtab'); if (!btn) return;
        document.querySelectorAll('.subtab').forEach(t => t.classList.toggle('active', t === btn));
        document.querySelectorAll('.subdisp').forEach(d => d.classList.toggle('active', d.dataset.sub === btn.dataset.sub));
      });
    }

    load();
  })();
  </script>
</body>
</html>
