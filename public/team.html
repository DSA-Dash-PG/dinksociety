<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team &middot; The Dink Society</title>
  <meta name="description" content="Team profile for The Dink Society pickleball league." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .profile-shell { max-width: var(--max-w); margin: 0 auto; padding: 80px var(--gutter) 80px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--color-text-faint);
      text-decoration: none; margin-bottom: var(--space-5);
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--color-text); }
    .back-link::before { content: '←'; }

    .team-hero {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-8) var(--space-6);
      margin-bottom: var(--space-4); display: flex; align-items: center; gap: var(--space-5);
    }
    .team-hero__emoji {
      font-size: 48px; width: 72px; height: 72px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--color-surface-2); border-radius: var(--radius-md);
    }
    .team-hero__body { flex: 1; min-width: 0; }
    .team-hero__eyebrow {
      font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--color-teal); margin-bottom: var(--space-2);
    }
    .team-hero__name {
      font-size: var(--text-3xl); font-weight: 800; text-transform: uppercase;
      margin: 0 0 var(--space-2); line-height: 1.1;
    }
    .team-hero__meta { display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: center; }
    .meta-pill {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: var(--radius-full); border: 1px solid var(--color-border);
      color: var(--color-text-faint); background: var(--color-surface-2);
    }
    .meta-pill--captain { color: var(--color-teal); border-color: var(--color-teal); background: var(--color-teal-dim); }

    .section-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-4);
    }
    .section-card__title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--color-text-faint); margin: 0 0 var(--space-4);
    }

    /* Record strip */
    .record-strip { display: flex; gap: var(--space-4); flex-wrap: wrap; }
    .record-stat { text-align: center; }
    .record-stat__val { font-size: var(--text-2xl); font-weight: 800; line-height: 1; }
    .record-stat__label { font-size: 10px; color: var(--color-text-faint); margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .record-stat__val--green { color: var(--color-lime); }
    .record-stat__val--red { color: var(--color-coral, #ff6b6b); }

    /* Roster */
    .roster-table { width: 100%; border-collapse: collapse; }
    .roster-table th {
      text-align: left; padding: 8px 0; font-size: 9px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--color-text-faint); font-weight: 600;
      border-bottom: 1px solid var(--color-border-strong);
    }
    .roster-table td { padding: 11px 0; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    .roster-table tr:last-child td { border-bottom: none; }
    .roster-table .numeric { text-align: right; font-variant-numeric: tabular-nums; }
    .player-name-link {
      font-size: 14px; font-weight: 600; color: var(--color-text);
      text-decoration: none; transition: color var(--transition);
    }
    .player-name-link:hover { color: var(--color-teal); }
    .captain-badge {
      font-size: 9px; font-weight: 700; color: var(--color-lime);
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 1px 6px; border-radius: 3px; background: var(--color-lime-ghost);
      margin-left: 8px; vertical-align: middle;
    }
    .dupr-val { font-size: 12px; color: var(--color-text-faint); font-variant-numeric: tabular-nums; }
    .gender-badge {
      font-size: 10px; font-weight: 600; color: var(--color-text-faint);
      padding: 2px 8px; border-radius: 3px; background: var(--color-surface-2);
      border: 1px solid var(--color-border);
    }

    .empty-state {
      text-align: center; padding: 40px 20px; font-size: 14px;
      color: var(--color-text-faint);
    }

    @media (max-width: 600px) {
      .team-hero { flex-direction: column; align-items: flex-start; gap: var(--space-4); padding: var(--space-6) var(--space-4); }
      .team-hero__name { font-size: clamp(1.5rem, 5vw, 2.5rem); }
      .roster-table .col-gender { display: none; }
    }
  </style>
</head>
<body data-page="team">
  <div data-partial="nav"></div>

  <div class="profile-shell">
    <a href="/teams" class="back-link">All Teams</a>

    <div id="hero-section">
      <div class="team-hero" style="justify-content:center;">
        <div class="empty-state">Loading team&hellip;</div>
      </div>
    </div>

    <div id="record-section" style="display:none;">
      <div class="section-card">
        <div class="section-card__title">Season Record</div>
        <div class="record-strip" id="record-strip"></div>
      </div>
    </div>

    <div id="roster-section" style="display:none;">
      <div class="section-card">
        <div class="section-card__title">Roster</div>
        <table class="roster-table">
          <thead>
            <tr>
              <th>Player</th>
              <th class="numeric">DUPR</th>
              <th class="col-gender" style="text-align:right;">Gender</th>
            </tr>
          </thead>
          <tbody id="roster-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const teamId = params.get('id') || '';

    async function load() {
      // Fetch teams
      let team = null;
      try {
        const r = await fetch('/.netlify/functions/public-teams?season=circuit-i');
        if (r.ok) {
          const data = await r.json();
          team = (data.teams || []).find(t => t.id === teamId);
        }
      } catch {}

      if (!team) {
        document.getElementById('hero-section').innerHTML =
          '<div class="empty-state">Team not found.</div>';
        return;
      }

      // Update page title
      document.title = `${team.name} · The Dink Society`;

      // Render hero
      const divLabel = team.divisionLabel || team.division || '';
      document.getElementById('hero-section').innerHTML = `
        <div class="team-hero">
          <div class="team-hero__emoji">${team.emoji || '🏓'}</div>
          <div class="team-hero__body">
            <div class="team-hero__eyebrow">Season 1 &mdash; ${esc(divLabel)}</div>
            <h1 class="team-hero__name">${esc(team.name)}</h1>
            <div class="team-hero__meta">
              <span class="meta-pill">${(team.roster || []).length} players</span>
              ${team.captain ? `<span class="meta-pill meta-pill--captain">Captain: ${esc(team.captain)}</span>` : ''}
            </div>
          </div>
        </div>`;

      // Render roster
      const roster = team.roster || [];
      if (roster.length) {
        const rows = roster.map(p => {
          const playerUrl = `/player?team=${encodeURIComponent(teamId)}&name=${encodeURIComponent(p.name || '')}`;
          const captainBadge = p.isCaptain ? '<span class="captain-badge">Captain</span>' : '';
          const dupr = p.dupr ? `<span class="dupr-val">${p.dupr}</span>` : '<span class="dupr-val">—</span>';
          const gender = p.gender ? `<span class="gender-badge">${esc(p.gender)}</span>` : '';
          return `<tr>
            <td><a href="${playerUrl}" class="player-name-link">${esc(p.name)}</a>${captainBadge}</td>
            <td class="numeric">${dupr}</td>
            <td class="col-gender" style="text-align:right;">${gender}</td>
          </tr>`;
        }).join('');
        document.getElementById('roster-body').innerHTML = rows;
        document.getElementById('roster-section').style.display = '';
      }

      // Try to load standings for this team
      try {
        const sr = await fetch('/.netlify/functions/public-standings?season=circuit-i');
        if (sr.ok) {
          const sd = await sr.json();
          if (!sd.empty && sd.divisions) {
            let teamRecord = null;
            for (const div of Object.values(sd.divisions)) {
              const match = (div.teams || []).find(t => t.teamId === teamId || t.teamName === team.name);
              if (match) { teamRecord = match; break; }
            }
            if (teamRecord) {
              document.getElementById('record-strip').innerHTML = `
                <div class="record-stat">
                  <div class="record-stat__val record-stat__val--green">${teamRecord.wins}</div>
                  <div class="record-stat__label">Wins</div>
                </div>
                <div class="record-stat">
                  <div class="record-stat__val record-stat__val--red">${teamRecord.losses}</div>
                  <div class="record-stat__label">Losses</div>
                </div>
                ${teamRecord.ties ? `<div class="record-stat"><div class="record-stat__val">${teamRecord.ties}</div><div class="record-stat__label">Ties</div></div>` : ''}
                <div class="record-stat">
                  <div class="record-stat__val">${teamRecord.matchPointsFor ?? '—'}</div>
                  <div class="record-stat__label">Match Pts</div>
                </div>
                <div class="record-stat">
                  <div class="record-stat__val">#${teamRecord.rank}</div>
                  <div class="record-stat__label">Rank</div>
                </div>`;
              document.getElementById('record-section').style.display = '';
            }
          }
        }
      } catch {}
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    load();
  </script>
</body>
</html>
