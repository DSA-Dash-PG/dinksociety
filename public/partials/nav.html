<script>
(function () {
  /* ── Drawer ── */
  var ham = document.getElementById('ds-nav-ham');
  var drawer = document.getElementById('ds-nav-drawer');
  var close = document.getElementById('ds-nav-drawer-close');
  var backdrop = document.getElementById('ds-nav-drawer-backdrop');

  function open() { drawer.classList.add('is-open'); ham.setAttribute('aria-expanded', 'true'); document.body.style.overflow = 'hidden'; }
  function shut() { drawer.classList.remove('is-open'); ham.setAttribute('aria-expanded', 'false'); document.body.style.overflow = ''; }

  if (ham) ham.addEventListener('click', open);
  if (close) close.addEventListener('click', shut);
  if (backdrop) backdrop.addEventListener('click', shut);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') shut(); });

  /* ── Active link ── */
  var page = document.body.getAttribute('data-page') || '';
  document.querySelectorAll('[data-nav]').forEach(function (a) {
    if (a.getAttribute('data-nav') === page) a.classList.add('is-active');
  });

  /* ── Theme toggle ── */
  var toggleBtn = document.getElementById('ds-theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-theme');
      if (current === 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('ds-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('ds-theme', 'light');
      }
    });
  }

  /* ── Nav scroll: transparent → solid ── */
  var nav = document.getElementById('ds-nav');
  var SOLID_THRESHOLD = 60;
  function checkScroll() {
    if (!nav) return;
    if (window.scrollY > SOLID_THRESHOLD) {
      nav.classList.add('is-solid');
    } else {
      nav.classList.remove('is-solid');
    }
  }
  window.addEventListener('scroll', checkScroll, { passive: true });
  checkScroll(); // run on load in case page is already scrolled

  /* ── Load circuit settings (public GET) ── */

  function _dsDate(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function _dsDay(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long' });
  }
  function _dsMonthYear(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  fetch('/.netlify/functions/admin-settings')
    .then(function (r) { return r.ok ? r.json() : fetch('/api/admin-settings').then(function(r2) { return r2.ok ? r2.json() : null; }); })
    .then(function (s) {
      if (!s) return;
      window.DS_SETTINGS = s;

      document.querySelectorAll('[data-circuit-label]').forEach(function (el) {
        el.textContent = s.circuitName || 'Season 1';
      });
      document.querySelectorAll('[data-circuit-venue]').forEach(function (el) {
        el.textContent = s.defaultVenue || '';
      });
      document.querySelectorAll('[data-team-fee]').forEach(function (el) {
        el.textContent = s.teamFee ? '$' + s.teamFee : '$650';
      });
      document.querySelectorAll('[data-agent-fee]').forEach(function (el) {
        el.textContent = s.agentFee || '$75';
      });
      document.querySelectorAll('[data-season-weeks]').forEach(function (el) {
        el.textContent = s.weeks || '8';
      });
      document.querySelectorAll('[data-match-time]').forEach(function (el) {
        el.textContent = s.matchTime || '7:00 PM';
      });
      if (s.startDate) {
        var startDate = _dsDate(s.startDate);
        var startDay  = _dsDay(s.startDate);
        var startMY   = _dsMonthYear(s.startDate);
        document.querySelectorAll('[data-start-date]').forEach(function (el) {
          el.textContent = startDate;
        });
        document.querySelectorAll('[data-start-day]').forEach(function (el) {
          el.textContent = startDay;
        });
        document.querySelectorAll('[data-start-day-plural]').forEach(function (el) {
          el.textContent = startDay + 's';
        });
        document.querySelectorAll('[data-start-month-year]').forEach(function (el) {
          el.textContent = startMY;
        });
      }
      var feeLabel = s.teamFee ? '$' + s.teamFee : '$650';
      var feeHtml = 'The full <strong>' + feeLabel + ' team fee</strong> is due at registration to confirm your spot.';
      document.querySelectorAll('[data-deposit-note]').forEach(function (el) {
        el.innerHTML = feeHtml;
      });
    })
    .catch(function () { /* settings not available, defaults stay */ });

  /* ── Register CTA visibility ──
     Hide every "Register" / "Reserve my spot" CTA when no season is
     accepting signups. public-seasons only returns seasons whose
     registration is not "closed", so an empty list = nothing to join.
     The buttons reappear automatically once a season opens again.
     Fails open: if the request errors, CTAs stay visible. */
  (function () {
    var REG_CTA_SEL = '.ds-nav-cta, .ds-nav-drawer-cta, [data-register-cta]';
    function setRegisterCTAs(show) {
      document.querySelectorAll(REG_CTA_SEL).forEach(function (el) {
        el.style.display = show ? '' : 'none';
      });
    }
    fetch('/.netlify/functions/public-seasons')
      .then(function (r) {
        if (r.ok) return r.json();
        return fetch('/api/public-seasons').then(function (r2) { return r2.ok ? r2.json() : null; });
      })
      .then(function (data) {
        if (!data) return; // request failed → leave CTAs visible
        var hasOpen = Array.isArray(data.seasons) && data.seasons.length > 0;
        if (!hasOpen) setRegisterCTAs(false);
      })
      .catch(function () { /* leave CTAs visible on error */ });
  })();

  /* ── Page hero background images ── */
  // Sub-pages use <div class="page-hero__bg" data-hero-slot="schedule">
  // This fetches from the site-images API and sets the background-image.
  // Slot names: schedule, standings, stats, teams, rules, gallery
  // These are admin-managed via the Site Images admin tab.
  var heroBg = document.querySelector('.page-hero__bg[data-hero-slot]');
  if (heroBg) {
    var slot = heroBg.getAttribute('data-hero-slot');
    fetch('/.netlify/functions/site-images-list')
      .then(function (r) { return r.ok ? r.json() : {}; })
      .then(function (slots) {
        var images = slots[slot];
        if (images && images.length > 0) {
          // Use the first image in the slot
          heroBg.style.backgroundImage = 'url(' + images[0].url + ')';
          heroBg.classList.remove('page-hero__bg--fallback');
        }
      })
      .catch(function () { /* fallback gradient stays */ });
  }
})();
</script>
