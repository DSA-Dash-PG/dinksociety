<!-- ═══════════════════════════════════════════════════════════
     nav.html — shared top navigation partial
     Night-Match design system · loaded by partials.js
     Transparent → solid on scroll
     ═══════════════════════════════════════════════════════════ -->
<nav class="ds-nav" id="ds-nav">
  <div class="ds-nav-inner">
    <a href="/" class="ds-nav-brand">
      <div class="ds-nav-brand-text">
        <strong>The Dink Society</strong>
        <small data-circuit-label>Season 1</small>
      </div>
    </a>

    <div class="ds-nav-links">
      <!-- Standard links are generated from NAV_ITEMS in the script below
           and inserted before the Player Login link. -->
      <a href="/me.html" data-nav="player" class="ds-nav-login" style="display:inline-flex;align-items:center;gap:6px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Player Login
      </a>
      <a href="/register.html" class="ds-nav-cta">Register</a>
    </div>

    <button class="ds-nav-theme-toggle" id="ds-theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>

    <button class="ds-nav-hamburger" id="ds-nav-ham" aria-label="Open menu" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<!-- Mobile drawer -->
<div class="ds-nav-drawer" id="ds-nav-drawer">
  <div class="ds-nav-drawer-backdrop" id="ds-nav-drawer-backdrop"></div>
  <div class="ds-nav-drawer-panel">
    <button class="ds-nav-drawer-close" id="ds-nav-drawer-close" aria-label="Close menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="ds-nav-drawer-links">
      <!-- Standard links are generated from NAV_ITEMS in the script below. -->
    </div>
    <a href="/me.html" class="ds-nav-drawer-login" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--color-border-strong,rgba(255,255,255,0.16));color:var(--color-text);font-weight:700;padding:13px;border-radius:9999px;text-decoration:none;margin-top:16px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Player Login
    </a>
    <a href="/register.html" class="ds-nav-drawer-cta">Register</a>
  </div>
</div>

<script>
(function () {
  /* ── Nav links: single source of truth ──
     Desktop nav and mobile drawer are both generated from this array, so
     adding/removing/renaming a nav item only happens here. Player Login and
     Register keep their own hardcoded markup (their styling differs per
     surface). This runs synchronously when the partial's scripts are
     re-executed, BEFORE partials.js calls highlightNav(), so the generated
     [data-nav] links are in place for active-state marking. */
  var NAV_ITEMS = [
    { href: '/',                 nav: 'home',        label: 'Home' },
    { href: '/drop.html',        nav: 'drop',        label: 'The Drop' },
    { href: '/schedule.html',    nav: 'schedule',    label: 'Schedule' },
    // Standings is a dropdown: the trigger links to the main table and the
    // panel lists the standings family of views (static submenu).
    { href: '/standings.html',   nav: 'standings',   label: 'Standings', mega: true, submenu: [
      { href: '/standings.html',            icon: '📊', label: 'Standings',              desc: 'The league table' },
      { href: '/head-to-head.html',         icon: '🤺', label: 'Head-to-Head',           desc: 'Who owns who' },
      { href: '/strength-of-schedule.html', icon: '🗓️', label: 'Strength of Schedule',   desc: 'How tough each slate is' },
      { href: '/ranking-trajectory.html',   icon: '📈', label: 'Team Ranking Trajectory', desc: 'Rank moves week by week' },
    ] },
    { href: '/leaderboard.html', nav: 'leaderboard', label: 'Leaderboard' },
    { href: '/the-nvz.html',     nav: 'nvz',         label: 'The NVZ' },
    // Teams is a mega-menu: the trigger links to /teams.html and a hover/tap
    // panel lists every team (populated dynamically from public-teams below).
    { href: '/teams.html',       nav: 'teams',       label: 'Teams', mega: true, dynamic: 'teams' },
    // Gallery is hidden until there are photos to show. To re-enable, just
    // un-comment this line — no other change needed.
    // { href: '/gallery.html',     nav: 'gallery',     label: 'Gallery' },
    { href: '/rules.html',       nav: 'rules',       label: 'Rules' },
  ];

  /* SVG chevron used by the mega trigger / drawer accordion. */
  var CHEV = '<svg class="ds-mega-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  var ARROW = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

  // A static submenu item (Standings family).
  function submenuItemHtml(s) {
    return '<a class="ds-mega-item" href="' + s.href + '">' +
      '<span class="ds-mega-item-ic">' + (s.icon || '') + '</span>' +
      '<span class="ds-mega-txt"><span class="ds-mega-nm">' + s.label + '</span>' +
        (s.desc ? '<span class="ds-mega-sub">' + s.desc + '</span>' : '') +
      '</span></a>';
  }

  // Desktop dropdown wrapper. Two flavours:
  //  · item.submenu  → static list of links (Standings)
  //  · item.dynamic  → grid populated from an API (Teams)
  function buildDesktopMega(item) {
    var wrap = document.createElement('div');
    wrap.className = 'ds-mega has-mega' + (item.submenu ? ' ds-mega--menu' : '');
    wrap.setAttribute('data-mega', item.nav);
    wrap.setAttribute('data-mega-href', item.href);
    var body, headLink;
    if (item.submenu) {
      body = '<div class="ds-mega-menu">' + item.submenu.map(submenuItemHtml).join('') + '</div>';
      headLink = '';
    } else {
      body = '<div class="ds-mega-grid" data-mega-grid><div class="ds-mega-msg">Loading teams&hellip;</div></div>';
      headLink = '<a href="' + item.href + '">All Teams' + ARROW + '</a>';
    }
    wrap.innerHTML =
      '<button class="ds-mega-trigger" data-nav="' + item.nav + '" aria-expanded="false" aria-haspopup="true">' +
        item.label + CHEV +
      '</button>' +
      '<div class="ds-mega-panel" role="menu">' +
        '<div class="ds-mega-head"><span class="ds-mega-lbl">' + item.label + '</span>' + headLink + '</div>' +
        body +
      '</div>';
    return wrap;
  }

  // Drawer (mobile) accordion. Same two flavours.
  function buildDrawerAcc(item) {
    var wrap = document.createElement('div');
    wrap.className = 'ds-drawer-acc';
    wrap.setAttribute('data-drawer-acc', item.nav);
    var body;
    if (item.submenu) {
      body = item.submenu.map(function (s) {
        return '<a href="' + s.href + '"><span class="ds-mega-item-ic">' + (s.icon || '') + '</span>' + s.label + '</a>';
      }).join('');
    } else {
      body = '<a href="' + item.href + '" class="ds-drawer-acc-all">All Teams &rarr;</a>';
    }
    wrap.innerHTML =
      '<button class="ds-drawer-acc-btn" data-nav="' + item.nav + '" aria-expanded="false">' +
        item.label + CHEV +
      '</button>' +
      '<div class="ds-drawer-acc-body" data-drawer-acc-body>' + body + '</div>';
    return wrap;
  }

  function buildNavLinks(container, beforeEl, surface) {
    if (!container) return;
    NAV_ITEMS.forEach(function (item) {
      var el;
      if (item.mega) {
        el = surface === 'drawer' ? buildDrawerAcc(item) : buildDesktopMega(item);
      } else {
        el = document.createElement('a');
        el.setAttribute('href', item.href);
        el.setAttribute('data-nav', item.nav);
        el.textContent = item.label;
      }
      container.insertBefore(el, beforeEl || null);
    });
  }

  var desktopLinks = document.querySelector('.ds-nav-links');
  buildNavLinks(desktopLinks, desktopLinks ? desktopLinks.querySelector('.ds-nav-login') : null, 'desktop');
  buildNavLinks(document.querySelector('.ds-nav-drawer-links'), null, 'drawer');

  /* ── Dropdown wiring (Standings + Teams) ──
     Hover-capable pointers: panel opens on hover (CSS), clicking the trigger
     navigates to the parent page. Touch / no-hover: tap toggles the panel
     (the parent page is reachable as the first item inside it). */
  (function wireMegas() {
    var canHover = window.matchMedia && window.matchMedia('(hover: hover)').matches;
    var megas = [].slice.call(document.querySelectorAll('.ds-mega'));

    megas.forEach(function (mega) {
      var trigger = mega.querySelector('.ds-mega-trigger');
      var href = mega.getAttribute('data-mega-href') || '/';
      if (!trigger) return;
      trigger.addEventListener('click', function (e) {
        if (canHover && !(e.metaKey || e.ctrlKey)) { location.href = href; return; }
        if (e.metaKey || e.ctrlKey) { location.href = href; return; }
        e.preventDefault();
        var willOpen = !mega.classList.contains('is-open');
        megas.forEach(function (m) { m.classList.remove('is-open'); var t = m.querySelector('.ds-mega-trigger'); if (t) t.setAttribute('aria-expanded', 'false'); });
        mega.classList.toggle('is-open', willOpen);
        trigger.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      });
    });

    document.addEventListener('click', function (e) {
      megas.forEach(function (mega) {
        if (!mega.contains(e.target)) {
          mega.classList.remove('is-open');
          var t = mega.querySelector('.ds-mega-trigger'); if (t) t.setAttribute('aria-expanded', 'false');
        }
      });
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') megas.forEach(function (mega) {
        mega.classList.remove('is-open');
        var t = mega.querySelector('.ds-mega-trigger'); if (t) t.setAttribute('aria-expanded', 'false');
      });
    });

    // Drawer accordions (all of them — Standings + Teams).
    document.querySelectorAll('.ds-drawer-acc').forEach(function (acc) {
      var accBtn = acc.querySelector('.ds-drawer-acc-btn');
      if (!accBtn) return;
      accBtn.addEventListener('click', function () {
        var isOpen = acc.classList.toggle('is-open');
        accBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    });

    // ── Populate the Teams dropdown from public-teams ──
    var SEASON_ID = new URLSearchParams(location.search).get('season') || 'circuit-i';
    var SUFFIX = SEASON_ID === 'circuit-i' ? '' : '&season=' + encodeURIComponent(SEASON_ID);
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }
    function slugify(s) { return String(s == null ? '' : s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
    function logoHtml(t) {
      var color = t.color || '#b8ff2c';
      if (t.photoUrl) {
        return '<span class="ds-mega-logo" style="background-image:url(\'' + esc(t.photoUrl) + '\');background-size:cover;background-position:center;"></span>';
      }
      return '<span class="ds-mega-logo" style="background:radial-gradient(120% 120% at 50% 25%, ' + esc(color) + '33 0%, var(--color-surface-2) 75%)">' + esc(t.emoji || '🏓') + '</span>';
    }

    fetch('/.netlify/functions/public-teams?season=' + encodeURIComponent(SEASON_ID))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        var teams = (data && data.teams) || [];
        teams = teams.slice().sort(function (a, b) { return String(a.name).localeCompare(String(b.name)); });

        var grid = document.querySelector('.ds-mega-grid[data-mega-grid]');
        var accBody = document.querySelector('.ds-drawer-acc-body[data-drawer-acc-body]');

        if (!teams.length) {
          if (grid) grid.innerHTML = '<div class="ds-mega-msg">No teams yet.</div>';
          return;
        }

        // Only show the division sub-label when teams actually span >1 division
        // (a single-division season would otherwise repeat the same label).
        var divs = {};
        teams.forEach(function (t) { divs[t.divisionLabel || t.division || ''] = 1; });
        var showSub = Object.keys(divs).filter(Boolean).length > 1;

        if (grid) {
          grid.innerHTML = teams.map(function (t) {
            var url = '/team?id=' + slugify(t.name) + SUFFIX;
            var sub = showSub ? (t.divisionLabel || t.division || '') : '';
            return '<a class="ds-mega-team" href="' + url + '">' + logoHtml(t) +
              '<span class="ds-mega-txt"><span class="ds-mega-nm">' + esc(t.name) + '</span>' +
              (sub ? '<span class="ds-mega-sub">' + esc(sub) + '</span>' : '') +
              '</span></a>';
          }).join('');
        }
        if (accBody) {
          var allLink = accBody.querySelector('.ds-drawer-acc-all');
          var html = teams.map(function (t) {
            var url = '/team?id=' + slugify(t.name) + SUFFIX;
            return '<a href="' + url + '">' + logoHtml(t) + esc(t.name) + '</a>';
          }).join('');
          accBody.insertAdjacentHTML('beforeend', html);
          if (allLink) accBody.insertBefore(allLink, accBody.firstChild); // keep "All Teams" on top
        }
      })
      .catch(function () {
        var grid = document.querySelector('.ds-mega-grid[data-mega-grid]');
        if (grid) grid.innerHTML = '<div class="ds-mega-msg"><a href="/teams.html" style="color:var(--color-lime);">View all teams &rarr;</a></div>';
      });
  })();

  /* ── Drawer ── */
  var ham = document.getElementById('ds-nav-ham');
  var drawer = document.getElementById('ds-nav-drawer');
  var close = document.getElementById('ds-nav-drawer-close');
  var backdrop = document.getElementById('ds-nav-drawer-backdrop');

  function open() { drawer.classList.add('is-open'); ham.setAttribute('aria-expanded', 'true'); document.body.style.overflow = 'hidden'; }
  function shut() { drawer.classList.remove('is-open'); ham.setAttribute('aria-expanded', 'false'); document.body.style.overflow = ''; }

  if (ham) ham.addEventListener('click', open);
  if (close) close.addEventListener('click', shut);
  if (backdrop) backdrop.addEventListener('click', shut);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') shut(); });

  /* ── Theme toggle ── */
  var toggleBtn = document.getElementById('ds-theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-theme');
      if (current === 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('ds-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('ds-theme', 'light');
      }
    });
  }

  /* ── Nav scroll: transparent → solid ── */
  var nav = document.getElementById('ds-nav');
  var SOLID_THRESHOLD = 60;
  function checkScroll() {
    if (!nav) return;
    if (window.scrollY > SOLID_THRESHOLD) {
      nav.classList.add('is-solid');
    } else {
      nav.classList.remove('is-solid');
    }
  }
  window.addEventListener('scroll', checkScroll, { passive: true });
  checkScroll(); // run on load in case page is already scrolled

  /* ── Load circuit settings (public GET) ── */

  function _dsDate(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function _dsDay(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long' });
  }
  function _dsMonthYear(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  (async function () {
      // Shared settings promise created in js/partials.js — no second fetch.
      var s = await window.DS_SETTINGS;
      if (!s) return;
      // Replace the promise with the resolved object so synchronous readers
      // (window.DS_SETTINGS.circuitName etc.) keep working as before.
      window.DS_SETTINGS = s;

      document.querySelectorAll('[data-circuit-label]').forEach(function (el) {
        el.textContent = s.circuitName || 'Season 1';
      });
      document.querySelectorAll('[data-circuit-venue]').forEach(function (el) {
        el.textContent = s.defaultVenue || '';
      });
      document.querySelectorAll('[data-team-fee]').forEach(function (el) {
        el.textContent = s.teamFee ? '$' + s.teamFee : '$650';
      });
      document.querySelectorAll('[data-agent-fee]').forEach(function (el) {
        el.textContent = s.agentFee || '$75';
      });
      document.querySelectorAll('[data-season-weeks]').forEach(function (el) {
        el.textContent = s.weeks || '8';
      });
      document.querySelectorAll('[data-match-time]').forEach(function (el) {
        el.textContent = s.matchTime || '7:00 PM';
      });
      if (s.startDate) {
        var startDate = _dsDate(s.startDate);
        var startDay  = _dsDay(s.startDate);
        var startMY   = _dsMonthYear(s.startDate);
        document.querySelectorAll('[data-start-date]').forEach(function (el) {
          el.textContent = startDate;
        });
        document.querySelectorAll('[data-start-day]').forEach(function (el) {
          el.textContent = startDay;
        });
        document.querySelectorAll('[data-start-day-plural]').forEach(function (el) {
          el.textContent = startDay + 's';
        });
        document.querySelectorAll('[data-start-month-year]').forEach(function (el) {
          el.textContent = startMY;
        });
      }
      var feeLabel = s.teamFee ? '$' + s.teamFee : '$650';
      var feeHtml = 'The full <strong>' + feeLabel + ' team fee</strong> is due at registration to confirm your spot.';
      document.querySelectorAll('[data-deposit-note]').forEach(function (el) {
        el.innerHTML = feeHtml;
      });
  })().catch(function () { /* settings not available, defaults stay */ });

  /* ── Register CTA visibility ──
     Hide every "Register" / "Reserve my spot" CTA when no season is
     accepting signups. public-seasons only returns seasons whose
     registration is not "closed", so an empty list = nothing to join.
     The buttons reappear automatically once a season opens again.
     Fails open: if the request errors, CTAs stay visible. */
  (function () {
    var REG_CTA_SEL = '.ds-nav-cta, .ds-nav-drawer-cta, [data-register-cta]';
    function setRegisterCTAs(show) {
      document.querySelectorAll(REG_CTA_SEL).forEach(function (el) {
        el.style.display = show ? '' : 'none';
      });
    }
    fetch('/.netlify/functions/public-seasons')
      .then(function (r) {
        if (r.ok) return r.json();
        return fetch('/api/public-seasons').then(function (r2) { return r2.ok ? r2.json() : null; });
      })
      .then(function (data) {
        if (!data) return; // request failed → leave CTAs visible
        var hasOpen = Array.isArray(data.seasons) && data.seasons.length > 0;
        if (!hasOpen) setRegisterCTAs(false);
      })
      .catch(function () { /* leave CTAs visible on error */ });
  })();

  /* ── Page hero background images ── */
  // Sub-pages use <div class="page-hero__bg" data-hero-slot="schedule">
  // This fetches from the site-images API and sets the background-image.
  // Slot names: schedule, standings, stats, teams, rules, gallery
  // These are admin-managed via the Site Images admin tab.
  var heroBg = document.querySelector('.page-hero__bg[data-hero-slot]');
  if (heroBg) {
    var slot = heroBg.getAttribute('data-hero-slot');
    fetch('/.netlify/functions/site-images-list')
      .then(function (r) { return r.ok ? r.json() : {}; })
      .then(function (slots) {
        var images = slots[slot];
        if (images && images.length > 0) {
          // Use the first image in the slot
          heroBg.style.backgroundImage = 'url(' + images[0].url + ')';
          heroBg.classList.remove('page-hero__bg--fallback');
        }
      })
      .catch(function () { /* fallback gradient stays */ });
  }
})();
</script>
