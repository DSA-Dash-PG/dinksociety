<script>
(function () {
  /* ── Drawer ── */
  var ham = document.getElementById('ds-nav-ham');
  var drawer = document.getElementById('ds-nav-drawer');
  var close = document.getElementById('ds-nav-drawer-close');
  var backdrop = document.getElementById('ds-nav-drawer-backdrop');

  function open() { drawer.classList.add('is-open'); ham.setAttribute('aria-expanded', 'true'); document.body.style.overflow = 'hidden'; }
  function shut() { drawer.classList.remove('is-open'); ham.setAttribute('aria-expanded', 'false'); document.body.style.overflow = ''; }

  if (ham) ham.addEventListener('click', open);
  if (close) close.addEventListener('click', shut);
  if (backdrop) backdrop.addEventListener('click', shut);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') shut(); });

  /* ── Active link ── */
  var page = document.body.getAttribute('data-page') || '';
  document.querySelectorAll('[data-nav]').forEach(function (a) {
    if (a.getAttribute('data-nav') === page) a.classList.add('is-active');
  });

  /* ── Theme toggle ── */
  var toggleBtn = document.getElementById('ds-theme-toggle');
  /* ── Theme toggle ── */
  var toggleBtn = document.getElementById('ds-theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
      var isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('ds-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('ds-theme', 'light');
      }
    });
  }

  /* ── Load circuit settings (public GET) ── */
  fetch('/.netlify/functions/admin-settings')
    .then(function (r) { return r.ok ? r.json() : fetch('/api/admin-settings').then(function(r2) { return r2.ok ? r2.json() : null; }); })
    .then(function (s) {
      if (!s) return;
      document.querySelectorAll('[data-circuit-label]').forEach(function (el) {
        el.textContent = s.circuitName || 'Circuit I';
      });
      document.querySelectorAll('[data-circuit-venue]').forEach(function (el) {
        el.textContent = s.defaultVenue || '';
      });
      document.querySelectorAll('[data-team-fee]').forEach(function (el) {
        el.textContent = s.teamFee || '$450';
      });
      document.querySelectorAll('[data-agent-fee]').forEach(function (el) {
        el.textContent = s.agentFee || '$75';
      });
    })
    .catch(function () { /* settings not available, defaults stay */ });
})();
</script>
