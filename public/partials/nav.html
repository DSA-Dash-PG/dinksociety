        <path d="M36 10V62" stroke="currentColor" stroke-width="3"/>
        <path d="M12 25H60" stroke="currentColor" stroke-width="3"/>
        <path d="M12 47H60" stroke="currentColor" stroke-width="3"/>
      </svg>
      <span class="ds-nav-brand-text">
        <strong>Dink Society</strong>

      </span>
    </a>

    <div class="ds-nav-links">
      <a href="/">Home</a>
      <a href="/leaderboard.html">Standings</a>
      <a href="/moments.html">Moments</a>
      <a href="/rules.html">Rules</a>
      <a href="/captain.html">Captain</a>

    </div>

    <div style="display: flex; align-items: center; gap: var(--space-2);">
      <button class="ds-nav-theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="ds-nav-hamburger" aria-label="Open menu" data-drawer-open>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>

<!-- Mobile drawer -->
<div class="ds-nav-drawer" id="nav-drawer">
  <div class="ds-nav-drawer-backdrop" data-drawer-close></div>
  <div class="ds-nav-drawer-panel">
    <button class="ds-nav-drawer-close" aria-label="Close menu" data-drawer-close>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="ds-nav-drawer-links">
      <a href="/">Home</a>
      <a href="/leaderboard.html">Standings</a>
      <a href="/moments.html">Moments</a>
      <a href="/rules.html">Rules</a>
      <a href="/captain.html">Captain Portal</a>
    </div>
    <a href="/register.html" class="ds-nav-drawer-cta">Start a Team — $450</a>
  </div>
</div>

<script>
(function() {
  // ── Theme toggle ──────────────────────────────────────────
  const toggle = document.getElementById('theme-toggle');
  const root = document.documentElement;

  // Determine initial theme: saved preference > system preference > dark default
  const saved = localStorage.getItem('ds-theme');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let theme = saved || (systemDark ? 'dark' : 'light');
  root.setAttribute('data-theme', theme);
  updateToggleIcon(theme);

  if (toggle) {
    toggle.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
      localStorage.setItem('ds-theme', theme);
      updateToggleIcon(theme);
    });
  }

  function updateToggleIcon(t) {
    if (!toggle) return;
    toggle.querySelector('.icon-sun').style.display = t === 'dark' ? 'block' : 'none';
    toggle.querySelector('.icon-moon').style.display = t === 'light' ? 'block' : 'none';
    toggle.setAttribute('aria-label', 'Switch to ' + (t === 'dark' ? 'light' : 'dark') + ' mode');
  }

  // ── Highlight current page ────────────────────────────────
  const path = window.location.pathname;
  document.querySelectorAll('.ds-nav-links a, .ds-nav-drawer-links a').forEach(a => {
    const href = a.getAttribute('href');
    if (href === path || (href === '/' && (path === '/' || path === '/index.html'))) {
      a.classList.add('is-active');
    }
  });

  // ── Drawer open/close ─────────────────────────────────────
  const drawer = document.getElementById('nav-drawer');
  if (!drawer) return;

  document.querySelectorAll('[data-drawer-open]').forEach(btn => {
    btn.addEventListener('click', () => {
      drawer.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    });
  });
  document.querySelectorAll('[data-drawer-close]').forEach(btn => {
    btn.addEventListener('click', () => {
      drawer.classList.remove('is-open');
      document.body.style.overflow = '';
    });
  });

  // Close on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && drawer.classList.contains('is-open')) {
      drawer.classList.remove('is-open');
      document.body.style.overflow = '';
    }
  });
})();
</script>
