<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule · The Dink Society</title>
  <meta name="description" content="Weekly match schedule for The Dink Society pickleball league." />
  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Schedule · The Dink Society" />
  <meta property="og:description" content="Weekly match schedule for The Dink Society pickleball league." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Dink Society" />
  <meta property="og:url" content="https://dinksociety.app/schedule" />
  <meta property="og:image" content="https://dinksociety.app/img/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Schedule · The Dink Society" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Schedule · The Dink Society" />
  <meta name="twitter:description" content="Weekly match schedule for The Dink Society pickleball league." />
  <meta name="twitter:image" content="https://dinksociety.app/img/og-image.png" />

  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    /* ── Shell ───────────────────────────────────────────────────── */
    .sched-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }

    /* ── Date strip ──────────────────────────────────────────────── */
    .date-strip {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-4) var(--space-6);
      margin-bottom: var(--space-3);
    }
    .strip-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--color-text-faint); margin-bottom: var(--space-2);
    }
    .pills-scroll {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .pills-scroll::-webkit-scrollbar { display: none; }
    .date-pill {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 5px 12px; font-size: 11px;
      font-weight: 600; color: var(--color-text-muted); white-space: nowrap;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      cursor: pointer; transition: all var(--transition);
    }
    .date-pill:hover { border-color: var(--color-border-strong); color: var(--color-text); }
    .date-pill .wk { font-size: 9px; color: var(--color-text-faint); font-weight: 700; letter-spacing: 0.08em; }
    .date-pill.is-next { border-color: var(--color-lime); color: var(--color-lime); background: var(--color-lime-ghost); }
    .date-pill.is-next .wk { color: var(--color-lime-active); }
    .date-pill.is-past { opacity: 0.4; }
    .date-pill.is-past:hover { opacity: 0.7; }
    .date-pill.is-selected {
      border-color: var(--color-lime); color: var(--color-bg);
      background: var(--color-lime); opacity: 1;
    }
    .date-pill.is-selected .wk { color: var(--color-bg); opacity: 0.7; }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .sched-toolbar { display: flex; justify-content: flex-end; margin-bottom: var(--space-3); }
    .sched-collapse-btn {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 6px 16px; font-size: 12px;
      font-family: inherit; color: var(--color-text-muted); cursor: pointer;
      transition: all var(--transition);
    }
    .sched-collapse-btn:hover { border-color: var(--color-border-strong); color: var(--color-text); }

    /* ── Week cards ──────────────────────────────────────────────── */
    .week-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); margin-bottom: var(--space-2);
      overflow: hidden; transition: border-color var(--transition);
    }
    .week-card:hover { border-color: var(--color-border-strong); }
    .week-card.is-past { opacity: 0.65; }
    .week-card.is-past:hover { opacity: 1; }

    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4) var(--space-6); cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--color-divider);
    }
    .week-card.is-collapsed .week-header { border-bottom: none; }

    .week-left { display: flex; align-items: baseline; gap: 12px; }
    .week-num { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-text-faint); }
    .week-date-text { font-size: 15px; font-weight: 700; color: var(--color-text); }
    .week-time-text { font-size: 12px; color: var(--color-text-faint); }

    .week-right { display: flex; align-items: center; gap: 10px; }
    .week-badge {
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: var(--radius-full);
      border: 1px solid var(--color-border); color: var(--color-text-faint);
      background: var(--color-surface-2);
    }
    .week-badge.is-next { background: var(--color-lime-ghost); color: var(--color-lime); border-color: rgba(184,255,44,0.3); }
    .week-badge.is-live {
      background: var(--color-lime); color: var(--color-bg); border-color: var(--color-lime);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .week-badge.is-live .ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-bg); animation: ds-pulse 1.1s infinite; }
    @keyframes ds-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

    .week-chevron { font-size: 16px; color: var(--color-text-faint); transition: transform 0.2s ease; line-height: 1; flex-shrink: 0; }
    .week-card.is-collapsed .week-chevron { transform: rotate(-90deg); }

    /* ── Week body ───────────────────────────────────────────────── */
    .week-body { padding: var(--space-5) var(--space-6) var(--space-6); }
    .week-card.is-collapsed .week-body { display: none; }

    .week-collapsed-summary { display: none; padding: var(--space-2) var(--space-6) var(--space-3); font-size: 12px; color: var(--color-text-faint); }
    .week-card.is-collapsed .week-collapsed-summary { display: block; }

    /* ── Matches grid ────────────────────────────────────────────── */
    .matches-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .match-entry {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* card top: court + status */
    .match-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-bottom: 1px solid var(--color-divider);
    }
    .match-court {
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-text-faint); display: flex; align-items: center; gap: 6px;
    }
    .court-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .match-badge {
      font-size: 9.5px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: var(--radius-full);
      border: 1px solid var(--color-border); color: var(--color-text-faint);
    }
    .match-badge.is-final { color: var(--color-teal); border-color: rgba(45,212,191,0.4); }
    .match-badge.is-next  { color: var(--color-lime); border-color: rgba(184,255,44,0.4); }
    .match-badge.is-live  {
      color: var(--color-bg); background: var(--color-lime); border-color: var(--color-lime);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .match-badge.is-live .ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-bg); animation: ds-pulse 1.1s infinite; }

    /* matchup: home | center | away */
    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 8px; padding: 16px 12px 12px; }
    .m-side { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; min-width: 0; }
    .m-seed {
      font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
      padding: 2px 8px; border-radius: 5px;
    }
    .m-seed.home { background: var(--color-lime-ghost); color: var(--color-lime); }
    .m-seed.away { background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); }
    .m-logo { font-size: 28px; line-height: 1; height: 30px; display: flex; align-items: center; }
    .m-logo--mono {
      width: 30px; height: 30px; border-radius: 50%; font-size: 13px; font-weight: 800;
      color: var(--color-text-muted); background: var(--color-surface); border: 1px solid var(--color-border);
      justify-content: center;
    }
    .m-team {
      font-size: 13px; font-weight: 700; color: var(--color-text); line-height: 1.25;
      text-decoration: none;
    }
    a.m-team:hover { color: var(--color-lime); }
    .m-side.is-winner .m-team { color: var(--color-lime); }
    .m-team.is-tbd { color: var(--color-text-faint); font-weight: 500; }

    .m-center { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 78px; padding-top: 16px; }
    .m-tally { font-size: 22px; font-weight: 800; color: var(--color-text); line-height: 1; font-variant-numeric: tabular-nums; }
    .m-tally .w { color: var(--color-lime); }
    .m-tally .dash { color: var(--color-text-faint); margin: 0 3px; }
    .m-sub { font-size: 10px; color: var(--color-text-faint); font-variant-numeric: tabular-nums; }
    .m-result { font-size: 10px; font-weight: 700; color: var(--color-text-muted); margin-top: 1px; max-width: 90px; line-height: 1.2; }
    .m-result.tie { color: #e0b34a; }
    .m-center.up .m-vs { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; color: var(--color-text-faint); }
    .m-center.up .m-start { font-size: 10px; color: var(--color-text-faint); margin-top: 3px; }

    /* serve / side rules */
    .m-serves { margin: 0 12px 12px; border: 1px solid var(--color-divider); border-radius: 9px; overflow: hidden; }
    .m-srow { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 11px; color: var(--color-text-muted); line-height: 1.3; }
    .m-srow + .m-srow { border-top: 1px solid var(--color-divider); }
    .m-rtag {
      flex: 0 0 auto; font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 5px; background: var(--color-lime-ghost); color: var(--color-lime);
    }
    .m-rtag.r2 { background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); }
    .m-srow b { color: var(--color-text); font-weight: 600; }
    .m-srow .act { color: var(--color-lime-active, var(--color-lime)); font-weight: 700; }
    .m-srow .act.side { color: var(--color-text-muted); }

    /* show-scores toggle + lazy body */
    .m-toggle {
      margin-top: auto; width: 100%; background: transparent; border: none;
      border-top: 1px solid var(--color-divider); color: var(--color-text-muted);
      padding: 11px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: color var(--transition);
    }
    .m-toggle:hover { color: var(--color-lime); }
    .m-toggle .chev { transition: transform 0.2s ease; }
    .match-entry.is-open .m-toggle .chev { transform: rotate(180deg); }
    .m-scorebody { display: none; border-top: 1px solid var(--color-divider); padding: 4px 12px 14px; }
    .match-entry.is-open .m-scorebody { display: block; }
    .m-loading { padding: 14px; text-align: center; font-size: 12px; color: var(--color-text-faint); }

    /* round + zebra games */
    .m-round { margin-top: 12px; }
    .m-round-head { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .m-round-label {
      font-size: 9.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-bg); background: var(--color-lime); padding: 3px 9px; border-radius: var(--radius-full);
    }
    .m-round-label.r2 { background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); }
    .m-games { border: 1px solid var(--color-divider); border-radius: 8px; overflow: hidden; }
    .m-game { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 7px 9px; font-size: 11.5px; }
    .m-game:nth-child(odd) { background: var(--color-surface); }
    .m-game .pl { color: var(--color-text-muted); line-height: 1.25; }
    .m-game .pl.right { text-align: right; }
    .m-game .mid { display: flex; flex-direction: column; align-items: center; min-width: 56px; }
    .m-game .gtype { font-size: 8px; font-weight: 800; letter-spacing: 0.06em; color: var(--color-text-faint); }
    .m-game .gnum { font-weight: 800; font-variant-numeric: tabular-nums; font-size: 13px; white-space: nowrap; }
    .m-game .gnum .w { color: var(--color-lime); }
    .m-game .gnum .l { color: var(--color-text-faint); }
    .m-game .gnum .dash { color: var(--color-text-faint); margin: 0 2px; }
    .m-round-sum {
      display: flex; justify-content: space-between; align-items: center; margin-top: 7px;
      padding: 7px 11px; border-radius: 7px; background: var(--color-surface);
      font-size: 10.5px; color: var(--color-text-muted);
    }
    .m-round-sum .b { font-weight: 800; color: var(--color-text); font-variant-numeric: tabular-nums; }

    /* ── Placeholder / empty ─────────────────────────────────────── */
    .week-tbd { text-align: center; padding: var(--space-6) 0 var(--space-2); font-size: 13px; color: var(--color-text-faint); }
    .empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--color-text-faint); }

    /* ── Mobile ──────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      .date-strip { padding: var(--space-3) var(--space-4); }
      .week-header { padding: var(--space-3) var(--space-4); }
      .week-left { flex-direction: column; align-items: flex-start; gap: 2px; }
      .week-time-text { display: none; }
      .week-body { padding: var(--space-3) var(--space-4) var(--space-5); }
      .week-collapsed-summary { padding: var(--space-2) var(--space-4) var(--space-3); }
      .matches-grid { grid-template-columns: 1fr; }
      .sched-toolbar { margin-bottom: var(--space-2); }
    }
  </style>
</head>
<body data-page="schedule">
  <div data-partial="nav"></div>
  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="schedule"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow"><span data-circuit-label>Season 1</span> · <span data-start-month-year>June 2026</span></div>
      <h1 class="page-hero__title">Schedule</h1>
    </div>
  </div>

  <main class="sched-shell">

    <div class="date-strip">
      <div class="strip-label">Game nights</div>
      <div class="pills-scroll" id="date-pills"></div>
    </div>

    <div class="sched-toolbar">
      <button class="sched-collapse-btn" id="collapse-btn">Collapse past weeks</button>
    </div>

    <div id="weeks-list"></div>

  </main>
  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    /* ── Constants ───────────────────────────────────────────────── */
    const SEASON_START = new Date('2026-06-08T00:00:00');
    const TOTAL_WEEKS  = 8;
    const MATCH_START_TIME = '7:00 PM';   // single start time for all matches

    // Fixed court-set order + presentation. A = 1&2, B = 3&6, C = 5&7.
    const COURT_SET_ORDER = { A: 0, B: 1, C: 2 };
    const COURT_SET_META = {
      A: { label: 'Courts 1 & 2', color: '#4a7c9e' },
      B: { label: 'Courts 3 & 6', color: '#7c4a9e' },
      C: { label: 'Courts 5 & 7', color: '#9e7c4a' },
    };
    const FALLBACK_COLORS = ['#4a7c9e', '#7c4a9e', '#9e7c4a'];

    let scheduleData  = null;
    let pastCollapsed = false;
    let selectedWeek  = null;
    const detailCache = {};   // matchId → loaded game detail (or 'error')

    const $id = id => document.getElementById(id);

    /* ── Week date helpers ───────────────────────────────────────── */
    function weekDate(n) {
      const d = new Date(SEASON_START);
      d.setDate(d.getDate() + (n - 1) * 7);
      return d;
    }
    function weekNightDate(n, weeksData) {
      const wData = weeksData?.find(w => w.week === n);
      const firstMatch = wData?.matches?.[0];
      const dt = firstMatch?.date || firstMatch?.scheduledAt;
      return dt ? new Date(dt) : weekDate(n);
    }
    function isWeekPast(n, weeksData) {
      const d = weekNightDate(n, weeksData);
      const endOfGameNight = new Date(d);
      endOfGameNight.setHours(23, 59, 59, 999);
      return endOfGameNight < new Date();
    }
    function isWeekToday(n, weeksData) {
      const d = weekNightDate(n, weeksData);
      const now = new Date();
      return d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
    }
    function nextWeekNum(weeksData) {
      for (let n = 1; n <= TOTAL_WEEKS; n++) {
        if (!isWeekPast(n, weeksData)) return n;
      }
      return null;
    }
    function formatWeekDate(n, weeksData) {
      return weekNightDate(n, weeksData).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    function formatPillDate(n, weeksData) {
      return weekNightDate(n, weeksData).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    /* ── Render date strip ───────────────────────────────────────── */
    function renderDateStrip(weeksData) {
      const nextWk = nextWeekNum(weeksData);
      $id('date-pills').innerHTML = Array.from({ length: TOTAL_WEEKS }, (_, i) => {
        const n = i + 1;
        const past = isWeekPast(n, weeksData);
        const next = n === nextWk;
        const sel  = n === selectedWeek;
        const cls  = (sel ? 'date-pill is-selected' : next ? 'date-pill is-next' : past ? 'date-pill is-past' : 'date-pill');
        return `<div class="${cls}" data-week="${n}"><span class="wk">WK ${n}</span>${formatPillDate(n, weeksData)}</div>`;
      }).join('');
    }

    /* ── Render all weeks ────────────────────────────────────────── */
    function renderAllWeeks(weeksData) {
      const nextWk = nextWeekNum(weeksData);
      const weekNums = Array.from({ length: TOTAL_WEEKS }, (_, i) => i + 1)
        .filter(n => selectedWeek == null || n === selectedWeek);

      $id('weeks-list').innerHTML = weekNums.map(n => {
        const past = isWeekPast(n, weeksData);
        const next = n === nextWk;
        const today = isWeekToday(n, weeksData);

        // Week badge: Live / Up Next / blank (no TBD or Complete).
        let badge = '';
        if (today && !past) badge = `<span class="week-badge is-live"><span class="ldot"></span>Live</span>`;
        else if (next)      badge = `<span class="week-badge is-next">Up Next</span>`;

        const collapsed = past && pastCollapsed && n !== selectedWeek;
        const cardCls   = ['week-card', past ? 'is-past' : '', collapsed ? 'is-collapsed' : ''].filter(Boolean).join(' ');

        const wData  = weeksData?.find(w => w.week === n);
        const matchCount = wData?.matches?.length || 0;
        const collapsedSummary = matchCount
          ? `${matchCount} match${matchCount !== 1 ? 'es' : ''} · click to expand`
          : 'Click to expand';

        return `
          <div class="${cardCls}" data-week="${n}">
            <div class="week-header" onclick="toggleWeek(${n})">
              <div class="week-left">
                <span class="week-num">Week ${n}</span>
                <span class="week-date-text">${formatWeekDate(n, weeksData)}</span>
                <span class="week-time-text">Matches start ${MATCH_START_TIME}</span>
              </div>
              <div class="week-right">
                ${badge}
                <span class="week-chevron">▾</span>
              </div>
            </div>
            <div class="week-body">
              ${renderMatches(wData?.matches || [], n, weeksData)}
            </div>
            <div class="week-collapsed-summary">${collapsedSummary}</div>
          </div>`;
      }).join('');
    }

    /* ── Sort matches into fixed court order (1&2 → 3&6 → 5&7) ────── */
    function orderMatches(matches) {
      return matches
        .map((m, idx) => ({ m, idx }))
        .sort((a, b) => {
          const ra = COURT_SET_ORDER[a.m.courtSet] ?? (90 + a.idx);
          const rb = COURT_SET_ORDER[b.m.courtSet] ?? (90 + b.idx);
          return ra - rb;
        })
        .map(x => x.m);
    }

    function courtMeta(m, idx) {
      if (m.courtSet && COURT_SET_META[m.courtSet]) return COURT_SET_META[m.courtSet];
      const label = (m.courtA && m.courtB) ? `Courts ${m.courtA} & ${m.courtB}` : (m.court || `Court ${idx + 1}`);
      return { label, color: FALLBACK_COLORS[idx % FALLBACK_COLORS.length] };
    }

    /*
