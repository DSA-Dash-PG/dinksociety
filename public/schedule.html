<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule · The Dink Society</title>
  <meta name="description" content="Weekly match schedule for The Dink Society pickleball league." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .sched-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }

    .sched-hero {
      background: var(--color-surface); border: 1px solid var(--color-border);
      padding: var(--space-8) var(--space-6); border-radius: var(--radius-lg); margin-bottom: var(--space-4);
    }
    .sched-hero .eyebrow { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--color-teal); margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2); }
    .sched-hero .eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--color-teal); box-shadow: 0 0 0 4px var(--color-teal-dim); }
    .sched-hero h1 { font-size: var(--text-3xl); font-weight: 800; text-transform: uppercase; margin: 0 0 var(--space-2); }
    .sched-hero p { color: var(--color-text-muted); font-size: var(--text-sm); margin: 0; }

    .sched-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: var(--space-4); }
    .sched-controls select {
      padding: 8px 14px; background: var(--color-surface-2); border: 1px solid var(--color-border);
      color: var(--color-text); border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .sched-controls select:focus { border-color: var(--color-lime); outline: none; }

    .week-tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); flex-wrap: wrap; }
    .week-tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .week-tab:hover { color: var(--color-text); background: var(--color-surface-2); }
    .week-tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .match-card {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 16px; align-items: center; padding: 18px 20px;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); margin-bottom: 8px;
      transition: border-color var(--transition);
    }
    .match-card:hover { border-color: var(--color-border-strong); }
    .match-card--final { border-left: 3px solid var(--color-teal); }
    .match-card__team { font-size: 14px; font-weight: 700; }
    .match-card__team--right { text-align: right; }
    .match-card__center { text-align: center; }
    .match-card__vs { font-size: 9px; letter-spacing: 0.2em; color: var(--color-text-faint); font-weight: 700; }
    .match-card__score { font-size: 18px; font-weight: 800; letter-spacing: 0.02em; }
    .match-card__score .win { color: var(--color-lime); }
    .match-card__time { font-size: 11px; color: var(--color-text-faint); margin-top: 4px; }
    .match-card__court { font-size: 10px; color: var(--color-text-faint); }
    .match-card__final { font-size: 9px; color: var(--color-teal); font-weight: 700; letter-spacing: 0.1em; margin-top: 4px; text-transform: uppercase; }
    .match-card__div { font-size: 9px; color: var(--color-text-faint); margin-top: 2px; }

    .empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--color-text-faint); }

    @media (max-width: 720px) {
      .sched-hero { padding: var(--space-6) var(--space-4); }
      .sched-hero h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); }
      .match-card { grid-template-columns: 1fr; text-align: center; gap: 8px; }
      .match-card__team, .match-card__team--right { text-align: center; }
    }
  </style>
</head>
<body data-page="schedule">
  <div data-partial="nav"></div>
  <main class="sched-shell">
    <div class="sched-hero">
      <div class="eyebrow">Schedule</div>
      <h1>Circuit I</h1>
      <p>May – Jun 2026 · Round-robin + Championship</p>
      <div class="sched-controls">
        <select id="sched-division">
          <option value="">All divisions</option>
          <option value="3-0-mixed">3.0 Mixed</option>
          <option value="3-5-mixed">3.5 Mixed</option>
        </select>
      </div>
    </div>
    <nav class="week-tabs" id="week-tabs"></nav>
    <div id="schedule-content"><div class="empty-state">Loading schedule&hellip;</div></div>
  </main>
  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    const DIV_LABELS = { '3-0-mixed': '3.0 Mixed', '3-5-mixed': '3.5 Mixed', '3.0M': '3.0 Mixed', '3.5M': '3.5 Mixed' };
    let scheduleData = null, currentWeek = 1;
    const $id = id => document.getElementById(id);

    async function loadSchedule() {
      try {
        const p = new URLSearchParams({ season: 'circuit-i' });
        const d = $id('sched-division').value;
        if (d) p.set('division', d);
        const r = await fetch(`/.netlify/functions/public-schedule?${p}`);
        if (!r.ok) throw 0;
        scheduleData = await r.json();
        if (scheduleData.empty) {
          $id('schedule-content').innerHTML = `<div class="empty-state">${esc(scheduleData.message)}</div>`;
          $id('week-tabs').innerHTML = '';
          return;
        }
        renderTabs();
        renderWeek(currentWeek);
      } catch {
        $id('schedule-content').innerHTML = '<div class="empty-state">Schedule not yet published. Check back closer to Circuit I.</div>';
        $id('week-tabs').innerHTML = '';
      }
    }

    function renderTabs() {
      const w = scheduleData?.weeks || [];
      if (!w.length) { $id('week-tabs').innerHTML = ''; return; }
      // Clamp currentWeek
      if (!w.find(x => x.week === currentWeek)) currentWeek = w[0].week;
      $id('week-tabs').innerHTML = w.map(x =>
        `<button class="week-tab ${x.week === currentWeek ? 'is-active' : ''}" data-week="${x.week}">Week ${x.week}${x.week === 7 ? ' (Finals)' : ''}</button>`
      ).join('');
      $id('week-tabs').querySelectorAll('.week-tab').forEach(b => {
        b.addEventListener('click', () => {
          currentWeek = parseInt(b.dataset.week);
          document.querySelectorAll('.week-tab').forEach(x => x.classList.toggle('is-active', parseInt(x.dataset.week) === currentWeek));
          renderWeek(currentWeek);
        });
      });
    }

    function renderWeek(n) {
      const w = (scheduleData?.weeks || []).find(x => x.week === n);
      const el = $id('schedule-content');
      if (!w?.matches?.length) { el.innerHTML = '<div class="empty-state">No matches scheduled for this week.</div>'; return; }

      el.innerHTML = w.matches.map(m => {
        const isFinal = m.status === 'final';
        const dt = m.date || m.scheduledAt;
        const ds = dt ? new Date(dt).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : '';

        // Score display
        let center = '<div class="match-card__vs">VS</div>';
        if (isFinal && m.homeRoundPts != null) {
          const hWin = m.homeRoundPts > m.awayRoundPts;
          center = `<div class="match-card__score"><span class="${hWin ? 'win' : ''}">${m.homeRoundPts}</span> – <span class="${!hWin ? 'win' : ''}">${m.awayRoundPts}</span></div>
            <div class="match-card__final">Final</div>`;
        }

        const divLabel = m.divisionLabel || DIV_LABELS[m.division] || '';
        const teamA = m.teamA || m.homeTeamName || 'TBD';
        const teamB = m.teamB || m.awayTeamName || 'TBD';

        return `<div class="match-card ${isFinal ? 'match-card--final' : ''}">
          <div class="match-card__team">${esc(teamA)}</div>
          <div class="match-card__center">
            ${center}
            ${m.court ? `<div class="match-card__court">${esc(m.court)}</div>` : ''}
            ${ds ? `<div class="match-card__time">${ds}</div>` : ''}
            ${divLabel ? `<div class="match-card__div">${esc(divLabel)}</div>` : ''}
          </div>
          <div class="match-card__team match-card__team--right">${esc(teamB)}</div>
        </div>`;
      }).join('');
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    $id('sched-division').addEventListener('change', loadSchedule);
    loadSchedule();
  </script>
</body>
</html>
