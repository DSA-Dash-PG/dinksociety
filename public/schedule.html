<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    /* ── Shell ───────────────────────────────────────────────────── */
    .sched-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }

    /* ── Date strip ──────────────────────────────────────────────── */
    .date-strip {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-4) var(--space-6);
      margin-bottom: var(--space-3);
    }
    .strip-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--color-text-faint); margin-bottom: var(--space-2);
    }
    .pills-scroll {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .pills-scroll::-webkit-scrollbar { display: none; }
    .date-pill {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 5px 12px; font-size: 11px;
      font-weight: 600; color: var(--color-text-muted); white-space: nowrap;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      cursor: pointer; transition: all var(--transition);
    }
    .date-pill:hover { border-color: var(--color-border-strong); color: var(--color-text); }
    .date-pill .wk { font-size: 9px; color: var(--color-text-faint); font-weight: 700; letter-spacing: 0.08em; }
    .date-pill.is-next { border-color: var(--color-lime); color: var(--color-lime); background: var(--color-lime-ghost); }
    .date-pill.is-next .wk { color: var(--color-lime-active); }
    .date-pill.is-past { opacity: 0.4; }
    .date-pill.is-past:hover { opacity: 0.7; }
    .date-pill.is-selected {
      border-color: var(--color-lime); color: var(--color-bg);
      background: var(--color-lime); opacity: 1;
    }
    .date-pill.is-selected .wk { color: var(--color-bg); opacity: 0.7; }

    /* ── Team filter chips (under the game-night pills) ──────────── */
    .team-strip-label { margin-top: var(--space-3); }
    .team-scroll {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .team-scroll::-webkit-scrollbar { display: none; }
    .team-chip {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 5px 12px; font-size: 11px;
      font-weight: 600; color: var(--color-text-muted); white-space: nowrap;
      flex-shrink: 0; cursor: pointer; transition: all var(--transition);
    }
    .team-chip:hover { border-color: var(--color-border-strong); color: var(--color-text); }
    .team-chip.is-selected {
      border-color: var(--color-lime); color: var(--color-bg); background: var(--color-lime);
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .sched-toolbar { display: flex; justify-content: flex-end; margin-bottom: var(--space-3); }
    .sched-collapse-btn {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 6px 16px; font-size: 12px;
      font-family: inherit; color: var(--color-text-muted); cursor: pointer;
      transition: all var(--transition);
    }
    .sched-collapse-btn:hover { border-color: var(--color-border-strong); color: var(--color-text); }

    /* ── Week cards ──────────────────────────────────────────────── */
    .week-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); margin-bottom: var(--space-2);
      overflow: hidden; transition: border-color var(--transition);
    }
    .week-card:hover { border-color: var(--color-border-strong); }
    .week-card.is-past { opacity: 0.65; }
    .week-card.is-past:hover { opacity: 1; }

    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4) var(--space-6); cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--color-divider);
    }
    .week-card.is-collapsed .week-header { border-bottom: none; }

    .week-left { display: flex; align-items: baseline; gap: 12px; }
    .week-num { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-text-faint); }
    .week-date-text { font-size: 15px; font-weight: 700; color: var(--color-text); }
    .week-time-text { font-size: 12px; color: var(--color-text-faint); }

    .week-right { display: flex; align-items: center; gap: 10px; }
    .week-badge {
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: var(--radius-full);
      border: 1px solid var(--color-border); color: var(--color-text-faint);
      background: var(--color-surface-2);
    }
    .week-badge.is-next { background: var(--color-lime-ghost); color: var(--color-lime); border-color: rgba(184,255,44,0.3); }
    .week-badge.is-live {
      background: var(--color-lime); color: var(--color-bg); border-color: var(--color-lime);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .week-badge.is-live .ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-bg); animation: ds-pulse 1.1s infinite; }
    @keyframes ds-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

    .week-chevron { font-size: 16px; color: var(--color-text-faint); transition: transform 0.2s ease; line-height: 1; flex-shrink: 0; }
    .week-card.is-collapsed .week-chevron { transform: rotate(-90deg); }

    /* ── Week body ───────────────────────────────────────────────── */
    .week-body { padding: var(--space-5) var(--space-6) var(--space-6); }
    .week-card.is-collapsed .week-body { display: none; }

    .week-collapsed-summary { display: none; padding: var(--space-2) var(--space-6) var(--space-3); font-size: 12px; color: var(--color-text-faint); }
    .week-card.is-collapsed .week-collapsed-summary { display: block; }

    /* ── Matches grid ────────────────────────────────────────────── */
    .matches-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .match-entry {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* card top: court + status */
    .match-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-bottom: 1px solid var(--color-divider);
    }
    .match-court {
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-text-faint); display: flex; align-items: center; gap: 6px;
    }
    .court-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .match-badge {
      font-size: 9.5px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: var(--radius-full);
      border: 1px solid var(--color-border); color: var(--color-text-faint);
    }
    .match-badge.is-final { color: var(--color-teal); border-color: rgba(45,212,191,0.4); }
    .match-badge.is-next  { color: var(--color-lime); border-color: rgba(184,255,44,0.4); }
    .match-badge.is-live  {
      color: var(--color-bg); background: var(--color-lime); border-color: var(--color-lime);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .match-badge.is-live .ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-bg); animation: ds-pulse 1.1s infinite; }

    /* matchup: home | center | away */
    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 8px; padding: 16px 12px 12px; }
    .m-side { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; min-width: 0; }
    .m-seed {
      font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
      padding: 2px 8px; border-radius: 5px;
    }
    .m-seed.home { background: var(--color-lime-ghost); color: var(--color-lime); }
    .m-seed.away { background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); }
    .m-logo { font-size: 28px; line-height: 1; height: 30px; display: flex; align-items: center; }
    .m-logo--mono {
      width: 30px; height: 30px; border-radius: 50%; font-size: 13px; font-weight: 800;
      color: var(--color-text-muted); background: var(--color-surface); border: 1px solid var(--color-border);
      justify-content: center;
    }
    .m-team {
      font-size: 13px; font-weight: 800; font-style: italic; text-transform: uppercase; color: var(--color-text); line-height: 1.25;
      text-decoration: none;
    }
    a.m-team:hover { color: var(--color-lime); }
    .m-side.is-winner .m-team { color: var(--color-lime); }
    .m-team.is-tbd { color: var(--color-text-faint); font-weight: 500; }

    .m-center { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 78px; padding-top: 16px; }
    .m-tally { font-size: 22px; font-weight: 800; color: var(--color-text); line-height: 1; font-variant-numeric: tabular-nums; }
    .m-tally .w { color: var(--color-lime); }
    .m-tally .dash { color: var(--color-text-faint); margin: 0 3px; }
    .m-sub { font-size: 10px; color: var(--color-text-faint); font-variant-numeric: tabular-nums; }
    .m-result { font-size: 10px; font-weight: 700; color: var(--color-text-muted); margin-top: 1px; max-width: 90px; line-height: 1.2; }
    .m-result.tie { color: #e0b34a; }
    .m-center.up .m-vs { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; color: var(--color-text-faint); }
    .m-center.up .m-start { font-size: 10px; color: var(--color-text-faint); margin-top: 3px; }

    /* serve / side rules */
    .m-serves { margin: 0 12px 12px; border: 1px solid var(--color-divider); border-radius: 9px; overflow: hidden; }
    .m-srow { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 11px; color: var(--color-text-muted); line-height: 1.3; }
    .m-srow + .m-srow { border-top: 1px solid var(--color-divider); }
    .m-rtag {
      flex: 0 0 auto; font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 5px; background: var(--color-lime-ghost); color: var(--color-lime);
    }
    .m-rtag.r2 { background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); }
    .m-srow b { color: var(--color-text); font-weight: 600; }
    .m-srow .act { color: var(--color-lime-active, var(--color-lime)); font-weight: 700; }
    .m-srow .act.side { color: var(--color-text-muted); }

    /* show-scores toggle + lazy body */
    .m-toggle {
      margin-top: 4px; width: 100%; background: transparent; border: none;
      border-top: 1px solid var(--color-divider); color: var(--color-text-muted);
      padding: 11px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: color var(--transition);
    }
    .m-toggle:hover { color: var(--color-lime); }
    .m-toggle .chev { transition: transform 0.2s ease; }
    .match-entry.is-open .m-toggle .chev { transform: rotate(180deg); }
    .m-scorebody { display: none; border-top: 1px solid var(--color-divider); padding: 4px 12px 14px; }
    .match-entry.is-open .m-scorebody { display: block; }
    .m-loading { padding: 14px; text-align: center; font-size: 12px; color: var(--color-text-faint); }

    /* round + zebra games */
    .m-round { margin-top: 12px; }
    .m-round-head { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .m-round-label {
      font-size: 9.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-bg); background: var(--color-lime); padding: 3px 9px; border-radius: var(--radius-full);
    }
    .m-round-label.r2 { background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); }
    .m-games { border: 1px solid var(--color-divider); border-radius: 8px; overflow: hidden; }
    .m-game { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 7px 9px; font-size: 11.5px; }
    .m-game:nth-child(odd) { background: var(--color-surface); }
    .m-game .pl { display: flex; flex-direction: column; gap: 3px; min-width: 0; color: var(--color-text-muted); line-height: 1.25; }
    .m-game .pl.right { align-items: flex-end; text-align: right; }
    .m-game .pl a { color: var(--color-text-muted); font-weight: 600; max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-decoration: underline; text-decoration-color: rgba(128,128,128,0.4); text-underline-offset: 3px; }
    .m-game .pl a:hover { color: var(--color-text); }
    .m-game .pl.is-winner a { color: var(--color-lime); font-weight: 700; text-decoration-color: rgba(184,255,44,0.45); }
    .m-game .mid { display: flex; flex-direction: column; align-items: center; min-width: 56px; }
    .m-game .gtype { font-size: 8px; font-weight: 800; letter-spacing: 0.06em; color: var(--color-text-faint); }
    .m-game .gnum { font-weight: 800; font-variant-numeric: tabular-nums; font-size: 13px; white-space: nowrap; }
    .m-game .gnum .w { color: var(--color-lime); }
    .m-game .gnum .l { color: var(--color-text-faint); }
    .m-game .gnum .dash { color: var(--color-text-faint); margin: 0 2px; }
    .m-round-sum {
      display: flex; justify-content: space-between; align-items: center; margin-top: 7px;
      padding: 7px 11px; border-radius: 7px; background: var(--color-surface);
      font-size: 10.5px; color: var(--color-text-muted);
    }
    .m-round-sum .b { font-weight: 800; color: var(--color-text); font-variant-numeric: tabular-nums; }

    /* ── Placeholder / empty ─────────────────────────────────────── */
    .week-tbd { text-align: center; padding: var(--space-6) 0 var(--space-2); font-size: 13px; color: var(--color-text-faint); }
    .empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--color-text-faint); }

    /* ── Bracket phases (Wk 6 Rivalry / Wk 7 Playoffs / Wk 8 Champ) ─ */
    .week-phase {
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: var(--radius-full); border: 1px solid transparent;
    }
    .week-phase.rivalry      { color: var(--color-teal); background: rgba(45,212,191,0.12); border-color: rgba(45,212,191,0.3); }
    .week-phase.playoff      { color: #ffb061; background: rgba(255,176,97,0.12); border-color: rgba(255,176,97,0.3); }
    .week-phase.championship { color: #f0c040; background: rgba(240,192,64,0.12); border-color: rgba(240,192,64,0.3); }

    .bracket-note { font-size: 12px; color: var(--color-text-faint); margin: 0 0 var(--space-4); line-height: 1.5; }
    .bgrp { margin-bottom: var(--space-5); }
    .bgrp:last-child { margin-bottom: 0; }
    .bgrp-label {
      font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text-faint); margin: 0 2px var(--space-3); display: flex; align-items: center; gap: 8px;
    }
    .bgrp-label .medal { font-size: 14px; }

    /* seed labels / chips inside a match card */
    .m-seedchip {
      font-size: 9px; font-weight: 800; letter-spacing: 0.04em;
      padding: 2px 7px; border-radius: 5px; background: var(--color-surface);
      color: var(--color-text-muted); border: 1px solid var(--color-border);
    }
    .m-seedchip.s1 { background: var(--color-lime-ghost); color: var(--color-lime); border-color: rgba(184,255,44,0.3); }
    .m-seedlabel { font-size: 12.5px; font-weight: 700; font-style: italic; text-transform: uppercase; color: var(--color-text-faint); line-height: 1.25; }
    .m-hint {
      margin: 0 12px 12px; padding: 7px 10px; border-radius: 8px; text-align: center;
      font-size: 10.5px; font-weight: 600; color: var(--color-text-faint);
      background: var(--color-surface); border: 1px solid var(--color-divider);
    }
    .m-hint.locked { color: var(--color-teal); border-color: rgba(45,212,191,0.25); }

    /* ── Mobile ──────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      .date-strip { padding: var(--space-3) var(--space-4); }
      .week-header { padding: var(--space-3) var(--space-4); }
      .week-left { flex-direction: column; align-items: flex-start; gap: 2px; }
      .week-time-text { display: none; }
      .week-body { padding: var(--space-3) var(--space-4) var(--space-5); }
      .week-collapsed-summary { padding: var(--space-2) var(--space-4) var(--space-3); }
      .matches-grid { grid-template-columns: 1fr; }
      .sched-toolbar { margin-bottom: var(--space-2); }
    }
  </style>
</head>
<body data-page="schedule">
  <div data-partial="nav"></div>
  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="schedule"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow"><span data-circuit-label>Season 1</span> · <span data-start-month-year>June 2026</span></div>
      <h1 class="page-hero__title">Schedule</h1>
    </div>
  </div>

  <main class="sched-shell">

    <div class="date-strip">
      <div class="strip-label">Game nights</div>
      <div class="pills-scroll" id="date-pills"></div>
      <div class="strip-label team-strip-label" id="team-strip-label" style="display:none;">Filter by team</div>
      <div class="team-scroll" id="team-filter"></div>
    </div>

    <div class="sched-toolbar">
      <button class="sched-collapse-btn" id="collapse-btn">Collapse all weeks</button>
    </div>

    <div id="weeks-list"></div>

  </main>
  <div data-partial="footer"></div>
  <script src="/js/short-name.js"></script>
  <script src="/js/partials.js"></script>
  <script>
    /* ── Constants ───────────────────────────────────────────────── */
    const SEASON_START = new Date('2026-06-08T00:00:00');
    const TOTAL_WEEKS  = 8;
    let   PLANNED_DATES = {};   // week # → ISO date published by admin (for weeks without matches yet)
    const MATCH_START_TIME = '7:00 PM';   // fallback only — scheduledAt is the source of truth
    const matchStartLabel = m => {
      if (m && m.scheduledAt) { const d = new Date(m.scheduledAt); if (!isNaN(d)) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }
      return (m && m.startTime) || MATCH_START_TIME;
    };

    // Fixed court-set order + presentation. A = 1&2, B = 3&6, C = 5&7.
    const COURT_SET_ORDER = { A: 0, B: 1, C: 2 };
    const COURT_SET_META = {
      A: { label: 'Courts 1 & 2', color: '#4a7c9e' },
      B: { label: 'Courts 3 & 6', color: '#7c4a9e' },
      C: { label: 'Courts 5 & 7', color: '#9e7c4a' },
    };
    const FALLBACK_COLORS = ['#4a7c9e', '#7c4a9e', '#9e7c4a'];

    let scheduleData  = null;
    let allCollapsed = false;
    let selectedWeek  = null;
    let selectedTeam  = null;   // team id to filter the schedule to (null = all teams)
    const detailCache = {};   // matchId → loaded game detail (or 'error')

    const $id = id => document.getElementById(id);

    /* ── Week date helpers ───────────────────────────────────────── */
    function weekDate(n) {
      const d = new Date(SEASON_START);
      d.setDate(d.getDate() + (n - 1) * 7);
      return d;
    }
    function weekNightDate(n, weeksData) {
      const wData = weeksData?.find(w => w.week === n);
      const firstMatch = wData?.matches?.[0];
      const dt = firstMatch?.date || firstMatch?.scheduledAt;
      if (dt) return new Date(dt);
      if (PLANNED_DATES[n]) { const d = new Date(PLANNED_DATES[n]); if (!isNaN(d)) return d; }
      return weekDate(n);
    }
    function isWeekPast(n, weeksData) {
      const d = weekNightDate(n, weeksData);
      const endOfGameNight = new Date(d);
      endOfGameNight.setHours(23, 59, 59, 999);
      return endOfGameNight < new Date();
    }
    function isWeekToday(n, weeksData) {
      const d = weekNightDate(n, weeksData);
      const now = new Date();
      return d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
    }
    function nextWeekNum(weeksData) {
      for (let n = 1; n <= TOTAL_WEEKS; n++) {
        if (!isWeekPast(n, weeksData)) return n;
      }
      return null;
    }
    function formatWeekDate(n, weeksData) {
      return weekNightDate(n, weeksData).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    function formatPillDate(n, weeksData) {
      return weekNightDate(n, weeksData).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    /* ── Render date strip ───────────────────────────────────────── */
    function renderDateStrip(weeksData) {
      const nextWk = nextWeekNum(weeksData);
      $id('date-pills').innerHTML = Array.from({ length: TOTAL_WEEKS }, (_, i) => {
        const n = i + 1;
        const past = isWeekPast(n, weeksData);
        const next = n === nextWk;
        const sel  = n === selectedWeek;
        const cls  = (sel ? 'date-pill is-selected' : next ? 'date-pill is-next' : past ? 'date-pill is-past' : 'date-pill');
        return `<div class="${cls}" data-week="${n}"><span class="wk">WK ${n}</span>${formatPillDate(n, weeksData)}</div>`;
      }).join('');
    }

    /* ── Team filter (under the game-night pills) ────────────────── */
    // Unique teams across the season's matches, for the "just my games" filter.
    function collectTeams(weeksData) {
      if (!weeksData) return [];
      const map = new Map();
      weeksData.forEach(w => (w.matches || []).forEach(m => {
        if (m.teamAId && m.teamA && m.teamA !== 'TBD') map.set(m.teamAId, m.teamA);
        if (m.teamBId && m.teamB && m.teamB !== 'TBD') map.set(m.teamBId, m.teamB);
      }));
      return [...map.entries()].map(([id, name]) => ({ id, name }))
        .sort((a, b) => a.name.localeCompare(b.name));
    }
    // Matches in a week involving the selected team (all matches when no filter).
    function teamMatches(wData) {
      const ms = wData?.matches || [];
      return selectedTeam ? ms.filter(m => m.teamAId === selectedTeam || m.teamBId === selectedTeam) : ms;
    }
    function renderTeamFilter(weeksData) {
      const el = $id('team-filter'), label = $id('team-strip-label');
      if (!el) return;
      const teams = collectTeams(weeksData);
      if (!teams.length) { el.innerHTML = ''; el.style.display = 'none'; if (label) label.style.display = 'none'; return; }
      el.style.display = ''; if (label) label.style.display = '';
      el.innerHTML = `<div class="team-chip${selectedTeam == null ? ' is-selected' : ''}" data-team="">All teams</div>` +
        teams.map(t => `<div class="team-chip${selectedTeam === t.id ? ' is-selected' : ''}" data-team="${esc(t.id)}">${esc(t.name)}</div>`).join('');
    }
    function selectTeam(id) {
      selectedTeam = id || null;
      // Picking a team shows their FULL season — clear any single-week filter so
      // you see every game they're scheduled for (tap a week after to focus one).
      if (selectedTeam) selectedWeek = null;
      const weeksData = scheduleData?.empty ? null : scheduleData?.weeks;
      renderTeamFilter(weeksData);
      renderDateStrip(weeksData);
      renderAllWeeks(weeksData);
    }

    /* ── Render all weeks ────────────────────────────────────────── */
    function renderAllWeeks(weeksData) {
      const nextWk = nextWeekNum(weeksData);
      let weekNums = Array.from({ length: TOTAL_WEEKS }, (_, i) => i + 1)
        .filter(n => selectedWeek == null || n === selectedWeek);
      if (selectedTeam) {
        weekNums = weekNums.filter(n => teamMatches(weeksData?.find(w => w.week === n)).length > 0);
      }
      if (!weekNums.length) {
        $id('weeks-list').innerHTML = `<p class="week-tbd" style="text-align:center;padding:28px 12px;">No games found for this team yet.</p>`;
        return;
      }

      $id('weeks-list').innerHTML = weekNums.map(n => {
        const past = isWeekPast(n, weeksData);
        const next = n === nextWk;
        const today = isWeekToday(n, weeksData);

        // Week badge: Live / Up Next / blank (no TBD or Complete).
        let badge = '';
        if (today && !past) badge = `<span class="week-badge is-live"><span class="ldot"></span>Live</span>`;
        else if (next)      badge = `<span class="week-badge is-next">Up Next</span>`;

        const collapsed = allCollapsed && n !== selectedWeek;
        const cardCls   = ['week-card', past ? 'is-past' : '', collapsed ? 'is-collapsed' : ''].filter(Boolean).join(' ');

        const wData  = weeksData?.find(w => w.week === n);
        const wMatches = teamMatches(wData);
        const matchCount = wMatches.length;
        const collapsedSummary = matchCount
          ? `${matchCount} match${matchCount !== 1 ? 'es' : ''} · click to expand`
          : 'Click to expand';

        const phasePill = wData?.phase
          ? `<span class="week-phase ${wData.phase}">${esc(wData.phaseLabel || wData.phase)}</span>`
          : '';
        const body = wData?.phase
          ? renderBracketWeek(selectedTeam ? { ...wData, matches: wMatches } : wData, n, weeksData)
          : renderMatches(wMatches, n, weeksData);

        return `
          <div class="${cardCls}" data-week="${n}">
            <div class="week-header" onclick="toggleWeek(${n})">
              <div class="week-left">
                <span class="week-num">Week ${n}</span>
                <span class="week-date-text">${formatWeekDate(n, weeksData)}</span>
                <span class="week-time-text">Matches start ${MATCH_START_TIME}</span>
              </div>
              <div class="week-right">
                ${phasePill}
                ${badge}
                <span class="week-chevron">▾</span>
              </div>
            </div>
            <div class="week-body">
              ${body}
            </div>
            <div class="week-collapsed-summary">${collapsedSummary}</div>
          </div>`;
      }).join('');
    }

    /* ── Sort matches into fixed court order (1&2 → 3&6 → 5&7) ────── */
    function orderMatches(matches) {
      return matches
        .map((m, idx) => ({ m, idx }))
        .sort((a, b) => {
          const ra = COURT_SET_ORDER[a.m.courtSet] ?? (90 + a.idx);
          const rb = COURT_SET_ORDER[b.m.courtSet] ?? (90 + b.idx);
          return ra - rb;
        })
        .map(x => x.m);
    }

    function courtMeta(m, idx) {
      // Actual courts on the match always win; courtSet only supplies the
      // color (and a fallback label for legacy matches without courts).
      const setMeta = (m.courtSet && COURT_SET_META[m.courtSet]) || null;
      const label = (m.courtA && m.courtB) ? `Courts ${m.courtA} & ${m.courtB}`
        : (m.court || (setMeta && setMeta.label) || `Court ${idx + 1}`);
      const color = setMeta ? setMeta.color : FALLBACK_COLORS[idx % FALLBACK_COLORS.length];
      return { label, color };
    }

    /* ── Render matches for one week ─────────────────────────────── */
    function renderMatches(matches, weekNum, weeksData) {
      if (!matches.length) {
        return `<p class="week-tbd">Matchups published closer to game night</p>`;
      }
      const next = weekNum === nextWeekNum(weeksData);
      const today = isWeekToday(weekNum, weeksData);

      return `<div class="matches-grid">${orderMatches(matches).map((m, idx) => {
        const isFinal = m.status === 'final';
        const teamAName = m.teamA || 'TBD';
        const teamBName = m.teamB || 'TBD';
        const isTbd = teamAName === 'TBD' && teamBName === 'TBD';
        const meta  = courtMeta(m, idx);

        // Top-right badge: Final / Live / Up Next / blank.
        let badge = '';
        if (isFinal)              badge = `<span class="match-badge is-final">Final</span>`;
        else if (today && !isTbd) badge = `<span class="match-badge is-live"><span class="ldot"></span>Live</span>`;
        else if (next && !isTbd)  badge = `<span class="match-badge is-next">Up Next</span>`;

        // Center column.
        let center;
        if (isFinal && m.homeRoundPts != null) {
          const hWin = m.homeRoundPts > m.awayRoundPts;
          const aWin = m.awayRoundPts > m.homeRoundPts;
          const tie  = m.homeRoundPts === m.awayRoundPts;
          const gamesLine = (m.gamesA != null && m.gamesB != null)
            ? `<div class="m-sub">${m.gamesA}–${m.gamesB} games</div>` : '';
          const result = tie ? 'Tie' : esc(hWin ? teamAName : teamBName);
          center = `<div class="m-center">
            <div class="m-tally"><span class="${hWin ? 'w' : ''}">${m.homeRoundPts}</span><span class="dash">–</span><span class="${aWin ? 'w' : ''}">${m.awayRoundPts}</span></div>
            ${gamesLine}
            <div class="m-result${tie ? ' tie' : ''}">${result}</div>
          </div>`;
        } else {
          center = `<div class="m-center up"><div class="m-vs">VS</div><div class="m-start">${esc(matchStartLabel(m))}</div></div>`;
        }

        const sideAWin = isFinal && m.homeRoundPts > m.awayRoundPts;
        const sideBWin = isFinal && m.awayRoundPts > m.homeRoundPts;

        // Serve / side rules — pre-match only (teams known, not final).
        const serves = (!isFinal && !isTbd) ? `
          <div class="m-serves">
            <div class="m-srow"><span class="m-rtag">R1</span><span><b>${esc(teamAName)}</b> <span class="act">serve</span> · <b>${esc(teamBName)}</b> <span class="act side">pick side</span></span></div>
            <div class="m-srow"><span class="m-rtag r2">R2</span><span><b>${esc(teamAName)}</b> <span class="act side">pick side</span> · <b>${esc(teamBName)}</b> <span class="act">serve</span></span></div>
          </div>` : '';

        // Lazy game-score toggle — only meaningful when final.
        const scores = isFinal ? `
          <button class="m-toggle" onclick="toggleScores(this, '${esc(m.id)}')"><span class="lbl">Show game scores</span> <span class="chev">▾</span></button>
          <div class="m-scorebody" data-match="${esc(m.id)}"></div>` : '';

        return `
          <div class="match-entry${isFinal ? ' is-final' : ''}">
            <div class="match-top">
              <span class="match-court"><span class="court-dot" style="background:${meta.color}"></span>${esc(meta.label)}${m.venue ? ' · ' + esc(m.venue) : ''}</span>
              ${badge}
            </div>
            <div class="match-teams">
              <div class="m-side${sideAWin ? ' is-winner' : ''}">
                <span class="m-seed home">HOME</span>
                ${logo(m.emojiA, teamAName)}
                ${teamLink(teamAName, m.teamAId, 'm-team' + (isTbd ? ' is-tbd' : ''))}
              </div>
              ${center}
              <div class="m-side${sideBWin ? ' is-winner' : ''}">
                <span class="m-seed away">AWAY</span>
                ${logo(m.emojiB, teamBName)}
                ${teamLink(teamBName, m.teamBId, 'm-team' + (isTbd ? ' is-tbd' : ''))}
              </div>
            </div>
            ${serves}
            ${scores}
          </div>`;
      }).join('')}</div>`;
    }

    /* ── Bracket weeks (Rivalry / Playoffs / Championship) ───────── */
    const PHASE_NOTE = {
      rivalry: 'Rivalry Week counts toward the regular season. Matchups seed off the standings through the round-robin — #1 plays #2, #3 plays #4, #5 plays #6.',
      playoff: 'Seeds lock from the final regular-season standings. The two semifinal winners meet for the title; #5 and #6 play a consolation match for 5th place.',
      championship: 'Built from the semifinal results — the two winners play for Gold/Silver, the two losers play for Bronze.',
    };
    const PHASE_LOCK = { rivalry: 'the round-robin', playoff: 'Rivalry Week', championship: 'the semifinals' };

    // Small seed chip from a "#N Seed" label (no chip for Winner/Loser labels).
    function seedChip(label) {
      const m = /^#(\d+)\b/.exec(label || '');
      if (!m) return '';
      return `<span class="m-seedchip${m[1] === '1' ? ' s1' : ''}">${m[1]}</span>`;
    }

    function bracketSide(name, id, emoji, seedLabel, seedSide) {
      const chip = seedChip(seedLabel);
      if (name) {
        return `<span class="m-seed ${seedSide}">${seedSide.toUpperCase()}</span>${chip ? chip : ''}${logo(emoji, name)}${teamLink(name, id, 'm-team')}`;
      }
      return `<span class="m-seed ${seedSide}">${seedSide.toUpperCase()}</span>${chip ? chip : ''}<span class="m-logo m-logo--mono">?</span><span class="m-seedlabel">${esc(seedLabel || 'TBD')}</span>`;
    }

    function bracketCard(m, idx, weekNum, weeksData) {
      const isFinal = m.status === 'final';
      const meta = courtMeta(m, idx);
      const today = isWeekToday(weekNum, weeksData);
      const next  = weekNum === nextWeekNum(weeksData);
      const resolvedBoth = !!(m.teamA && m.teamB);

      let badge = '';
      if (isFinal)                       badge = `<span class="match-badge is-final">Final</span>`;
      else if (today && resolvedBoth)    badge = `<span class="match-badge is-live"><span class="ldot"></span>Live</span>`;
      else if (next && resolvedBoth)     badge = `<span class="match-badge is-next">Up Next</span>`;

      let center;
      if (isFinal && m.homeRoundPts != null) {
        const hWin = m.homeRoundPts > m.awayRoundPts, aWin = m.awayRoundPts > m.homeRoundPts;
        const tie = m.homeRoundPts === m.awayRoundPts;
        const gamesLine = (m.gamesA != null && m.gamesB != null) ? `<div class="m-sub">${m.gamesA}–${m.gamesB} games</div>` : '';
        const result = tie ? 'Tie' : esc(hWin ? m.teamA : m.teamB);
        center = `<div class="m-center">
          <div class="m-tally"><span class="${hWin ? 'w' : ''}">${m.homeRoundPts}</span><span class="dash">–</span><span class="${aWin ? 'w' : ''}">${m.awayRoundPts}</span></div>
          ${gamesLine}<div class="m-result${tie ? ' tie' : ''}">${result}</div>
        </div>`;
      } else {
        center = `<div class="m-center up"><div class="m-vs">VS</div><div class="m-start">${esc(matchStartLabel(m))}</div></div>`;
      }

      // Status hint: projected vs locked (hidden once final).
      let hint = '';
      if (!isFinal) {
        hint = m.seedLocked
          ? `<div class="m-hint locked">Seeded · matchup locked</div>`
          : `<div class="m-hint">Teams set once ${esc(PHASE_LOCK[m.phase] || 'the prior round')} is complete</div>`;
      }

      // Serve / side rules only once teams are locked (avoid implying a projection is final).
      const serves = (!isFinal && resolvedBoth && m.seedLocked) ? `
        <div class="m-serves">
          <div class="m-srow"><span class="m-rtag">R1</span><span><b>${esc(m.teamA)}</b> <span class="act">serve</span> · <b>${esc(m.teamB)}</b> <span class="act side">pick side</span></span></div>
          <div class="m-srow"><span class="m-rtag r2">R2</span><span><b>${esc(m.teamA)}</b> <span class="act side">pick side</span> · <b>${esc(m.teamB)}</b> <span class="act">serve</span></span></div>
        </div>` : '';

      const scores = isFinal ? `
        <button class="m-toggle" onclick="toggleScores(this, '${esc(m.id)}')"><span class="lbl">Show game scores</span> <span class="chev">▾</span></button>
        <div class="m-scorebody" data-match="${esc(m.id)}"></div>` : '';

      const sideAWin = isFinal && m.homeRoundPts > m.awayRoundPts;
      const sideBWin = isFinal && m.awayRoundPts > m.homeRoundPts;

      return `
        <div class="match-entry${isFinal ? ' is-final' : ''}">
          <div class="match-top">
            <span class="match-court"><span class="court-dot" style="background:${meta.color}"></span>${esc(meta.label)}${m.venue ? ' · ' + esc(m.venue) : ''}</span>
            ${badge}
          </div>
          <div class="match-teams">
            <div class="m-side${sideAWin ? ' is-winner' : ''}">${bracketSide(m.teamA, m.teamAId, m.emojiA, m.seedLabelA, 'home')}</div>
            ${center}
            <div class="m-side${sideBWin ? ' is-winner' : ''}">${bracketSide(m.teamB, m.teamBId, m.emojiB, m.seedLabelB, 'away')}</div>
          </div>
          ${serves}
          ${hint}
          ${scores}
        </div>`;
    }

    function renderBracketWeek(wData, weekNum, weeksData) {
      const matches = wData.matches || [];
      if (!matches.length) return `<p class="week-tbd">Matchups published closer to game night</p>`;
      const note = PHASE_NOTE[wData.phase] ? `<p class="bracket-note">${esc(PHASE_NOTE[wData.phase])}</p>` : '';

      // Group by bracketGroup, preserving order. Show group headers only when a
      // week spans more than one group (Playoffs, Championship).
      const groups = [];
      const seen = {};
      matches.forEach((m, i) => {
        const g = m.bracketGroup || '';
        if (!(g in seen)) { seen[g] = groups.length; groups.push({ label: g, medal: m.medal || '', items: [] }); }
        groups[seen[g]].items.push({ m, idx: i });
      });

      const multi = groups.length > 1;
      const body = groups.map(grp => {
        const cards = grp.items.map(({ m, idx }) => bracketCard(m, idx, weekNum, weeksData)).join('');
        const header = multi
          ? `<div class="bgrp-label">${grp.medal ? `<span class="medal">${esc(grp.medal)}</span>` : ''}${esc(grp.label)}</div>`
          : '';
        return `<div class="bgrp">${header}<div class="matches-grid">${cards}</div></div>`;
      }).join('');

      return note + body;
    }

    /* ── Team logo (emoji, or monogram fallback) ─────────────────── */
    function logo(emoji, name) {
      if (emoji) return `<span class="m-logo">${esc(emoji)}</span>`;
      const initial = (String(name || '?').trim()[0] || '?').toUpperCase();
      return `<span class="m-logo m-logo--mono">${esc(initial)}</span>`;
    }

    /* ── Toggle a single week card ───────────────────────────────── */
    function toggleWeek(n) {
      const card = document.querySelector(`.week-card[data-week="${n}"]`);
      if (card) card.classList.toggle('is-collapsed');
    }

    /* ── Toggle ALL weeks (collapse / expand the whole schedule) ──── */
    function togglePast() {
      allCollapsed = !allCollapsed;
      $id('collapse-btn').textContent = allCollapsed ? 'Expand all weeks' : 'Collapse all weeks';
      document.querySelectorAll('.week-card').forEach(card => {
        card.classList.toggle('is-collapsed', allCollapsed);
      });
    }

    /* ── Show / hide game scores (lazy fetch detail) ─────────────── */
    async function toggleScores(btn, matchId) {
      const entry = btn.closest('.match-entry');
      const body  = entry.querySelector('.m-scorebody');
      const open  = entry.classList.toggle('is-open');
      btn.querySelector('.lbl').textContent = open ? 'Hide game scores' : 'Show game scores';
      if (!open) return;

      if (detailCache[matchId] && detailCache[matchId] !== 'error') {
        body.innerHTML = renderGameDetail(detailCache[matchId]);
        return;
      }
      if (!body.dataset.loaded) {
        body.innerHTML = `<div class="m-loading">Loading scores…</div>`;
        try {
          const p = new URLSearchParams({ season: SEASON_ID, match: matchId });
          const r = await fetch(`/.netlify/functions/public-match?${p}`);
          if (!r.ok) throw 0;
          const data = await r.json();
          detailCache[matchId] = data.match;
          body.innerHTML = renderGameDetail(data.match);
          body.dataset.loaded = '1';
        } catch {
          detailCache[matchId] = 'error';
          body.innerHTML = `<div class="m-loading">Scores unavailable right now.</div>`;
        }
      }
    }

    /* ── Render game-by-game detail (zebra rounds) ───────────────── */
    function renderGameDetail(match) {
      if (!match || !match.games || !match.games.length) {
        return `<div class="m-loading">Game-by-game scores not posted.</div>`;
      }
      const rounds = [1, 2].map(rn => {
        const games = match.games.filter(g => g.round === rn);
        if (!games.length) return '';
        const rd = rn === 1 ? match.round1 : match.round2;
        let ptsH = 0, ptsA = 0;
        const rows = games.map(g => {
          // Display-only "First L." to keep the rows tidy; each name links to the
          // player's public profile (full name in the href, same as roster pages).
          const sn = (n) => (typeof shortName === 'function' ? shortName(n) : n);
          const plink = (n, teamName) =>
            `<a href="/player?team=${slug(teamName)}&name=${encodeURIComponent(n)}${LINK_SUFFIX}">${esc(sn(n))}</a>`;
          const hp = g.homePlayers && g.homePlayers.length ? g.homePlayers.map(n => plink(n, match.home && match.home.name)).join('') : '—';
          const ap = g.awayPlayers && g.awayPlayers.length ? g.awayPlayers.map(n => plink(n, match.away && match.away.name)).join('') : '—';
          const scored = g.home != null && g.away != null;
          let num = '<span class="gnum">—</span>';
          if (scored) {
            ptsH += g.home; ptsA += g.away;
            num = `<span class="gnum"><span class="${g.homeWin ? 'w' : 'l'}">${g.home}</span><span class="dash">–</span><span class="${g.homeWin ? 'l' : 'w'}">${g.away}</span></span>`;
          }
          return `<div class="m-game">
            <div class="pl${scored && g.homeWin ? ' is-winner' : ''}">${hp}</div>
            <div class="mid"><span class="gtype">${g.type}</span>${num}</div>
            <div class="pl right${scored && !g.homeWin ? ' is-winner' : ''}">${ap}</div>
          </div>`;
        }).join('');

        const gamesH = rd?.homeGames ?? '';
        const gamesA = rd?.awayGames ?? '';
        const sum = (rd || ptsH || ptsA)
          ? `<div class="m-round-sum"><span><span class="b">${gamesH}</span> games · <span class="b">${ptsH}</span> pts</span><span><span class="b">${ptsA}</span> pts · <span class="b">${gamesA}</span> games</span></div>`
          : '';

        return `<div class="m-round">
          <div class="m-round-head"><span class="m-round-label${rn === 2 ? ' r2' : ''}">Round ${rn}</span></div>
          <div class="m-games">${rows}</div>
          ${sum}
        </div>`;
      }).join('');
      return rounds || `<div class="m-loading">Game-by-game scores not posted.</div>`;
    }

    /* ── Season context (carries through to team links) ──────────── */
    const SEASON_ID   = new URLSearchParams(location.search).get('season') || 'circuit-i';
    const LINK_SUFFIX = SEASON_ID === 'circuit-i' ? '' : '&season=' + encodeURIComponent(SEASON_ID);
    function slug(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,30)||'team';}
    function teamLink(name, id, cls) {
      if (!name || name === 'TBD') return `<span class="${cls}">${esc(name || 'TBD')}</span>`;
      const ref = id || slug(name);
      return `<a class="${cls}" href="/team?id=${encodeURIComponent(ref)}${LINK_SUFFIX}">${esc(name)}</a>`;
    }

    /* ── Load schedule from API ──────────────────────────────────── */
    async function loadSchedule() {
      renderDateStrip(null);
      renderTeamFilter(null);
      renderAllWeeks(null);
      try {
        // Planned week dates published by the admin — used for weeks that don't
        // have matches scheduled yet, so teams still see when they'll play.
        try {
          const sr = await fetch('/.netlify/functions/admin-settings');
          if (sr.ok) { const s = await sr.json(); if (s && s.weekDates) PLANNED_DATES = s.weekDates; }
        } catch {}
        const p = new URLSearchParams({ season: SEASON_ID });
        const r = await fetch(`/.netlify/functions/public-schedule?${p}`);
        if (!r.ok) throw 0;
        scheduleData = await r.json();
        const weeksData = scheduleData?.empty ? null : scheduleData?.weeks;
        renderDateStrip(weeksData);
        renderTeamFilter(weeksData);
        renderAllWeeks(weeksData);
      } catch {
        // Keep the placeholder week cards already rendered; no-op
      }
    }

    /* ── XSS escape ──────────────────────────────────────────────── */
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    /* ── Wire up collapse button ─────────────────────────────────── */
    $id('collapse-btn').addEventListener('click', togglePast);

    /* ── Filter weeks by clicking a game-night pill ──────────────── */
    function selectWeek(n) {
      selectedWeek = (selectedWeek === n) ? null : n;
      const weeksData = scheduleData?.empty ? null : scheduleData?.weeks;
      renderDateStrip(weeksData);
      renderAllWeeks(weeksData);
    }
    $id('date-pills').addEventListener('click', e => {
      const pill = e.target.closest('.date-pill');
      if (!pill) return;
      const n = Number(pill.dataset.week);
      if (n) selectWeek(n);
    });

    /* ── Filter to one team's games by clicking a team chip ──────── */
    $id('team-filter').addEventListener('click', e => {
      const chip = e.target.closest('.team-chip');
      if (!chip) return;
      selectTeam(chip.dataset.team || null);
    });

    loadSchedule();
  </script>
</body>
</html>
