<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .sched-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 0 80px; }

    .sched-hero {
      background: linear-gradient(150deg, var(--emerald) 0%, var(--emerald-dark) 100%);
      color: var(--cream);
      padding: 40px 40px 36px;
      position: relative;
      overflow: hidden;
    }
    .sched-hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,235,212,0.04) 1.5px, transparent 1.5px);
      background-size: 18px 18px;
      pointer-events: none;
    }
    .sched-hero > * { position: relative; z-index: 1; }
    .sched-hero h1 {
      font-family: var(--font-display); font-style: italic;
      font-size: 36px; font-weight: 500; margin: 0 0 6px; line-height: 1.1;
    }
    .sched-hero p { font-size: 14px; opacity: 0.6; margin: 0; }

    .sched-body { padding: 24px var(--gutter); }

    .sched-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(15,77,58,0.06);
      font-size: 14px;
    }
    .sched-wk {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-deep);
      min-width: 50px;
    }
    .sched-teams { flex: 1; font-weight: 500; }
    .sched-vs { color: rgba(15,77,58,0.3); font-weight: 400; }
    .sched-date { font-size: 12px; opacity: 0.4; }
    .sched-result {
      font-size: 12px; font-weight: 600;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(15,77,58,0.06);
    }

    .empty-state {
      text-align: center; padding: 48px 20px;
      font-size: 14px; opacity: 0.5;
    }

    @media (max-width: 600px) {
      .sched-hero { padding: 28px 20px; }
      .sched-hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <div class="sched-shell">
    <div class="sched-hero">
      <h1>Circuit I &mdash; weekly matchups</h1>
      <p>Round-robin through week 6, championship week 7. Updated as matchups are set.</p>
    </div>

    <div class="sched-body">
      <div class="tabs" id="sched-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>

      <div id="sched-list">
        <div class="empty-state">Schedule will appear once the admin generates matchups for Circuit I.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    // Tab switching
    document.getElementById('sched-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#sched-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
      // Future: fetch schedule for btn.dataset.division
    });
  </script>
</body>
</html>
