<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule · The Dink Society</title>
  <meta name="description" content="Weekly match schedule for The Dink Society pickleball league." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    /* ── Shell ───────────────────────────────────────────────────── */
    .sched-shell { max-width: var(--max-w); margin: 0 auto; padding: 80px var(--gutter) 80px; }

    /* ── Hero ────────────────────────────────────────────────────── */
    .sched-hero {
      background: var(--color-surface); border: 1px solid var(--color-border);
      padding: var(--space-8) var(--space-6); border-radius: var(--radius-lg);
      margin-bottom: var(--space-4);
    }
    .sched-hero .eyebrow {
      font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--color-teal); margin-bottom: var(--space-3);
      display: flex; align-items: center; gap: var(--space-2);
    }
    .sched-hero .eyebrow::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-teal); box-shadow: 0 0 0 4px var(--color-teal-dim);
    }
    .sched-hero h1 { font-size: var(--text-3xl); font-weight: 800; text-transform: uppercase; margin: 0 0 var(--space-2); }
    .sched-hero p { color: var(--color-text-muted); font-size: var(--text-sm); margin: 0; }

    /* ── Date strip ──────────────────────────────────────────────── */
    .date-strip {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-4) var(--space-6);
      margin-bottom: var(--space-3);
    }
    .strip-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--color-text-faint); margin-bottom: var(--space-2);
    }
    .pills-scroll {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .pills-scroll::-webkit-scrollbar { display: none; }
    .date-pill {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 5px 12px; font-size: 11px;
      font-weight: 600; color: var(--color-text-muted); white-space: nowrap;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .date-pill .wk { font-size: 9px; color: var(--color-text-faint); font-weight: 700; letter-spacing: 0.08em; }
    .date-pill.is-next { border-color: var(--color-lime); color: var(--color-lime); background: var(--color-lime-ghost); }
    .date-pill.is-next .wk { color: var(--color-lime-active); }
    .date-pill.is-past { opacity: 0.4; }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .sched-toolbar { display: flex; justify-content: flex-end; margin-bottom: var(--space-3); }
    .sched-collapse-btn {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-full); padding: 6px 16px; font-size: 12px;
      font-family: inherit; color: var(--color-text-muted); cursor: pointer;
      transition: all var(--transition);
    }
    .sched-collapse-btn:hover { border-color: var(--color-border-strong); color: var(--color-text); }

    /* ── Week cards ──────────────────────────────────────────────── */
    .week-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); margin-bottom: var(--space-2);
      overflow: hidden; transition: border-color var(--transition);
    }
    .week-card:hover { border-color: var(--color-border-strong); }
    .week-card.is-past { opacity: 0.65; }
    .week-card.is-past:hover { opacity: 1; }

    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4) var(--space-6); cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--color-divider);
    }
    .week-card.is-collapsed .week-header { border-bottom: none; }

    .week-left { display: flex; align-items: center; gap: 12px; }
    .week-num { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-faint); }
    .week-date-text { font-size: 14px; font-weight: 700; color: var(--color-text); }
    .week-time-text { font-size: 12px; color: var(--color-text-faint); }

    .week-right { display: flex; align-items: center; gap: 10px; }
    .week-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: var(--radius-full);
      border: 1px solid var(--color-border); color: var(--color-text-faint);
      background: var(--color-surface-2);
    }
    .week-badge.is-next { background: var(--color-lime-dim); color: var(--color-lime); border-color: rgba(184,255,44,0.3); }
    .week-badge.is-complete { color: var(--color-text-faint); }

    .week-chevron { font-size: 16px; color: var(--color-text-faint); transition: transform 0.2s ease; line-height: 1; flex-shrink: 0; }
    .week-card.is-collapsed .week-chevron { transform: rotate(-90deg); }

    /* ── Week body ───────────────────────────────────────────────── */
    .week-body { padding: var(--space-5) var(--space-6) var(--space-6); }
    .week-card.is-collapsed .week-body { display: none; }

    .week-collapsed-summary { display: none; padding: var(--space-2) var(--space-6) var(--space-3); font-size: 12px; color: var(--color-text-faint); }
    .week-card.is-collapsed .week-collapsed-summary { display: block; }

    /* ── Matches grid ────────────────────────────────────────────── */
    .matches-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .match-entry {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .match-entry.is-final { border-top: 2px solid var(--color-teal); }

    .match-court {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-text-faint); padding: 7px 12px 6px;
      border-bottom: 1px solid var(--color-divider);
      display: flex; align-items: center; gap: 6px;
    }
    .court-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .match-teams {
      padding: 12px; display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .match-team { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
    .match-team.right { align-items: flex-end; }
    .match-team-name {
      font-size: 13px; font-weight: 700; color: var(--color-text);
      line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .match-team-name.is-winner { color: var(--color-lime); }
    .match-team-name.is-tbd { color: var(--color-text-faint); font-weight: 500; }
    a.team-name-link { text-decoration: none; cursor: pointer; }
    a.team-name-link:hover { text-decoration: underline; }
    .match-team-record { font-size: 10px; color: var(--color-text-faint); }

    .match-center { text-align: center; flex-shrink: 0; padding: 0 6px; }
    .match-vs { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--color-text-faint); }
    .match-score { font-size: 18px; font-weight: 800; color: var(--color-text); line-height: 1; }
    .match-score .w { color: var(--color-lime); }
    .match-final-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-teal); margin-top: 2px; }

    /* ── Placeholder / TBD state ─────────────────────────────────── */
    .week-tbd { text-align: center; padding: var(--space-6) 0 var(--space-2); font-size: 13px; color: var(--color-text-faint); }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--color-text-faint); }

    /* ── Mobile ──────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      .sched-hero { padding: var(--space-5) var(--space-4); }
      .sched-hero h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); }
      .date-strip { padding: var(--space-3) var(--space-4); }

      .week-header { padding: var(--space-3) var(--space-4); }
      .week-left { flex-direction: column; align-items: flex-start; gap: 2px; }
      .week-time-text { display: none; }
      .week-body { padding: var(--space-3) var(--space-4) var(--space-5); }
      .week-collapsed-summary { padding: var(--space-2) var(--space-4) var(--space-3); }

      .matches-grid { grid-template-columns: 1fr; }

      .sched-toolbar { margin-bottom: var(--space-2); }
    }
  </style>
</head>
<body data-page="schedule">
  <div data-partial="nav"></div>
  <main class="sched-shell">

    <div class="sched-hero">
      <div class="eyebrow">Schedule</div>
      <h1 data-circuit-label>Season 1</h1>
      <p>Starts <span data-start-day>Monday</span>, <span data-start-date>June 8, 2026</span> &middot; <span data-season-weeks>8</span> weeks &middot; Matches <span data-match-time>7:00–9:00 PM</span></p>
    </div>

    <div class="date-strip">
      <div class="strip-label">Game nights</div>
      <div class="pills-scroll" id="date-pills"></div>
    </div>

    <div class="sched-toolbar">
      <button class="sched-collapse-btn" id="collapse-btn">Collapse past weeks</button>
    </div>

    <div id="weeks-list"></div>

  </main>
  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    /* ── Constants ───────────────────────────────────────────────── */
    const SEASON_START = new Date('2026-06-08T00:00:00');
    const TOTAL_WEEKS  = 8;
    const COURT_COLORS = ['#4a7c9e', '#7c4a9e', '#9e7c4a'];
    const DIV_LABELS   = { '3-0-mixed': '3.0 Mixed', '3-5-mixed': '3.0–3.5 Mixed', '3.0M': '3.0 Mixed', '3.5M': '3.0–3.5 Mixed' };

    let scheduleData  = null;
    let pastCollapsed = false;

    const $id = id => document.getElementById(id);

    /* ── Week date helpers ───────────────────────────────────────── */
    function weekDate(n) {
      const d = new Date(SEASON_START);
      d.setDate(d.getDate() + (n - 1) * 7);
      return d;
    }

    function isWeekPast(n, weeksData) {
      // Try to get the date from match data first
      const wData = weeksData?.find(w => w.week === n);
      const firstMatch = wData?.matches?.[0];
      const dt = firstMatch?.date || firstMatch?.scheduledAt;
      const d = dt ? new Date(dt) : weekDate(n);
      // Past if the game night date was yesterday or earlier
      const endOfGameNight = new Date(d);
      endOfGameNight.setHours(23, 59, 59, 999);
      return endOfGameNight < new Date();
    }

    function nextWeekNum(weeksData) {
      for (let n = 1; n <= TOTAL_WEEKS; n++) {
        if (!isWeekPast(n, weeksData)) return n;
      }
      return null;
    }

    function formatWeekDate(n, weeksData) {
      const wData = weeksData?.find(w => w.week === n);
      const firstMatch = wData?.matches?.[0];
      const dt = firstMatch?.date || firstMatch?.scheduledAt;
      const d = dt ? new Date(dt) : weekDate(n);
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function formatPillDate(n, weeksData) {
      const wData = weeksData?.find(w => w.week === n);
      const firstMatch = wData?.matches?.[0];
      const dt = firstMatch?.date || firstMatch?.scheduledAt;
      const d = dt ? new Date(dt) : weekDate(n);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    /* ── Render date strip ───────────────────────────────────────── */
    function renderDateStrip(weeksData) {
      const nextWk = nextWeekNum(weeksData);
      $id('date-pills').innerHTML = Array.from({ length: TOTAL_WEEKS }, (_, i) => {
        const n = i + 1;
        const past = isWeekPast(n, weeksData);
        const next = n === nextWk;
        const cls  = next ? 'date-pill is-next' : past ? 'date-pill is-past' : 'date-pill';
        return `<div class="${cls}"><span class="wk">WK ${n}</span>${formatPillDate(n, weeksData)}</div>`;
      }).join('');
    }

    /* ── Render all weeks ────────────────────────────────────────── */
    function renderAllWeeks(weeksData) {
      const nextWk = nextWeekNum(weeksData);
      $id('weeks-list').innerHTML = Array.from({ length: TOTAL_WEEKS }, (_, i) => {
        const n    = i + 1;
        const past = isWeekPast(n, weeksData);
        const next = n === nextWk;

        const badgeCls  = next ? 'week-badge is-next' : past ? 'week-badge is-complete' : 'week-badge';
        const badgeTxt  = next ? 'Up next' : past ? 'Complete' : 'TBD';
        const collapsed = past && pastCollapsed;
        const cardCls   = ['week-card', past ? 'is-past' : '', collapsed ? 'is-collapsed' : ''].filter(Boolean).join(' ');

        const wData  = weeksData?.find(w => w.week === n);
        const matchCount = wData?.matches?.length || 0;
        const collapsedSummary = matchCount
          ? `${matchCount} match${matchCount !== 1 ? 'es' : ''} · click to expand`
          : 'Click to expand';

        return `
          <div class="${cardCls}" data-week="${n}">
            <div class="week-header" onclick="toggleWeek(${n})">
              <div class="week-left">
                <span class="week-num">Week ${n}</span>
                <span class="week-date-text">${formatWeekDate(n, weeksData)}</span>
                <span class="week-time-text">7:00–9:00 PM</span>
              </div>
              <div class="week-right">
                <span class="${badgeCls}">${badgeTxt}</span>
                <span class="week-chevron">▾</span>
              </div>
            </div>
            <div class="week-body">
              ${renderMatches(wData?.matches || [], n)}
            </div>
            <div class="week-collapsed-summary">${collapsedSummary}</div>
          </div>`;
      }).join('');
    }

    /* ── Render matches for one week ─────────────────────────────── */
    function renderMatches(matches, weekNum) {
      if (!matches.length) {
        return `<p class="week-tbd">Matchups published closer to game night</p>`;
      }

      return `<div class="matches-grid">${matches.map((m, idx) => {
        const isFinal = m.status === 'final';
        const teamAName = m.teamA || m.homeTeamName || 'TBD';
        const teamBName = m.teamB || m.awayTeamName || 'TBD';
        const isTbd   = teamAName === 'TBD' && teamBName === 'TBD';
        const court   = esc(m.court || `Court ${idx + 1}`);
        const color   = COURT_COLORS[idx % COURT_COLORS.length];

        let center = `<div class="match-center"><div class="match-vs">VS</div></div>`;
        if (isFinal && m.homeRoundPts != null) {
          const hWin = m.homeRoundPts > m.awayRoundPts;
          center = `<div class="match-center">
            <div class="match-score"><span class="${hWin ? 'w' : ''}">${m.homeRoundPts}</span>–<span class="${!hWin ? 'w' : ''}">${m.awayRoundPts}</span></div>
            <div class="match-final-label">Final</div>
          </div>`;
        }

        return `
          <div class="match-entry${isFinal ? ' is-final' : ''}">
            <div class="match-court">
              <span class="court-dot" style="background:${color}"></span>${court}
            </div>
            <div class="match-teams">
              <div class="match-team">
                ${teamLink(teamAName, m.teamAId, 'match-team-name' + (isFinal && m.homeRoundPts > m.awayRoundPts ? ' is-winner' : '') + (isTbd ? ' is-tbd' : ''))}
              </div>
              ${center}
              <div class="match-team right">
                ${teamLink(teamBName, m.teamBId, 'match-team-name' + (isFinal && m.awayRoundPts > m.homeRoundPts ? ' is-winner' : '') + (isTbd ? ' is-tbd' : ''))}
              </div>
            </div>
          </div>`;
      }).join('')}</div>`;
    }

    /* ── Toggle single week ──────────────────────────────────────── */
    function toggleWeek(n) {
      const card = document.querySelector(`.week-card[data-week="${n}"]`);
      if (card) card.classList.toggle('is-collapsed');
    }

    /* ── Toggle all past weeks ───────────────────────────────────── */
    function togglePast() {
      pastCollapsed = !pastCollapsed;
      $id('collapse-btn').textContent = pastCollapsed ? 'Expand past weeks' : 'Collapse past weeks';
      document.querySelectorAll('.week-card.is-past').forEach(card => {
        card.classList.toggle('is-collapsed', pastCollapsed);
      });
    }

    /* ── Season context (carries through to team links) ──────────── */
    const SEASON_ID   = new URLSearchParams(location.search).get('season') || 'circuit-i';
    const LINK_SUFFIX = SEASON_ID === 'circuit-i' ? '' : '&season=' + encodeURIComponent(SEASON_ID);
    function slug(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,30)||'team';}
    function teamLink(name, id, cls) {
      if (!name || name === 'TBD') return `<div class="${cls}">${esc(name || 'TBD')}</div>`;
      const ref = id || slug(name);
      return `<a class="${cls} team-name-link" href="/team?id=${encodeURIComponent(ref)}${LINK_SUFFIX}">${esc(name)}</a>`;
    }

    /* ── Load schedule from API ──────────────────────────────────── */
    async function loadSchedule() {
      renderDateStrip(null);
      renderAllWeeks(null);

      try {
        const p = new URLSearchParams({ season: SEASON_ID });
        const r = await fetch(`/.netlify/functions/public-schedule?${p}`);
        if (!r.ok) throw 0;
        scheduleData = await r.json();
        const weeksData = scheduleData?.empty ? null : scheduleData?.weeks;
        renderDateStrip(weeksData);
        renderAllWeeks(weeksData);
      } catch {
        // Keep the placeholder week cards already rendered; no-op
      }
    }

    /* ── XSS escape ──────────────────────────────────────────────── */
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    /* ── Wire up collapse button ─────────────────────────────────── */
    $id('collapse-btn').addEventListener('click', togglePast);

    loadSchedule();
  </script>
</body>
</html>
