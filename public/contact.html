<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .contact-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }

    .contact-body {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 40px; max-width: 800px; padding-top: var(--space-4);
    }

    .contact-form { display: flex; flex-direction: column; gap: 12px; }
    .contact-field label {
      display: block; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--color-text-faint); margin-bottom: 5px; font-weight: 600;
    }
    .contact-field input,
    .contact-field select,
    .contact-field textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--color-border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit;
      background: var(--color-surface-2); color: var(--color-text);
      transition: border-color var(--transition);
    }
    .contact-field input:focus,
    .contact-field select:focus,
    .contact-field textarea:focus {
      outline: none; border-color: var(--color-lime);
    }
    .contact-field textarea { height: 120px; resize: vertical; }

    .contact-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .contact-submit {
      padding: 12px 24px; background: var(--color-lime); color: var(--color-text-inverse);
      border: none; border-radius: var(--radius-full); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all var(--transition);
    }
    .contact-submit:hover { background: var(--color-lime-hover); transform: translateY(-1px); }

    .contact-status {
      font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm);
      display: none; margin-top: 4px;
    }
    .contact-status--success { display: block; background: var(--color-teal-dim); color: var(--color-teal); }
    .contact-status--error { display: block; background: var(--color-red-dim); color: var(--color-red); }

    .contact-info { padding-top: 8px; }
    .contact-info__block { margin-bottom: 24px; }
    .contact-info__label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--color-lime); font-weight: 700; margin-bottom: 6px;
    }
    .contact-info__value { font-size: 14px; line-height: 1.7; color: var(--color-text-muted); }
    .contact-info__value a { color: var(--color-lime); text-decoration: none; font-weight: 600; }

    @media (max-width: 700px) {
      .contact-body { grid-template-columns: 1fr; gap: 32px; }
      .contact-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="contact">
  <div data-partial="nav"></div>

  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="contact"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow">The Dink Society</div>
      <h1 class="page-hero__title">Get In Touch</h1>
      <p class="page-hero__sub">Questions about the league, registration, or partnerships? Drop us a line.</p>
    </div>
  </div>

  <div class="contact-shell">
    <div class="contact-body">
      <form class="contact-form" id="contact-form" onsubmit="return handleContact(event)">
        <div class="contact-row">
          <div class="contact-field">
            <label for="c-first">First name</label>
            <input type="text" id="c-first" name="first" required />
          </div>
          <div class="contact-field">
            <label for="c-last">Last name</label>
            <input type="text" id="c-last" name="last" required />
          </div>
        </div>
        <div class="contact-field">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" name="email" required />
        </div>
        <div class="contact-field">
          <label for="c-subject">What's this about?</label>
          <select id="c-subject" name="subject">
            <option value="">Select a topic</option>
            <option value="registration">Registration question</option>
            <option value="rules">Rules clarification</option>
            <option value="partnership">Partnership / sponsorship</option>
            <option value="feedback">Feedback</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="contact-field">
          <label for="c-message">Message</label>
          <textarea id="c-message" name="message" required></textarea>
        </div>
        <button type="submit" class="contact-submit">Send message</button>
        <div class="contact-status" id="contact-status"></div>
      </form>

      <div class="contact-info">
        <div class="contact-info__block">
          <div class="contact-info__label">Follow us</div>
          <div class="contact-info__value">
            <a href="https://instagram.com/dinksociety.pb" target="_blank" rel="noopener">@dinksociety.pb</a>
          </div>
        </div>
        <div class="contact-info__block">
          <div class="contact-info__label">Location</div>
          <div class="contact-info__value">Southern California</div>
        </div>
        <div class="contact-info__block">
          <div class="contact-info__label">League</div>
          <div class="contact-info__value">Circuit I &middot; May 2026<br>3.0 Mixed &amp; 3.5 Mixed</div>
        </div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    function handleContact(e) {
      e.preventDefault();
      const status = document.getElementById('contact-status');
      status.className = 'contact-status contact-status--success';
      status.textContent = "Message sent! We'll get back to you soon.";
      e.target.reset();
      return false;
    }
  </script>
</body>
</html>
