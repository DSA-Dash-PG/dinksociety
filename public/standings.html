<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings &middot; The Dink Society</title>
  <meta name="description" content="Division standings for The Dink Society pickleball league." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .stand-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }

    /* Tabs */
    .div-tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); flex-wrap: wrap; }
    .div-tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .div-tab:hover  { color: var(--color-text); background: var(--color-surface-2); }
    .div-tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    /* Pre-season banner */
    .preseason-banner {
      background: var(--color-lime-ghost); border: 1px solid var(--color-lime-dim);
      border-radius: var(--radius-md); padding: 12px var(--space-5);
      display: flex; align-items: center; gap: var(--space-3);
      margin-bottom: var(--space-4); font-size: 13px; font-weight: 600;
    }
    .preseason-banner__dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--color-lime);
      flex-shrink: 0; box-shadow: 0 0 0 3px var(--color-lime-dim);
    }
    .preseason-banner__label { color: var(--color-lime); flex: 1; }
    .preseason-banner__note  { color: var(--color-text-faint); font-weight: 400; font-size: 12px; }

    /* Cards */
    .stand-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--space-4);
    }
    .stand-card__hd {
      padding: var(--space-5) var(--space-5) 0;
      display: flex; align-items: baseline; gap: var(--space-3); flex-wrap: wrap;
    }
    .stand-card__title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin: 0; }
    .stand-card__sub   { font-size: 11px; color: var(--color-text-faint); }
    .stand-card__updated { font-size: 10px; color: var(--color-text-faint); margin-left: auto; }

    /* Table wrapper */
    .stand-table-wrap { overflow-x: auto; padding: var(--space-4) 0 0; }
    .stand-table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
    .stand-table th {
      text-align: right; padding: 6px 8px; font-size: 9px;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-faint);
      font-weight: 700; border-bottom: 1px solid var(--color-border-strong);
    }
    .stand-table th:first-child, .stand-table th.col-team { text-align: left; }
    .stand-table td { padding: 10px 8px; border-bottom: 1px solid var(--color-border); text-align: right; }
    .stand-table td:first-child, .stand-table td.col-team { text-align: left; }
    .stand-table tr:last-child td { border-bottom: none; }
    .stand-table tbody tr:hover td { background: var(--color-surface-2); }

    /* Rank */
    .col-rank { width: 36px; color: var(--color-text-faint); font-weight: 800; font-size: 12px; }
    .col-rank--1 { color: #f0c040; }
    .col-rank--2 { color: #c0c8d0; }
    .col-rank--3 { color: #cd7f32; }
    .stand-row--leader td { background: var(--color-lime-ghost); }

    /* Team cell */
    .col-team { min-width: 160px; }
    .team-cell  { display: flex; align-items: center; gap: 8px; }
    .team-emoji { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
    .team-name  { font-weight: 700; color: var(--color-text); }
    a.team-name-link { color: inherit; text-decoration: none; cursor: pointer; }
    a.team-name-link:hover { color: var(--color-lime); text-decoration: underline; }
    .team-badge {
      display: inline-flex; align-items: center;
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 7px; border-radius: var(--radius-full); white-space: nowrap; flex-shrink: 0;
    }
    .team-badge--clinched   { background: var(--color-lime-dim);  color: var(--color-lime); }
    .team-badge--eliminated { background: var(--color-red-dim);   color: var(--color-red); }
    .team-badge--inhunt     { background: var(--color-gold-dim);  color: var(--color-gold); }

    /* Stat cells */
    .col-pts       { font-weight: 800; font-size: 15px; color: var(--color-lime); }
    .col-pts--zero { color: var(--color-text-faint); }
    .col-diff-pos  { color: var(--color-teal); font-weight: 600; }
    .col-diff-neg  { color: var(--color-red);  font-weight: 600; }
    .col-muted     { color: var(--color-text-faint); }

    /* Playoff cutline */
    .cutline-row td { padding: 0 8px !important; border-bottom: none !important; }
    .cutline-inner {
      border-top: 2px dashed rgba(255,255,255,0.18);
      display: flex; align-items: center; gap: 8px; padding: 5px 0 3px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text-faint);
    }

    /* Points note */
    .pts-note {
      padding: var(--space-4) var(--space-5);
      font-size: 11px; color: var(--color-text-faint);
      border-top: 1px solid var(--color-border);
      display: flex; flex-wrap: wrap; gap: 6px 16px;
    }
    .pts-note strong { color: var(--color-text-muted); }

    /* Optional columns */
    .col-opt { }
    @media (max-width: 800px) { .col-opt { display: none; } .stand-table { font-size: 12px; } }
    @media (max-width: 560px) { .stand-table th, .stand-table td { padding: 8px 5px; } .team-emoji { display: none; } }

    /* Legend */
    .legend-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-4);
    }
    .legend-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--color-text-faint); margin: 0 0 var(--space-4);
      display: flex; align-items: center; gap: 8px;
    }
    .legend-title::before { content: ''; display: block; width: 12px; height: 1px; background: var(--color-border-strong); }
    .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 5px 20px; }
    .legend-item { font-size: 12px; color: var(--color-text-muted); }
    .legend-item abbr { font-weight: 800; color: var(--color-text); text-decoration: none; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
    .legend-divider { grid-column: 1 / -1; border: none; border-top: 1px solid var(--color-border); margin: 4px 0; }
    .legend-badges { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 10px 20px; margin-top: 2px; }
    .legend-badge-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-muted); }
    .legend-tiebreak {
      grid-column: 1 / -1; margin-top: 6px; padding: 10px 14px;
      background: var(--color-surface-2); border-radius: var(--radius-sm);
      font-size: 11px; color: var(--color-text-faint); line-height: 1.6;
    }
    .legend-tiebreak strong { color: var(--color-text-muted); }

    /* H2H */
    .section-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-4);
    }
    .section-card__title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 4px; }
    .section-card__sub   { font-size: 12px; color: var(--color-text-faint); margin: 0 0 var(--space-4); }
    .h2h-wrap { overflow-x: auto; }
    .h2h-table { border-collapse: collapse; font-size: 12px; min-width: 100%; }
    .h2h-table th {
      padding: 6px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--color-text-faint);
      border-bottom: 1px solid var(--color-border-strong); text-align: center; white-space: nowrap;
    }
    .h2h-table th.h2h-lbl  { text-align: left; min-width: 120px; }
    .h2h-table th.h2h-tot  { color: var(--color-text); }
    .h2h-table td { padding: 9px 10px; border-bottom: 1px solid var(--color-border); text-align: center; font-variant-numeric: tabular-nums; }
    .h2h-table tr:last-child td { border-bottom: none; }
    .h2h-table td.h2h-team { text-align: left; font-weight: 700; white-space: nowrap; }
    .h2h-table td.h2h-self { background: var(--color-surface-2); color: var(--color-text-faint); }
    .h2h-win  { color: var(--color-lime); font-weight: 700; }
    .h2h-loss { color: var(--color-red); }
    .h2h-tie  { color: var(--color-text-muted); }
    .h2h-total { font-weight: 700; }
    .h2h-note  { margin-top: var(--space-3); font-size: 11px; color: var(--color-text-faint); }

    /* Trajectory */
    .traj-legend { display: flex; flex-wrap: wrap; gap: 8px 20px; margin-bottom: var(--space-4); }
    .traj-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-muted); }
    .traj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #traj-canvas { width: 100%; height: 220px; display: block; }

    /* Empty */
    .empty-state { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--color-text-faint); }

    @media (max-width: 720px) {
      .legend-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body data-page="standings">
  <div data-partial="nav"></div>

  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="standings"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow"><span data-circuit-label>Season 1</span> · <span data-start-month-year>June 2026</span></div>
      <h1 class="page-hero__title">Standings</h1>
    </div>
  </div>

  <div class="stand-shell">

    <div id="preseason-banner" style="display:none">
      <div class="preseason-banner">
        <div class="preseason-banner__dot"></div>
        <span class="preseason-banner__label">Season 1 &middot; Starts Monday June 8, 2026</span>
        <span class="preseason-banner__note">Registration open &middot; Teams listed in sign-up order</span>
      </div>
    </div>

    <nav class="div-tabs" id="div-tabs"></nav>
    <div id="stand-content"><div class="empty-state">Loading&hellip;</div></div>

  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
  // ── Config ───────────────────────────────────────────────────────
  const SEASON = { id:(new URLSearchParams(location.search).get('season')||'circuit-i'), totalMatches:6, maxPtsPerMatch:4, playoffSpots:4 };
  const DIV_LABELS = { '3-5-mixed':'3.0–3.5 Mixed','3-0-mixed':'3.0 Mixed','3.5M':'3.0–3.5 Mixed','3.0M':'3.0 Mixed' };
  const TEAM_COLORS = ['#b8ff2c','#17d7b0','#f0c040','#ff7b54','#a78bfa','#f472b6','#60a5fa','#34d399'];

  // ── State ────────────────────────────────────────────────────────
  let standingsData = null, teamsData = null, activeDivision = '', isPreseason = false;

  // Links carry the current season so navigation stays in context (e.g. test season).
  const LINK_SUFFIX = SEASON.id === 'circuit-i' ? '' : '&season=' + encodeURIComponent(SEASON.id);
  function slug(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,30)||'team';}
  function teamHref(t){const id=t.teamId||slug(t.teamName);return '/team?id='+encodeURIComponent(id)+LINK_SUFFIX;}

  // ── Bootstrap ────────────────────────────────────────────────────
  async function load() {
    try {
      const [sr, tr] = await Promise.all([
        fetch('/.netlify/functions/public-standings?season=' + SEASON.id).then(r => r.ok ? r.json() : null),
        fetch('/.netlify/functions/public-teams?season='    + SEASON.id).then(r => r.ok ? r.json() : null),
      ]);
      standingsData = sr;
      teamsData     = tr;
    } catch { standingsData = { empty: true }; }

    isPreseason = !standingsData?.divisions;
    document.getElementById('preseason-banner').style.display = isPreseason ? '' : 'none';
    renderTabs();
    render();
  }

  // ── Tabs ─────────────────────────────────────────────────────────
  function renderTabs() {
    const el  = document.getElementById('div-tabs');
    let divs  = standingsData?.divisions
      ? Object.keys(standingsData.divisions).sort()
      : [...new Set((teamsData?.teams || []).map(t => t.division).filter(Boolean))].sort();
    if (!divs.length) { el.innerHTML = ''; return; }
    if (!activeDivision || !divs.includes(activeDivision)) activeDivision = divs[0];

    // Build label map from actual data first (divisionLabel field), fall back to hard-coded map
    const labelMap = {};
    (teamsData?.teams || []).forEach(t => {
      if (t.division && t.divisionLabel && !labelMap[t.division]) labelMap[t.division] = t.divisionLabel;
    });
    if (standingsData?.divisions) {
      Object.entries(standingsData.divisions).forEach(([d, data]) => {
        if (data?.divisionLabel && !labelMap[d]) labelMap[d] = data.divisionLabel;
      });
    }
    const tabLabel = d => labelMap[d] || DIV_LABELS[d] || d;

    el.innerHTML = divs.map(d =>
      '<button class="div-tab' + (d === activeDivision ? ' is-active' : '') + '" data-div="' + esc(d) + '">' + esc(tabLabel(d)) + '</button>'
    ).join('');
    el.querySelectorAll('.div-tab').forEach(btn => btn.addEventListener('click', () => {
      activeDivision = btn.dataset.div;
      el.querySelectorAll('.div-tab').forEach(b => b.classList.toggle('is-active', b.dataset.div === activeDivision));
      render();
    }));
  }

  // ── Dispatch ─────────────────────────────────────────────────────
  function render() {
    const el = document.getElementById('stand-content');
    isPreseason ? renderPreseason(el) : renderLive(el);
  }

  // ── Pre-season ───────────────────────────────────────────────────
  function renderPreseason(el) {
    const divTeams = (teamsData?.teams || []).filter(t => !activeDivision || t.division === activeDivision);
    if (!divTeams.length) {
      el.innerHTML = '<div class="empty-state">No teams registered yet — check back soon.</div>';
      return;
    }
    const teams = divTeams.map((t, i) => ({
      rank:0, teamId:t.id, teamName:t.name, teamEmoji:t.emoji||'🏓',
      wins:0, losses:0, ties:0, matchesPlayed:0,
      matchPointsFor:0, matchPointsAgainst:0, pointDiff:0,
      totalGamesWon:0, totalGamesLost:0,
      maxPts: SEASON.totalMatches * SEASON.maxPtsPerMatch, status:null, h2h:{},
    }));
    // Use divisionLabel from the first team, fall back to DIV_LABELS map, then raw code
    const divLabel = divTeams[0]?.divisionLabel || DIV_LABELS[activeDivision] || activeDivision || 'Mixed Doubles';
    el.innerHTML = standingsCardHtml(teams, true, '', divLabel) + legendCardHtml();
  }

  // ── Live season ──────────────────────────────────────────────────
  function renderLive(el) {
    const divData = standingsData?.divisions?.[activeDivision];
    if (!divData?.teams?.length) {
      el.innerHTML = '<div class="empty-state">No standings for this division yet.</div>';
      return;
    }
    const teams = divData.teams.map(t => {
      const remaining = SEASON.totalMatches - (t.matchesPlayed || 0);
      return { ...t, remaining, maxPts: t.matchPointsFor + remaining * SEASON.maxPtsPerMatch };
    });
    computeStatus(teams);
    const updated = standingsData.lastUpdated
      ? '<span class="stand-card__updated">Updated ' + fmtDate(standingsData.lastUpdated) + '</span>' : '';
    // Use divisionLabel from standings blob, then teams fallback, then map
    const divLabel = divData.divisionLabel
      || (teamsData?.teams || []).find(t => t.division === activeDivision)?.divisionLabel
      || DIV_LABELS[activeDivision] || activeDivision || 'Mixed Doubles';
    el.innerHTML = standingsCardHtml(teams, false, updated, divLabel) + legendCardHtml()
                 + h2hCardHtml(teams) + trajectoryCardHtml(teams, divData.weeklyData);
  }

  // ── Standings card ───────────────────────────────────────────────
  function standingsCardHtml(teams, preseason, updatedHtml, divLabel) {
    updatedHtml = updatedHtml || '';
    divLabel = divLabel || DIV_LABELS[activeDivision] || activeDivision || 'Mixed Doubles';
    const spots = SEASON.playoffSpots;
    let rows = '';

    teams.forEach((t, idx) => {
      // Playoff cutline row
      if (!preseason && idx === spots) {
        rows += '<tr class="cutline-row"><td colspan="12" style="padding:0 8px">'
              + '<div class="cutline-inner">CURRENT PLAYOFF LINE</div></td></tr>';
      }

      const rankCls = idx===0 ? 'col-rank--1' : idx===1 ? 'col-rank--2' : idx===2 ? 'col-rank--3' : '';
      const rankSym = preseason ? (idx+1) : (idx===0 ? '🥇' : idx===1 ? '🥈' : idx===2 ? '🥉' : idx+1);

      const pts      = t.matchPointsFor;
      const pb       = (preseason || idx===0) ? '—' : (teams[0].matchPointsFor - pts);
      const diff     = t.pointDiff || 0;
      const diffStr  = preseason ? '—' : (diff===0 ? '0' : diff>0 ? '+'+diff : String(diff));
      const diffCls  = preseason ? 'col-muted' : diff>0 ? 'col-diff-pos' : diff<0 ? 'col-diff-neg' : '';
      const ptsCls   = pts===0 ? 'col-pts col-pts--zero' : 'col-pts';
      const rds      = preseason ? '—' : (t.matchesPlayed || 0) * 2;
      const badge    = badgeHtml(t.status);

      rows += '<tr class="' + (!preseason && idx===0 ? 'stand-row--leader' : '') + '">'
        + '<td class="col-rank ' + rankCls + '">' + rankSym + '</td>'
        + '<td class="col-team"><div class="team-cell">'
        + '  <a class="team-name team-name-link" href="' + teamHref(t) + '">'  + esc(t.teamName)  + '</a>'
        + badge
        + '</div></td>'
        + '<td class="col-opt col-muted">' + rds + '</td>'
        + '<td>' + t.wins + '</td>'
        + '<td>' + t.losses + '</td>'
        + '<td class="col-opt col-muted">' + t.ties + '</td>'
        + '<td class="' + ptsCls + '">' + pts + '</td>'
        + '<td class="col-opt col-muted">' + pb + '</td>'
        + '<td class="col-opt">' + t.totalGamesWon + '</td>'
        + '<td class="col-opt col-muted">' + t.totalGamesLost + '</td>'
        + '<td class="' + diffCls + '">' + diffStr + '</td>'
        + '<td class="col-opt col-muted">' + t.maxPts + '</td>'
        + '</tr>';
    });

    const note = preseason
      ? '<div class="pts-note">Teams listed in registration order. Stats will populate after Week 1.</div>'
      : '<div class="pts-note">'
        + '<span><strong>Point System:</strong> Win = 2 pts · Tie = 1 pt · Loss = 0 pts · Max 4 pts per match (2 rounds)</span>'
        + '<span><strong>Tiebreaker:</strong> PTS → GW → Head-to-Head → DIFF</span>'
        + (teams.length > spots ? '<span>Top ' + spots + ' advance to playoffs · Bottom ' + (teams.length - spots) + ' play consolation bracket</span>' : '')
        + '</div>';

    return '<div class="stand-card">'
      + '<div class="stand-card__hd">'
      + '  <h2 class="stand-card__title">' + esc(divLabel) + '</h2>'
      + (preseason ? '  <span class="stand-card__sub">Pre-Season</span>' : '')
      + updatedHtml
      + '</div>'
      + '<div class="stand-table-wrap">'
      + '<table class="stand-table">'
      + '<thead><tr>'
      + '<th class="col-rank">#</th>'
      + '<th class="col-team">Team</th>'
      + '<th class="col-opt" title="Rounds Played (2 per match)">RDS</th>'
      + '<th title="Round Wins">W</th>'
      + '<th title="Round Losses">L</th>'
      + '<th class="col-opt" title="Round Ties">T</th>'
      + '<th title="Match Points (W\xd72 + T\xd71)">PTS</th>'
      + '<th class="col-opt" title="Points Back from #1">PB</th>'
      + '<th class="col-opt" title="Games Won (all rounds)">GW</th>'
      + '<th class="col-opt" title="Games Lost">GL</th>'
      + '<th title="Points Differential">DIFF</th>'
      + '<th class="col-opt" title="Max possible points">MAX</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table></div>'
      + note
      + '</div>';
  }

  // ── Legend card ──────────────────────────────────────────────────
  function legendCardHtml() {
    return '<div class="legend-card">'
      + '<p class="legend-title">Column Key</p>'
      + '<div class="legend-grid">'
      + '<div class="legend-item"><abbr>RDS</abbr> = Rounds Played (2 per match)</div>'
      + '<div class="legend-item"><abbr>W</abbr> = Round Wins</div>'
      + '<div class="legend-item"><abbr>L</abbr> = Round Losses</div>'
      + '<div class="legend-item"><abbr>T</abbr> = Round Ties</div>'
      + '<div class="legend-item"><abbr>PTS</abbr> = Match Points (W \xd7 2 + T \xd7 1)</div>'
      + '<div class="legend-item"><abbr>PB</abbr> = Points Back from #1</div>'
      + '<div class="legend-item"><abbr>GW</abbr> = Games Won (across all rounds)</div>'
      + '<div class="legend-item"><abbr>GL</abbr> = Games Lost (across all rounds)</div>'
      + '<div class="legend-item"><abbr>DIFF</abbr> = Points Differential (PTS − PA)</div>'
      + '<div class="legend-item"><abbr>MAX</abbr> = Best possible end-of-season pts (current + weeks remaining \xd7 4)</div>'
      + '<hr class="legend-divider" />'
      + '<div class="legend-badges">'
      + '  <div class="legend-badge-item"><span class="team-badge team-badge--clinched">Clinched</span>Locked into top 4 regardless of remaining results</div>'
      + '  <div class="legend-badge-item"><span class="team-badge team-badge--inhunt">In Hunt</span>Could still climb in or fall out</div>'
      + '  <div class="legend-badge-item"><span class="team-badge team-badge--eliminated">Eliminated</span>Mathematically can’t reach top 4</div>'
      + '</div>'
      + '<div class="legend-tiebreak">'
      + '  <strong>Playoff visualization</strong> appears once standings reflect at least 2 completed weeks. '
      + '  Top 4 seeds advance to the Week 7 playoff bracket; the bottom 2 play a consolation match.'
      + '</div>'
      + '</div>'
      + '</div>';
  }

  // ── H2H card ─────────────────────────────────────────────────────
  function h2hCardHtml(teams) {
    const hasData = teams.some(t => t.h2h && Object.keys(t.h2h).length > 0);
    if (!hasData) {
      return '<div class="section-card">'
        + '<h3 class="section-card__title">🤺 Head-to-Head Matrix</h3>'
        + '<p class="section-card__sub">Who owns who — match points in every matchup</p>'
        + '<div class="empty-state" style="padding:28px 20px">Head-to-head results will appear after Week 1.</div>'
        + '</div>';
    }

    const hdCols = teams.map(t =>
      '<th title="' + esc(t.teamName) + '">' + esc(t.teamEmoji || t.teamName.split(' ')[0]) + '</th>'
    ).join('');

    const bodyRows = teams.map(rt => {
      const cells = teams.map(ct => {
        if (rt.teamId === ct.teamId) return '<td class="h2h-self">—</td>';
        const e = rt.h2h?.[ct.teamId];
        if (!e) return '<td class="col-muted">—</td>';
        const cls = e.for > e.against ? 'h2h-win' : e.for < e.against ? 'h2h-loss' : 'h2h-tie';
        return '<td class="' + cls + '">' + e.for + '–' + e.against + '</td>';
      }).join('');
      const tf = Object.values(rt.h2h||{}).reduce((s,v) => s+(v.for||0), 0);
      const ta = Object.values(rt.h2h||{}).reduce((s,v) => s+(v.against||0), 0);
      const tc = tf>ta ? 'h2h-win' : tf<ta ? 'h2h-loss' : 'h2h-tie';
      return '<tr><td class="h2h-team">' + esc(rt.teamEmoji) + ' <a class="team-name-link" href="' + teamHref(rt) + '">' + esc(rt.teamName) + '</a></td>'
           + cells
           + '<td class="h2h-total ' + tc + '">' + tf + '–' + ta + '</td></tr>';
    }).join('');

    return '<div class="section-card">'
      + '<h3 class="section-card__title">🤺 Head-to-Head Matrix</h3>'
      + '<p class="section-card__sub">Who owns who — match points in every matchup</p>'
      + '<div class="h2h-wrap"><table class="h2h-table">'
      + '<thead><tr><th class="h2h-lbl">TEAM ↓ VS →</th>' + hdCols + '<th class="h2h-tot">TOTAL</th></tr></thead>'
      + '<tbody>' + bodyRows + '</tbody>'
      + '</table></div>'
      + '<p class="h2h-note">Each cell = match pts (your score – opponent score). 🟢 = win &nbsp; 🔴 = loss &nbsp; Row = your results vs each opponent.</p>'
      + '</div>';
  }

  // ── Trajectory card ──────────────────────────────────────────────
  function trajectoryCardHtml(teams, weeklyData) {
    if (!weeklyData || Object.keys(weeklyData).length < 2) {
      return '<div class="section-card">'
        + '<h3 class="section-card__title">📈 Team Ranking Trajectory</h3>'
        + '<p class="section-card__sub">How each team’s rank has moved week by week</p>'
        + '<div class="empty-state" style="padding:28px 20px">Trajectory chart appears after Week 2.</div>'
        + '</div>';
    }
    const legendHtml = teams.map((t, i) =>
      '<div class="traj-legend-item">'
      + '<div class="traj-dot" style="background:' + TEAM_COLORS[i % TEAM_COLORS.length] + '"></div>'
      + '<span>' + esc(t.teamName) + '</span>'
      + '</div>'
    ).join('');
    return '<div class="section-card">'
      + '<h3 class="section-card__title">📈 Team Ranking Trajectory</h3>'
      + '<p class="section-card__sub">How each team’s rank has moved week by week</p>'
      + '<div class="traj-legend">' + legendHtml + '</div>'
      + '<canvas id="traj-canvas"></canvas>'
      + '</div>';
    // TODO: draw chart on canvas after rendering using weeklyData rank history
  }

  // ── Status computation ───────────────────────────────────────────
  function computeStatus(teams) {
    const spots = SEASON.playoffSpots;
    if (teams.length <= spots) { teams.forEach(t => t.status = null); return; }
    const sorted = [...teams].sort((a, b) => b.matchPointsFor - a.matchPointsFor);
    teams.forEach(t => {
      if (!t.matchesPlayed) { t.status = null; return; }
      const rank = sorted.findIndex(s => s.teamId === t.teamId) + 1;
      if (rank <= spots) {
        const belowMax = Math.max(...sorted.slice(spots).map(s => s.maxPts));
        t.status = t.matchPointsFor > belowMax ? 'clinched' : 'inhunt';
      } else {
        t.status = t.maxPts < sorted[spots - 1].matchPointsFor ? 'eliminated' : 'inhunt';
      }
    });
  }

  function badgeHtml(s) {
    if (!s) return '';
    if (s==='clinched')   return '<span class="team-badge team-badge--clinched">Clinched</span>';
    if (s==='eliminated') return '<span class="team-badge team-badge--eliminated">Eliminated</span>';
    if (s==='inhunt')     return '<span class="team-badge team-badge--inhunt">In Hunt</span>';
    return '';
  }

  // ── Utilities ────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
           + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }

  load();
  </script>
</body>
