<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings &middot; The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <style>
    .stand-shell { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter) 80px; }
    .stand-body { padding-top: var(--space-4); }

    .tabs { display: flex; gap: 3px; margin-bottom: var(--space-4); }
    .tab {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent; color: var(--color-text-faint);
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .tab:hover { color: var(--color-text); background: var(--color-surface-2); }
    .tab.is-active { background: var(--color-lime); color: var(--color-text-inverse); border-color: var(--color-lime); }

    .stand-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .stand-table th {
      text-align: left; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--color-text-faint); padding: 10px 8px;
      border-bottom: 1px solid var(--color-border-strong); font-weight: 600;
    }
    .stand-table td {
      padding: 14px 8px;
      border-bottom: 1px solid var(--color-border);
    }
    .stand-table tbody tr:first-child td { color: var(--color-lime); font-weight: 600; }
    .stand-table tbody tr:hover td { background: var(--color-surface-2); }

    .rank-num { font-size: 18px; font-weight: 900; color: var(--color-lime); }
    .team-name { font-weight: 700; }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 14px; color: var(--color-text-faint); }

    @media (max-width: 600px) {
      .stand-table { font-size: 13px; }
    }
  </style>
</head>
<body data-page="standings">
  <div data-partial="nav"></div>

  <div class="page-hero">
    <div class="page-hero__bg page-hero__bg--fallback" data-hero-slot="standings"></div>
    <div class="page-hero__gradient"></div>
    <div class="page-hero__content">
      <div class="page-hero__eyebrow">Circuit I · May 2026</div>
      <h1 class="page-hero__title">Standings</h1>
      <p class="page-hero__sub">Updated live after each league night. W-L-T plus round point differential.</p>
    </div>
  </div>

  <div class="stand-shell">
    <div class="stand-body">
      <div class="tabs" id="stand-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>
      <div id="stand-content">
        <div class="empty-state">Standings will populate once league play begins.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('stand-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#stand-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
