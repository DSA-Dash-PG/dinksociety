<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Drop — The Dink Society</title>
  <meta name="description" content="The Drop — The Dink Society's weekly editorial. The storylines, players, and teams that mattered on the courts this week." />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/shared-nav.css" />
  <script src="/js/short-name.js"></script>
  <script>(function(){var t=localStorage.getItem("ds-theme");if(t==="light"){document.documentElement.setAttribute("data-theme","light")}else{document.documentElement.setAttribute("data-theme","dark")}})()</script>

  <meta property="og:title" content="The Drop — The Dink Society" />
  <meta property="og:description" content="The weekly word: the storylines, players, and teams that mattered this week." />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="The Dink Society" />

  <style>
  /* ═══════════════════════════════════════════════════════════════
     THE DROP — full article page. Scoped under #drop. Uses shared.css tokens.
     ═══════════════════════════════════════════════════════════════ */
  #drop{ --serif:'Newsreader',Georgia,serif; }
  #drop a{ color:inherit; }
  #drop .wrap{ max-width:1040px; margin:0 auto; padding:0 var(--gutter); }

  /* breadcrumb / week strip */
  #drop .crumbs{ max-width:1040px; margin:0 auto; padding:88px var(--gutter) 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  #drop .crumbs a.back{ font-size:13px; font-weight:700; color:var(--color-text-muted); text-decoration:none; }
  #drop .crumbs a.back:hover{ color:var(--color-text); }
  #drop .weekpick{ display:flex; gap:6px; flex-wrap:wrap; }
  #drop .weekpick a{ font-size:12px; font-weight:800; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:8px; border:1px solid var(--color-border); color:var(--color-text-faint); text-decoration:none; }
  #drop .weekpick a.on{ background:var(--color-lime); color:var(--color-text-inverse); border-color:var(--color-lime); }
  #drop .weekpick a:not(.on):hover{ color:var(--color-text); border-color:var(--color-border-strong); }

  /* masthead */
  #drop .masthead{ text-align:center; padding:40px 0 26px; border-bottom:1px solid var(--color-border); background:radial-gradient(900px 320px at 50% -30%,var(--color-lime-ghost),transparent 60%); }
  #drop .eyebrow{ display:inline-flex; align-items:center; gap:9px; font-size:11px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:var(--color-lime); margin-bottom:14px; }
  #drop .eyebrow::before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--color-lime); box-shadow:0 0 10px var(--color-lime); }
  #drop .masthead h1{ font-family:var(--serif); font-weight:600; font-size:clamp(3rem,2rem+5vw,5.4rem); line-height:.9; letter-spacing:-.02em; margin:0 0 14px; }
  #drop .masthead h1 .lime{ color:var(--color-lime); }
  #drop .masthead .meta{ font-size:13px; color:var(--color-text-muted); font-weight:500; display:flex; gap:9px; justify-content:center; align-items:center; flex-wrap:wrap; }
  #drop .masthead .meta .dot{ color:var(--color-text-faint); }
  #drop .masthead .tagline{ font-family:var(--serif); font-style:italic; font-size:17px; color:var(--color-text-muted); margin-top:12px; }

  /* layout */
  #drop .layout{ display:grid; grid-template-columns:1fr 312px; gap:46px; padding:40px 0 80px; }
  @media(max-width:880px){ #drop .layout{ grid-template-columns:1fr; gap:36px; } }

  /* lead */
  #drop .kicker{ display:inline-block; font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:800; color:var(--color-lime); border:1px solid var(--color-lime-active); padding:4px 11px; border-radius:999px; margin-bottom:16px; }
  #drop .kicker.upset{ color:var(--color-red); border-color:var(--color-red); }
  #drop .kicker.streak{ color:var(--color-gold); border-color:var(--color-gold); }
  #drop .kicker.riser{ color:var(--color-teal); border-color:var(--color-teal); }
  #drop .lead h2{ font-family:var(--serif); font-weight:600; font-size:clamp(1.9rem,1.4rem+1.6vw,2.7rem); line-height:1.08; letter-spacing:-.015em; margin:0 0 14px; }
  #drop .lead .dek{ font-size:18px; color:var(--color-text-muted); margin-bottom:20px; line-height:1.5; }
  #drop .byline{ display:flex; align-items:center; gap:12px; padding-bottom:24px; margin-bottom:24px; border-bottom:1px solid var(--color-border); font-size:13px; color:var(--color-text-faint); }
  #drop .byline .badge{ width:34px; height:34px; border-radius:8px; background:var(--color-lime); color:var(--color-text-inverse); display:grid; place-items:center; font-family:var(--serif); font-weight:600; font-size:18px; }
  #drop .byline b{ color:var(--color-text); font-weight:600; }
  #drop .lead .bodycopy{ font-size:17px; color:var(--color-text); line-height:1.65; }
  #drop .lead .bodycopy p{ margin:0 0 18px; }
  #drop .lead .bodycopy p:first-of-type::first-letter{ font-family:var(--serif); font-weight:600; font-size:3.1em; line-height:.72; float:left; padding:6px 10px 0 0; color:var(--color-lime); }
  #drop .lead .bodycopy blockquote{ font-family:var(--serif); font-style:italic; font-size:23px; line-height:1.35; color:var(--color-text); border-left:3px solid var(--color-lime); padding:4px 0 4px 22px; margin:26px 0; }

  /* storylines */
  #drop .sec-head{ display:flex; align-items:baseline; gap:14px; margin:48px 0 4px; }
  #drop .sec-head h3{ font-family:var(--serif); font-size:14px; letter-spacing:.04em; font-weight:600; text-transform:uppercase; color:var(--color-text); }
  #drop .sec-head .rule{ flex:1; height:1px; background:var(--color-border); }
  #drop .sec-head .count{ font-size:12px; color:var(--color-text-faint); font-weight:700; }
  #drop .story{ display:grid; grid-template-columns:40px 1fr; gap:18px; padding:24px 0; border-bottom:1px solid var(--color-border); }
  #drop .story .num{ font-family:var(--serif); font-size:28px; font-weight:600; color:var(--color-text-faint); line-height:1; }
  #drop .story h4{ font-family:var(--serif); font-size:23px; font-weight:600; line-height:1.15; margin:8px 0 8px; letter-spacing:-.01em; }
  #drop .story .bodycopy{ color:var(--color-text-muted); font-size:15.5px; line-height:1.6; }
  #drop .story .bodycopy p{ margin:0 0 10px; }
  #drop .story .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  #drop .chip{ display:inline-flex; align-items:baseline; gap:6px; font-size:12px; color:var(--color-text-muted); background:var(--color-surface-2); border:1px solid var(--color-border); padding:3px 10px; border-radius:999px; }
  #drop .chip b{ color:var(--color-text); }

  /* around the league */
  #drop .leaguegrid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:18px 0 6px; }
  @media(max-width:680px){ #drop .leaguegrid{ grid-template-columns:1fr; } }
  #drop .teamrep{ border:1px solid var(--color-border); border-left:3px solid var(--color-lime); border-radius:var(--radius-sm); background:var(--color-surface); padding:13px 15px; }
  #drop .teamrep__nm{ font-family:var(--serif); font-weight:600; font-size:17px; margin-bottom:5px; }
  #drop .teamrep__bl{ font-size:14px; line-height:1.55; color:var(--color-text-muted); }
  #drop .teamrep__bl .ds-ent{ color:var(--color-lime); }
  /* Player/team names in the lead + storyline body copy get the same lime treatment as Around the League. */
  #drop .bodycopy .ds-ent{ color:var(--color-lime); text-decoration:none; font-weight:600; }
  #drop .bodycopy .ds-ent:hover{ text-decoration:underline; }

  /* performers rail */
  #drop .rail{ display:flex; flex-direction:column; gap:16px; position:sticky; top:84px; align-self:start; }
  @media(max-width:880px){ #drop .rail{ position:static; } }
  #drop .card{ background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:18px; }
  #drop .card h5{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--color-text-faint); font-weight:800; margin:0 0 14px; }
  #drop .potw{ display:flex; gap:13px; align-items:center; padding:11px 0; }
  #drop .potw+.potw{ border-top:1px solid var(--color-border); }
  #drop .potw .av{ width:46px; height:46px; border-radius:12px; flex:none; background:var(--color-surface-3); display:grid; place-items:center; font-family:var(--serif); font-weight:600; font-size:17px; color:var(--color-lime); position:relative; }
  #drop .potw .av .chef{ position:absolute; bottom:-6px; right:-6px; width:22px; height:22px; border-radius:50%; background:var(--color-gold); display:grid; place-items:center; font-size:12px; border:2px solid var(--color-surface); }
  #drop .potw .gender{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-faint); font-weight:800; }
  #drop .potw .nm{ font-weight:700; font-size:15px; }
  #drop .potw .sub{ font-size:12.5px; color:var(--color-text-muted); }
  #drop .tow{ display:flex; align-items:center; gap:13px; }
  #drop .tow .crest{ width:50px; height:50px; border-radius:12px; flex:none; background:var(--color-lime); display:grid; place-items:center; font-family:var(--serif); font-weight:600; font-size:21px; color:var(--color-text-inverse); }
  #drop .tow .nm{ font-weight:700; font-size:17px; font-family:var(--serif); }
  #drop .tow .rec{ font-size:13px; color:var(--color-lime-active); font-weight:700; }
  #drop .tow .note{ font-size:12.5px; color:var(--color-text-muted); margin-top:3px; }
  #drop .riser{ display:flex; align-items:center; justify-content:space-between; padding:9px 0; font-size:14px; }
  #drop .riser+.riser{ border-top:1px solid var(--color-border); }
  #drop .riser .who{ display:flex; align-items:center; gap:10px; }
  #drop .riser .rk{ font-size:12px; color:var(--color-text-faint); width:16px; }
  #drop .riser .delta{ font-weight:800; font-size:13px; }
  #drop .riser .delta.up{ color:var(--color-lime); }
  #drop .riser .delta.dn{ color:var(--color-red); }
  #drop .minilink{ display:block; text-align:center; font-size:13px; font-weight:700; color:var(--color-text-muted); text-decoration:none; padding:11px; border:1px solid var(--color-border); border-radius:10px; }
  #drop .minilink:hover{ color:var(--color-text); border-color:var(--color-border-strong); }

  /* tease + states */
  #drop .tease{ border-top:1px solid var(--color-border); margin-top:26px; padding:38px 0 0; text-align:center; }
  #drop .tease .eyebrow{ justify-content:center; }
  #drop .tease h3{ font-family:var(--serif); font-size:25px; font-weight:600; margin:6px 0 8px; }
  #drop .tease p{ color:var(--color-text-muted); max-width:520px; margin:0 auto 20px; }
  #drop .cta{ display:inline-block; background:var(--color-lime); color:var(--color-text-inverse); font-weight:800; font-size:14px; text-decoration:none; padding:12px 26px; border-radius:10px; }
  #drop .state{ max-width:620px; margin:60px auto; text-align:center; color:var(--color-text-muted); }
  #drop .state h2{ font-family:var(--serif); font-weight:600; font-size:28px; color:var(--color-text); margin-bottom:10px; }

  /* ── redesigned rail cards (match home #recap) ── */
  #drop .card .cardhd{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:0 0 12px; }
  #drop .card .cardhd h5{ margin:0; }
  #drop .card .cardmore{ font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--color-lime); text-decoration:none; white-space:nowrap; }
  #drop .card .cardsub{ font-size:10px; color:var(--color-text-faint); font-weight:700; }
  #drop .kchnlbl{ background:#000; border:1px solid rgba(255,255,255,.14); border-radius:6px; padding:3px 8px; font-size:10px; font-weight:900; font-style:italic; color:#f0d020; letter-spacing:.05em; margin-right:8px; }

  /* K'CHN Players of the Week — home-style cards, stacked in the rail */
  #drop .potwcards{ display:grid; grid-template-columns:1fr; gap:11px; }
  #drop .pcard{ position:relative; display:flex; flex-direction:column; border:1px solid var(--color-border); border-radius:var(--radius-lg); background:linear-gradient(160deg,var(--color-surface),var(--color-bg)); padding:14px 14px 13px; overflow:hidden; }
  #drop .pcard::before{ content:''; position:absolute; inset:0 0 auto 0; height:3px; }
  #drop .pcard.m::before{ background:var(--color-lime); }
  #drop .pcard.f::before{ background:var(--color-teal); }
  #drop .pcard__badge{ position:absolute; top:12px; right:12px; font-size:9px; font-weight:900; font-style:italic; color:#f0d020; background:#000; border:1px solid rgba(255,255,255,.12); border-radius:6px; padding:3px 7px; }
  #drop .pcard__cat{ font-size:8.5px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--color-text-faint); }
  #drop .pcard__row{ display:flex; align-items:center; gap:11px; margin:10px 0 13px; }
  #drop .pav{ width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; flex-shrink:0; background:var(--color-surface-2); }
  #drop .pcard.m .pav{ border:2px solid var(--color-lime); color:var(--color-lime); }
  #drop .pcard.f .pav{ border:2px solid var(--color-teal); color:var(--color-teal); }
  #drop .pcard__name{ font-size:15px; font-weight:900; text-transform:uppercase; letter-spacing:-.01em; line-height:1.05; color:var(--color-text); }
  #drop .pcard__team{ font-size:11px; color:var(--color-text-muted); margin-top:3px; }
  #drop .pcard__stats{ margin-top:auto; display:grid; grid-template-columns:repeat(4,1fr); gap:5px; border-top:1px solid var(--color-border); padding-top:11px; }
  #drop .pcard__stats .l{ font-size:8px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-faint); margin-bottom:3px; }
  #drop .pcard__stats .v{ font-size:15px; font-weight:900; line-height:1; color:var(--color-text); }
  #drop .pcard.m .v.hot{ color:var(--color-lime); }
  #drop .pcard.f .v.hot{ color:var(--color-teal); }

  /* Team of the Week */
  #drop .totw{ display:flex; align-items:center; gap:13px; }
  #drop .totw .crest{ width:48px; height:48px; border-radius:12px; flex:none; background:var(--color-lime); display:grid; place-items:center; font-family:var(--serif); font-weight:600; font-size:19px; color:var(--color-text-inverse); }
  #drop .totw .nm{ font-weight:900; font-size:15px; text-transform:uppercase; letter-spacing:-.01em; }
  #drop .totw .rec2{ font-size:12.5px; color:var(--color-lime-active); font-weight:800; margin-top:2px; }
  #drop .totw .note{ font-size:12px; color:var(--color-text-muted); margin-top:3px; }

  /* Top Performers — tabbed */
  #drop .perftabs{ display:flex; gap:4px; background:var(--color-surface-2); border:1px solid var(--color-border); border-radius:11px; padding:3px; margin-bottom:12px; }
  #drop .perftabs button{ flex:1; font-family:inherit; font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.02em; color:var(--color-text-muted); background:none; border:0; padding:8px 4px; border-radius:8px; cursor:pointer; transition:background .12s,color .12s; }
  #drop .perftabs button:hover{ color:var(--color-text); }
  #drop .perftabs button.on{ background:var(--color-lime); color:var(--color-text-inverse); }
  #drop .dp-perfpanel{ display:none; flex-direction:column; gap:11px; }
  #drop .dp-perfpanel.on{ display:flex; }
  #drop .perf-col{ border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-surface-2); padding:12px 12px 6px; }
  #drop .perf-col h4{ font-size:9.5px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--color-text-faint); margin:0 0 4px; }
  #drop .prow{ display:flex; align-items:center; gap:9px; padding:8px 0; border-top:1px solid var(--color-border); }
  #drop .prow:first-of-type{ border-top:none; }
  #drop .prk{ font-size:12px; font-weight:900; color:var(--color-text-faint); width:14px; flex-shrink:0; }
  #drop .prow.lead .prk{ color:var(--color-gold); }
  #drop .prow-av{ width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; background:var(--color-surface-3); color:var(--color-text-muted); overflow:hidden; border:1.5px solid var(--color-border); }
  #drop .perf-col.m .prow-av{ border-color:rgba(184,255,44,.45); }
  #drop .perf-col.f .prow-av{ border-color:rgba(23,215,176,.45); }
  #drop .pav img{ width:100%; height:100%; object-fit:cover; border-radius:inherit; }
  #drop .pinfo{ min-width:0; flex:1; }
  #drop .pnm{ font-weight:800; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--color-text); }
  #drop .ptm{ font-size:10px; color:var(--color-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #drop .pval{ margin-left:auto; font-size:15px; font-weight:900; flex-shrink:0; }
  #drop .perf-col.m .pval{ color:var(--color-lime); }
  #drop .perf-col.f .pval{ color:var(--color-teal); }

  /* Top Climbers */
  #drop .climb{ display:flex; align-items:center; gap:11px; padding:10px 0; border-top:1px solid var(--color-border); }
  #drop .climb:first-of-type{ border-top:none; }
  #drop .climb .cav{ width:38px; height:38px; border-radius:50%; flex:none; background:var(--color-surface-2); border:2px solid var(--color-teal); color:var(--color-teal); display:grid; place-items:center; font-weight:900; font-size:13px; }
  #drop .climb .cnm{ font-weight:900; font-size:13px; text-transform:uppercase; letter-spacing:-.01em; line-height:1.05; }
  #drop .climb .ctm{ font-size:10.5px; color:var(--color-text-muted); margin-top:2px; }
  #drop .climb .cjump{ margin-left:auto; text-align:right; flex:none; }
  #drop .climb .cdelta{ font-size:16px; font-weight:900; color:var(--color-teal); line-height:1; }
  #drop .climb .cdelta::before{ content:'▲ '; font-size:11px; }
  #drop .climb .crank{ font-size:10px; color:var(--color-text-faint); font-weight:700; margin-top:3px; white-space:nowrap; }
  </style>
</head>
<body>
  <div data-partial="nav"></div>

  <main id="drop">
    <div class="crumbs">
      <a class="back" href="/">← Weekly Recap</a>
      <nav class="weekpick" id="dp-weekpick"></nav>
    </div>

    <!-- loaded states swap in here -->
    <div id="dp-root">
      <div class="state"><h2>Loading The Drop…</h2><p>Pulling this week's word from the desk.</p></div>
    </div>
  </main>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script src="/js/entity-cards.js"></script>
  <script>
  (function () {
    var SN = (typeof shortName === 'function') ? shortName : function (s) { return s || ''; };
    var IDX = null; // entity index (players/teams) for editorial links + hover cards
    function entTeam(name){ if(!name) return ''; return '<a class="ds-ent" data-ent="'+esc(name)+'" href="'+window.DSEntity.teamHref(name)+'">'+esc(name)+'</a>'; }
    function entPlayer(name, teamName, display){ if(!name) return esc(display||''); var d=(display!=null?display:name); return '<a class="ds-ent" data-ent="'+esc(name)+'" href="'+window.DSEntity.playerHref(name, teamName||'')+'">'+esc(d)+'</a>'; }
    function L(text){ return (window.DSEntity && IDX) ? window.DSEntity.linkify(esc(text), IDX) : esc(text); }
    function Lhtml(html){ return (window.DSEntity && IDX) ? window.DSEntity.linkify(html||'', IDX) : (html||''); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function initials(name){ if(!name) return '?'; var p=String(name).trim().split(/\s+/); return ((p[0][0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase(); }
    // Player avatar: photo when we can resolve one (direct photoUrl/playerId, else
    // matched by name against the players aggregate), falling back to initials.
    function ddPlayerByName(name){ if(!DROP_PLAYERS||!name) return null; var n=String(name).trim().toLowerCase(); var ks=Object.keys(DROP_PLAYERS); for(var i=0;i<ks.length;i++){ var pp=DROP_PLAYERS[ks[i]]; if(String(pp.name||'').trim().toLowerCase()===n) return pp; } return null; }
    function avatarHtml(p, cls){
      var ini=esc(initials(p&&p.name)), url=p&&p.photoUrl, pid=p&&p.playerId;
      if(!url&&!pid&&p&&p.name){ var m=ddPlayerByName(p.name); if(m){ url=m.photoUrl; pid=m.playerId; } }
      var src = url ? url : (pid ? '/.netlify/functions/player-photo-serve?id='+encodeURIComponent(pid) : null);
      if(!src) return '<div class="'+cls+'">'+ini+'</div>';
      return '<div class="'+cls+'" data-ini="'+ini+'"><img src="'+src+'" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" onerror="this.remove();this.parentNode.textContent=this.parentNode.dataset.ini;"></div>';
    }
    function rec(w,l){ return (w==null?0:w)+'–'+(l==null?0:l); }
    function qs(k){ return new URLSearchParams(location.search).get(k); }

    var TOTAL_WEEKS = 8;
    var reqWeek = qs('week');
    var DROP_PLAYERS = null; // players aggregate (composite + rankDelta + gender), for live Top Movers

    // Top Performers tab switcher (delegated — survives root.innerHTML swaps).
    document.addEventListener('click', function(e){
      var b = e.target.closest('.dp-perf .perftabs button'); if(!b) return;
      var wrap = b.closest('.dp-perf'); if(!wrap) return;
      var k = b.getAttribute('data-k');
      wrap.querySelectorAll('.perftabs button').forEach(function(x){ x.classList.toggle('on', x===b); });
      wrap.querySelectorAll('.dp-perfpanel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-tab')===k); });
    });

    function renderWeekpick(current, publishedWeeks){
      var el = document.getElementById('dp-weekpick'); if(!el) return;
      var pub = {}; (publishedWeeks||[]).forEach(function(w){ pub[w]=1; });
      var html = '';
      for(var w=1; w<=TOTAL_WEEKS; w++){
        if(pub[w]){ html += '<a href="/drop.html?week='+w+'" class="'+(w===current?'on':'')+'">'+w+'</a>'; }
      }
      el.innerHTML = html;
    }

    function storyTagClass(kind){
      return ({title:'',upset:'upset',streak:'streak',riser:'riser',note:''})[kind]||'';
    }

    function signed(n){ if(n==null||n==='') return '—'; n=+n; if(!isFinite(n)) return '—'; return (n>0?'+':'')+n; }
    function perfVal(p, metric){
      if(metric==='diff') return signed(p.diff);
      if(metric==='pts') return p.ps!=null?p.ps:'—';
      return p.dsr!=null?p.dsr:'—';
    }
    function perfRows(arr, metric){
      return (arr||[]).slice(0,6).map(function(p,i){
        return '<div class="prow'+(i===0?' lead':'')+'"><span class="prk">'+(i+1)+'</span>'
          + avatarHtml(p,'prow-av')
          + '<div class="pinfo"><div class="pnm">'+entPlayer(p.name, p.teamName, SN(p.name))+'</div>'
          + '<div class="ptm">'+esc(p.teamName||'')+' · '+esc(rec(p.w,p.l))+'</div></div>'
          + '<span class="pval">'+esc(perfVal(p,metric))+'</span></div>';
      }).join('');
    }
    function perfPanel(tp, metric, on){
      var men = (tp.men && tp.men[metric]) || [], women = (tp.women && tp.women[metric]) || [];
      return '<div class="dp-perfpanel'+(on?' on':'')+'" data-tab="'+metric+'">'
        + '<div class="perf-col m"><h4>Men · Top 6</h4>'+perfRows(men,metric)+'</div>'
        + '<div class="perf-col f"><h4>Women · Top 6</h4>'+perfRows(women,metric)+'</div></div>';
    }

    // Top Movers (climbers) — biggest DSR rank jumps this week, computed live from
    // the players aggregate (composite rank + rankDelta) so ranks are always current.
    function computeClimbers(){
      if(!DROP_PLAYERS) return [];
      var all=Object.keys(DROP_PLAYERS).map(function(k){return DROP_PLAYERS[k];});
      var ranked=all.filter(function(p){return p.composite!=null&&isFinite(p.composite);}).slice()
        .sort(function(a,b){return b.composite-a.composite;});
      var rankOf={};
      ranked.forEach(function(p,i){rankOf[p.playerId!=null?p.playerId:p.name]=i+1;});
      return all.filter(function(p){return p.rankDelta!=null&&isFinite(p.rankDelta)&&p.rankDelta>0;})
        .sort(function(a,b){return b.rankDelta-a.rankDelta;})
        .map(function(p){var rk=rankOf[p.playerId!=null?p.playerId:p.name]||null;
          return {name:p.name,teamName:p.teamName,gender:p.gender,playerId:p.playerId,photoUrl:p.photoUrl,delta:p.rankDelta,rank:rk,fromRank:rk!=null?rk+p.rankDelta:null};});
    }
    function climberRows(cl, g){
      var rows=cl.filter(function(c){return String(c.gender||'').toUpperCase()===g;}).slice(0,6);
      if(!rows.length) return '<div class="prow" style="color:var(--color-text-faint);font-size:11px;padding:8px 4px;">No movers yet.</div>';
      return rows.map(function(c,i){
        var jump=(c.rank&&c.fromRank)?' · #'+c.fromRank+' → #'+c.rank:'';
        return '<div class="prow'+(i===0?' lead':'')+'"><span class="prk">'+(i+1)+'</span>'
          + avatarHtml(c,'prow-av')
          + '<div class="pinfo"><div class="pnm">'+entPlayer(c.name, c.teamName, SN(c.name))+'</div>'
          + '<div class="ptm">'+esc(c.teamName||'')+jump+'</div></div>'
          + '<span class="pval" style="color:var(--color-lime)">▲'+esc(c.delta)+'</span></div>';
      }).join('');
    }
    function movingPanel(on){
      var cl=computeClimbers();
      return '<div class="dp-perfpanel'+(on?' on':'')+'" data-tab="moving">'
        + '<div class="perf-col m"><h4>Men · Top Movers</h4>'+climberRows(cl,'M')+'</div>'
        + '<div class="perf-col f"><h4>Women · Top Movers</h4>'+climberRows(cl,'F')+'</div></div>';
    }

    function pcard(p, cls, cat){
      return '<div class="pcard '+cls+'"><div class="pcard__badge">K\'CHN</div>'
        + '<div class="pcard__cat">'+cat+'</div>'
        + '<div class="pcard__row">'+avatarHtml(p,'pav')+''
          + '<div><div class="pcard__name">'+entPlayer(p.name, p.teamName, SN(p.name))+'</div>'
          + (p.teamName?'<div class="pcard__team">'+entTeam(p.teamName)+'</div>':'')+'</div></div>'
        + '<div class="pcard__stats">'
          + '<div><div class="l">Rec</div><div class="v hot">'+esc(rec(p.w,p.l))+'</div></div>'
          + '<div><div class="l">PS</div><div class="v">'+esc(p.ps!=null?p.ps:'—')+'</div></div>'
          + '<div><div class="l">Diff</div><div class="v">'+esc(signed(p.diff))+'</div></div>'
          + '<div><div class="l">DSR</div><div class="v">'+esc(p.dsr!=null?p.dsr:'—')+'</div></div>'
        + '</div></div>';
    }

    function performerHtml(perf){
      if(!perf) return '';
      var html = '';
      // K'CHN Players of the Week — home-style cards
      var pm = perf.potw && perf.potw.men, pf = perf.potw && perf.potw.women;
      if(pm || pf){
        html += '<div class="card"><div class="cardhd"><h5><span class="kchnlbl">K\'CHN</span>Players of the Week</h5></div><div class="potwcards">';
        if(pm) html += pcard(pm,'m','Male · POTW');
        if(pf) html += pcard(pf,'f','Female · POTW');
        html += '</div></div>';
      }
      // Team of the Week
      var t = perf.teamOfWeek;
      if(t && t.name){
        html += '<div class="card"><div class="cardhd"><h5>Team of the Week</h5></div><div class="totw">'
          + '<div class="crest">'+(t.emoji?esc(t.emoji):esc(initials(t.name)))+'</div>'
          + '<div><div class="nm">'+entTeam(t.name)+'</div>'
          + (t.record?'<div class="rec2">'+esc(t.record)+'</div>':'')
          + (t.note?'<div class="note">'+esc(t.note)+'</div>':'')
          + '</div></div></div>';
      }
      // Top Performers — tabbed: DSR / Best Diff / Most Pts, top 6 M & F
      var tp = perf.topPerformers;
      if(tp && (tp.men || tp.women)){
        html += '<div class="card"><div class="cardhd"><h5>Top Performers</h5><a class="cardmore" href="/leaderboard.html">Leaderboard →</a></div>'
          + '<div class="dp-perf">'
          + '<div class="perftabs"><button class="on" data-k="dsr">DSR</button><button data-k="diff">Diff</button><button data-k="pts">Pts</button><button data-k="moving">Movers</button></div>'
          + perfPanel(tp,'dsr',true) + perfPanel(tp,'diff',false) + perfPanel(tp,'pts',false) + movingPanel(false)
          + '</div></div>';
      }
      html += '<a class="minilink" href="/standings.html">View full standings →</a>';
      return html;
    }

    function storyHtml(s, i){
      var chips = (s.chips||[]).map(function(c){ return '<span class="chip"><span>'+esc(c.label)+'</span>'+(c.value!=null&&c.value!==''?'<b>'+esc(c.value)+'</b>':'')+'</span>'; }).join('');
      return '<article class="story"><div class="num">'+('0'+(i+2)).slice(-2)+'</div><div>'
        + (s.tag?'<span class="kicker '+storyTagClass(s.tagKind)+'">'+esc(s.tag)+'</span>':'')
        + (s.title?'<h4>'+L(s.title)+'</h4>':'')
        + '<div class="bodycopy">'+Lhtml(s.html)+'</div>'
        + (chips?'<div class="chips">'+chips+'</div>':'')
        + '</div></article>';
    }

    function render(drop){
      var root = document.getElementById('dp-root');
      var lead = '<article class="lead">'
        + '<span class="kicker">The Lead</span>'
        + '<h2>'+L(drop.title)+'</h2>'
        + (drop.dek?'<p class="dek">'+L(drop.dek)+'</p>':'')
        + '<div class="byline"><div class="badge">D</div><div>'+esc(drop.byline||'By The Society Desk')+' · Dink Society editorial</div></div>'
        + '<div class="bodycopy">'+Lhtml(drop.leadHtml)+'</div></article>';

      var rest = (drop.storylines||[]).slice(0);
      var stories = '';
      if(rest.length){
        stories = '<div class="sec-head"><h3>Also This Week</h3><span class="rule"></span><span class="count">'+rest.length+' storyline'+(rest.length>1?'s':'')+'</span></div>'
          + rest.map(storyHtml).join('');
      }

      // Around the League — a bright spot for every team, shown BEFORE the storylines.
      var league = '';
      var trs = drop.teamReports||[];
      if(trs.length){
        league = '<div class="sec-head"><h3>Around the League</h3><span class="rule"></span><span class="count">'+trs.length+' team'+(trs.length>1?'s':'')+'</span></div>'
          + '<div class="leaguegrid">'
          + trs.map(function(r){ return '<div class="teamrep"><div class="teamrep__nm">'+entTeam(r.team)+'</div><div class="teamrep__bl">'+L(r.blurb)+'</div></div>'; }).join('')
          + '</div>';
      }

      var aside = '<aside><div class="rail">'+performerHtml(drop.performers)+'</div></aside>';

      var tease = '<div class="tease"><div class="eyebrow">Next Drop · Tuesday</div><h3>The week after never waits</h3>'
        + '<p>New results, new storylines. We\'ll have the word the morning after game night.</p>'
        + '<a class="cta" href="/">Back to Weekly Recap</a></div>';

      var head = '<header class="masthead">'
        + '<h1>The <span class="lime">Drop</span></h1>'
        + '<div class="meta"><span>'+esc(drop.kicker||('Week '+drop.week))+'</span><span class="dot">·</span>'
        + '<span>'+esc(dateStr(drop.publishedAt))+'</span><span class="dot">·</span><span>'+esc((drop.readMins||4)+' min read')+'</span></div></header>';

      root.innerHTML = head + '<div class="wrap"><div class="layout"><main>'+lead+league+stories+'</main>'+aside+'</div>'+tease+'</div>';
      document.title = 'The Drop · '+(drop.kicker||('Week '+drop.week))+' — The Dink Society';
      if(window.DSEntity && IDX) window.DSEntity.mount(root, IDX);
    }

    function dateStr(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }

    function showEmpty(msg){
      document.getElementById('dp-root').innerHTML =
        '<header class="masthead"><h1>The <span class="lime">Drop</span></h1></header>'
        + '<div class="state"><h2>No Drop yet</h2><p>'+esc(msg||'The first Drop lands after Week 1.')+'</p></div>';
    }

    // Preview mode (?preview=1) renders the DRAFT via the authenticated admin
    // endpoint, so editors can see a week before it's published. Normal mode
    // uses the public endpoint (published Drops only).
    var reqPreview = qs('preview');
    var api = reqPreview
      ? ('/.netlify/functions/admin-drop?week=' + encodeURIComponent(reqWeek||''))
      : ('/.netlify/functions/public-drop' + (reqWeek?('?week='+encodeURIComponent(reqWeek)):''));
    function getJSON(u, creds){ return fetch(u, creds?{credentials:'include'}:undefined).then(function(r){ return r.ok?r.json():null; }).catch(function(){ return null; }); }
    Promise.all([
      getJSON(api, !!reqPreview),
      getJSON('/.netlify/functions/public-drop?view=index'),
      getJSON('/.netlify/functions/public-leaderboard?view=players'),
      getJSON('/.netlify/functions/public-standings'),
      getJSON('/.netlify/functions/public-teams')
    ]).then(function(res){
      var data = res[0], idx = res[1], pl = res[2], st = res[3], tm = res[4];
      DROP_PLAYERS = (pl && pl.players) ? pl.players : null;
      try {
        if(window.DSEntity){
          IDX = window.DSEntity.buildIndex({
            teams: (tm && tm.teams) ? tm.teams : [],
            players: (pl && pl.players) ? Object.values(pl.players) : [],
            standings: st || null
          });
        }
      } catch(e){ IDX = null; }
      var pubWeeks = (idx && idx.weeks ? idx.weeks.map(function(w){ return w.week; }) : []);
      // Preview: admin-drop returns {record, livePerformers}. Normal: public-drop returns {drop}.
      var dropObj = null;
      if(reqPreview){
        if(data && data.record){ dropObj = data.record; var pf=dropObj.performers; if(!pf || !pf.potw || (!pf.potw.men && !pf.potw.women)) dropObj.performers = data.livePerformers || pf; }
      } else if(data && !data.empty && data.drop){ dropObj = data.drop; }
      if(!dropObj){ showEmpty(reqPreview ? 'Nothing to preview yet — save the draft first, and make sure you are logged into admin in this browser.' : (data && data.message)); renderWeekpick(-1, pubWeeks); return; }
      render(dropObj);
      renderWeekpick(dropObj.week, pubWeeks);
    });
  })();
  </script>
</body>
</html>
