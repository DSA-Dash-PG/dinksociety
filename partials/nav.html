<script>
(function(){
  // Theme toggle
  const toggle = document.getElementById('theme-toggle');
  const root = document.documentElement;
  const saved = localStorage.getItem('ds-theme');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let theme = saved || (systemDark ? 'dark' : 'light');
  root.setAttribute('data-theme', theme);
  updateIcon(theme);
  if (toggle) toggle.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    localStorage.setItem('ds-theme', theme);
    updateIcon(theme);
  });
  function updateIcon(t) {
    if (!toggle) return;
    toggle.querySelector('.icon-sun').style.display = t === 'dark' ? 'block' : 'none';
    toggle.querySelector('.icon-moon').style.display = t === 'light' ? 'block' : 'none';
  }
  // Active link
  const path = location.pathname;
  document.querySelectorAll('.ds-nav__link, .ds-nav__drawer-link').forEach(a => {
    const href = a.getAttribute('href');
    if (href === path || (href === '/' && (path === '/' || path === '/index.html'))) a.classList.add('is-active');
  });
})();
</script>
