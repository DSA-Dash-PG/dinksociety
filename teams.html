<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams · The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/shared-nav.css">
  <link rel="stylesheet" href="/css/compat.css">
</head>
<body>
  <div data-partial="nav"></div>

  <div class="teams-shell">
    <div class="teams-hero">
      <h1>Circuit I rosters</h1>
      <p>4&ndash;10 players per team. Tap a team to see the full roster, match history, and player profiles.</p>
    </div>

    <div class="teams-body">
      <div class="tabs" id="teams-tabs">
        <button class="tab is-active" data-division="3.0-mixed">3.0 Mixed</button>
        <button class="tab" data-division="3.5-mixed">3.5 Mixed</button>
      </div>

      <div id="teams-grid">
        <div class="empty-state">Teams will appear once rosters are set for Circuit I.</div>
      </div>
    </div>
  </div>

  <div data-partial="footer"></div>
  <script src="/js/partials.js"></script>
  <script>
    document.getElementById('teams-tabs')?.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      document.querySelectorAll('#teams-tabs .tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  </script>
</body>
</html>
