<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Standings redesign — Dink Society (mockup)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,600;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0e0e;--surf:#161616;--surf2:#1e1e1e;--surf3:#262626;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
    --tx:#f0f0ec;--mut:#9a9e97;--fnt:#5e625c;--inv:#0e0e0e;--lime:#b8ff2c;--limed:rgba(184,255,44,.12);--teal:#17d7b0;--teald:rgba(23,215,176,.12);--gold:#f0c040;--goldd:rgba(240,192,64,.12);--red:#ff5c47;--redd:rgba(255,92,71,.12)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:var(--tx);font-family:'Inter',sans-serif;line-height:1.45;display:flex;flex-direction:column;align-items:center;padding:24px 12px 60px;gap:14px}
  .cap{color:var(--mut);font-size:13px;max-width:430px;text-align:center}.cap b{color:var(--tx)}
  .phone{width:412px;max-width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:26px;overflow:hidden;height:820px;display:flex;flex-direction:column}
  .hdr{padding:16px;border-bottom:1px solid var(--bd);font-size:18px;font-weight:900;font-style:italic;text-transform:uppercase}
  .scroll{flex:1;overflow-y:auto;padding:14px 14px 24px}
  /* main pills */
  .mainpills{display:flex;gap:6px;background:var(--surf2);border:1px solid var(--bd);border-radius:999px;padding:4px;margin-bottom:12px}
  .mainpills button{flex:1;background:none;border:0;color:var(--mut);font:inherit;font-size:13.5px;font-weight:800;padding:9px;border-radius:999px;cursor:pointer}
  .mainpills button.on{background:var(--teal);color:#06231d}
  .mainpills button.on.ld{background:var(--lime);color:#06210f}
  /* sub pills (scrollable row) */
  .subpills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
  .subpills::-webkit-scrollbar{display:none}
  .subpills button{flex:0 0 auto;background:var(--surf2);border:1px solid var(--bd);color:var(--mut);font:inherit;font-size:11.5px;font-weight:800;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .subpills button.on{background:var(--lime);color:var(--inv);border-color:var(--lime)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{font-size:8.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--fnt);text-align:center;padding:9px 5px;background:var(--surf)}
  th.l,td.l{text-align:left}
  td{padding:11px 5px;border-top:1px solid var(--bd);text-align:center;white-space:nowrap}
  tr.lead td{background:rgba(240,192,64,.05)}
  .em{font-size:15px;margin-right:5px}
  .chip{display:inline-block;font-size:11px;font-weight:800;color:var(--inv);background:var(--teal);padding:2px 8px;border-radius:999px}
  /* row list */
  .row{display:flex;align-items:center;gap:11px;padding:10px 4px;border-top:1px solid var(--bd)}
  .row:first-child{border-top:0}
  .rk{width:18px;text-align:center;font-weight:900;font-size:13px;color:var(--fnt)}
  .rk.g1{color:var(--gold)}.rk.g2{color:#cfd3c8}.rk.g3{color:#cd7f32}
  .av{width:32px;height:32px;border-radius:50%;flex:none;background:var(--surf3);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--mut)}
  .nm{flex:1;min-width:0;font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nm small{display:block;font-size:10px;color:var(--fnt);font-weight:600}
  .val{font-weight:900;font-size:15px}.val.lime{color:var(--lime)}.val.teal{color:var(--teal)}
  .delta{font-weight:900;font-size:13px;min-width:42px;text-align:right}
  .delta.up{color:var(--lime)}.delta.dn{color:var(--red)}
  /* Movers / Droppers — two columns */
  .mcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
  .mcol{background:var(--surf2);border:1px solid var(--bd);border-radius:12px;padding:10px 11px}
  .mcol h4{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--fnt);margin-bottom:2px}
  .mcol .row{gap:7px;padding:8px 0}
  .mcol .av{width:26px;height:26px;font-size:10px}
  .mcol .nm{font-size:12px}.mcol .nm small{font-size:9px}
  .mcol .delta{min-width:0;font-size:13px}
  .lbl{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--fnt);margin:4px 2px 10px}
  .pillsm{font-size:9px;font-weight:800;color:var(--lime);background:var(--limed);border:1px solid rgba(184,255,44,.3);padding:2px 8px;border-radius:999px}
  .foot{margin-top:18px;font-size:12.5px;color:var(--mut);background:var(--surf);border:1px solid var(--bd);border-left:3px solid var(--lime);border-radius:8px;padding:12px 14px;line-height:1.55}.foot b{color:var(--tx)}
</style>
</head>
<body>
  <div class="cap"><b>Standings redesign — interactive mockup.</b> Tap the League/Ladder pills and the sub-pills. Representative data, nothing wired.</div>
  <div class="phone">
    <div class="hdr">Standings</div>
    <div class="scroll">
      <div class="mainpills" id="mainpills">
        <button data-m="league" class="on">League</button>
        <button data-m="ladder">Ladder</button>
      </div>
      <div class="subpills" id="subpills"></div>
      <div id="content"></div>
    </div>
  </div>
  <div class="cap">Movers is now <b>one genderless top-6</b> — biggest rank moves in <b>both</b> directions (gainers ▲ lime, fallers ▼ red).</div>

<script>
var STATE={ main:'league', sub:'standings' };
var SUBS={
  league:[['standings','Standings'],['leaderboard','Leaderboard'],['streaks','Hot Streaks'],['dsr','DSR'],['pts','PTS'],['movers','Movers']],
  ladder:[['standings','Standings'],['leaderboard','Leaderboard'],['streaks','Hot Streaks'],['avg','Avg'],['wins','Wins']]
};

var TEAMS=[
  {n:'Smash Society',e:'🏔️',dsr:458.8,w:4,t:0,l:0,pts:8,gw:20,ps:246,diff:138},
  {n:'ZERO ZERO TWO',e:'🎯',dsr:599,w:3,t:1,l:0,pts:7,gw:20,ps:242,diff:134},
  {n:'Big Dink Energy',e:'😤',dsr:408.7,w:2,t:1,l:1,pts:5,gw:13,ps:184,diff:9},
  {n:"K'CHN",e:'🍌',dsr:310.3,w:2,t:0,l:2,pts:4,gw:12,ps:177,diff:-15},
  {n:'What the Dink?!',e:'👹',dsr:158.6,w:0,t:0,l:4,pts:0,gw:5,ps:137,diff:-99},
  {n:'Timog Cal',e:'🌴',dsr:58.5,w:0,t:0,l:4,pts:0,gw:2,ps:91,diff:-167}
];
var PLAYERS=[
  {n:'Ryan Hom',t:'Smash Society',dsr:97.6,ps:88,w:8,l:0,streak:8,delta:3},
  {n:'Judy Dela Cruz',t:'ZERO ZERO TWO',dsr:96.7,ps:84,w:8,l:0,streak:6,delta:1},
  {n:'Shay Co',t:'ZERO ZERO TWO',dsr:96.1,ps:80,w:7,l:1,streak:4,delta:0},
  {n:'Phoebe Bautista',t:'Smash Society',dsr:93.8,ps:78,w:7,l:1,streak:5,delta:2},
  {n:'Annie Kang',t:'Smash Society',dsr:93.2,ps:75,w:6,l:2,streak:3,delta:-1},
  {n:'Lara Park',t:'ZERO ZERO TWO',dsr:92.9,ps:74,w:6,l:2,streak:2,delta:9},
  {n:'Eli Ho',t:'Big Dink Energy',dsr:91.7,ps:70,w:5,l:1,streak:5,delta:11},
  {n:'Richard Hak',t:'Big Dink Energy',dsr:57.4,ps:50,w:4,l:2,streak:4,delta:10},
  {n:'Ant Bautista',t:'ZERO ZERO TWO',dsr:90.7,ps:68,w:5,l:1,streak:1,delta:-4},
  {n:'Philip Reyes',t:'ZERO ZERO TWO',dsr:88.7,ps:66,w:4,l:2,streak:0,delta:-6},
  {n:'Kai Park',t:'Smash Society',dsr:80.4,ps:61,w:5,l:3,streak:0,delta:-3},
  {n:'Mia Tan',t:'Big Dink Energy',dsr:78.1,ps:58,w:3,l:3,streak:2,delta:8}
];
function ini(n){return n.split(' ').map(function(x){return x[0];}).join('').slice(0,2).toUpperCase();}
function rkCls(i){return i===0?'g1':i===1?'g2':i===2?'g3':'';}

function standingsTable(){
  return '<table><thead><tr><th>#</th><th class="l">Team</th><th>DSR</th><th>W</th><th>T</th><th>L</th><th>Pts</th><th>Diff</th></tr></thead><tbody>'
    + TEAMS.map(function(t,i){return '<tr class="'+(i===0?'lead':'')+'"><td>'+(i+1)+'</td><td class="l"><span class="em">'+t.e+'</span>'+t.n+(i===0?' <span class="chip" style="font-size:8px;padding:1px 6px">TOP</span>':'')+'</td><td><span style="color:var(--teal);font-weight:800">'+t.dsr+'</span></td><td>'+t.w+'</td><td>'+t.t+'</td><td>'+t.l+'</td><td><b>'+t.pts+'</b></td><td style="color:'+(t.diff>=0?'var(--lime)':'var(--red)')+'">'+(t.diff>0?'+':'')+t.diff+'</td></tr>';}).join('')
    + '</tbody></table>';
}
function playerRows(arr, valFn, valCls){
  return arr.map(function(p,i){return '<div class="row"><span class="rk '+rkCls(i)+'">'+(i+1)+'</span><span class="av">'+ini(p.n)+'</span>'
    + '<span class="nm">'+p.n+'<small>'+p.t+'</small></span><span class="val '+(valCls||'lime')+'">'+valFn(p)+'</span></div>';}).join('');
}
function leaderboard(){ return '<div class="lbl">Player rankings · by DSR</div>'+playerRows(PLAYERS.slice().sort(function(a,b){return b.dsr-a.dsr;}),function(p){return p.dsr;},'teal'); }
function dsrList(){ return '<div class="lbl">Top 10 · DSR</div>'+playerRows(PLAYERS.slice().sort(function(a,b){return b.dsr-a.dsr;}).slice(0,10),function(p){return p.dsr;},'teal'); }
function ptsList(){ return '<div class="lbl">Top 10 · points scored</div>'+playerRows(PLAYERS.slice().sort(function(a,b){return b.ps-a.ps;}).slice(0,10),function(p){return p.ps;},'lime'); }
function streaks(){ var s=PLAYERS.filter(function(p){return p.streak>=2;}).sort(function(a,b){return b.streak-a.streak;});
  return '<div class="lbl">🔥 Hot streaks · current win streak</div>'+s.map(function(p,i){return '<div class="row"><span class="rk '+rkCls(i)+'">'+(i+1)+'</span><span class="av">'+ini(p.n)+'</span><span class="nm">'+p.n+'<small>'+p.t+'</small></span><span class="pillsm" style="font-size:12px">W'+p.streak+'</span></div>';}).join(''); }
function shortNm(n){var p=n.split(' ');return p[0]+(p[1]?' '+p[1][0]+'.':'');}
function moverCol(title, arr, up){
  var rows=arr.length?arr.map(function(p,i){return '<div class="row"><span class="rk '+rkCls(i)+'">'+(i+1)+'</span><span class="av">'+ini(p.n)+'</span><span class="nm">'+shortNm(p.n)+'<small>'+p.t+'</small></span><span class="delta '+(up?'up':'dn')+'">'+(up?'▲'+p.delta:'▼'+Math.abs(p.delta))+'</span></div>';}).join('')
    :'<div style="color:var(--fnt);font-size:12px;padding:10px 2px">None this week.</div>';
  return '<div class="mcol"><h4>'+title+'</h4>'+rows+'</div>';
}
function movers(){
  // Two columns: top 6 Movers (gainers ▲) and top 6 Droppers (fallers ▼). No gender split.
  var gain=PLAYERS.filter(function(p){return p.delta>0;}).sort(function(a,b){return b.delta-a.delta;}).slice(0,6);
  var drop=PLAYERS.filter(function(p){return p.delta<0;}).sort(function(a,b){return a.delta-b.delta;}).slice(0,6);
  return '<div class="lbl">DSR rank moves · this week</div><div class="mcols">'+moverCol('Movers',gain,true)+moverCol('Droppers',drop,false)+'</div>';
}
function ladderPlaceholder(lbl){ return '<div class="lbl">'+lbl+'</div><div style="color:var(--fnt);font-size:13px;padding:14px 4px;line-height:1.6">Ladder '+lbl.toLowerCase()+' goes here — same layout, ladder data (rank by Avg / Wins / XP / DR). Movers works identically: top 6, gainers ▲ + fallers ▼.</div>'; }

function renderContent(){
  if(STATE.main==='ladder'){
    if(STATE.sub==='movers') return movers();
    var map={standings:'Ladder standings',leaderboard:'Ladder leaderboard',streaks:'Hot streaks',avg:'Top 10 · average',wins:'Top 10 · wins'};
    return ladderPlaceholder(map[STATE.sub]||'Ladder');
  }
  switch(STATE.sub){
    case 'standings': return standingsTable();
    case 'leaderboard': return leaderboard();
    case 'streaks': return streaks();
    case 'dsr': return dsrList();
    case 'pts': return ptsList();
    case 'movers': return movers();
  }
}
function renderSubpills(){
  var subs=SUBS[STATE.main];
  document.getElementById('subpills').innerHTML=subs.map(function(s){return '<button data-s="'+s[0]+'" class="'+(STATE.sub===s[0]?'on':'')+'">'+s[1]+'</button>';}).join('');
}
function render(){
  renderSubpills();
  document.getElementById('content').innerHTML=renderContent();
  document.querySelectorAll('#mainpills button').forEach(function(b){b.classList.toggle('on',b.dataset.m===STATE.main);b.classList.toggle('ld',STATE.main==='ladder');});
}
document.getElementById('mainpills').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;STATE.main=b.dataset.m;STATE.sub=SUBS[STATE.main][0][0];render();});
document.getElementById('subpills').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;STATE.sub=b.dataset.s;render();});
render();
</script>
</body>
</html>
